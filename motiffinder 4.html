  // Resultate-Block
  const results = document.createElement('div');
  results.className = 'results-section'; results.id = 'results_' + m.id;

  card.appendChild(row1);
  card.appendChild(row2);
  card.appendChild(row3);
  card.appendChild(preview);
  card.appendChild(results);

  // Wenn schon Resultate da: rendern
  if (m.results) renderResults(m);

  return card;
}

function updateMotifPreview(id) {
  const m = motifs.find(x => x.id === id);
  if (!m) return;
  const root = document.getElementById('preview_' + id);
  if (!root) return;
  if (!mf.genome) {
    root.innerHTML = '<span style="color:var(--fg-mute)">Genom laden für Vorschau</span>';
    return;
  }
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok || norm.value.length === 0) {
    root.innerHTML = '<span style="color:var(--fg-mute)">' + (norm.error || 'Konsensus eingeben') + '</span>';
    return;
  }
  const cons = norm.value;
  const both = m.strand === 'both';
  const expected = expectedHitsForMotif(cons, m.mismatches, mf.genome.composition, mf.genome.length, both);

  // Ampel
  let ampel, label;
  if (expected < 500)        { ampel = 'green';  label = 'spezifisch'; }
  else if (expected < 5000)  { ampel = 'yellow'; label = 'moderat'; }
  else if (expected < 50000) { ampel = 'orange'; label = 'unspezifisch'; }
  else                       { ampel = 'red';    label = 'zu unspezifisch'; }

  // Komplexität: Anzahl der unterschiedlichen Hamming-Varianten bei k Mismatches (≤k)
  // = sum_{j=0..k} C(L,j) * 3^j   (jede Position ungleich der Match-Menge)
  // Ist nur für reine ACGT-Konsensus exakt; bei IUPAC schon erweitert. Geben wir als grobe Größe an.
  const L = cons.length;
  let variants = 0;
  for (let j = 0; j <= Math.min(m.mismatches, L); j++) {
    variants += binomial(L, j) * Math.pow(3, j);
  }

  let html = '';
  html += '<div class="preview-row"><span>Länge</span><span class="v">' + L + ' bp</span></div>';
  html += '<div class="preview-row"><span>Zufallserwartung <span class="info-icon" data-tt="zufall">i</span></span><span class="v">' +
          (expected < 1 ? expected.toFixed(2) : Math.round(expected).toLocaleString('de-DE')) +
          ' Treffer</span></div>';
  html += '<div class="preview-row"><span>Varianten (Hamming ≤ ' + m.mismatches + ')</span><span class="v">' +
          variants.toLocaleString('de-DE') + '</span></div>';
  html += '<div class="preview-row"><span>Spezifität</span><span><span class="ampel ' + ampel + '">' + label + '</span></span></div>';
  if (ampel === 'red' && !m.forceScan) {
    html += '<div style="margin-top:6px;color:var(--err);font-size:11px">Scan blockiert. ';
    html += '<button class="action" id="override_' + id + '">Trotzdem scannen</button></div>';
  }
  root.innerHTML = html;

  // Override-Button verkabeln
  const ovBtn = document.getElementById('override_' + id);
  if (ovBtn) ovBtn.addEventListener('click', () => {
    m.forceScan = true;
    updateMotifPreview(id);
  });

  // Scan-Button enabled?
  const card = document.getElementById('card_' + id);
  if (card) {
    const sb = card.querySelector('.scan-btn');
    if (sb) sb.disabled = (ampel === 'red' && !m.forceScan) || L === 0;
  }
}

function binomial(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  k = Math.min(k, n - k);
  let r = 1;
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
  return r;
}

// ---------- Scanner ----------
function scanMotif(id) {
  const m = motifs.find(x => x.id === id);
  if (!m || !mf.twobit) return;
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok || norm.value.length === 0) return;

  const card = document.getElementById('card_' + id);
  const scanBtn = card.querySelector('.scan-btn');
  scanBtn.disabled = true;
  scanBtn.textContent = 'Scannt...';

  // v0.2: Scan im Main-Thread mit setTimeout-Yield, damit UI nicht blockiert.
  // Web-Worker kommt in v0.3 wenn Visualisierung dazu kommt; bei 4 Mb + simples Regex
  // ist Main-Thread mit Yield ausreichend (~200-500 ms).
  const t0 = performance.now();
  setTimeout(() => {
    try {
      const hits = runScan(norm.value, m.mismatches, m.strand, mf.twobit, mf.genome.geneIndex);
      const t1 = performance.now();
      m.results = {
        hits,
        consensus: norm.value,
        mismatches: m.mismatches,
        strand: m.strand,
        scanDurationMs: Math.round(t1 - t0),
        expected: expectedHitsForMotif(norm.value, m.mismatches, mf.genome.composition,
                                        mf.genome.length, m.strand === 'both'),
        sortBy: 'position', sortDir: 'asc',
        filterIntergenicOnly: false
      };
      renderResults(m);
    } catch (err) {
      log('Scan-Fehler: ' + err.message, 'err');
    } finally {
      scanBtn.disabled = false;
      scanBtn.textContent = 'Scan';
    }
  }, 10);
}

function runScan(consensus, mismatches, strand, twobit, geneIndex) {
  const L = consensus.length;
  // Pro Position erlaubte Basen-Set als Bitmask: A=1, C=2, G=4, T=8
  const allowed = new Uint8Array(L);
  for (let i = 0; i < L; i++) {
    let mask = 0;
    for (const b of IUPAC[consensus[i]]) {
      if (b === 'A') mask |= 1;
      else if (b === 'C') mask |= 2;
      else if (b === 'G') mask |= 4;
      else if (b === 'T') mask |= 8;
    }
    allowed[i] = mask;
  }
  const baseToBit = { A: 1, C: 2, G: 4, T: 8, N: 0 };

  // Sequenz für schnellen Zugriff in einen kompakten Uint8Array (mit Bitmask pro Base)
  const total = twobit.length;
  const seqBits = new Uint8Array(total);
  // Aus 2bit-Daten dekodieren
  const data = twobit.data;
  for (let i = 0; i < total; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    seqBits[i] = 1 << bits;  // A=00->1, C=01->2, G=10->4, T=11->8
  }
  // N-Blöcke auf 0 setzen (matcht nichts)
  for (const [ns, nl] of twobit.nBlocks) {
    for (let i = ns; i < ns + nl; i++) seqBits[i] = 0;
  }

  const hitsPlus = [];
  const hitsMinus = [];

  if (strand === 'both' || strand === '+') {
    const positions = total - L + 1;
    for (let p = 0; p < positions; p++) {
      let mm = 0;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[p + i];
        if (sb === 0) { mm = mismatches + 1; break; } // N: nie matcht
        if ((sb & allowed[i]) === 0) {
          mm++;
          if (mm > mismatches) break;
        }
      }
      if (mm <= mismatches) {
        hitsPlus.push({ start: p + 1, end: p + L, strand: 1, mismatches: mm });
      }
    }
  }

  if (strand === 'both' || strand === '-') {
    // Reverse-Complement des Konsensus berechnen
    const rcAllowed = new Uint8Array(L);
    const COMP_MASK = { 1: 8, 2: 4, 4: 2, 8: 1, 0: 0 }; // A<->T, C<->G
    for (let i = 0; i < L; i++) {
      let m = allowed[L - 1 - i];
      let rc = 0;
      if (m & 1) rc |= COMP_MASK[1];
      if (m & 2) rc |= COMP_MASK[2];
      if (m & 4) rc |= COMP_MASK[4];
      if (m & 8) rc |= COMP_MASK[8];
      rcAllowed[i] = rc;
    }
    const positions = total - L + 1;
    for (let p = 0; p < positions; p++) {
      let mm = 0;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[p + i];
        if (sb === 0) { mm = mismatches + 1; break; }
        if ((sb & rcAllowed[i]) === 0) {
          mm++;
          if (mm > mismatches) break;
        }
      }
      if (mm <= mismatches) {
        hitsMinus.push({ start: p + 1, end: p + L, strand: -1, mismatches: mm });
      }
    }
  }

  // Dedup: Wenn Treffer auf + und − bei gleicher Position+Länge, einer mit palindromic-Tag
  const palinKey = h => h.start + ':' + h.end;
  const plusByKey = new Map();
  for (const h of hitsPlus) plusByKey.set(palinKey(h), h);
  const merged = [];
  const minusKeysHandled = new Set();
  for (const h of hitsPlus) {
    const k = palinKey(h);
    if (hitsMinus.find(mh => palinKey(mh) === k)) {
      h.palindromic = true;
      minusKeysHandled.add(k);
    }
    merged.push(h);
  }
  for (const h of hitsMinus) {
    const k = palinKey(h);
    if (minusKeysHandled.has(k)) continue;
    merged.push(h);
  }

  // Sequenzen + Klassifikation
  for (const h of merged) {
    const seq = twobit.get(h.start - 1, h.end - h.start + 1);
    h.sequence = (h.strand === 1) ? seq : revcompString(seq);
    const cl = classifyHit(h.start, h.end, h.strand, geneIndex);
    h.intragenic = cl.intragenic;
    h.nearestGene = cl.nearestGene;
    h.distanceToGeneStart = cl.distanceToGeneStart;
    h.strandRelToGene = cl.strandRelToGene;
    h.score = consensus.length - h.mismatches;
  }

  // Sortierung default nach Position
  merged.sort((a, b) => a.start - b.start);

  return merged;
}

function revcompString(s) {
  const comp = { A: 'T', T: 'A', C: 'G', G: 'C', N: 'N' };
  let r = '';
  for (let i = s.length - 1; i >= 0; i--) r += (comp[s[i]] || 'N');
  return r;
}

// ---------- Resultate-Rendering ----------
function renderResults(m) {
  const root = document.getElementById('results_' + m.id);
  if (!root) return;
  if (!m.results) { root.classList.remove('show'); return; }
  root.classList.add('show');

  const r = m.results;
  const all = r.hits;
  const filtered = r.filterIntergenicOnly ? all.filter(h => !h.intragenic) : all;

  // Statistik
  const obs = all.length;
  const exp = r.expected;
  const ratio = exp > 0 ? obs / exp : 0;
  const log2r = (obs > 0 && exp > 0) ? Math.log2(ratio) : null;
  const z = exp > 0 ? (obs - exp) / Math.sqrt(exp) : 0;

  let stats = '';
  stats += '<div class="results-stats">';
  stats += '<span class="k">Konsensus</span><span class="v">' + r.consensus + ' (' + r.consensus.length + ' bp, ≤' + r.mismatches + ' MM, Strang ' + r.strand + ')</span>';
  stats += '<span class="k">Zufallserwartung <span class="info-icon" data-tt="zufall">i</span></span><span class="v">' +
            Math.round(exp).toLocaleString('de-DE') + '</span>';
  stats += '<span class="k">Gefunden</span><span class="v">' + obs.toLocaleString('de-DE') + '</span>';
  let ratioLabel;
  if (ratio >= 1) ratioLabel = 'Anreicherung';
  else            ratioLabel = 'Verarmung';
  stats += '<span class="k">' + ratioLabel + ' <span class="info-icon" data-tt="anreicherung">i</span></span><span class="v">' +
            ratio.toFixed(2) + '× ' + (log2r !== null ? '(log₂ ' + (log2r >= 0 ? '+' : '') + log2r.toFixed(2) + ')' : '') +
            (log2r !== null && log2r < -2 ? '<span class="badge-warn">stark verarmt — Selektion?</span>' : '') +
            '</span>';
  stats += '<span class="k">Z-Score <span class="info-icon" data-tt="zscore">i</span></span><span class="v">' +
            (isFinite(z) ? z.toFixed(2) : '—') + '</span>';
  stats += '<span class="k">Scan-Dauer</span><span class="v">' + r.scanDurationMs + ' ms</span>';
  stats += '</div>';

  // Controls
  stats += '<div class="results-controls">';
  stats += '<label><input type="checkbox" id="filt_intergenic_' + m.id + '"' + (r.filterIntergenicOnly ? ' checked' : '') + '> nur intergenische Treffer</label>';
  stats += '<button id="copy_tsv_' + m.id + '">TSV kopieren</button>';
  stats += '<span style="color:var(--fg-mute)">' + filtered.length + ' angezeigt</span>';
  stats += '</div>';

  // Tabelle
  const LIMIT = 1000;
  const showHits = filtered.slice(0, LIMIT);
  let table = '<table class="results-table"><thead><tr>';
  const cols = [
    { k: 'start', t: 'Pos' },
    { k: 'strand', t: 'Strang' },
    { k: 'sequence', t: 'Sequenz' },
    { k: 'score', t: 'Score' },
    { k: 'distanceToGeneStart', t: 'Δ Gen-Start', tt: 'distance' },
    { k: 'strandRelToGene', t: 'Strangbezug' },
    { k: 'context', t: 'Kontext' },
    { k: 'nearestGene', t: 'Gen' }
  ];
  for (const c of cols) {
    const sorted = (r.sortBy === c.k) ? ' class="sorted"' : '';
    const arr = (r.sortBy === c.k) ? (r.sortDir === 'asc' ? ' ↑' : ' ↓') : '';
    table += '<th data-sort="' + c.k + '"' + sorted + '>' + c.t + arr + '</th>';
  }
  table += '</tr></thead><tbody>';
  for (const h of showHits) {
    table += '<tr>';
    table += '<td>' + h.start.toLocaleString('de-DE') + '</td>';
    table += '<td>' + (h.strand === 1 ? '+' : '−') + (h.palindromic ? ' (pal)' : '') + '</td>';
    table += '<td>' + colorizeSequence(h.sequence, r.consensus, h.strand) + '</td>';
    table += '<td>' + h.score + '/' + r.consensus.length + '</td>';
    table += '<td>' + (h.distanceToGeneStart !== null ? (h.distanceToGeneStart >= 0 ? '+' : '') + h.distanceToGeneStart : '—') + '</td>';
    table += '<td>' + (h.strandRelToGene || '—') + '</td>';
    table += '<td><span class="ctx-pill ' + (h.intragenic ? 'intragenic' : 'intergenic') + '">' + (h.intragenic ? 'intra' : 'inter') + '</span></td>';
    table += '<td>' + (h.nearestGene || '—') + '</td>';
    table += '</tr>';
  }
  if (filtered.length > LIMIT) {
    table += '<tr><td colspan="8" class="results-overflow">... ' + (filtered.length - LIMIT).toLocaleString('de-DE') + ' weitere Treffer ausgeblendet</td></tr>';
  }
  table += '</tbody></table>';

  root.innerHTML = stats + table;

  // Event-Handlers
  document.getElementById('filt_intergenic_' + m.id).addEventListener('change', (e) => {
    r.filterIntergenicOnly = e.target.checked;
    renderResults(m);
  });
  document.getElementById('copy_tsv_' + m.id).addEventListener('click', () => {
    const lines = ['#position\tstrand\tsequence\tscore\tdistance_to_gene_start\tstrand_rel_to_gene\tcontext\tnearest_gene\tpalindromic'];
    for (const h of filtered) {
      lines.push([h.start, h.strand === 1 ? '+' : '-', h.sequence, h.score + '/' + r.consensus.length,
                  h.distanceToGeneStart !== null ? h.distanceToGeneStart : '',
                  h.strandRelToGene || '', h.intragenic ? 'intragenic' : 'intergenic',
                  h.nearestGene || '', h.palindromic ? 'palindromic' : ''].join('\t'));
    }
    const tsv = lines.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(tsv).then(
        () => log('TSV (' + filtered.length + ' Zeilen) in Zwischenablage', 'ok'),
        (e) => log('Clipboard-Fehler: ' + e, 'err')
      );
    } else {
      log('Clipboard nicht verfügbar — TSV in Debug-Log', 'warn');
      logPre(tsv.length > 4000 ? tsv.substring(0, 4000) + '\n[abgeschnitten]' : tsv);
    }
  });
  // Sort-Header
  for (const th of root.querySelectorAll('th[data-sort]')) {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (r.sortBy === k) r.sortDir = r.sortDir === 'asc' ? 'desc' : 'asc';
      else { r.sortBy = k; r.sortDir = 'asc'; }
      sortHits(r);
      renderResults(m);
    });
  }
}

function sortHits(r) {
  const dir = r.sortDir === 'asc' ? 1 : -1;
  const k = r.sortBy;
  r.hits.sort((a, b) => {
    const av = a[k], bv = b[k];
    if (av === null && bv === null) return 0;
    if (av === null) return 1;
    if (bv === null) return -1;
    if (typeof av === 'string') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });
}

function colorizeSequence(seq, consensus, strand) {
  // consensus ist immer in + Strang-Sicht. Wenn Treffer auf − liegt, ist h.sequence schon revcomp.
  // Pro Position: matcht das Zeichen das IUPAC-Set?
  let out = '';
  for (let i = 0; i < seq.length; i++) {
    const b = seq[i].toUpperCase();
    const cls = 'b-' + (['A','C','G','T','N'].includes(b) ? b : 'N');
    const allowed = IUPAC[consensus[i]] || ['A','C','G','T'];
    const isMatch = allowed.includes(b);
    out += '<span class="seq-base ' + cls + (isMatch ? '' : ' mismatch') + '">' + b + '</span>';
  }
  return out;
}

const TOOLTIPS = {
  motiv: { title: 'Motiv', body: 'DNA-Sequenz-Muster (Konsensus oder Matrix), nach dem im Genom gesucht wird. Bindestellen für Regulatoren, Ribosomenbindungsstellen, Promotor-Boxen sind typische Beispiele.' },
  konsensus: { title: 'Konsensus', body: 'Idealsequenz eines Motivs in IUPAC-Notation. Repräsentiert die häufigste Base pro Position oder eine Gruppe erlaubter Basen (z.B. R = A oder G).' },
  iupac: { title: 'IUPAC', body: 'Standard-Code für Mehrdeutigkeit in DNA-Sequenzen. R=A/G, Y=C/T, N=alle, etc. Siehe Legende über der Eingabe.' },
  mismatches: { title: 'Mismatches', body: 'Erlaubte Abweichungen vom Konsensus. Bei 2 Mismatches werden Treffer mit bis zu 2 nicht-passenden Positionen akzeptiert. Höhere Mismatch-Zahl erhöht Treffer-Anzahl exponentiell.' },
  strang: { title: 'Strang', body: 'DNA-Doppelstrang: + (Sense) und − (Antisense). Bei "beide" wird auch das Reverse-Complement gesucht. Palindromische Motive ergeben dann einen Treffer mit Flag (pal).' },
  zufall: { title: 'Zufallserwartung', body: 'Wieviele Treffer rein zufällig erwartet würden, basierend auf der Genom-Komposition (A/C/G/T-Häufigkeiten) und der Motiv-Spezifität. Hilft einzuschätzen ob das Motiv spezifisch genug ist.' },
  anreicherung: { title: 'Anreicherung / Verarmung', body: 'Verhältnis tatsächlich gefundener Treffer zur Zufallserwartung. >1 = häufiger als zufällig (Anreicherung), <1 = seltener (Verarmung). Starke Verarmung kann auf Selektion gegen das Motiv hinweisen, z.B. Restriktions-Schnittstellen-Vermeidung.' },
  zscore: { title: 'Z-Score', body: 'Standardisierte Abweichung von der Erwartung. (Beobachtet − Erwartet) / √Erwartet. |Z|>2 deutet auf signifikante Abweichung, |Z|>5 stark signifikant. Bei sehr großen Genomen werden auch kleine Effekte hoch-Z, deshalb mit Anreicherungs-Verhältnis kombiniert betrachten.' },
  distance: { title: 'Distanz zum Gen-Start', body: 'Abstand vom Treffer zum Start des nächstgelegenen Gens, in bp. Negativ = upstream (typisch für Promotor-Region), 0 = am Start, positiv = innerhalb oder downstream des Gens.' }
};

let activeTooltipTrigger = null;

function setupTooltips() {
  const box = document.getElementById('tooltip-box');
  const close = document.getElementById('tt-close');

  document.addEventListener('click', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger) {
      e.stopPropagation();
      const key = trigger.dataset.tt;
      if (!key) return;
      if (activeTooltipTrigger === trigger) {
        hideTooltip();
        return;
      }
      showTooltip(trigger, key);
    } else if (!e.target.closest('#tooltip-box')) {
      hideTooltip();
    }
  });

  close.addEventListener('click', (e) => {
    e.stopPropagation();
    hideTooltip();
  });

  // Desktop: Hover
  document.addEventListener('mouseover', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger && trigger !== activeTooltipTrigger) {
      const key = trigger.dataset.tt;
      if (key && TOOLTIPS[key]) {
        clearTimeout(window._ttHoverTimeout);
        window._ttHoverTimeout = setTimeout(() => showTooltip(trigger, key), 250);
      }
    }
  });
  document.addEventListener('mouseout', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger) clearTimeout(window._ttHoverTimeout);
  });
}

function showTooltip(trigger, key) {
  const tt = TOOLTIPS[key];
  if (!tt) return;
  const box = document.getElementById('tooltip-box');
  document.getElementById('tt-title-text').textContent = tt.title;
  document.getElementById('tt-body').textContent = tt.body;
  box.classList.add('show');

  // Position berechnen — bevorzugt unterhalb, sonst oberhalb
  const r = trigger.getBoundingClientRect();
  box.style.left = '0px'; box.style.top = '0px'; // reset für Messung
  const bb = box.getBoundingClientRect();
  let left = r.left + r.width / 2 - bb.width / 2;
  let top = r.bottom + 8;
  if (top + bb.height > window.innerHeight - 10) {
    top = r.top - bb.height - 8;
  }
  if (left < 10) left = 10;
  if (left + bb.width > window.innerWidth - 10) left = window.innerWidth - bb.width - 10;
  box.style.left = left + 'px';
  box.style.top = top + 'px';

  if (activeTooltipTrigger) activeTooltipTrigger.classList.remove('active');
  trigger.classList.add('active');
  activeTooltipTrigger = trigger;
}

function hideTooltip() {
  document.getElementById('tooltip-box').classList.remove('show');
  if (activeTooltipTrigger) activeTooltipTrigger.classList.remove('active');
  activeTooltipTrigger = null;
}

// ---------- Init v0.2 ----------
renderIupacLegend();
setupTooltips();
document.getElementById('add-motif-btn').addEventListener('click', () => addMotif());

// API für Konsole erweitern
window.mf.scanMotif = scanMotif;
window.mf.motifs = () => motifs;
window.mf._internal.computeComposition = computeComposition;
window.mf._internal.expectedHitsForMotif = expectedHitsForMotif;
window.mf._internal.runScan = runScan;
window.mf._internal.classifyHit = classifyHit;

log('Motif Finder ' + VERSION + ' bereit. ?debug für Eruda, Debug-Panel unten rechts.', 'info');
