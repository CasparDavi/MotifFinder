  function matchFromBlockInline(blockIdx, posInGenome, mmHalfPoints, hardCount, spacersList, startPos) {
    if (blockIdx >= blocks.length) {
      output.push({
        start: startPos + 1,
        end: posInGenome,
        strand: strandCode,
        mmHalfPoints: mmHalfPoints,
        hardMm: hardCount,
        softMm: mmHalfPoints - hardCount * 2,   // jeder Soft = 1 HalfPoint
        spacers: spacersList.slice()
      });
      return;
    }
    const blk = blocks[blockIdx];
    if (blk.type === 'fixed') {
      const consMask = fixedMasks[blockIdx];
      const spaceMask = spaceMasks ? spaceMasks[blockIdx] : null;
      const L = blk.seq.length;
      if (posInGenome + L > total) return;
      let mm = mmHalfPoints;
      let hard = hardCount;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[posInGenome + i];
        if (sb === 0) return; // N-Base: kein Match
        if ((sb & consMask[i]) === 0) {
          // Nicht im Konsensus
          if (spaceMask && (sb & spaceMask[i]) !== 0) {
            // Aber im Datenraum → Soft-MM = 1 HalfPoint
            mm += 1;
          } else {
            // Auch nicht im Datenraum → Hard-MM = 2 HalfPoints
            mm += 2;
            hard++;
          }
          if (mm > maxMmHalfPoints) return;
        }
      }
      matchFromBlockInline(blockIdx + 1, posInGenome + L, mm, hard, spacersList, startPos);
    } else {
      for (let len = blk.min; len <= blk.max; len++) {
        if (posInGenome + len > total) break;
        spacersList.push(len);
        matchFromBlockInline(blockIdx + 1, posInGenome + len, mmHalfPoints, hardCount, spacersList, startPos);
        spacersList.pop();
      }
    }
  }
}

function revcompString(s) {
  // IUPAC-aware Komplement
  const comp = {
    'A':'T', 'T':'A', 'C':'G', 'G':'C',
    'R':'Y', 'Y':'R',  // R(A/G) <-> Y(C/T)
    'M':'K', 'K':'M',  // M(A/C) <-> K(G/T)
    'S':'S', 'W':'W',  // selbstkomplementär
    'B':'V', 'V':'B',  // B(C/G/T) <-> V(A/C/G)
    'D':'H', 'H':'D',  // D(A/G/T) <-> H(A/C/T)
    'N':'N',
    'a':'t', 't':'a', 'c':'g', 'g':'c',
    'r':'y', 'y':'r', 'm':'k', 'k':'m',
    's':'s', 'w':'w',
    'b':'v', 'v':'b', 'd':'h', 'h':'d',
    'n':'n'
  };
  let r = '';
  for (let i = s.length - 1; i >= 0; i--) r += (comp[s[i]] || 'N');
  return r;
}

// ---------- Resultate-Rendering ----------
// v0.8.1: Treffer-Tabelle für Hairpin-Karten. Eigene Spalten für Hairpin-spezifische
// Felder (ΔG, Stem, Loop, T-Tract). Sortierbar, mit TSV-Export, Selektion und Filter.
function renderHairpinResults(m, root) {
  const r = m.results;
  const all = r.hits;
  // Filter
  let filtered = all;
  if (r.filterIntergenicOnly) filtered = filtered.filter(h => !h.intragenic);

  // Sort
  const sortBy = r.sortBy || 'deltaG';
  const sortDir = r.sortDir || 'asc';
  filtered = filtered.slice();
  filtered.sort((a, b) => {
    let av = a[sortBy], bv = b[sortBy];
    if (av === undefined || av === null) av = 0;
    if (bv === undefined || bv === null) bv = 0;
    if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir === 'asc' ? av - bv : bv - av;
  });

  const showHits = filtered.slice(0, 5000);

  // v0.8.3d: ist T-Tract-Suche aktiv? (für Spalten-Anzeige und Hint-Text)
  const tTractEnabled = !!(m.results.scanParams && m.results.scanParams.tTractEnabled);

  // Header-Statistik
  let html = '';
  html += '<div class="results-controls">';
  html += '<label><input type="checkbox" id="filt_intergenic_' + m.id + '"' +
          (r.filterIntergenicOnly ? ' checked' : '') + '> nur intergenische Treffer</label>';
  html += '<button id="copy_tsv_' + m.id + '">TSV kopieren</button>';
  html += '<span style="color:var(--fg-mute)">' + filtered.length + ' angezeigt</span>';
  if (r.scanTimeMs) {
    html += '<span style="color:var(--fg-mute)">· Scan-Zeit: ' + (r.scanTimeMs/1000).toFixed(2) + ' s</span>';
  }
  if (filtered.length > 0) {
    const dgMin = Math.min(...filtered.map(h => h.deltaG));
    const dgMax = Math.max(...filtered.map(h => h.deltaG));
    html += '<span style="color:var(--fg-mute)">· ΔG ' + dgMin.toFixed(1) + ' bis ' + dgMax.toFixed(1) + ' kcal/mol</span>';
  }
  html += '</div>';

  // v0.8.3d: globale Spalten-Breiten für Struktur-Ausrichtung
  // Damit alle linken Schenkel rechtsbündig auf gleicher Spalte enden,
  // alle Loops in der Mitte, alle rechten Schenkel + T-Tracts links bündig.
  //
  // v0.8.3d: Bulges erweitern die ausgerichtete Länge (BP + Bulge-Bases auf
  // einer Seite, BP + Filler auf der anderen).
  let maxLeftLen = 0, maxLoopLen = 0, maxRightLen = 0;
  for (const h of showHits) {
    // alignedLen = stemLen + sum(bulge-Längen) — einseitig ergänzt durch Filler
    let alignedLen = h.stemLen || (h.stemTop ? h.stemTop.length : 0);
    for (const b of (h.bulges || [])) {
      alignedLen += (b.bases || '').length;
    }
    if (alignedLen > maxLeftLen) maxLeftLen = alignedLen;
    if (alignedLen > maxRightLen) maxRightLen = alignedLen;
    if (h.loop && h.loop.length > maxLoopLen) maxLoopLen = h.loop.length;
  }
  // Fallbacks falls keine Treffer:
  if (maxLeftLen === 0) maxLeftLen = 6;
  if (maxLoopLen === 0) maxLoopLen = 4;
  if (maxRightLen === 0) maxRightLen = 6;

  // Tabelle in Wrap
  html += '<div class="results-table-wrap"><table class="results-table"><thead><tr>';
  html += '<th class="col-sel"><input type="checkbox" class="row-checkbox" id="sel_master_' + m.id + '" title="Alle anzeigen / keine"></th>';

  const cols = [
    { k: 'start',     t: 'Pos',     tip: 'Startposition des Hairpins (Stem-5\') im Genom, 1-basiert.' },
    { k: 'strand',    t: 'Strang',  tip: '+ = Hairpin auf Sense-Strang. − = auf Antisense-Strang. Im UTR-Modus immer auf dem Strang des zugehörigen Gens.' },
    { k: 'sequence',  t: 'Struktur', tip: 'Stem + Loop + Stem in Transkriptionsrichtung (DNA-Anzeige, T statt U). Linker Schenkel rechtsbündig, Loop zentriert, rechter Schenkel + T-Tract linksbündig. Mismatches und Loop in grau, T-Tract in weiß. Dot-Bracket im Tooltip.' },
    { k: 'deltaG',    t: 'ΔG',      tip: 'Freie Bildungsenergie des Hairpins bei 37°C in kcal/mol (Turner 2004 NN-Modell). Negativer = stabiler.' },
    { k: 'stemLen',   t: 'Stem',    tip: 'Stem-Länge in bp (Watson-Crick + GU-Wobble + ggf. interne Mismatches).' },
    { k: 'loopLen',   t: 'Loop',    tip: 'Loop-Länge in nt.' },
    { k: 'mmCount',   t: 'MM',      tip: 'Anzahl 1×1-Mismatches im Stem.', hideIf: () => !showHits.some(h => (h.mmCount|0) > 0) },
    { k: 'bulgeCount',t: 'Bulge',  tip: 'Anzahl Bulges im Stem (ungepaarte Bases auf einer Seite). Hover zeigt Position und Sequenz.', hideIf: () => !showHits.some(h => (h.bulgeCount|0) > 0) }
  ];
  if (tTractEnabled) {
    cols.push({ k: 'tTractCount', t: 'T-Tract', tip: 'Anzahl T-Nukleotide direkt 3\' des Stems im Such-Fenster. Hoher Wert (≥6) deutet auf rho-unabhängigen Terminator (intrinsischer Transkriptions-Stop).' });
  }
  cols.push(
    { k: 'distanceToGeneStart', t: 'Δ Gen-Start', tip: 'Distanz zum Start des nächsten Gens. Bei UTR3-Suche: typisch hoch positiv (downstream Gen-Ende).' },
    { k: 'context',   t: 'Kontext', tip: 'inter / intra: liegt der Hairpin außerhalb (typisch für Terminatoren) oder innerhalb eines Gens.' },
    { k: 'nearestGene', t: 'Gen',   tip: 'Zugehöriges Gen: bei UTR-Modus das Anker-Gen, sonst nächstes.', sticky: true }
  );

  // Spalten filtern (hideIf kann Spalte ausblenden)
  const visibleCols = cols.filter(c => !(c.hideIf && c.hideIf()));

  for (const c of visibleCols) {
    const cls = [];
    if (sortBy === c.k) cls.push('sorted');
    if (c.sticky) cls.push('sticky-gene');
    const clsAttr = cls.length ? ' class="' + cls.join(' ') + '"' : '';
    const arr = (sortBy === c.k) ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';
    const tipAttr = c.tip ? ' title="' + escapeAttr(c.tip) + '"' : '';
    html += '<th data-sort="' + c.k + '"' + clsAttr + tipAttr + '>' + c.t + arr + '</th>';
  }
  html += '</tr></thead><tbody>';

  if (!r.selected) r.selected = new Set();
  for (const h of showHits) {
    const hkey = h.start + ':' + h.end + ':' + h.strand;
    const isSel = r.selected.has(hkey);
    html += '<tr>';
    html += '<td class="col-sel"><input type="checkbox" class="row-checkbox row-sel-' + m.id + '" data-hkey="' + hkey + '"' + (isSel ? ' checked' : '') + '></td>';
    html += '<td>' + h.start.toLocaleString('de-DE') + '</td>';
    html += '<td>' + (h.strand === 1 ? '+' : h.strand === -1 ? '−' : '±') + '</td>';

    // ===== Struktur-Spalte (drei Sub-Spans, monospace, ausgerichtet) =====
    // v0.8.3d: mit Bulge-Support. Top und Bot werden positionsweise aligniert,
    // Bulges erzeugen auf der jeweils anderen Seite einen Filler "·".
    //
    // Aufbau:
    //   alignedPositions = Array von { top, bot, type }
    //     - top, bot: Buchstaben (oder '·' für Filler)
    //     - type: 'bp' | 'mm' | 'bulge_top' | 'bulge_bot'
    // Reihenfolge: außen → innen (also wie stemTop/stemBot)

    const stemTopDna = (h.stemTop || '').replace(/U/g, 'T');
    const stemBotDna = (h.stemBot || '').replace(/U/g, 'T');
    const loopDna = (h.loop || '').replace(/U/g, 'T');
    const tTractSeqDna = h.tTractSeq ? h.tTractSeq.replace(/U/g, 'T') : '';

    const mmSet = new Set(h.mmPositions || []);
    // Bulge-Map: kInside (außen→innen) → Bulge-Eintrag
    const bulgeMap = new Map();
    for (const b of (h.bulges || [])) {
      bulgeMap.set(b.kInside, b);
    }

    // Aufbau alignedPositions
    const aligned = [];  // {top, bot, type}
    const stemLen = stemTopDna.length;
    for (let k = 0; k < stemLen; k++) {
      // BP- oder MM-Position
      aligned.push({
        top: stemTopDna[k],
        bot: stemBotDna[k].replace(/T/g, 'T'),  // bot[k] paart mit top[k]
        type: mmSet.has(k) ? 'mm' : 'bp'
      });
      // Bulge nach Position k? (Bulge sitzt zwischen BP[k] und BP[k+1])
      if (bulgeMap.has(k)) {
        const b = bulgeMap.get(k);
        const bulgeBasesDna = b.bases.replace(/U/g, 'T');
        for (let j = 0; j < bulgeBasesDna.length; j++) {
          if (b.side === 'top') {
            aligned.push({ top: bulgeBasesDna[j], bot: '·', type: 'bulge_top' });
          } else {
            aligned.push({ top: '·', bot: bulgeBasesDna[j], type: 'bulge_bot' });
          }
        }
      }
    }

    // Linker Schenkel (Stem-Top, außen→innen): Padding links
    const totalLen = aligned.length;
    let leftHtml = '';
    const leftPad = Math.max(maxLeftLen, maxRightLen) - totalLen;
    if (leftPad > 0) leftHtml += '<span class="hp-pad">' + '&nbsp;'.repeat(leftPad) + '</span>';
    for (const pos of aligned) {
      const base = pos.top;
      if (pos.type === 'bp') {
        leftHtml += '<span class="hp-paired b-' + base + '">' + escapeHtml(base) + '</span>';
      } else if (pos.type === 'bulge_bot') {
        // Filler — andere Seite hat Bulge, hier nur Punkt
        leftHtml += '<span class="hp-pad">·</span>';
      } else {
        // MM oder bulge_top: ungepaart
        leftHtml += '<span class="hp-unpaired">' + escapeHtml(base) + '</span>';
      }
    }

    // Loop: zentriert
    let loopHtml = '';
    const loopPad = maxLoopLen - loopDna.length;
    const loopPadL = Math.floor(loopPad / 2);
    const loopPadR = loopPad - loopPadL;
    if (loopPadL > 0) loopHtml += '<span class="hp-pad">' + '&nbsp;'.repeat(loopPadL) + '</span>';
    for (const base of loopDna) {
      loopHtml += '<span class="hp-unpaired">' + escapeHtml(base) + '</span>';
    }
    if (loopPadR > 0) loopHtml += '<span class="hp-pad">' + '&nbsp;'.repeat(loopPadR) + '</span>';

    // Rechter Schenkel (Stem-Bot, in Transkriptions-Richtung 5'→3'):
    // aligned ist außen→innen. Für rechten Schenkel müssen wir UMDREHEN
    // (weil rechter Schenkel im Transkript geht: innen → außen, also Loop-Ende → Helix-Ende)
    let rightHtml = '';
    for (let i = aligned.length - 1; i >= 0; i--) {
      const pos = aligned[i];
      const base = pos.bot;
      if (pos.type === 'bp') {
        rightHtml += '<span class="hp-paired b-' + base + '">' + escapeHtml(base) + '</span>';
      } else if (pos.type === 'bulge_top') {
        rightHtml += '<span class="hp-pad">·</span>';
      } else {
        // MM oder bulge_bot: ungepaart
        rightHtml += '<span class="hp-unpaired">' + escapeHtml(base) + '</span>';
      }
    }
    const rightPad = Math.max(maxLeftLen, maxRightLen) - totalLen;
    if (rightPad > 0) rightHtml += '<span class="hp-pad">' + '&nbsp;'.repeat(rightPad) + '</span>';

    // T-Tract direkt anschließend, in weiß. Nur die "echten" T's anzeigen, max 12 Zeichen.
    let tTractHtml = '';
    if (tTractEnabled && tTractSeqDna) {
      // Anzeige des aktuellen T-Tract-Window-Inhalts (kann auch andere Bases enthalten)
      const showLen = Math.min(tTractSeqDna.length, 12);
      tTractHtml = '<span class="hp-ttract">' + escapeHtml(tTractSeqDna.substring(0, showLen)) + '</span>';
    }

    // Tooltip mit Dot-Bracket und Stem|Loop|Stem-Sequenzen.
    // stemBot in Top-Reading-Richtung (5'→3' entlang Transkript) = stemBotFull, weil
    // stemBotFull schon im Genom 5'→3' steht (oder im Transcript bei rc-Strang).
    const stemBotShow = (h.stemBotFull || stemBotDna).replace(/U/g, 'T');
    const tooltipText = (h.dotBracket || '') + '   ' +
                        (h.stemTopFull || stemTopDna).replace(/U/g, 'T') + '|' +
                        loopDna + '|' +
                        stemBotShow +
                        (tTractEnabled && tTractSeqDna ? '   T-Tract: ' + tTractSeqDna : '');

    html += '<td class="hp-struct" title="' + escapeAttr(tooltipText) + '">' +
            '<span class="hp-left">' + leftHtml + '</span>' +
            '<span class="hp-loop">' + loopHtml + '</span>' +
            '<span class="hp-right">' + rightHtml + '</span>' +
            tTractHtml +
            '</td>';

    // ΔG
    const dgClass = h.deltaG < -10 ? 'color:#81c784;font-weight:bold' :
                    h.deltaG < -7  ? 'color:#88c468' :
                    h.deltaG < -5  ? 'color:var(--fg)' :
                                     'color:var(--fg-mute)';
    html += '<td style="' + dgClass + ';font-family:ui-monospace,monospace">' + h.deltaG.toFixed(2) + '</td>';
    html += '<td>' + h.stemLen + '</td>';
    html += '<td>' + h.loopLen + '</td>';
    // MM (nur wenn Spalte sichtbar)
    if (visibleCols.some(c => c.k === 'mmCount')) {
      const mmc = h.mmCount | 0;
      const mmClass = mmc > 0 ? 'color:var(--warn)' : 'color:var(--fg-mute)';
      html += '<td style="' + mmClass + ';font-family:ui-monospace,monospace">' + mmc + '</td>';
    }
    // Bulge (nur wenn Spalte sichtbar)
    if (visibleCols.some(c => c.k === 'bulgeCount')) {
      const buc = h.bulgeCount | 0;
      const buClass = buc > 0 ? 'color:var(--warn)' : 'color:var(--fg-mute)';
      const buTip = buc > 0
        ? (h.bulges || []).map(b => b.side + ':' + b.bases).join(', ')
        : '';
      html += '<td style="' + buClass + ';font-family:ui-monospace,monospace" title="' + escapeAttr(buTip) + '">' + buc + '</td>';
    }
    // T-Tract (nur wenn aktiviert)
    if (tTractEnabled) {
      const tColor = h.tTractCount >= 6 ? 'color:#ffffff;font-weight:bold' :
                     h.tTractCount >= 4 ? 'color:var(--fg)' : 'color:var(--fg-mute)';
      html += '<td style="' + tColor + ';font-family:ui-monospace,monospace">' + (h.tTractCount || 0) + '/' + (m.results.scanParams.tTractWindow || 8) + '</td>';
    }
    html += '<td>' + (h.distanceToGeneStart !== null && h.distanceToGeneStart !== undefined ?
                     ((h.distanceToGeneStart >= 0 ? '+' : '') + h.distanceToGeneStart) : '—') + '</td>';
    html += '<td><span class="ctx-pill ' + (h.intragenic ? 'intragenic' : 'intergenic') + '">' + (h.intragenic ? 'intra' : 'inter') + '</span></td>';
    html += '<td class="sticky-gene">' + (h.nearestGene || '—') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  if (filtered.length > showHits.length) {
    html += '<div class="results-overflow" style="color:var(--warn);padding:6px;font-size:11px">' +
            'Zeige erste ' + showHits.length + ' von ' + filtered.length + ' Treffern' + '</div>';
  }
  if (filtered.length === 0) {
    html += '<div style="color:var(--fg-mute);text-align:center;padding:12px;font-size:12px">' +
            'Keine Hairpins erfüllen die Kriterien. ΔG-Schwelle lockern?' +
            (tTractEnabled ? ' Oder T-Tract-Anforderung reduzieren?' : '') +
            '</div>';
  }

  // v0.8.3d: Panel-Sektion (Genom-Position pro Treffer mit Genen)
  // Wie bei normalen Motif-Karten — zeigt selektierte (oder Top-N) Treffer
  // als kleine Canvas-Streifen mit Gen-Annotation in der Umgebung.
  const panelHtml = '<div class="panel-section" id="panels_' + m.id + '">' +
                    '<div class="panel-section-header">' +
                      '<span class="ps-title" id="panels_title_' + m.id + '">Panels</span>' +
                      '<div class="ps-actions">' +
                        '<button id="panels_clear_' + m.id + '">Auswahl löschen</button>' +
                        '<button id="panels_toggle_' + m.id + '">Einklappen</button>' +
                      '</div>' +
                    '</div>' +
                    '<div class="panel-list" id="panel_list_' + m.id + '"></div>' +
                  '</div>';

  root.innerHTML = html + panelHtml;

  // Event-Handlers
  const filtBox = document.getElementById('filt_intergenic_' + m.id);
  if (filtBox) {
    filtBox.addEventListener('change', (e) => {
      r.filterIntergenicOnly = e.target.checked;
      renderHairpinResults(m, root);
    });
  }
  const tsvBtn = document.getElementById('copy_tsv_' + m.id);
  if (tsvBtn) {
    tsvBtn.addEventListener('click', () => {
      const lines = [];
      lines.push(['#position', 'strand', 'stem_top', 'loop_seq', 'stem_bot_3to5', 'stem_len', 'loop_len',
                  'mm_count', 'mm_positions',
                  'bulge_count', 'bulges',
                  'delta_g_kcalmol', 'dot_bracket', 't_tract_count', 't_tract_seq',
                  'distance_to_gene', 'context', 'nearest_gene'].join('\t'));
      for (const h of filtered) {
        const bulgeStr = (h.bulges || []).map(b => b.side + ':k' + b.kInside + ':' + b.bases).join(';');
        lines.push([
          h.start, h.strand === 1 ? '+' : (h.strand === -1 ? '-' : '±'),
          h.stemTop || '', h.loop || '', h.stemBot || '',
          h.stemLen, h.loopLen,
          h.mmCount || 0, (h.mmPositions || []).join(','),
          h.bulgeCount || 0, bulgeStr,
          h.deltaG.toFixed(3), h.dotBracket || '',
          h.tTractCount || 0, h.tTractSeq || '',
          h.distanceToGeneStart !== null && h.distanceToGeneStart !== undefined ? h.distanceToGeneStart : '',
          h.intragenic ? 'intra' : 'inter',
          h.nearestGene || ''
        ].join('\t'));
      }
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        log('TSV kopiert (' + filtered.length + ' Zeilen)', 'ok');
      });
    });
  }
  // Sort-Handler auf Headers
  root.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.getAttribute('data-sort');
      if (r.sortBy === k) {
        r.sortDir = r.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        r.sortBy = k;
        r.sortDir = (k === 'deltaG' || k === 'distanceToGeneStart') ? 'asc' : 'desc';
      }
      renderHairpinResults(m, root);
    });
  });
  // Selektions-Handler
  root.querySelectorAll('.row-sel-' + m.id).forEach(cb => {
    cb.addEventListener('change', () => {
      const k = cb.getAttribute('data-hkey');
      if (cb.checked) r.selected.add(k); else r.selected.delete(k);
      updatePanels(m);
    });
  });
  const masterCb = document.getElementById('sel_master_' + m.id);
  if (masterCb) {
    masterCb.addEventListener('change', () => {
      if (masterCb.checked) {
        for (const h of filtered) r.selected.add(h.start + ':' + h.end + ':' + h.strand);
      } else {
        r.selected.clear();
      }
      renderHairpinResults(m, root);
    });
  }
  // Panel-Section-Handler
  const clearBtn = document.getElementById('panels_clear_' + m.id);
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      r.selected.clear();
      renderHairpinResults(m, root);
    });
  }
  const toggleBtn = document.getElementById('panels_toggle_' + m.id);
  const panelList = document.getElementById('panel_list_' + m.id);
  if (toggleBtn && panelList) {
    toggleBtn.addEventListener('click', () => {
      panelList.classList.toggle('hidden');
      toggleBtn.textContent = panelList.classList.contains('hidden') ? 'Ausklappen' : 'Einklappen';
      updatePanels(m);
    });
  }
  // Panels initial rendern
  updatePanels(m);
}

// v0.9: Render der Strukturmotiv-Ergebnisse: Score-Track als SVG + Peaks-Tabelle
function renderStructureResults(m, root) {
  root.innerHTML = '';
  const r = m.results;
  if (!r || !r.scoreTrack) return;
  const scoreTrack = r.scoreTrack;
  const trackStart = r.trackStart;
  const trackStep = r.trackStep;
  const algoDef = STRUCTURE_ALGORITHMS[m.structure.algorithm];

  // ---------- Statistik ----------
  let minS = Infinity, maxS = -Infinity, sum = 0;
  for (let i = 0; i < scoreTrack.length; i++) {
    const v = scoreTrack[i];
    if (v < minS) minS = v;
    if (v > maxS) maxS = v;
    sum += v;
  }
  const meanS = scoreTrack.length > 0 ? sum / scoreTrack.length : 0;

  const stats = document.createElement('div');
  stats.className = 'param-row';
  stats.style.cssText = 'flex-wrap:wrap;gap:12px;font-size:12px;color:var(--fg-mute);padding:6px 0';
  stats.innerHTML =
    '<span>Min: <b style="color:var(--fg)">' + minS.toFixed(2) + '</b> ' + (algoDef.unit || '') + '</span>' +
    '<span>Mean: <b style="color:var(--fg)">' + meanS.toFixed(2) + '</b></span>' +
    '<span>Max: <b style="color:var(--fg)">' + maxS.toFixed(2) + '</b></span>' +
    '<span>Peaks: <b style="color:var(--fg)">' + r.hits.length + '</b></span>' +
    '<span>Track: <b style="color:var(--fg)">' + scoreTrack.length + '</b> Punkte (' + trackStep + ' bp Step)</span>';
  root.appendChild(stats);

  // ---------- Score-Track SVG ----------
  const trackWrap = document.createElement('div');
  trackWrap.style.cssText = 'margin:8px 0;border:1px solid var(--border);border-radius:3px;background:var(--bg-elevated);position:relative';
  const trackLabel = document.createElement('div');
  trackLabel.style.cssText = 'font-size:11px;color:var(--fg-mute);padding:4px 8px;border-bottom:1px solid var(--border)';
  trackLabel.textContent = 'Score-Track entlang Genom (' + (mf.twobit ? mf.twobit.length.toLocaleString() : '?') + ' bp)';
  trackWrap.appendChild(trackLabel);

  const svgW = 800;
  const svgH = 100;
  const padL = 35, padR = 8, padT = 6, padB = 18;
  const plotW = svgW - padL - padR;
  const plotH = svgH - padT - padB;
  const xmlns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(xmlns, 'svg');
  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.style.cssText = 'width:100%;height:auto;display:block';

  // Y-Achsen-Bereich: nutze tatsächliche Min/Max mit kleinem Padding
  const yMin = Math.min(0, minS);
  const yMax = maxS > 0 ? maxS * 1.05 : 1;
  const yRange = yMax - yMin || 1;

  // Score-Pfad als Polyline (downsampled für Performance)
  const targetPoints = Math.min(scoreTrack.length, plotW * 2);
  const decim = Math.max(1, Math.floor(scoreTrack.length / targetPoints));
  let pathD = '';
  for (let i = 0; i < scoreTrack.length; i += decim) {
    const x = padL + (i / scoreTrack.length) * plotW;
    const y = padT + plotH - ((scoreTrack[i] - yMin) / yRange) * plotH;
    pathD += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }
  const path = document.createElementNS(xmlns, 'path');
  path.setAttribute('d', pathD);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', m.color);
  path.setAttribute('stroke-width', '1');
  svg.appendChild(path);

  // Peak-Threshold-Linien (Max und Min, je nach aktiven Typen)
  const hasMaxType = m.structure.peakTypes.includes('maximum') ||
                     m.structure.peakTypes.includes('inflection-down');
  const hasMinType = m.structure.peakTypes.includes('minimum');

  if (hasMaxType && m.structure.peakThreshold !== null && m.structure.peakThreshold !== undefined &&
      m.structure.peakThreshold >= yMin && m.structure.peakThreshold <= yMax) {
    const ty = padT + plotH - ((m.structure.peakThreshold - yMin) / yRange) * plotH;
    const thresholdLine = document.createElementNS(xmlns, 'line');
    thresholdLine.setAttribute('x1', padL); thresholdLine.setAttribute('y1', ty);
    thresholdLine.setAttribute('x2', padL + plotW); thresholdLine.setAttribute('y2', ty);
    thresholdLine.setAttribute('stroke', '#7da5cc');
    thresholdLine.setAttribute('stroke-width', '0.5');
    thresholdLine.setAttribute('stroke-dasharray', '3,2');
    thresholdLine.setAttribute('opacity', '0.5');
    svg.appendChild(thresholdLine);
  }
  if (hasMinType && m.structure.minThreshold !== null && m.structure.minThreshold !== undefined &&
      m.structure.minThreshold >= yMin && m.structure.minThreshold <= yMax) {
    const ty = padT + plotH - ((m.structure.minThreshold - yMin) / yRange) * plotH;
    const thresholdLine = document.createElementNS(xmlns, 'line');
    thresholdLine.setAttribute('x1', padL); thresholdLine.setAttribute('y1', ty);
    thresholdLine.setAttribute('x2', padL + plotW); thresholdLine.setAttribute('y2', ty);
    thresholdLine.setAttribute('stroke', '#d49a6a');
    thresholdLine.setAttribute('stroke-width', '0.5');
    thresholdLine.setAttribute('stroke-dasharray', '3,2');
    thresholdLine.setAttribute('opacity', '0.5');
    svg.appendChild(thresholdLine);
  }

  // Peaks als kleine Marker — Form/Farbe nach Typ
  // Maximum: Dreieck nach OBEN (Spitze nach oben — intuitiv "hoch")
  // Minimum: Dreieck nach UNTEN (Spitze nach unten — intuitiv "tief")
  // Wendepunkt: Kreis (neutraler Punkt)
  const TYPE_COLOR_SVG = { 'maximum': '#7da5cc', 'minimum': '#d49a6a', 'inflection-down': '#b88dca' };
  for (const h of r.hits.slice(0, 200)) {
    const x = padL + ((h.center - 1) / mf.twobit.length) * plotW;
    const y = padT + plotH - ((h.score - yMin) / yRange) * plotH;
    const c = TYPE_COLOR_SVG[h.peakType] || m.color;
    if (h.peakType === 'maximum') {
      // Dreieck Spitze nach oben
      const tri = document.createElementNS(xmlns, 'path');
      tri.setAttribute('d', 'M' + x + ',' + (y - 2.4) + ' L' + (x + 2.2) + ',' + (y + 1.6) + ' L' + (x - 2.2) + ',' + (y + 1.6) + ' Z');
      tri.setAttribute('fill', c);
      tri.setAttribute('opacity', '0.85');
      svg.appendChild(tri);
    } else if (h.peakType === 'minimum') {
      // Dreieck Spitze nach unten
      const tri = document.createElementNS(xmlns, 'path');
      tri.setAttribute('d', 'M' + x + ',' + (y + 2.4) + ' L' + (x + 2.2) + ',' + (y - 1.6) + ' L' + (x - 2.2) + ',' + (y - 1.6) + ' Z');
      tri.setAttribute('fill', c);
      tri.setAttribute('opacity', '0.85');
      svg.appendChild(tri);
    } else if (h.peakType === 'inflection-down') {
      // Kreis
      const c1 = document.createElementNS(xmlns, 'circle');
      c1.setAttribute('cx', x); c1.setAttribute('cy', y);
      c1.setAttribute('r', '2.0');
      c1.setAttribute('fill', c);
      c1.setAttribute('opacity', '0.85');
      svg.appendChild(c1);
    }
  }

  // Y-Achse-Beschriftung
  const yMaxLbl = document.createElementNS(xmlns, 'text');
  yMaxLbl.setAttribute('x', padL - 4); yMaxLbl.setAttribute('y', padT + 8);
  yMaxLbl.setAttribute('text-anchor', 'end');
  yMaxLbl.setAttribute('fill', 'var(--fg-mute)');
  yMaxLbl.setAttribute('font-size', '10');
  yMaxLbl.textContent = yMax.toFixed(1);
  svg.appendChild(yMaxLbl);

  const yMinLbl = document.createElementNS(xmlns, 'text');
  yMinLbl.setAttribute('x', padL - 4); yMinLbl.setAttribute('y', padT + plotH);
  yMinLbl.setAttribute('text-anchor', 'end');
  yMinLbl.setAttribute('fill', 'var(--fg-mute)');
  yMinLbl.setAttribute('font-size', '10');
  yMinLbl.textContent = yMin.toFixed(1);
  svg.appendChild(yMinLbl);

  // X-Achse Marker (Anfang, Mitte, Ende)
  const totalBp = mf.twobit ? mf.twobit.length : 0;
  const xLabels = [
    { pos: 0, x: padL, text: '0' },
    { pos: 0.5, x: padL + plotW / 2, text: (totalBp / 2 / 1e6).toFixed(1) + ' Mb' },
    { pos: 1, x: padL + plotW, text: (totalBp / 1e6).toFixed(1) + ' Mb' }
  ];
  for (const lbl of xLabels) {
    const t = document.createElementNS(xmlns, 'text');
    t.setAttribute('x', lbl.x); t.setAttribute('y', padT + plotH + 12);
    t.setAttribute('text-anchor', lbl.pos === 0 ? 'start' : lbl.pos === 1 ? 'end' : 'middle');
    t.setAttribute('fill', 'var(--fg-mute)');
    t.setAttribute('font-size', '10');
    t.textContent = lbl.text;
    svg.appendChild(t);
  }

  trackWrap.appendChild(svg);
  root.appendChild(trackWrap);

  // ---------- Peaks-Tabelle (Top-50) ----------
  if (r.hits.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:12px;color:var(--fg-mute);font-style:italic;text-align:center';
    empty.textContent = 'Keine Peaks gefunden. Thresholds anpassen oder andere Peak-Typen wählen.';
    root.appendChild(empty);
    return;
  }

  // Type-Filter-Zeile (zeigt Counts pro Typ, klickbar)
  const typeCounts = { maximum: 0, minimum: 0, 'inflection-down': 0 };
  for (const h of r.hits) typeCounts[h.peakType] = (typeCounts[h.peakType] || 0) + 1;
  const typeFilter = (r.typeFilter || new Set(Object.keys(typeCounts).filter(k => typeCounts[k] > 0)));
  r.typeFilter = typeFilter;   // persistieren in m.results

  const filterRow = document.createElement('div');
  filterRow.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;padding:6px 0;font-size:11px';
  const TYPE_LBL = { 'maximum': 'Max', 'minimum': 'Min', 'inflection-down': 'Wendep.' };
  const TYPE_COLOR = { 'maximum': '#7da5cc', 'minimum': '#d49a6a', 'inflection-down': '#b88dca' };
  for (const t of ['maximum', 'minimum', 'inflection-down']) {
    if (typeCounts[t] === 0) continue;
    const pill = document.createElement('button');
    pill.style.cssText = 'background:transparent;border:1px solid;border-radius:10px;padding:2px 8px;cursor:pointer;font-size:11px;font-family:inherit;' +
      'border-color:' + TYPE_COLOR[t] + ';' +
      (typeFilter.has(t) ? 'color:var(--bg);background:' + TYPE_COLOR[t] + ';' : 'color:' + TYPE_COLOR[t] + ';');
    pill.textContent = TYPE_LBL[t] + ' (' + typeCounts[t] + ')';
    pill.addEventListener('click', () => {
      if (typeFilter.has(t)) typeFilter.delete(t); else typeFilter.add(t);
      renderStructureResults(m, root);
    });
    filterRow.appendChild(pill);
  }
  root.appendChild(filterRow);

  // Filter anwenden
  const visibleHits = r.hits.filter(h => typeFilter.has(h.peakType));

  const tableWrap = document.createElement('div');
  tableWrap.style.cssText = 'margin-top:4px;border:1px solid var(--border);border-radius:3px;overflow:auto;max-height:400px';
  let html = '<table style="width:100%;border-collapse:collapse;font-size:12px">';
  // v0.10: Selektions-Spalte ergänzt — wirkt auf Panels
  const selectedAll = visibleHits.length > 0 && visibleHits.every(h => r.selected.has(hitKeyOf(h)));
  html += '<thead style="position:sticky;top:0;background:var(--bg-elevated)">' +
          '<tr style="border-bottom:1px solid var(--border)">' +
          '<th style="padding:6px 8px;text-align:center;color:var(--fg-mute);width:24px">' +
            '<input type="checkbox" id="sel_master_' + m.id + '"' + (selectedAll ? ' checked' : '') + ' title="Alle Top-50 selektieren">' +
          '</th>' +
          '<th style="padding:6px 8px;text-align:left;color:var(--fg-mute)">Typ</th>' +
          '<th style="padding:6px 8px;text-align:left;color:var(--fg-mute)">Position (bp)</th>' +
          '<th style="padding:6px 8px;text-align:left;color:var(--fg-mute)">Score (' + (algoDef.unit || '') + ')</th>' +
          '<th style="padding:6px 8px;text-align:left;color:var(--fg-mute)">Region</th>' +
          '<th style="padding:6px 8px;text-align:left;color:var(--fg-mute)">Nächstes Gen</th>' +
          '</tr></thead><tbody>';
  const showHits = visibleHits.slice(0, 50);
  for (const h of showHits) {
    const startStr = h.start.toLocaleString();
    const endStr = h.end.toLocaleString();
    const centerStr = h.center.toLocaleString();
    const region = h.intragenic ? 'intragenic' : 'intergenic';
    const regionColor = h.intragenic ? 'var(--fg-mute)' : 'var(--accent)';
    const geneName = h.nearestGene || '-';
    const dist = (h.distanceToGeneStart !== undefined && h.distanceToGeneStart !== null)
      ? ' (' + (h.distanceToGeneStart > 0 ? '+' : '') + h.distanceToGeneStart + ')'
      : '';
    const typeColor = TYPE_COLOR[h.peakType] || m.color;
    const typeBadge = '<span style="display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;background:' +
                      typeColor + '33;color:' + typeColor + ';border:1px solid ' + typeColor + '88;font-weight:500">' +
                      (TYPE_LBL[h.peakType] || h.peakType) + '</span>';
    const hkey = hitKeyOf(h);
    const isSel = r.selected.has(hkey);
    html += '<tr style="border-bottom:1px solid var(--border-mute,#222)">' +
            '<td style="padding:4px 8px;text-align:center">' +
              '<input type="checkbox" class="row-sel-' + m.id + '" data-hkey="' + escapeHtml(hkey) + '"' +
              (isSel ? ' checked' : '') + '>' +
            '</td>' +
            '<td style="padding:4px 8px">' + typeBadge + '</td>' +
            '<td style="padding:4px 8px;font-family:monospace" title="Center: ' + centerStr + '">' + startStr + '–' + endStr + '</td>' +
            '<td style="padding:4px 8px;font-family:monospace;color:' + typeColor + ';font-weight:500">' + h.score.toFixed(2) + '</td>' +
            '<td style="padding:4px 8px;color:' + regionColor + '">' + region + '</td>' +
            '<td style="padding:4px 8px">' + escapeHtml(geneName) + escapeHtml(dist) + '</td>' +
            '</tr>';
  }
  html += '</tbody></table>';
  tableWrap.innerHTML = html;
  root.appendChild(tableWrap);

  if (visibleHits.length > 50) {
    const more = document.createElement('div');
    more.style.cssText = 'padding:6px;color:var(--fg-mute);font-size:11px;text-align:center;font-style:italic';
    more.textContent = '... und ' + (visibleHits.length - 50) + ' weitere Peaks (Top-50 nach Score angezeigt)';
    root.appendChild(more);
  }

  // ---------- v0.10: Panel-Sektion (Gen-Kontext pro Treffer, analog motif/hairpin) ----------
  const panelHtml = '<div class="panel-section" id="panels_' + m.id + '">' +
                    '<div class="panel-section-header">' +
                      '<span class="ps-title" id="panels_title_' + m.id + '">Panels</span>' +
                      '<div class="ps-actions">' +
                        '<button id="panels_clear_' + m.id + '">Auswahl löschen</button>' +
                        '<button id="panels_toggle_' + m.id + '">Einklappen</button>' +
                      '</div>' +
                    '</div>' +
                    '<div class="panel-list" id="panel_list_' + m.id + '"></div>' +
                  '</div>';
  const panelWrap = document.createElement('div');
  panelWrap.innerHTML = panelHtml;
  root.appendChild(panelWrap.firstChild);

  // Selektions-Handler
  root.querySelectorAll('.row-sel-' + m.id).forEach(cb => {
    cb.addEventListener('change', () => {
      const k = cb.getAttribute('data-hkey');
      if (cb.checked) r.selected.add(k); else r.selected.delete(k);
      updatePanels(m);
    });
  });
  const masterCb = document.getElementById('sel_master_' + m.id);
  if (masterCb) {
    masterCb.addEventListener('change', () => {
      if (masterCb.checked) {
        for (const h of showHits) r.selected.add(hitKeyOf(h));
      } else {
        for (const h of showHits) r.selected.delete(hitKeyOf(h));
      }
      renderStructureResults(m, root);
    });
  }
  // Panel-Section-Handler
  const clearBtn = document.getElementById('panels_clear_' + m.id);
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      r.selected.clear();
      renderStructureResults(m, root);
    });
  }
  const toggleBtn = document.getElementById('panels_toggle_' + m.id);
  const panelList = document.getElementById('panel_list_' + m.id);
  if (toggleBtn && panelList) {
    toggleBtn.addEventListener('click', () => {
      panelList.classList.toggle('hidden');
      toggleBtn.textContent = panelList.classList.contains('hidden') ? 'Ausklappen' : 'Einklappen';
      updatePanels(m);
    });
  }
  // Panels initial rendern
  updatePanels(m);
}

function renderResults(m) {
  const root = document.getElementById('results_' + m.id);
  if (!root) return;
  if (!m.results) { root.classList.remove('show'); return; }
  root.classList.add('show');
  // v0.8.1: Hairpin-Karten bekommen eigene Tabelle
  if (m.kind === 'hairpin') {
    return renderHairpinResults(m, root);
  }
  // v0.9: Strukturmotiv-Karten bekommen Score-Track + Peaks-Tabelle
  if (m.kind === 'structure') {
    return renderStructureResults(m, root);
  }

  const r = m.results;
  const all = r.hits;
  // v0.7: Filter-Logik kombiniert: intergenisch + low-complexity
  let filtered = all;
  if (r.filterIntergenicOnly) filtered = filtered.filter(h => !h.intragenic);
  if (r.filterLowComplexity) {
    // Low-Complexity: Entropy < 1.5 Bits (deutlich unter Maximum 2.0)
    filtered = filtered.filter(h => h.localEntropy === undefined || h.localEntropy >= 1.5);
  }

  // Statistik
  const obs = all.length;
  const exp = r.expected;
  const ratio = exp > 0 ? obs / exp : 0;
  const log2r = (obs > 0 && exp > 0) ? Math.log2(ratio) : null;
  const z = exp > 0 ? (obs - exp) / Math.sqrt(exp) : 0;

  // Konsensus-String mit Längen-Range
  const lengthLabel = (r.consensusBlocks && r.hasSpacer)
    ? (() => {
        let mn = 0, mx = 0;
        for (const b of r.consensusBlocks) {
          if (b.type === 'fixed') { mn += b.seq.length; mx += b.seq.length; }
          else { mn += b.min; mx += b.max; }
        }
        return mn + '–' + mx + ' bp';
      })()
    : (r.consensusBlocks ? (r.consensusBlocks.reduce((s,b)=>s+(b.type==='fixed'?b.seq.length:0),0) + ' bp')
                         : (r.consensus.length + ' bp'));

  let stats = '';
  // v0.4.7: results-stats wurde in motif-block verlagert (Diagramme + Statistik nebeneinander)

  // Controls
  stats += '<div class="results-controls">';
  stats += '<label><input type="checkbox" id="filt_intergenic_' + m.id + '"' + (r.filterIntergenicOnly ? ' checked' : '') + '> nur intergenische Treffer</label>';
  stats += '<label><input type="checkbox" id="filt_lowcompl_' + m.id + '"' + (r.filterLowComplexity ? ' checked' : '') + '> Low-Complexity ausblenden</label>';
  stats += '<button id="copy_tsv_' + m.id + '">TSV kopieren</button>';
  stats += '<button id="copy_loci_' + m.id + '" title="Liste der einmaligen Gen-Namen / Locus-Tags zur Zwischenablage (für STRING-DB-Anreicherung)">Gen-Liste kopieren</button>';
  stats += '<span style="color:var(--fg-mute)">' + filtered.length + ' angezeigt</span>';
  stats += '</div>';

  // Tabelle
  const LIMIT = 1000;
  const showHits = filtered.slice(0, LIMIT);

  // Spacer-Blöcke ermitteln (für separate Spalten)
  const spacerBlocks = (r.consensusBlocks || []).filter(b => b.type === 'spacer');
  const spacerCount = spacerBlocks.length;

  let table = '<div class="results-table-wrap"><table class="results-table"><thead><tr>';
  // Checkbox-Spalte: zuerst, mit master-Toggle im Header
  table += '<th class="col-sel"><input type="checkbox" class="row-checkbox" id="sel_master_' + m.id + '" title="Alle anzeigen / keine"></th>';
  // v0.7.2: jede Spalte hat tip-Text für Header-Tooltip
  const cols = [
    { k: 'start', t: 'Pos', tip: 'Startposition des Treffers im Genom (1-basiert).' },
    { k: 'strand', t: 'Strang', tip: '+ = Sense-Strang (5\'→3\'). − = Antisense-Strang (revcomp). (pal) = palindromisch — Treffer auf beiden Strängen identisch.' },
    { k: 'sequence', t: 'Sequenz', tip: 'Treffer-Sequenz auf dem Strang. Farben kodieren Sequenz-Blöcke: variable Konsensus-Stellen rot/orange (je nach IUPAC-Score), Spacer grau, fixe Positionen schwarz.' }
  ];
  // Eine Spalte pro Spacer
  for (let si = 0; si < spacerCount; si++) {
    const b = spacerBlocks[si];
    const rangeLabel = (b.min === b.max) ? String(b.min) : (b.min + '–' + b.max);
    cols.push({
      k: 'spacer_' + si,
      t: 'Spacer ' + (si + 1) + '<br><span style="font-size:10px;color:var(--fg-mute)">(' + rangeLabel + ')</span>',
      tip: 'Beobachtete Spacer-Länge zwischen den fixen Blöcken (' + rangeLabel + ' nt erlaubt).'
    });
  }
  cols.push({ k: 'scoreFraction', t: 'Score', tip: 'Treffer-Score als Prozent vom Maximum. Bei Konsensus-Suche: Anteil der match-Halbpunkte (M=1, IUPAC-Sub=0.5). Bei PWM-Suche: relativer Bit-Score gegen IC × Frequenz-Modell.' });
  cols.push({ k: 'distanceToGeneStart', t: 'Δ Gen-Start', tip: 'Distanz Treffer-Start zu Gen-Start des nächsten Gens. Negativ = upstream (typischer Promotor-Bereich), positiv = innerhalb/downstream.' });
  cols.push({ k: 'strandRelToGene', t: 'Strangbezug', tip: 'Sense = Treffer auf gleichem Strang wie nächstes Gen. Antisense = entgegengesetzt.' });
  cols.push({ k: 'context', t: 'Kontext', tip: 'inter = intergenischer Bereich (zwischen Genen, oft Promotor/Terminator). intra = innerhalb eines Gens (selten regulatorisch außer für sRNAs/asRNAs).' });
  cols.push({ k: 'nearestGene', t: 'Gen', tip: 'Name des nächsten Gens (Gene-Symbol oder Locus-Tag).', sticky: true });
  // v0.4.6: Soft/Hard-MM-Spalten falls Datenraum-Suche aktiv
  const hasSearchSpace = r.hasSearchSpace || false;
  if (hasSearchSpace) {
    cols.push({ k: 'softMm', t: 'Soft-MM', tip: 'Soft-Mismatches: Position passt zwar zum erweiterten Datenraum, weicht aber vom strikten Konsensus ab. Nicht penalisiert wie Hard-MM.' });
    cols.push({ k: 'hardMm', t: 'Hard-MM', tip: 'Hard-Mismatches: Position widerspricht sowohl Konsensus als auch Datenraum. Echter Mismatch.' });
  }
  // v0.5: Log-Odds-Spalte falls vorhanden
  const hasLogOdds = r.hasLogOdds || false;
  if (hasLogOdds) {
    cols.push({ k: 'logOdds', t: 'Log-Odds', tip: 'log₂(f_motiv / p_genom) summiert über fixe Positionen. Höhere Werte = überdurchschnittlich gegen Genom-Hintergrund. Nur als Annotation, nicht im Score.' });
  }
  // v0.6: CAI-Spalte falls Codon-Analyse vorhanden
  const hasCai = !!(mf.genome && mf.genome.codonAnalysis && mf.genome.codonAnalysis.hasReference);
  if (hasCai) {
    cols.push({ k: 'nearestGeneCai', t: 'CAI', tip: 'Codon Adaptation Index des nächsten Gens. Referenz: ribosomale Proteine + Elongationsfaktoren. Hoch (>Top-10%) = stark exprimiertes Gen. Färbung: hoch = Akzent, atypisch = Warn.' });
  }
  // v0.4.5: Symmetrie-Spalten falls aktiv
  const isSym = (r.symmetryMode === 'inverted_repeat' || r.symmetryMode === 'direct_repeat') && r.halfSiteLen;
  if (isSym) {
    cols.push({ k: 'symMmLeft', t: 'MM-L', tip: 'Mismatches in der linken Half-Site gegenüber Konsensus.' });
    cols.push({ k: 'symMmRight', t: 'MM-R', tip: 'Mismatches in der rechten Half-Site gegenüber Konsensus.' });
    cols.push({ k: 'symAsymmetry', t: 'Asym', tip: 'Asymmetrie-Maß: |MM-L − MM-R|. 0 = gleichmäßig, hoch = einseitig degeneriert.' });
    cols.push({ k: 'symSubs', t: 'Sym-Subs', tip: 'Anzahl symmetrisch gepaarter Substitutionen (linke und rechte Half-Site mismatchen an spiegelbildlicher Position).' });
    cols.push({ k: 'asymSubs', t: 'Asym-Subs', tip: 'Anzahl asymmetrischer Substitutionen (Mismatch nur in einer Half-Site).' });
  }
  for (const c of cols) {
    const sorted = (r.sortBy === c.k) ? ' class="sorted"' : '';
    const arr = (r.sortBy === c.k) ? (r.sortDir === 'asc' ? ' ↑' : ' ↓') : '';
    const tipAttr = c.tip ? ' title="' + escapeAttr(c.tip) + '"' : '';
    // v0.7.2: sticky-Spalte (Gen) bleibt beim horizontalen Scrollen sichtbar
    const cls = [];
    if (r.sortBy === c.k) cls.push('sorted');
    if (c.sticky) cls.push('sticky-gene');
    const clsAttr = cls.length ? ' class="' + cls.join(' ') + '"' : '';
    table += '<th data-sort="' + c.k + '"' + clsAttr + tipAttr + '>' + c.t + arr + '</th>';
  }
  table += '</tr></thead><tbody>';
  if (!r.selected) r.selected = new Set();
  for (let hi = 0; hi < showHits.length; hi++) {
    const h = showHits[hi];
    const hitKey = hitKeyOf(h);
    const isSelected = r.selected.has(hitKey);
    table += '<tr>';
    table += '<td class="col-sel"><input type="checkbox" class="row-checkbox row-sel-' + m.id + '" data-hkey="' + hitKey + '"' + (isSelected ? ' checked' : '') + '></td>';
    table += '<td>' + h.start.toLocaleString('de-DE') + '</td>';
    table += '<td>' + (h.strand === 1 ? '+' : '−') + (h.palindromic ? ' (pal)' : '') + '</td>';
    table += '<td>' + colorizeBlockSequence(h, r.consensusBlocks) + '</td>';
    for (let si = 0; si < spacerCount; si++) {
      const v = (h.spacers && h.spacers[si] !== undefined) ? h.spacers[si] : '—';
      table += '<td>' + v + '</td>';
    }
    table += '<td>' + (h.scoreFraction !== undefined ? Math.round(h.scoreFraction * 100) + '%' : '—') + '</td>';
    table += '<td>' + (h.distanceToGeneStart !== null ? (h.distanceToGeneStart >= 0 ? '+' : '') + h.distanceToGeneStart : '—') + '</td>';
    table += '<td>' + (h.strandRelToGene || '—') + '</td>';
    table += '<td><span class="ctx-pill ' + (h.intragenic ? 'intragenic' : 'intergenic') + '">' + (h.intragenic ? 'intra' : 'inter') + '</span></td>';
    table += '<td class="sticky-gene">' + (h.nearestGene || '—') + '</td>';
    if (hasSearchSpace) {
      table += '<td>' + (h.softMm !== undefined ? h.softMm : '—') + '</td>';
      table += '<td>' + (h.hardMm !== undefined ? h.hardMm : '—') + '</td>';
    }
    if (hasLogOdds) {
      table += '<td>' + (h.logOdds !== undefined && h.logOdds !== null ? (h.logOdds >= 0 ? '+' : '') + h.logOdds.toFixed(2) : '—') + '</td>';
    }
    if (hasCai) {
      // CAI mit Klassifikation als visueller Akzent
      let caiCell = '—';
      if (h.nearestGeneCai !== undefined && h.nearestGeneCai !== null) {
        const v = h.nearestGeneCai.toFixed(3);
        let color = '';
        if (h.nearestGeneCodonClass === 'hoch') color = ' style="color:var(--accent)"';
        else if (h.nearestGeneCodonClass === 'atypisch') color = ' style="color:var(--warn)"';
        caiCell = '<span' + color + '>' + v + '</span>';
      }
      table += '<td>' + caiCell + '</td>';
    }
    if (isSym) {
      table += '<td>' + (h.symMmLeft !== undefined ? h.symMmLeft : '—') + '</td>';
      table += '<td>' + (h.symMmRight !== undefined ? h.symMmRight : '—') + '</td>';
      table += '<td>' + (h.symAsymmetry !== undefined ? h.symAsymmetry : '—') + '</td>';
      table += '<td>' + (h.symSubs !== undefined ? h.symSubs : '—') + '</td>';
      table += '<td>' + (h.asymSubs !== undefined ? h.asymSubs : '—') + '</td>';
    }
    table += '</tr>';
  }
  if (filtered.length > LIMIT) {
    table += '<tr><td colspan="' + (cols.length + 1) + '" class="results-overflow">... ' + (filtered.length - LIMIT).toLocaleString('de-DE') + ' weitere Treffer ausgeblendet</td></tr>';
  }
  table += '</tbody></table></div>';

  // Panel-Sektion: erst nach Tabelle gerendert, vom updatePanels gefüllt
  const panelHtml = '<div class="panel-section" id="panels_' + m.id + '">' +
                    '<div class="panel-section-header">' +
                      '<span class="ps-title" id="panels_title_' + m.id + '">Panels</span>' +
                      '<div class="ps-actions">' +
                        '<button id="panels_clear_' + m.id + '">Auswahl löschen</button>' +
                        '<button id="panels_toggle_' + m.id + '">Einklappen</button>' +
                      '</div>' +
                    '</div>' +
                    '<div class="panel-list" id="panel_list_' + m.id + '"></div>' +
                  '</div>';

  root.innerHTML = stats + table + panelHtml;

  // Event-Handlers
  document.getElementById('filt_intergenic_' + m.id).addEventListener('change', (e) => {
    r.filterIntergenicOnly = e.target.checked;
    renderResults(m);
  });
  // v0.7: Low-Complexity-Filter
  const lowComplBox = document.getElementById('filt_lowcompl_' + m.id);
  if (lowComplBox) {
    lowComplBox.addEventListener('change', (e) => {
      r.filterLowComplexity = e.target.checked;
      renderResults(m);
    });
  }
  document.getElementById('copy_tsv_' + m.id).addEventListener('click', () => {
    const spacerBlocks = (r.consensusBlocks || []).filter(b => b.type === 'spacer');
    const header = ['#position','strand','sequence'];
    for (let si = 0; si < spacerBlocks.length; si++) header.push('spacer_' + (si + 1));
    header.push('score_pct', 'distance_to_gene_start', 'strand_rel_to_gene', 'context', 'nearest_gene', 'palindromic');
    const hasSearchSpaceTsv = r.hasSearchSpace || false;
    if (hasSearchSpaceTsv) header.push('soft_mm', 'hard_mm');
    const hasLogOddsTsv = r.hasLogOdds || false;
    if (hasLogOddsTsv) header.push('log_odds');
    // v0.6: CAI / codon class
    const hasCaiTsv = !!(mf.genome && mf.genome.codonAnalysis && mf.genome.codonAnalysis.hasReference);
    if (hasCaiTsv) header.push('cai', 'codon_class');
    const isSymTsv = (r.symmetryMode === 'inverted_repeat' || r.symmetryMode === 'direct_repeat') && r.halfSiteLen;
    if (isSymTsv) header.push('mm_left', 'mm_right', 'asymmetry', 'sym_subs', 'asym_subs');
    const lines = [header.join('\t')];
    for (const h of filtered) {
      const row = [h.start, h.strand === 1 ? '+' : '-', h.sequence];
      for (let si = 0; si < spacerBlocks.length; si++) {
        row.push((h.spacers && h.spacers[si] !== undefined) ? h.spacers[si] : '');
      }
      row.push(h.scoreFraction !== undefined ? Math.round(h.scoreFraction * 100) : '');
      row.push(h.distanceToGeneStart !== null ? h.distanceToGeneStart : '');
      row.push(h.strandRelToGene || '');
      row.push(h.intragenic ? 'intragenic' : 'intergenic');
      row.push(h.nearestGene || '');
      row.push(h.palindromic ? 'palindromic' : '');
      if (hasSearchSpaceTsv) {
        row.push(h.softMm !== undefined ? h.softMm : '');
        row.push(h.hardMm !== undefined ? h.hardMm : '');
      }
      if (hasLogOddsTsv) {
        row.push(h.logOdds !== undefined && h.logOdds !== null ? h.logOdds.toFixed(2) : '');
      }
      if (hasCaiTsv) {
        row.push(h.nearestGeneCai !== undefined && h.nearestGeneCai !== null ? h.nearestGeneCai.toFixed(3) : '');
        row.push(h.nearestGeneCodonClass || '');
      }
      if (isSymTsv) {
        row.push(h.symMmLeft !== undefined ? h.symMmLeft : '');
        row.push(h.symMmRight !== undefined ? h.symMmRight : '');
        row.push(h.symAsymmetry !== undefined ? h.symAsymmetry : '');
        row.push(h.symSubs !== undefined ? h.symSubs : '');
        row.push(h.asymSubs !== undefined ? h.asymSubs : '');
      }
      lines.push(row.join('\t'));
    }
    const tsv = lines.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(tsv).then(
        () => log('TSV (' + filtered.length + ' Zeilen) in Zwischenablage', 'ok'),
        (e) => log('Clipboard-Fehler: ' + e, 'err')
      );
    } else {
      log('Clipboard nicht verfügbar — TSV in Debug-Log', 'warn');
      logPre(tsv.length > 4000 ? tsv.substring(0, 4000) + '\n[abgeschnitten]' : tsv);
    }
  });

  // v0.4.6.1: Gen-Liste kopieren (für STRING-DB Anreicherungs-Analyse)
  document.getElementById('copy_loci_' + m.id).addEventListener('click', () => {
    const seen = new Set();
    const list = [];
    for (const h of filtered) {
      if (h.nearestGene && !seen.has(h.nearestGene)) {
        seen.add(h.nearestGene);
        list.push(h.nearestGene);
      }
    }
    if (list.length === 0) {
      log('Keine Gene zum Kopieren', 'warn');
      return;
    }
    const txt = list.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(
        () => log('Gen-Liste (' + list.length + ' einmalige Gene) in Zwischenablage', 'ok'),
        (e) => log('Clipboard-Fehler: ' + e, 'err')
      );
    } else {
      log('Clipboard nicht verfügbar — Liste in Debug-Log', 'warn');
      logPre(txt);
    }
  });
  // Sort-Header
  for (const th of root.querySelectorAll('th[data-sort]')) {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (r.sortBy === k) r.sortDir = r.sortDir === 'asc' ? 'desc' : 'asc';
      else { r.sortBy = k; r.sortDir = 'asc'; }
      sortHits(r);
      renderResults(m);
    });
  }

  // Row-Checkbox-Handler
  for (const cb of root.querySelectorAll('.row-sel-' + m.id)) {
    cb.addEventListener('change', (e) => {
      const k = e.target.dataset.hkey;
      if (e.target.checked) r.selected.add(k);
      else r.selected.delete(k);
      updatePanels(m);
      // Master-Checkbox-Status updaten
      const master = document.getElementById('sel_master_' + m.id);
      if (master) {
        const total = root.querySelectorAll('.row-sel-' + m.id).length;
        const checked = root.querySelectorAll('.row-sel-' + m.id + ':checked').length;
        master.checked = (total > 0 && checked === total);
        master.indeterminate = (checked > 0 && checked < total);
      }
    });
  }
  // Master-Checkbox: alle anzeigen / keine
  // v0.4.6.1: Click-Handler — toggelt explizit basierend auf aktuellem Auswahl-State
  const master = document.getElementById('sel_master_' + m.id);
  if (master) {
    // Beim Re-Render: master-State synchronisieren
    const total = showHits.length;
    let checkedCount = 0;
    for (const h of showHits) {
      if (r.selected.has(hitKeyOf(h))) checkedCount++;
    }
    master.checked = (total > 0 && checkedCount === total);
    master.indeterminate = (checkedCount > 0 && checkedCount < total);

    master.addEventListener('change', (e) => {
      // Nach Browser-Toggle: e.target.checked ist der NEUE State
      const newChecked = e.target.checked;
      if (newChecked) {
        for (const h of showHits) r.selected.add(hitKeyOf(h));
      } else {
        for (const h of showHits) r.selected.delete(hitKeyOf(h));
      }
      renderResults(m);
    });
  }

  // Panel-Action-Buttons
  const clearBtn = document.getElementById('panels_clear_' + m.id);
  if (clearBtn) clearBtn.addEventListener('click', () => {
    r.selected.clear();
    renderResults(m);
  });
  const toggleBtn = document.getElementById('panels_toggle_' + m.id);
  if (toggleBtn) toggleBtn.addEventListener('click', () => {
    const list = document.getElementById('panel_list_' + m.id);
    if (!list) return;
    const isHidden = list.classList.toggle('hidden');
    toggleBtn.textContent = isHidden ? 'Aufklappen' : 'Einklappen';
    if (!isHidden) updatePanels(m);
  });

  // v0.3.2: Globale Genom-Karte aktualisieren (statt pro-Motiv-Distribution)
  renderGenomeMap();
  // v0.4: Set-Stats aktualisieren (Treffer-Anzahl könnte sich geändert haben)
  renderSets();

  // Panels rendern
  updatePanels(m);
}

// ---------- v0.3.1: GC-Skew + Genom-Distribution ----------
// GC-Skew = (G - C) / (G + C) pro Sliding-Window
// Speichert ein Array von { center, value }
function computeGCSkew(tb, windowSize, step) {
  const total = tb.length;
  const data = tb.data;
  const out = [];
  // Schnellere Berechnung: laufender Counter über Window
  // Initial-Window
  let g = 0, c = 0;
  const w = Math.min(windowSize, total);
  for (let i = 0; i < w; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    if (bits === 1) c++;       // C
    else if (bits === 2) g++;  // G
  }
  // Erstes Datenpunkt
  out.push({ center: Math.floor(w / 2), value: (g + c) > 0 ? (g - c) / (g + c) : 0 });
  // Schiebe das Fenster vorwärts in Schritten von 'step'
  for (let start = step; start + w <= total; start += step) {
    // Entferne 'step' Basen vom linken Rand, füge 'step' am rechten Rand hinzu
    for (let k = 0; k < step; k++) {
      const leftIdx = start - step + k;
      const lb = (data[leftIdx >> 2] >> ((3 - (leftIdx & 3)) * 2)) & 0x3;
      if (lb === 1) c--; else if (lb === 2) g--;
      const rightIdx = start + w - step + k;
      const rb = (data[rightIdx >> 2] >> ((3 - (rightIdx & 3)) * 2)) & 0x3;
      if (rb === 1) c++; else if (rb === 2) g++;
    }
    out.push({ center: start + Math.floor(w / 2), value: (g + c) > 0 ? (g - c) / (g + c) : 0 });
  }
  return out;
}

// v0.7: Tetranucleotid-Anomalie pro Sliding-Window.
// Globale 4-mer-Frequenzen werden mit lokalen verglichen, χ²-Distanz pro Window.
// Liefert: { centers: [...], values: [...], maxValue, windowSize }
function computeTetranucleotideAnomaly(tb, windowSize, step) {
  const total = tb.length;
  if (total < windowSize * 2) return null;
  const data = tb.data;
  // Lookup: 4-mer als Integer 0..255
  // Wir bauen einen Stream von Nukleotid-Indizes (0=A, 1=C, 2=G, 3=T) und N-Mask
  const nucIdx = new Uint8Array(total);
  const validMask = new Uint8Array(total);
  for (let i = 0; i < total; i++) {
    nucIdx[i] = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    validMask[i] = 1;
  }
  // N-Blocks ausmaskieren
  for (const [ns, nl] of tb.nBlocks) {
    for (let i = ns; i < ns + nl; i++) validMask[i] = 0;
  }

  // Globale 4-mer-Counts
  const globalCounts = new Float64Array(256);
  let globalTotal = 0;
  for (let i = 0; i + 3 < total; i++) {
    if (validMask[i] && validMask[i+1] && validMask[i+2] && validMask[i+3]) {
      const k = (nucIdx[i] << 6) | (nucIdx[i+1] << 4) | (nucIdx[i+2] << 2) | nucIdx[i+3];
      globalCounts[k]++;
      globalTotal++;
    }
  }
  if (globalTotal === 0) return null;
  // Globale Frequenzen + Pseudocount für χ²-Stabilität
  const globalFreq = new Float64Array(256);
  for (let k = 0; k < 256; k++) {
    globalFreq[k] = (globalCounts[k] + 1) / (globalTotal + 256);
  }

  // Pro Window
  const centers = [];
  const values = [];
  const w = Math.min(windowSize, total);
  // Initial-Window: zähle alle 4-mere darin
  const localCounts = new Float64Array(256);
  let localTotal = 0;
  for (let i = 0; i + 3 < w; i++) {
    if (validMask[i] && validMask[i+1] && validMask[i+2] && validMask[i+3]) {
      const k = (nucIdx[i] << 6) | (nucIdx[i+1] << 4) | (nucIdx[i+2] << 2) | nucIdx[i+3];
      localCounts[k]++;
      localTotal++;
    }
  }
  // Erste Distanz
  const computeDistance = () => {
    if (localTotal === 0) return 0;
    let chi2 = 0;
    for (let k = 0; k < 256; k++) {
      const localF = (localCounts[k] + 0.1) / (localTotal + 25.6);
      const diff = localF - globalFreq[k];
      chi2 += (diff * diff) / globalFreq[k];
    }
    return chi2;
  };
  centers.push(Math.floor(w / 2));
  values.push(computeDistance());

  // Sliding: hinzufügen am rechten Rand, abziehen am linken
  for (let start = step; start + w <= total; start += step) {
    // Schiebe um 'step' Schritte: jeden Schritt einzeln (4-mere überlappen)
    for (let s = 0; s < step; s++) {
      // Entferne 4-mere die am linken Rand komplett verschwinden
      const leftStart = start - step + s;
      // 4-mer das gerade aus dem Window herausfällt: beginnt an Position leftStart - 3 ... ?
      // Eigentlich: das Window ist [leftStart, leftStart + w). 4-mere im Window beginnen bei [leftStart, leftStart+w-3].
      // Beim Verschieben um 1 fällt 4-mer an Position leftStart heraus (alt: [leftStart, leftStart+w-3], neu: [leftStart+1, leftStart+w-2])
      // Und 4-mer an Position leftStart+w-3 wird neu hinzugefügt
      const leaveIdx = leftStart;
      if (leaveIdx + 3 < total &&
          validMask[leaveIdx] && validMask[leaveIdx+1] && validMask[leaveIdx+2] && validMask[leaveIdx+3]) {
        const k = (nucIdx[leaveIdx] << 6) | (nucIdx[leaveIdx+1] << 4) | (nucIdx[leaveIdx+2] << 2) | nucIdx[leaveIdx+3];
        localCounts[k]--;
        localTotal--;
      }
      const enterIdx = leftStart + w - 3;
      if (enterIdx + 3 < total &&
          validMask[enterIdx] && validMask[enterIdx+1] && validMask[enterIdx+2] && validMask[enterIdx+3]) {
        const k = (nucIdx[enterIdx] << 6) | (nucIdx[enterIdx+1] << 4) | (nucIdx[enterIdx+2] << 2) | nucIdx[enterIdx+3];
        localCounts[k]++;
        localTotal++;
      }
    }
    centers.push(start + Math.floor(w / 2));
    values.push(computeDistance());
  }

  // Max für Normalisierung
  let maxValue = 0;
  for (const v of values) if (v > maxValue) maxValue = v;
  return { centers, values, maxValue, windowSize: w, step };
}
// Methode (Lobry 1996, Grigoriev 1998): kumulativ über (G-C) integrieren entlang des Genoms.
// Min der Kumulativen ≈ oriC (wo Lagging-Strand zu Leading-Strand wird, leftward Replikation startet)
// Max der Kumulativen ≈ ter
// Wir nehmen die feine GC-Skew-Auflösung und integrieren.
// Zurückgegeben werden Positionen + Konfidenz-Maß (Tiefe des Skew-Signals).
function detectOriTer(skewFine, genomeLen) {
  if (!skewFine || skewFine.length < 10) return null;
  // Kumulative Summe über (g - c)/(g + c) gewichtet mit Distanz zwischen Punkten
  const cum = [];
  let s = 0;
  let lastCenter = 0;
  for (const pt of skewFine) {
    const dx = pt.center - lastCenter;
    s += pt.value * dx;
    cum.push({ center: pt.center, value: s });
    lastCenter = pt.center;
  }
  // v0.7: Bei zirkulären Bakteriengenomen sollte die Gesamtsumme theoretisch 0 sein.
  // In der Praxis driftet sie wegen Zufallsschwankungen oder Asymmetrien. Wir entfernen
  // den linearen Drift, damit Min/Max von der Replikations-Asymmetrie kommen, nicht von
  // einem konstanten Bias.
  const totalDrift = cum[cum.length - 1].value;
  const span = cum[cum.length - 1].center - cum[0].center;
  if (span > 0 && Math.abs(totalDrift) > 0) {
    for (const pt of cum) {
      pt.value -= totalDrift * (pt.center - cum[0].center) / span;
    }
  }
  // Min und Max der detrendeten Kumulativen finden
  let minIdx = 0, maxIdx = 0;
  let minVal = cum[0].value, maxVal = cum[0].value;
  for (let i = 1; i < cum.length; i++) {
    if (cum[i].value < minVal) { minVal = cum[i].value; minIdx = i; }
    if (cum[i].value > maxVal) { maxVal = cum[i].value; maxIdx = i; }
  }
  const oriC = cum[minIdx].center;
  const ter = cum[maxIdx].center;
  // Konfidenz: Tiefe = (max - min) / genomeLen, normiert
  // Bei klar bipolarem Skew ist das ~0.05-0.2 (5-20% des Genoms im skew-Signal)
  // Bei flachem Skew ist es <0.01.
  const skewDepth = (maxVal - minVal) / genomeLen;
  return { oriC, ter, skewDepth, cum };
}

// v0.7: Shannon-Entropy einer Region — niedrige Werte = repetitiv/low-complexity.
// Wir berechnen Mononukleotid-Entropy: H(p) = -Σ p log₂(p), in Bits, max 2.0
// (Bei AAA...A → H=0, bei perfekt uniform → H=2)
function shannonEntropyAtPosition(twobit, start, end) {
  const len = end - start + 1;
  if (len < 4) return 2;  // zu klein, Default voll
  // Erweitere ±25 bp links und rechts für Kontext-Bewertung
  const ctxStart = Math.max(0, start - 25);
  const ctxEnd = Math.min(twobit.length - 1, end + 25);
  const ctxLen = ctxEnd - ctxStart + 1;
  const counts = [0, 0, 0, 0];  // A C G T
  let valid = 0;
  const data = twobit.data;
  for (let i = ctxStart; i <= ctxEnd; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    counts[bits]++;
    valid++;
  }
  if (valid === 0) return 2;
  let h = 0;
  for (const c of counts) {
    if (c > 0) {
      const p = c / valid;
      h -= p * Math.log2(p);
    }
  }
  return h;
}

// ===========================================================================
// v0.8.1: Hairpin/Terminator-Suche
// ===========================================================================
//
// Methodik: Inverted-Repeat-Detektor mit thermodynamischer Bewertung gemäß
// Turner 2004 Nearest-Neighbor-Modell für RNA. Ergänzt um T-Tract-Score für
// rho-unabhängige Terminatoren (poly-U direkt 3' des Stems).
//
// Quellen:
//   - Mathews, Sabina, Zuker, Turner (1999) J. Mol. Biol. 288, 911-940
//   - Turner & Mathews (2010) NAR 38, D280-D282 (NNDB)
//   - Lu, Turner, Mathews (2006) NAR 34, 4912-4924 (Enthalpie-Updates)
//
// Implementierungsumfang (ausreichend für lokale Hairpin-Energie, NICHT für
// vollständige RNA-Faltung):
//   - Watson-Crick + G-U Stack-Energien
//   - Hairpin-Loop-Initiation (Länge 3-30)
//   - Terminal-AU/GU-Penalty
//   - Tetraloop-Bonus (UNCG, GNRA Familie)
//
// Konvention: ΔG bei 37 °C, Einheit kcal/mol, negativ = stabilisierend.

// Turner 2004 Stack-Energien für Watson-Crick + GU-Wobble.
// Konvention: Schlüssel "XY/X'Y'" bedeutet:
//
//      5'- X  Y -3'
//      3'- X' Y' -5'
//
// wobei die Stack-Energie für den Übergang vom Paar X-X' zum Paar Y-Y' gilt.
// X' steht UNTER X, Y' steht UNTER Y. X-X' und Y-Y' sind Watson-Crick (oder GU).
//
// In meinem Stem-Datenmodell: stemTop[i] paart mit stemBot[i] an gleichem Index.
// Stack zwischen Index i und i+1 hat den Schlüssel:
//    stemTop[i] + stemTop[i+1] + '/' + stemBot[i] + stemBot[i+1]
//
// Werte aus NNDB Turner 2004 (Watson-Crick):
//   ΔG37 (kcal/mol). Negativer = stabilisierender Stack.
//
// Wichtige Symmetrie der RNA-Doppelhelix: ein Stack und sein 2-fold-Symmetrie-
// Partner haben identische Energien. Beispiel: 5'-AC-3'/3'-UG-5' (Schlüssel "AC/UG")
// ist identisch mit 5'-GU-3'/3'-CA-5' (Schlüssel "GU/CA"). Wir tragen beide ein
// damit der Lookup unabhängig von der Lese-Richtung funktioniert.
// Werte direkt aus rna_turner2004.par (ViennaRNA), Stand v0.8.3d.
// Konvention: Schlüssel "TOP5+TOP3+/BOT3+BOT5" wo
//   BP[i]   (Closing-Pair): (TOP5, BOT3)
//   BP[i+1] (Inner-Pair):   (TOP3, BOT5)
