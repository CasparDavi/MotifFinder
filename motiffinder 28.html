function handleDebugAction(action) {
  if (action === 'clear') {
    dbgLog.innerHTML = '';
    return;
  }
  if (!mf.genome) {
    log('Kein Genom geladen', 'warn');
    return;
  }
  if (action === 'stats') {
    const featTypes = {};
    for (const f of mf.genome.features) featTypes[f.type] = (featTypes[f.type] || 0) + 1;
    logPre(JSON.stringify({
      accession: mf.genome.accession,
      organism: mf.genome.organism,
      length: mf.genome.length,
      topology: mf.genome.topology,
      format: mf.genome.format,
      features_total: mf.genome.features.length,
      feature_types: featTypes,
      twobit_bytes: mf.twobit.sizeBytes(),
      n_blocks: mf.twobit.nBlocks.length
    }, null, 2));
  } else if (action === 'getseq') {
    const startStr = prompt('Start-Position (1-basiert)?', '1');
    if (!startStr) return;
    const lenStr = prompt('Länge?', '60');
    if (!lenStr) return;
    const start = parseInt(startStr, 10) - 1;
    const len = parseInt(lenStr, 10);
    try {
      const s = mf.twobit.get(start, len);
      logPre('Sequenz [' + (start + 1) + '..' + (start + len) + ']:\n' + s);
    } catch (e) { log(e.message, 'err'); }
  } else if (action === 'revcomp') {
    const startStr = prompt('Start-Position (1-basiert)?', '1');
    if (!startStr) return;
    const lenStr = prompt('Länge?', '60');
    if (!lenStr) return;
    const start = parseInt(startStr, 10) - 1;
    const len = parseInt(lenStr, 10);
    try {
      const s = mf.twobit.get(start, len);
      const rc = mf.twobit.revcomp(start, len);
      logPre('Forward:  ' + s + '\nRevComp:  ' + rc);
    } catch (e) { log(e.message, 'err'); }
  } else if (action === 'listgenes') {
    const startStr = prompt('Start-Position (1-basiert)?', '1');
    if (!startStr) return;
    const endStr = prompt('End-Position (1-basiert)?', '10000');
    if (!endStr) return;
    const start = parseInt(startStr, 10);
    const end = parseInt(endStr, 10);
    const genes = mf.genome.features.filter(f =>
      (f.type === 'gene' || f.type === 'CDS') && f.end >= start && f.start <= end
    ).slice(0, 30);
    const lines = genes.map(g => {
      const lt = g.qualifiers.locus_tag || '';
      const nm = g.qualifiers.gene || '';
      const pr = (g.qualifiers.product || '').substring(0, 50);
      return (g.strand === 1 ? '+' : '-') + ' ' +
             String(g.start).padStart(8) + '..' + String(g.end).padEnd(8) + ' ' +
             g.type.padEnd(6) + ' ' + lt.padEnd(14) + ' ' + nm.padEnd(8) + ' ' + pr;
    });
    logPre('Features in [' + start + '..' + end + ']:\n' + lines.join('\n') +
           (genes.length === 30 ? '\n... (beschränkt auf 30)' : ''));
  } else if (action === 'parsertest') {
    runParserSelftest();
  }
}

// ---------------------------------------------------------------------------
// Parser-Selbsttest
// ---------------------------------------------------------------------------
function runParserSelftest() {
  log('Parser-Selbsttest läuft...', 'info');
  let pass = 0, fail = 0;
  const check = (name, cond, detail) => {
    if (cond) { pass++; log('  ✓ ' + name, 'ok'); }
    else { fail++; log('  ✗ ' + name + (detail ? ' — ' + detail : ''), 'err'); }
  };

  // 2bit Roundtrip
  const seq = 'ATGCGTACGTTANGCATCGTACGTATCG';
  const tb = new TwoBit(seq);
  const decoded = tb.get(0, seq.length);
  check('2bit Roundtrip Länge', decoded.length === seq.length);
  // Alle Positionen außer N-Blöcke
  let matches = 0;
  for (let i = 0; i < seq.length; i++) if (seq[i].toUpperCase() === decoded[i]) matches++;
  check('2bit Roundtrip Zeichen', matches === seq.length, matches + '/' + seq.length);

  // Revcomp: ATGC -> GCAT (complement: TACG, reverse: GCAT)
  check('2bit revcomp ATGC', tb.revcomp(0, 4) === 'GCAT', 'expected GCAT got ' + tb.revcomp(0, 4));

  // Random Access
  check('2bit random', tb.get(4, 4) === 'GTAC', 'got ' + tb.get(4, 4));

  // GenBank-Mini
  const gb = `LOCUS       TESTSEQ                  50 bp    DNA     linear   BCT 01-JAN-2026
DEFINITION  Test sequence.
ACCESSION   TESTSEQ
SOURCE      Testus organismus
  ORGANISM  Testus organismus
FEATURES             Location/Qualifiers
     source          1..50
                     /organism="Testus organismus"
     gene            5..20
                     /gene="geneA"
                     /locus_tag="TEST_0001"
     CDS             complement(25..40)
                     /gene="geneB"
                     /locus_tag="TEST_0002"
                     /product="hypothetical protein"
ORIGIN
        1 atgcgtacgt tagcatcgta cgtatcgatc gtacgatcgt acgatcgtac
//`;
  const gbParsed = parseGenBank(gb);
  check('GenBank accession', gbParsed.accession === 'TESTSEQ');
  check('GenBank length', gbParsed.length === 50);
  check('GenBank organism', gbParsed.organism === 'Testus organismus');
  check('GenBank features count', gbParsed.features.length === 3, 'got ' + gbParsed.features.length);
  const geneA = gbParsed.features.find(f => f.qualifiers.gene === 'geneA');
  check('GenBank geneA existiert', !!geneA);
  check('GenBank geneA start/end', geneA && geneA.start === 5 && geneA.end === 20);
  check('GenBank geneA strand', geneA && geneA.strand === 1);
  const geneB = gbParsed.features.find(f => f.qualifiers.gene === 'geneB');
  check('GenBank geneB complement', geneB && geneB.strand === -1);
  check('GenBank sequence', gbParsed.sequence.length === 50);

  // EMBL-Mini
  const embl = `ID   TESTSEQ; SV 1; linear; genomic DNA; STD; PRO; 50 BP.
AC   TESTSEQ;
DE   Test sequence.
OS   Testus organismus
FH   Key             Location/Qualifiers
FT   source          1..50
FT                   /organism="Testus organismus"
FT   gene            5..20
FT                   /gene="geneA"
FT                   /locus_tag="TEST_0001"
FT   CDS             complement(25..40)
FT                   /gene="geneB"
FT                   /product="hypothetical protein"
SQ   Sequence 50 BP;
     atgcgtacgt tagcatcgta cgtatcgatc gtacgatcgt acgatcgtac        50
//`;
  const emParsed = parseEmbl(embl);
  check('EMBL accession', emParsed.accession === 'TESTSEQ');
  check('EMBL length', emParsed.length === 50);
  check('EMBL features', emParsed.features.length === 3, 'got ' + emParsed.features.length);
  const emGeneB = emParsed.features.find(f => f.qualifiers.gene === 'geneB');
  check('EMBL geneB complement', emGeneB && emGeneB.strand === -1);

  // FASTA+GFF
  const fasta = '>chr1 Test\nATGCGTACGTTAGCATCGTACGTATCGATCGTACGATCGTACGATCGTAC\n';
  const gff = `##gff-version 3
chr1\ttest\tgene\t5\t20\t.\t+\t.\tID=gene1;Name=geneA;locus_tag=TEST_0001
chr1\ttest\tCDS\t25\t40\t.\t-\t0\tID=cds1;gene=geneB;product=hypothetical protein
`;
  const fastaRecs = parseFasta(fasta);
  const gffFeats = parseGff(gff);
  const combined = combineFastaGff(fastaRecs, gffFeats);
  check('FASTA+GFF length', combined.length === 50);
  check('FASTA+GFF features', combined.features.length === 2);
  const fgGeneB = combined.features.find(f => f.qualifiers.gene === 'geneB');
  check('FASTA+GFF geneB strand', fgGeneB && fgGeneB.strand === -1);

  // Join-Location (spliced)
  const gbJoin = `LOCUS       TEST2                    100 bp    DNA     linear   BCT 01-JAN-2026
FEATURES             Location/Qualifiers
     CDS             join(10..30,50..80)
                     /gene="spliced"
ORIGIN
        1 atgcgtacgt tagcatcgta cgtatcgatc gtacgatcgt acgatcgtac gtacgtacgt
       61 acgtacgtac gtacgtacgt acgtacgtac
//`;
  const gbj = parseGenBank(gbJoin);
  const sp = gbj.features.find(f => f.qualifiers.gene === 'spliced');
  check('GenBank join segments', sp && sp.segments.length === 2, 'segs=' + (sp ? sp.segments.length : '?'));
  check('GenBank join start/end span', sp && sp.start === 10 && sp.end === 80);

  log('Selbsttest fertig: ' + pass + ' ok, ' + fail + ' fehlgeschlagen',
      fail === 0 ? 'ok' : 'err');
}

// ---------- IUPAC ----------
const IUPAC = {
  A: ['A'], C: ['C'], G: ['G'], T: ['T'], U: ['T'],
  R: ['A','G'], Y: ['C','T'], S: ['G','C'], W: ['A','T'], K: ['G','T'], M: ['A','C'],
  B: ['C','G','T'], D: ['A','G','T'], H: ['A','C','T'], V: ['A','C','G'],
  N: ['A','C','G','T']
};
const IUPAC_DESC = {
  A: 'A', C: 'C', G: 'G', T: 'T',
  R: 'A or G (puRine)',
  Y: 'C or T (pYrimidine)',
  S: 'G or C (Strong)',
  W: 'A or T (Weak)',
  K: 'G or T (Keto)',
  M: 'A or C (aMino)',
  B: 'C/G/T (not A)',
  D: 'A/G/T (not C)',
  H: 'A/C/T (not G)',
  V: 'A/C/G (not T)',
  N: 'A/C/G/T (any)'
};

function renderIupacLegend() {

  for (const [code, desc] of Object.entries(IUPAC_DESC)) {
    const item = document.createElement('div');

    const c = document.createElement('span'); c.className = 'code'; c.textContent = code;
    const d = document.createElement('span'); d.textContent = desc;
    item.appendChild(c); item.appendChild(d);
    root.appendChild(item);
  }
}

// IUPAC-Konsensus normalisieren und validieren
// Konsensus-Parser: erkennt feste IUPAC-Blöcke und variable Spacer.
// Spacer-Notationen: N12-16, N12..16, N{12,16}, N12 (fest)
// Beispiel: "CGTTTT N12-16 GGGWAW" -> {
//   blocks: [
//     {type:'fixed', seq:'CGTTTT'},
//     {type:'spacer', min:12, max:16},
//     {type:'fixed', seq:'GGGWAW'}
//   ],
//   minLength: 6+12+6=24, maxLength: 6+16+6=28
// }
function normalizeConsensus(s) {
  if (!s) return { ok: false, error: 'Konsensus eingeben', value: '' };

  // Whitespaces entfernen, Großbuchstaben
  const raw = s.toUpperCase().replace(/\s+/g, '');
  if (raw.length === 0) return { ok: false, error: 'Konsensus eingeben', value: '' };

  // Tokenize: scanne Zeichen für Zeichen, erkenne Spacer-Patterns
  const blocks = [];
  let i = 0;
  let currentFixed = '';

  const flushFixed = () => {
    if (currentFixed) { blocks.push({ type: 'fixed', seq: currentFixed }); currentFixed = ''; }
  };

  while (i < raw.length) {
    const c = raw[i];
    // Prüfe auf Spacer-Pattern: N gefolgt von Ziffern oder Klammern
    // Möglichkeiten:
    //   N{a,b}
    //   N12-16  oder  N12..16
    //   N12     (fest)
    if (c === 'N' && i + 1 < raw.length && (raw[i+1] === '{' || /\d/.test(raw[i+1]))) {
      // Match versuchen
      const rest = raw.substring(i);
      // N{a,b}
      let m = rest.match(/^N\{(\d+),(\d+)\}/);
      if (m) {
        flushFixed();
        const min = parseInt(m[1], 10), max = parseInt(m[2], 10);
        if (min > max) return { ok: false, error: 'Spacer-Range ungültig: N{' + min + ',' + max + '}', value: raw };
        blocks.push({ type: 'spacer', min, max });
        i += m[0].length;
        continue;
      }
      // N12-16  oder  N12..16
      m = rest.match(/^N(\d+)(?:-|\.\.)(\d+)/);
      if (m) {
        flushFixed();
        const min = parseInt(m[1], 10), max = parseInt(m[2], 10);
        if (min > max) return { ok: false, error: 'Spacer-Range ungültig: N' + min + '-' + max, value: raw };
        blocks.push({ type: 'spacer', min, max });
        i += m[0].length;
        continue;
      }
      // N12 (fest) — aber NUR wenn die Ziffern eindeutig zu N gehören und nicht versehentlich
      // Zwei Ziffern sind ein klares Spacer-Signal (kein einzelnes IUPAC-N gefolgt von Ziffern hat hier Sinn)
      m = rest.match(/^N(\d+)/);
      if (m) {
        flushFixed();
        const fixed = parseInt(m[1], 10);
        blocks.push({ type: 'spacer', min: fixed, max: fixed });
        i += m[0].length;
        continue;
      }
    }
    // Reguläres IUPAC-Zeichen
    if (!IUPAC[c]) {
      return { ok: false, error: 'Ungültiges Zeichen: ' + c, value: raw };
    }
    currentFixed += c;
    i++;
  }
  flushFixed();

  if (blocks.length === 0) {
    return { ok: false, error: 'Konsensus leer', value: raw };
  }

  // Validierungen:
  // - Spacer am Anfang/Ende ist sinnlos (kein Anker)
  if (blocks[0].type === 'spacer' || blocks[blocks.length - 1].type === 'spacer') {
    return { ok: false, error: 'Spacer am Anfang oder Ende ist nicht erlaubt — fixe Submotive müssen flankieren', value: raw };
  }
  // - Zwei Spacer hintereinander unsinnig (theoretisch durch Parser nicht möglich, aber check)
  for (let k = 1; k < blocks.length; k++) {
    if (blocks[k].type === 'spacer' && blocks[k-1].type === 'spacer') {
      return { ok: false, error: 'Zwei Spacer hintereinander', value: raw };
    }
  }

  // Aggregierte Längen
  let minLen = 0, maxLen = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') { minLen += b.seq.length; maxLen += b.seq.length; }
    else { minLen += b.min; maxLen += b.max; }
  }

  const hasSpacer = blocks.some(b => b.type === 'spacer');
  // Kanonischer normalisierter String (für Anzeige & Speicherung)
  const canonical = blocks.map(b =>
    b.type === 'fixed' ? b.seq : ('N' + b.min + (b.min !== b.max ? '-' + b.max : ''))
  ).join(' ');

  return { ok: true, value: raw, blocks, minLen, maxLen, hasSpacer, canonical };
}

// ---------- Genom-Komposition ----------
function computeComposition(tb) {
  const counts = { A: 0, C: 0, G: 0, T: 0, N: 0 };
  // 4 Basen pro Byte ausnutzen für Speed
  const data = tb.data;
  const len = tb.length;
  // Inits
  for (let i = 0; i < len; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    const b = ['A','C','G','T'][bits];
    counts[b]++;
  }
  // N-Blöcke abziehen (da als A geschrieben aber eigentlich N)
  for (const [ns, nl] of tb.nBlocks) {
    counts.A -= nl;  // standardmäßig wurden Ns als A=00 kodiert
    counts.N += nl;
  }
  const validTotal = counts.A + counts.C + counts.G + counts.T;
  return {
    A: counts.A / validTotal,
    C: counts.C / validTotal,
    G: counts.G / validTotal,
    T: counts.T / validTotal,
    N: counts.N,
    validTotal
  };
}

// Wahrscheinlichkeit dass eine zufällige Position das IUPAC-Symbol matcht
function iupacProb(code, comp) {
  const bases = IUPAC[code];
  if (!bases) return 0;
  let p = 0;
  for (const b of bases) p += comp[b];
  return p;
}

// Erwartete Trefferzahl für IUPAC-Konsensus + erlaubte Mismatches
// Formel: pro Mismatch-Anzahl j: C(L,j) * (Match-Probs für L-j Positionen) * (Mismatch-Probs für j)
// Pro Position: pMatch = iupacProb(c, comp), pMismatch = 1 - pMatch
// Für genaue Berechnung müssen wir aber über die Positionsauswahl summieren weil die p_i positionsabhängig sind.
// Berechnet die Match-Wahrscheinlichkeit pro Position für einen einzelnen fixed-Block
// (DP über erlaubte Mismatches innerhalb des Blocks).
// Gibt zurück: Array f[j] = Wkt dass an einer Random-Position im Block genau j Mismatches.
function blockMatchDist(seq, comp, maxMismatches) {
  const L = seq.length;
  const k = Math.min(maxMismatches, L);
  let f = new Array(k + 1).fill(0);
  f[0] = 1;
  for (let i = 0; i < L; i++) {
    const p = iupacProb(seq[i], comp);
    const fNew = new Array(k + 1).fill(0);
    for (let j = 0; j <= k; j++) {
      if (f[j] === 0) continue;
      fNew[j] += f[j] * p;
      if (j + 1 <= k) fNew[j + 1] += f[j] * (1 - p);
    }
    f = fNew;
  }
  return f;
}

// Konvolution zweier Mismatch-Verteilungen (Mismatches summieren sich)
function convDist(a, b, maxK) {
  const out = new Array(maxK + 1).fill(0);
  for (let i = 0; i < a.length; i++) {
    if (a[i] === 0) continue;
    for (let j = 0; j < b.length; j++) {
      if (i + j > maxK) break;
      out[i + j] += a[i] * b[j];
    }
  }
  return out;
}

// Erweitert: akzeptiert String ODER parsed-Konsensus-Objekt {blocks, ...}
function expectedHitsForMotif(consensus, mismatches, comp, genomeLength, bothStrands) {
  // Wenn String: parsen
  let parsed;
  if (typeof consensus === 'string') {
    parsed = normalizeConsensus(consensus);
    if (!parsed.ok) return 0;
  } else {
    parsed = consensus;
  }
  const blocks = parsed.blocks;
  if (!blocks || blocks.length === 0) return 0;

  // Gesamterwartung = Summe über alle Spacer-Längen-Kombinationen.
  // Pro Längen-Kombination: Faltung der Mismatch-Verteilungen aller fixed-Blöcke.
  // Keine Spacer? → einfache DP über alle Positionen.
  if (!parsed.hasSpacer) {
    // Alle Blocks sind fixed, einfach konkatenieren
    const seq = blocks.map(b => b.seq).join('');
    const dist = blockMatchDist(seq, comp, mismatches);
    let pHit = 0;
    for (let j = 0; j <= mismatches && j < dist.length; j++) pHit += dist[j];
    const L = seq.length;
    return pHit * (genomeLength - L + 1) * (bothStrands ? 2 : 1);
  }

  // Mit Spacern: Verteilung pro fixed-Block einmalig berechnen
  const fixedDists = [];
  for (const b of blocks) {
    if (b.type === 'fixed') fixedDists.push(blockMatchDist(b.seq, comp, mismatches));
  }
  // Anzahl Spacer-Länge-Varianten = Produkt der Range-Größen
  // Pro Variante: feste Länge L = sum(fixed.length) + sum(spacer-Länge-Wahl)
  // Match-Wkt pro Variante = Konvolution der fixed-Distributionen, p(matches ≤ mismatches)
  // Die Match-Wkt ist unabhängig von der Spacer-Länge (Spacer matchen immer, beliebige Basen).
  // Daher: konvolviere die fixed-Dists einmal:
  let combined = [1];
  for (const d of fixedDists) combined = convDist(combined, d, mismatches);
  let pHit = 0;
  for (let j = 0; j <= mismatches && j < combined.length; j++) pHit += combined[j];

  // Summe über alle Spacer-Längen-Kombinationen
  // Vereinfachung: Anzahl Kombinationen = Produkt der (max-min+1).
  // Pro Kombi mit Gesamtlänge L: Position-Anzahl = genomeLength - L + 1
  // Lange Spacer reduzieren Position-Anzahl leicht. Bei großen Genomen vernachlässigbar,
  // aber wir machen's korrekt:
  const spacers = blocks.filter(b => b.type === 'spacer');
  const fixedLen = blocks.filter(b => b.type === 'fixed').reduce((s, b) => s + b.seq.length, 0);

  // Iteriere alle Kombinationen — bei wenigen Spacern ohnehin klein
  // Für jeden Spacer alle Längen durchlaufen, position-counts addieren
  let totalPositions = 0;
  function recurse(idx, sumSpacerLen) {
    if (idx >= spacers.length) {
      const L = fixedLen + sumSpacerLen;
      const positions = Math.max(0, genomeLength - L + 1);
      totalPositions += positions;
      return;
    }
    const sp = spacers[idx];
    for (let l = sp.min; l <= sp.max; l++) recurse(idx + 1, sumSpacerLen + l);
  }
  recurse(0, 0);

  return pHit * totalPositions * (bothStrands ? 2 : 1);
}

// ---------- Gen-Index für Distanz-Berechnung ----------
function buildGeneIndex(features) {
  // Nur 'gene' und 'CDS' verwenden, sortiert nach start
  // v0.4.6.1: zusätzliche Felder product/note für Tooltips
  const genes = features.filter(f => f.type === 'gene' || f.type === 'CDS')
                       .map(f => ({
                         start: f.start, end: f.end, strand: f.strand,
                         name: f.qualifiers.gene || f.qualifiers.locus_tag || '?',
                         locusTag: f.qualifiers.locus_tag || null,
                         product: f.qualifiers.product || null,
                         note: f.qualifiers.note || null,
                         type: f.type
                       }))
                       .sort((a, b) => a.start - b.start);
  return genes;
}

// ====== v0.6: Codon-Bias-Analyse ======
// Beim Genom-Laden für jede CDS:
//   - Codon-Counts (61 sense codons, ohne Stops)
//   - Codon-Distanz zum Genom-Mittel (euklidisch, RSCU-Vektoren)
//   - CAI gegen automatisch identifiziertes Referenz-Set (ribosomale Proteine, Elongationsfaktoren)
//   - Klassifikation: typisch / hoch / atypisch

// Codon-Tabelle: 61 sense codons + 3 stops
// Mappen wir zu Aminosäuren (Standard-Genetic-Code)
const CODON_TABLE = {
  TTT:'F',TTC:'F',TTA:'L',TTG:'L',
  TCT:'S',TCC:'S',TCA:'S',TCG:'S',
  TAT:'Y',TAC:'Y',TAA:'*',TAG:'*',
  TGT:'C',TGC:'C',TGA:'*',TGG:'W',
  CTT:'L',CTC:'L',CTA:'L',CTG:'L',
  CCT:'P',CCC:'P',CCA:'P',CCG:'P',
  CAT:'H',CAC:'H',CAA:'Q',CAG:'Q',
  CGT:'R',CGC:'R',CGA:'R',CGG:'R',
  ATT:'I',ATC:'I',ATA:'I',ATG:'M',
  ACT:'T',ACC:'T',ACA:'T',ACG:'T',
  AAT:'N',AAC:'N',AAA:'K',AAG:'K',
  AGT:'S',AGC:'S',AGA:'R',AGG:'R',
  GTT:'V',GTC:'V',GTA:'V',GTG:'V',
  GCT:'A',GCC:'A',GCA:'A',GCG:'A',
  GAT:'D',GAC:'D',GAA:'E',GAG:'E',
  GGT:'G',GGC:'G',GGA:'G',GGG:'G'
};
// Liste der 61 sense codons (nicht-stop), in stabiler Reihenfolge
const SENSE_CODONS = Object.keys(CODON_TABLE).filter(c => CODON_TABLE[c] !== '*').sort();
// Pro Aminosäure: alle Codons die sie codieren
const AA_TO_CODONS = {};
for (const c of SENSE_CODONS) {
  const aa = CODON_TABLE[c];
  if (!AA_TO_CODONS[aa]) AA_TO_CODONS[aa] = [];
  AA_TO_CODONS[aa].push(c);
}

// Extrahiert die Codons aus einem Gen (CDS), berücksichtigt Strang.
// Liefert eine Map { codon: count }, nur sense-codons.
function extractCodonsFromGene(gene, twobit) {
  // Gen-Sequenz in Lese-Richtung holen
  const len = gene.end - gene.start + 1;
  if (len < 6 || len % 3 !== 0) return null;  // nicht durch 3 teilbar oder zu kurz
  let seq = twobit.get(gene.start - 1, len);
  if (gene.strand === -1) seq = revcompString(seq);
  // Zähle Codons
  const counts = {};
  for (let i = 0; i < seq.length - 2; i += 3) {
    const c = seq.substr(i, 3);
    if (CODON_TABLE[c] === undefined) continue;  // N oder ungültig
    if (CODON_TABLE[c] === '*') continue;  // stop ignorieren
    counts[c] = (counts[c] || 0) + 1;
  }
  return counts;
}

// Aus Codon-Counts ein RSCU-Vektor (Relative Synonymous Codon Usage) bauen.
// RSCU(codon) = beobachtete Frequenz / erwartete Frequenz unter uniformer Synonym-Verteilung
// Werte um 1 = uniform, >1 = überrepräsentiert, <1 = unterrepräsentiert
// Liefert: { codon: rscu } für alle 61 sense codons
function countsToRSCU(counts) {
  const rscu = {};
  for (const aa of Object.keys(AA_TO_CODONS)) {
    const codons = AA_TO_CODONS[aa];
    let totalForAA = 0;
    for (const c of codons) totalForAA += (counts[c] || 0);
    if (totalForAA === 0) {
      // Aminosäure kommt im Gen nicht vor → RSCU = 1 (neutral)
      for (const c of codons) rscu[c] = 1;
    } else {
      // Erwartung pro Codon = total / N(synonym)
      const expected = totalForAA / codons.length;
      for (const c of codons) {
        rscu[c] = (counts[c] || 0) / expected;
      }
    }
  }
  return rscu;
}

// Aus dem Genom alle CDS holen und Codon-Analyse durchführen.
// Setzt pro Gene-Index-Eintrag: cai, codonDistance, codonClass.
function computeCodonAnalysis(geneIndex, twobit) {
  const result = {
    referenceCount: 0,
    referenceNames: [],
    hasReference: false,
    cdsAnalyzed: 0,
    cdsSkipped: 0
  };

  // Schritt 1: Pro CDS Codon-Counts, dann RSCU
  // Wir behandeln gene-Einträge als CDS wenn sie Länge%3==0 sind.
  const geneRSCUs = new Map();  // gene-Objekt → RSCU-Vektor
  const referenceGenes = [];

  // Regex für Referenz-Set: ribosomale Proteine, Elongationsfaktoren
  // Standardmäßig im Produkt-Feld
  const referenceRegex = /\b(ribosomal protein|elongation factor|EF-(?:Tu|G|Ts|P|4)|RpsA|RpsB|RpsC|RpsD|RpsE|RpsF|RpsG|RpsH|RpsI|RpsJ|RpsK|RpsL|RpsM|RpsN|RpsO|RpsP|RpsQ|RpsR|RpsS|RpsT|RpsU|RplA|RplB|RplC|RplD|RplE|RplF|RplG|RplH|RplI|RplJ|RplK|RplL|RplM|RplN|RplO|RplP|RplQ|RplR|RplS|RplT|RplU|RplV|RplW|RplX|RplY|tuf|tufA|tufB|fusA)\b/i;

  // Wir wollen pro Locus nur eine Codon-Analyse: bevorzugt CDS-Eintrag,
  // falls nicht vorhanden, gene-Eintrag mit Länge%3==0.
  // Erst Gruppen pro Position (start,end,strand)
  const cdsByKey = new Map();
  for (const g of geneIndex) {
    const key = g.start + ':' + g.end + ':' + g.strand;
    const existing = cdsByKey.get(key);
    if (!existing || (g.type === 'CDS' && existing.type !== 'CDS')) {
      cdsByKey.set(key, g);
    }
  }

  for (const g of cdsByKey.values()) {
    const counts = extractCodonsFromGene(g, twobit);
    if (!counts) {
      result.cdsSkipped++;
      continue;
    }
    const rscu = countsToRSCU(counts);
    geneRSCUs.set(g, rscu);
    result.cdsAnalyzed++;
    // In Referenz-Set?
    const txt = (g.product || '') + ' ' + (g.note || '') + ' ' + (g.name || '');
    if (referenceRegex.test(txt)) {
      referenceGenes.push(g);
    }
  }

  if (geneRSCUs.size === 0) return result;

  // Schritt 2: Genom-Mittel-RSCU (über alle CDS, gleichgewichtet)
  const meanRSCU = {};
  for (const c of SENSE_CODONS) meanRSCU[c] = 0;
  for (const rscu of geneRSCUs.values()) {
    for (const c of SENSE_CODONS) meanRSCU[c] += rscu[c];
  }
  for (const c of SENSE_CODONS) meanRSCU[c] /= geneRSCUs.size;

  // Schritt 3: Codon-Distanz pro Gen (euklidisch zum Genom-Mittel)
  for (const [g, rscu] of geneRSCUs.entries()) {
    let d2 = 0;
    for (const c of SENSE_CODONS) {
      const diff = rscu[c] - meanRSCU[c];
      d2 += diff * diff;
    }
    g.codonDistance = Math.sqrt(d2);
  }

  // Schritt 4: CAI berechnen wenn Referenz-Set vorhanden
  if (referenceGenes.length >= 5) {
    result.hasReference = true;
    result.referenceCount = referenceGenes.length;
    result.referenceNames = referenceGenes.slice(0, 10).map(g => g.name);

    // Aggregierte Codon-Counts aus dem Referenz-Set
    const refCounts = {};
    for (const g of referenceGenes) {
      const counts = extractCodonsFromGene(g, twobit);
      if (!counts) continue;
      for (const c in counts) refCounts[c] = (refCounts[c] || 0) + counts[c];
    }
    // Pro Aminosäure: w(codon) = count(codon) / max-count-in-synonyms
    // CAI eines Gens = geometrisches Mittel der w-Werte aller verwendeten Codons
    const wValues = {};
    for (const aa of Object.keys(AA_TO_CODONS)) {
      const codons = AA_TO_CODONS[aa];
      let maxCount = 0;
      for (const c of codons) maxCount = Math.max(maxCount, refCounts[c] || 0);
      if (maxCount === 0) {
        for (const c of codons) wValues[c] = 1;  // AA fehlt → neutral
      } else {
        for (const c of codons) {
          // Pseudocount um log(0) zu vermeiden
          const cnt = (refCounts[c] || 0);
          wValues[c] = cnt > 0 ? cnt / maxCount : 0.01;
        }
      }
    }

    for (const [g, rscu] of geneRSCUs.entries()) {
      const counts = extractCodonsFromGene(g, twobit);
      if (!counts) continue;
      let logSum = 0;
      let n = 0;
      for (const c in counts) {
        // Methionin (ATG) und Tryptophan (TGG) sind die einzigen Single-Codon-AAs
        // klassisch werden sie ausgeschlossen, weil sie keine Wahl haben
        const aa = CODON_TABLE[c];
        if (AA_TO_CODONS[aa].length === 1) continue;
        const w = wValues[c];
        if (w > 0) {
          logSum += Math.log(w) * counts[c];
          n += counts[c];
        }
      }
      g.cai = n > 0 ? Math.exp(logSum / n) : null;
    }
  }

  // Schritt 5: Klassifikation
  // Distanz: typisch (innerhalb 1.5σ vom Median) / atypisch (>2σ)
  const dists = [...geneRSCUs.keys()].map(g => g.codonDistance).filter(v => v !== undefined);
  if (dists.length >= 5) {
    const sorted = dists.slice().sort((a, b) => a - b);
    const median = sorted[Math.floor(sorted.length / 2)];
    // MAD (Median Absolute Deviation), robuster als σ
    const absDevs = sorted.map(v => Math.abs(v - median)).sort((a, b) => a - b);
    const mad = absDevs[Math.floor(absDevs.length / 2)];
    const sigmaEst = 1.4826 * mad;  // robust σ-Schätzer
    const atypicalThreshold = median + 2 * sigmaEst;

    // CAI-Klassifikation: top 10% = "hoch"
    let caiTop10 = null;
    if (result.hasReference) {
      const cais = [...geneRSCUs.keys()].map(g => g.cai).filter(v => v !== null && v !== undefined);
      if (cais.length >= 5) {
        const caiSorted = cais.slice().sort((a, b) => b - a);  // descending
        caiTop10 = caiSorted[Math.floor(caiSorted.length * 0.1)];
      }
    }

    for (const g of geneRSCUs.keys()) {
      let cls = 'typisch';
      // v0.6: Erst CAI prüfen — Gene mit hohem CAI sind "hoch" (vermutlich hoch exprimiert),
      // auch wenn ihre Codon-Distanz vom Genom-Mittel groß ist (das ist genau das Charakteristische).
      // Erst wenn CAI nicht "hoch" ist, kann ein Gen als "atypisch" klassifiziert werden.
      if (caiTop10 !== null && g.cai !== null && g.cai !== undefined && g.cai >= caiTop10) {
        cls = 'hoch';
      } else if (g.codonDistance > atypicalThreshold) {
        cls = 'atypisch';
      }
      g.codonClass = cls;
    }

    result.atypicalThreshold = atypicalThreshold;
    result.medianDistance = median;
    result.caiTop10 = caiTop10;
  }

  // Bug-Fix v0.7: GenBank hat oft sowohl 'gene' als auch 'CDS' an gleicher Position.
  // computeCodonAnalysis berechnet CAI nur auf der bevorzugten (CDS-)Variante.
  // classifyHit kann aber den 'gene'-Doppelgänger als nearestGene wählen — dann fehlt CAI.
  // Lösung: berechnete Werte (cai, codonDistance, codonClass) auf alle Locus-Doppelgänger
  // im geneIndex replizieren.
  for (const g of geneIndex) {
    if (g.cai !== undefined) continue;  // hat schon Werte (war in cdsByKey)
    const key = g.start + ':' + g.end + ':' + g.strand;
    const ref = cdsByKey.get(key);
    if (ref && ref.cai !== undefined) {
      g.cai = ref.cai;
      g.codonDistance = ref.codonDistance;
      g.codonClass = ref.codonClass;
    }
  }

  return result;
}

// Klassifikation eines Treffers im Gen-Kontext
function classifyHit(start, end, strand, geneIndex) {
  // Binäre Suche nach Genen die den Treffer überlappen
  let intragenic = false;
  let containingGene = null;
  // Linear-Scan reicht für moderate Genzahl, Treffer-Anzahl ist begrenzt
  // Für 4500 Gene * 2400 Treffer = 10.8M ops, ginge im Worker
  for (const g of geneIndex) {
    if (g.end < start) continue;
    if (g.start > end) break;
    if (g.start <= start && g.end >= end) {
      intragenic = true; containingGene = g; break;
    }
    if (g.start <= end && g.end >= start) {
      // Teilüberlapp
      intragenic = true; containingGene = g; break;
    }
  }
  // Nächstes downstream-Gen (zum Berechnen der Distanz zu Gen-Start auf gleichem oder anderem Strand)
  // Für intergene Treffer suchen wir das nächstgelegene Gen-Start in der Nähe
  let nearestGeneStart = null;
  let distanceToGeneStart = null;
  let strandRelToGene = null;
  if (containingGene) {
    nearestGeneStart = containingGene;
    // Distanz zum eigenen Gen-Start
    if (containingGene.strand === 1) {
      distanceToGeneStart = start - containingGene.start;
    } else {
      distanceToGeneStart = containingGene.end - end;
    }
    strandRelToGene = (strand === containingGene.strand) ? 'sense' : 'antisense';
  } else {
    // Suche das nächste Gen-Start (vor oder nach dem Treffer)
    let bestDist = Infinity, bestGene = null;
    for (const g of geneIndex) {
      // Position des Gen-Starts (TSS-Approximation)
      const geneStartPos = g.strand === 1 ? g.start : g.end;
      // Wir interessieren uns für den nächsten Gen-Start "downstream" des Treffers
      // Aber bei Promotor-Suche ist das nächste Gen-Start in der Strang-Richtung wichtig
      // Pragmatisch: nächste Gen-Start-Position absolut
      const treffermitte = (start + end) / 2;
      const d = Math.abs(geneStartPos - treffermitte);
      if (d < bestDist) {
        bestDist = d;
        bestGene = g;
      }
    }
    if (bestGene) {
      nearestGeneStart = bestGene;
      // Vorzeichen: positiv = upstream des Gen-Starts (typischer Promotor)
      // negativ = downstream des Gen-Starts (innerhalb oder dahinter)
      if (bestGene.strand === 1) {
        distanceToGeneStart = start - bestGene.start;
      } else {
        distanceToGeneStart = bestGene.end - end;
      }
      strandRelToGene = (strand === bestGene.strand) ? 'sense' : 'antisense';
    }
  }
  return {
    intragenic,
    nearestGene: nearestGeneStart ? nearestGeneStart.name : null,
    nearestGeneLocusTag: nearestGeneStart ? nearestGeneStart.locus_tag : null,
    nearestGeneCai: nearestGeneStart && nearestGeneStart.cai !== undefined ? nearestGeneStart.cai : null,
    nearestGeneCodonClass: nearestGeneStart ? (nearestGeneStart.codonClass || null) : null,
    distanceToGeneStart,
    strandRelToGene
  };
}

function newMotif() {
