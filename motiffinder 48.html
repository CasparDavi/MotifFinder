// ====== Sequenz-Parser, Konsensus- und Datenraum-Ableitung (v0.4.4) ======

// Parst eine Liste von Sequenz-Strings (z.B. aus User-Textarea oder PRODORIC-Bindingsites).
// Jede Eingabe-Zeile wird als eine Beispielsequenz behandelt.
// Akzeptierte Formate (toleranter Parser):
//   - Reine ACGT-Sequenz: ATGCAT
//   - Mit IUPAC-Codes: WGTCAA
//   - Mit Spacer als "n5", "N5", "(n)5", "n{5}", "n5-15" etc.: GTTTCAn5TATTGT
//   - Mit Whitespace: "GTTTCA n5 TATTGT"
//   - Mit Großbuchstaben für konservierte Positionen, Klein für weniger: "GtttcaN5TattGT"
//     → Lower/Upper wird vereinheitlicht zu Upper (Konservierungs-Info verworfen)
// 
// Rückgabe pro Sequenz: { left: 'GTTTCA', spacerLen: 5, spacerMin/Max?: ..., right: 'TATTGT' }
//   oder { left: 'GTTTCAATG...', spacerLen: 0, right: '' } wenn kein Spacer.
//
// Achtung: bei festen Spacer-Längen (z.B. 'n5') ist spacerLen=5 und keine Range.
// Bei Range (z.B. 'n5-15') ist spacerMin/spacerMax gesetzt (selten in Beobachtungen,
// üblich in Konsensus-Strings).
function parseExampleSequence(line) {
  if (!line || typeof line !== 'string') return null;
  let s = line.trim().toUpperCase();
  if (!s) return null;
  // Whitespace tolerieren — aber als Spacer-Marker behandeln wir es nicht.
  // Whitespace zwischen Blöcken wird zur Trennung der Spacer-Notation gebraucht
  // ("GTTTCA N5 TATTGT" → "GTTTCAN5TATTGT" nach Whitespace-Removal).
  // Wir entfernen Whitespace.
  s = s.replace(/\s+/g, '');
  // Klammern um Spacer entfernen: "(N)5" → "N5"
  s = s.replace(/\(\s*N\s*\)/gi, 'N');
  // Spacer-Notationen normalisieren: "N{5,15}" → "N5-15"
  s = s.replace(/N\{(\d+),(\d+)\}/g, 'N$1-$2');
  // Detektiere Spacer-Patterns: N{Zahl} oder N{Zahl}-{Zahl}
  // Pattern: vor Spacer = links, nach Spacer = rechts
  const spacerMatch = s.match(/^([ACGTRYSWKMBDHVN]+?)N(\d+)(?:-(\d+))?([ACGTRYSWKMBDHVN]+)$/);
  if (spacerMatch) {
    const left = spacerMatch[1];
    const spacerMin = parseInt(spacerMatch[2], 10);
    const spacerMax = spacerMatch[3] ? parseInt(spacerMatch[3], 10) : spacerMin;
    const right = spacerMatch[4];
    return {
      left, right,
      spacerLen: (spacerMin === spacerMax) ? spacerMin : null,
      spacerMin: spacerMin,
      spacerMax: spacerMax,
      raw: s
    };
  }
  // Kein Spacer: alles ist eine Sequenz (mit ggf. IUPAC-Codes, aber keine Spacer)
  // Falls sie aber 'N' ohne Zahl enthält, ist das einfach ein IUPAC-N (jede Base).
  // Validität: nur IUPAC-Zeichen?
  if (!/^[ACGTRYSWKMBDHVN]+$/.test(s)) {
    return null; // Ungültige Zeichen
  }
  return { left: s, right: '', spacerLen: 0, raw: s };
}

// Parst eine Liste (newline-separiert) von Sequenz-Strings.
// Liefert ein Set von gültigen Eintragungen + die ungültigen Zeilen.
function parseSequenceList(text) {
  if (!text || typeof text !== 'string') return { sequences: [], invalid: [] };
  const lines = text.split(/\r?\n/);
  const sequences = [];
  const invalid = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue; // leere Zeile
    if (trimmed.startsWith('#') || trimmed.startsWith('//')) continue; // Kommentar
    const parsed = parseExampleSequence(trimmed);
    if (parsed) sequences.push(parsed);
    else invalid.push(trimmed);
  }
  return { sequences, invalid };
}

// Aus Liste von parsed Sequenzen die Häufigkeitsmatrix (Counts) ableiten.
// Erweitert IUPAC-Codes auf ihre Komponenten (gewichtet 1/k pro Komponente).
// Wenn Sequenzen unterschiedliche Längen haben (Spacer-Längenvariation), wird
// die "Block-Struktur" beibehalten: linker Block | Spacer | rechter Block.
//
// Rückgabe: { left: matrix[L][4], spacerLengths: [...], right: matrix[R][4],
//             leftLen: L, rightLen: R, n: total sequences,
//             spacerMin, spacerMax }
//
// Rauchfallen:
//   - Wenn linker/rechter Block unterschiedlich lang → Sequenz wird übersprungen mit Warnung
//   - Wenn manche Sequenzen Spacer haben, andere nicht → wir behandeln "kein Spacer" als 
//     "nur linker Block, rechter Block leer". Inkonsistent — Warnung ausgeben.
function computeFrequencyMatrices(parsedSeqs) {
  if (!parsedSeqs || parsedSeqs.length === 0) {
    return null;
  }
  // Bestimme linke/rechte Block-Länge (Modus = häufigster Wert)
  const leftLengths = parsedSeqs.map(p => p.left.length);
  const rightLengths = parsedSeqs.map(p => p.right.length);
  // Modus
  const mode = (arr) => {
    const c = new Map();
    for (const v of arr) c.set(v, (c.get(v) || 0) + 1);
    let bestK = arr[0], bestV = 0;
    for (const [k, v] of c) if (v > bestV) { bestV = v; bestK = k; }
    return bestK;
  };
  const L = mode(leftLengths);
  const R = mode(rightLengths);
  // Filtere Sequenzen mit anderer Block-Länge raus
  const usable = parsedSeqs.filter(p => p.left.length === L && p.right.length === R);
  const skipped = parsedSeqs.length - usable.length;

  // Initialisiere Count-Matrizen [L][4] und [R][4]
  const NUC = ['A', 'C', 'G', 'T'];
  const NUC_IDX = { A: 0, C: 1, G: 2, T: 3 };
  const IUPAC_EXPAND = {
    A: ['A'], C: ['C'], G: ['G'], T: ['T'], U: ['T'],
    R: ['A', 'G'], Y: ['C', 'T'], S: ['C', 'G'], W: ['A', 'T'],
    K: ['G', 'T'], M: ['A', 'C'],
    B: ['C', 'G', 'T'], D: ['A', 'G', 'T'], H: ['A', 'C', 'T'], V: ['A', 'C', 'G'],
    N: ['A', 'C', 'G', 'T']
  };
  const newMatrix = (n) => Array.from({length: n}, () => [0, 0, 0, 0]);
  const leftMatrix = newMatrix(L);
  const rightMatrix = newMatrix(R);
  const spacerLengths = [];

  for (const p of usable) {
    // Linker Block
    for (let i = 0; i < L; i++) {
      const ch = p.left[i];
      const expand = IUPAC_EXPAND[ch];
      if (!expand) continue;
      const w = 1 / expand.length;
      for (const n of expand) {
        leftMatrix[i][NUC_IDX[n]] += w;
      }
    }
    // Rechter Block
    for (let i = 0; i < R; i++) {
      const ch = p.right[i];
      const expand = IUPAC_EXPAND[ch];
      if (!expand) continue;
      const w = 1 / expand.length;
      for (const n of expand) {
        rightMatrix[i][NUC_IDX[n]] += w;
      }
    }
    // Spacer-Länge (wenn fixed)
    if (typeof p.spacerLen === 'number' && p.spacerLen > 0) {
      spacerLengths.push(p.spacerLen);
    } else if (p.spacerMin && p.spacerMax) {
      // Falls Range, nehmen wir den Mittelwert (selten in Eingabesequenzen)
      spacerLengths.push(Math.round((p.spacerMin + p.spacerMax) / 2));
    }
  }

  // Spacer-Range
  let spacerMin = null, spacerMax = null;
  if (spacerLengths.length > 0) {
    spacerMin = Math.min(...spacerLengths);
    spacerMax = Math.max(...spacerLengths);
  }

  return {
    leftMatrix, rightMatrix,
    leftLen: L, rightLen: R,
    n: usable.length,
    skipped: skipped,
    spacerLengths: spacerLengths,
    spacerMin: spacerMin,
    spacerMax: spacerMax
  };
}

// ====== v0.4.7: Diagramm-Renderer ======

// Aus einer Count-Matrix [N][4] die Frequenz-Matrix bilden (Reihen-Sum = 1)
function countsToFrequency(countMatrix) {
  return countMatrix.map(row => {
    const s = row[0] + row[1] + row[2] + row[3];
    if (s === 0) return [0.25, 0.25, 0.25, 0.25];
    return [row[0]/s, row[1]/s, row[2]/s, row[3]/s];
  });
}

// Information Content pro Position: IC_i = 2 - H(p_i)
// = 2 + Σ p_i × log₂(p_i)
function positionIC(freqRow) {
  let h = 0;
  for (const p of freqRow) {
    if (p > 0) h += p * Math.log2(p);
  }
  return 2 + h;  // 2 - H, mit H = -Σ p log p, also +Σ p log p
}

// Sequence Logo als SVG-String
// freqMatrix: [N][4] mit Werten 0..1, Reihen-Sum = 1
// gapPx: optionaler Spacer-Bereich (Breite in px) zwischen left und right
// spacerLabel: optionaler Text der im Spacer-Bereich angezeigt wird (z.B. "N7")
// totalWidth, totalHeight: gewünschte SVG-Größe
function renderSequenceLogoSVG(freqMatrix, opts) {
  opts = opts || {};
  const totalH = opts.height || 140;
  const padTop = 20, padBottom = 22, padLeft = 30, padRight = 8;
  const innerH = totalH - padTop - padBottom;

  // Pro Position: total IC, plus pro Nukleotid: IC × Frequenz (= Buchstaben-Höhe)
  const NUC = ['A', 'C', 'G', 'T'];
  const COLORS = {
    A: 'var(--base-A, #d4c896)', // beige
    C: 'var(--base-C, #b4d878)', // lime
    G: 'var(--base-G, #9ec8e8)', // blau
    T: 'var(--base-T, #e8a5b8)'  // rosa
  };
  // Da SVG var() für color/fill bedingt unterstützt: Hex-Werte direkt
  const HEX = { A: '#d4c896', C: '#b4d878', G: '#9ec8e8', T: '#e8a5b8' };

  // Block-Strukturen — wenn opts.blocks vorhanden, wird daraus pro fixed-Block ein Logo-Bereich
  // mit Spacer-Brücken dazwischen gerendert.
  // Sonst: ein durchgängiges Logo aus freqMatrix.
  const blocks = opts.blocks || [{ type: 'fixed', matrix: freqMatrix }];
  // Default-Spacer-Breite (in Logo-Spalten)
  const SPACER_WIDTH_COLS = 1.2;  // ~1 Buchstabenbreite

  // Berechne logische Spalten-Anzahl (jede fixed-Position = 1 Spalte, jeder Spacer = SPACER_WIDTH_COLS)
  let totalCols = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') totalCols += b.matrix.length;
    else totalCols += SPACER_WIDTH_COLS;
  }
  const innerW = (opts.width || 380) - padLeft - padRight;
  const colW = innerW / totalCols;

  // SVG aufbauen
  const w = padLeft + innerW + padRight;
  const h = totalH;
  let svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="font-family:ui-monospace,monospace">';

  // Y-Achse: 0, 1, 2 bits
  svg += '<g stroke="rgba(255,255,255,0.15)" stroke-width="1">';
  for (let bit = 0; bit <= 2; bit++) {
    const y = padTop + innerH - (bit / 2) * innerH;
    svg += '<line x1="' + padLeft + '" y1="' + y + '" x2="' + (w - padRight) + '" y2="' + y + '"/>';
    svg += '<text x="' + (padLeft - 5) + '" y="' + (y + 3) + '" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="end">' + bit + '</text>';
  }
  svg += '</g>';

  // Y-Achsen-Beschriftung
  svg += '<text x="6" y="' + (padTop + innerH/2) + '" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="start" transform="rotate(-90, 6, ' + (padTop + innerH/2) + ')">bits</text>';

  // Iteration über Blocks
  let curX = padLeft;
  let posIdx = 1;
  for (const b of blocks) {
    if (b.type === 'fixed') {
      const fm = b.matrix;
      for (let i = 0; i < fm.length; i++) {
        const row = fm[i];
        const ic = positionIC(row);
        // Buchstaben sortiert nach Höhe (kleinste oben aufstapeln, größte unten)
        const stack = NUC.map((n, j) => ({ n, h: row[j] * ic })).sort((a, b) => a.h - b.h);
        let yCur = padTop + innerH;
        for (const item of stack) {
          if (item.h <= 0.001) continue;
          const lh = (item.h / 2) * innerH;
          const yTop = yCur - lh;
          // Buchstabe auf Höhe lh skalieren
          const cx = curX + colW / 2;
          const baseFontSize = 24;
          const scaleY = lh / 18;  // referenzhöhe ~18
          const scaleX = colW / 14;
          svg += '<text x="' + cx + '" y="' + (yCur - 3) + '" fill="' + HEX[item.n] +
                 '" font-size="' + baseFontSize + '" font-weight="700" text-anchor="middle"' +
                 ' transform="translate(' + cx + ',' + yCur + ') scale(' + scaleX + ',' + scaleY + ') translate(' + (-cx) + ',' + (-yCur) + ')">' +
                 item.n + '</text>';
          yCur = yTop;
        }
        // X-Achsen-Tick
        svg += '<text x="' + (curX + colW/2) + '" y="' + (padTop + innerH + 12) + '" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle">' + posIdx + '</text>';
        curX += colW;
        posIdx++;
      }
    } else {
      // Spacer-Brücke
      const spw = colW * SPACER_WIDTH_COLS;
      const cy = padTop + innerH / 2;
      // Gestrichelte Linie
      svg += '<line x1="' + curX + '" y1="' + cy + '" x2="' + (curX + spw) + '" y2="' + cy + '" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,3"/>';
      // Label
      const lbl = b.label || (b.min === b.max ? 'N' + b.min : 'N' + b.min + '-' + b.max);
      svg += '<text x="' + (curX + spw/2) + '" y="' + (cy - 3) + '" fill="rgba(255,255,255,0.55)" font-size="10" text-anchor="middle">' + lbl + '</text>';
      curX += spw;
    }
  }

  svg += '</svg>';
  return svg;
}

// Frequency-Chart als HTML-Tabelle mit Heatmap-Hintergrund
// blocks: [{type: 'fixed', matrix}, {type: 'spacer', label}, ...]
function renderFrequencyChartHTML(blocks) {
  const NUC = ['A', 'C', 'G', 'T'];
  let html = '<div class="freq-chart-wrap"><table class="freq-chart"><thead><tr>';
  html += '<th></th>';
  let posIdx = 1;
  for (const b of blocks) {
    if (b.type === 'fixed') {
      for (let i = 0; i < b.matrix.length; i++) {
        html += '<th>' + posIdx + '</th>';
        posIdx++;
      }
    } else {
      const lbl = b.label || (b.min === b.max ? 'N' + b.min : 'N' + b.min + '-' + b.max);
      html += '<th class="freq-spacer">' + lbl + '</th>';
    }
  }
  html += '</tr></thead><tbody>';
  for (let nIdx = 0; nIdx < 4; nIdx++) {
    const n = NUC[nIdx];
    html += '<tr><td class="freq-rowhead freq-rowhead-' + n + '">' + n + '</td>';
    for (const b of blocks) {
      if (b.type === 'fixed') {
        for (let i = 0; i < b.matrix.length; i++) {
          const row = b.matrix[i];
          const total = row[0] + row[1] + row[2] + row[3];
          const f = total > 0 ? row[nIdx] / total : 0;
          // Heatmap: höhere Frequenz = sattere Akzentfarbe
          const alpha = (0.05 + f * 0.45).toFixed(2);
          // Bestimme ob diese Zelle die höchste in der Spalte ist
          const isMax = (row[nIdx] === Math.max(row[0], row[1], row[2], row[3])) && total > 0;
          const cls = isMax ? ' freq-max' : '';
          html += '<td class="' + cls + '" style="background:rgba(122,184,245,' + alpha + ')">' + Math.round(f * 100) + '</td>';
        }
      } else {
        html += '<td class="freq-spacer">·</td>';
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

// Spacer-Histogramm der Eingabe-Sequenzen als SVG
// spacerLengths: Array von Spacer-Längen (z.B. [7, 7, 8, 6, 7, 8])
// totalRange: optional [min, max] zum Padding der X-Achse
function renderSpacerHistogramSVG(spacerLengths, opts) {
  opts = opts || {};
  if (!spacerLengths || spacerLengths.length === 0) {
    return '<div style="color:var(--fg-mute);font-size:12px;padding:16px;text-align:center">Keine Spacer-Daten</div>';
  }
  const w = opts.width || 380;
  const h = opts.height || 140;
  const padLeft = 30, padRight = 8, padTop = 14, padBottom = 22;
  const innerW = w - padLeft - padRight;
  const innerH = h - padTop - padBottom;

  // Bins
  const counts = new Map();
  for (const v of spacerLengths) counts.set(v, (counts.get(v) || 0) + 1);
  const min = Math.min(...spacerLengths);
  const max = Math.max(...spacerLengths);
  const range = max - min + 1;
  const binW = innerW / range;
  const maxCount = Math.max(...counts.values());

  let svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '" style="font-family:ui-monospace,monospace">';

  // Y-Achse Ticks (3 Stufen: 0, mid, max)
  for (let t = 0; t <= 2; t++) {
    const tv = Math.round((t / 2) * maxCount);
    const ty = padTop + innerH - (t / 2) * innerH;
    svg += '<line x1="' + padLeft + '" y1="' + ty + '" x2="' + (w - padRight) + '" y2="' + ty + '" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>';
    svg += '<text x="' + (padLeft - 4) + '" y="' + (ty + 3) + '" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="end">' + tv + '</text>';
  }

  // Bars
  for (let i = 0; i < range; i++) {
    const len = min + i;
    const c = counts.get(len) || 0;
    const bh = (c / maxCount) * innerH;
    const bx = padLeft + i * binW + binW * 0.15;
    const by = padTop + innerH - bh;
    const bw = binW * 0.7;
    svg += '<rect x="' + bx + '" y="' + by + '" width="' + bw + '" height="' + bh + '" fill="#7ab8f5" rx="1"/>';
    // Label unter dem Bar
    svg += '<text x="' + (bx + bw/2) + '" y="' + (padTop + innerH + 12) + '" fill="rgba(255,255,255,0.55)" font-size="9" text-anchor="middle">' + len + '</text>';
    // Count über dem Bar wenn Platz
    if (bh > 14) {
      svg += '<text x="' + (bx + bw/2) + '" y="' + (by + 10) + '" fill="rgba(0,0,0,0.7)" font-size="9" text-anchor="middle" font-weight="600">' + c + '</text>';
    }
  }

  // Achsen-Label
  svg += '<text x="' + (padLeft + innerW/2) + '" y="' + (h - 4) + '" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="middle">Spacer-Länge (bp)</text>';
  svg += '<text x="6" y="' + (padTop + innerH/2) + '" fill="rgba(255,255,255,0.5)" font-size="9" text-anchor="start" transform="rotate(-90, 6, ' + (padTop + innerH/2) + ')">Häufigkeit</text>';

  svg += '</svg>';
  return svg;
}

// Aus einem normalisierten Konsensus + derivedFromSequences eine Block-Liste mit Matrizen bauen
// für die Diagramme. Wenn keine derivedFromSequences vorhanden, return null.
function buildLogoBlocks(motif) {
  const der = motif.derivedFromSequences;
  if (!der || !der.ok) return null;
  const m = der.matrices;
  const norm = normalizeConsensus(motif.consensus);
  if (!norm.ok) {
    // Ohne Konsensus-Block-Struktur: einfaches Logo aus left + right + Default-Spacer
    if (m.spacerMin !== null) {
      return [
        { type: 'fixed', matrix: m.leftMatrix },
        { type: 'spacer', min: m.spacerMin, max: m.spacerMax },
        { type: 'fixed', matrix: m.rightMatrix }
      ];
    }
    return [{ type: 'fixed', matrix: m.leftMatrix }];
  }
  // Konsensus-Blocks zur Strukturierung nutzen
  // Bei klarer 3-Block-Struktur: left-fixed | spacer | right-fixed
  if (norm.blocks.length === 3 && norm.blocks[0].type === 'fixed' && norm.blocks[1].type === 'spacer' && norm.blocks[2].type === 'fixed') {
    const leftFixedLen = norm.blocks[0].seq.length;
    const rightFixedLen = norm.blocks[2].seq.length;
    // Plausibilität
    if (leftFixedLen === m.leftLen && rightFixedLen === m.rightLen) {
      return [
        { type: 'fixed', matrix: m.leftMatrix },
        { type: 'spacer', min: norm.blocks[1].min, max: norm.blocks[1].max },
        { type: 'fixed', matrix: m.rightMatrix }
      ];
    }
  }
  // Fallback: einfache Konkatenation
  const concat = m.leftMatrix.concat(m.rightMatrix);
  return [{ type: 'fixed', matrix: concat }];
}

// ====== v0.5: PWM-Suche ======

// Aus den Sequenzen-Daten eines Motivs eine PWM-Block-Struktur bauen
// Score = f × IC (Stormo-Style, IC = 2 - H gegen uniform)
// Pseudocount α=0.5 wird auf die Frequenzen angewendet
// Liefert: { blocks: [{type:'fixed', positionScores: [[a,c,g,t], ...], maxPerPos: [...]}, {type:'spacer', min, max}, ...], totalMaxScore }
function buildPwmFromSequences(motif) {
  const der = motif.derivedFromSequences;
  if (!der || !der.ok || !der.matrices) return null;
  const m = der.matrices;

  // Helfer: Count-Row → smoothed Frequency mit Pseudocount α=0.5
  // total = Σ counts + 4×α (so dass Σ frequencies = 1)
  const ALPHA = 0.5;
  const countsToSmoothFreq = (row) => {
    const total = row[0] + row[1] + row[2] + row[3] + 4 * ALPHA;
    return [
      (row[0] + ALPHA) / total,
      (row[1] + ALPHA) / total,
      (row[2] + ALPHA) / total,
      (row[3] + ALPHA) / total
    ];
  };

  // Pro Position: f × IC für jedes Nukleotid
  // IC = 2 - H(p) = 2 + Σ p × log₂(p)
  const matrixToPositionScores = (countMatrix) => {
    const out = [];
    const maxPerPos = [];
    for (const row of countMatrix) {
      const f = countsToSmoothFreq(row);
      let h = 0;
      for (const p of f) {
        if (p > 0) h += p * Math.log2(p);
      }
      const ic = 2 + h;  // bits, in [0, 2]
      const scores = f.map(p => p * ic);
      out.push(scores);
      maxPerPos.push(Math.max(...scores));
    }
    return { positionScores: out, maxPerPos };
  };

  // Block-Struktur aus Konsensus + Sequenz-Matrizen
  const norm = normalizeConsensus(motif.consensus);
  let blocks = [];
  if (norm.ok && norm.blocks.length === 3 &&
      norm.blocks[0].type === 'fixed' && norm.blocks[1].type === 'spacer' && norm.blocks[2].type === 'fixed' &&
      norm.blocks[0].seq.length === m.leftLen && norm.blocks[2].seq.length === m.rightLen) {
    const ls = matrixToPositionScores(m.leftMatrix);
    const rs = matrixToPositionScores(m.rightMatrix);
    blocks.push({ type: 'fixed', positionScores: ls.positionScores, maxPerPos: ls.maxPerPos });
    blocks.push({ type: 'spacer', min: norm.blocks[1].min, max: norm.blocks[1].max });
    blocks.push({ type: 'fixed', positionScores: rs.positionScores, maxPerPos: rs.maxPerPos });
  } else if (m.spacerMin !== null && m.rightLen > 0) {
    // Aus Sequenzen abgeleitet: left + spacer + right
    const ls = matrixToPositionScores(m.leftMatrix);
    const rs = matrixToPositionScores(m.rightMatrix);
    blocks.push({ type: 'fixed', positionScores: ls.positionScores, maxPerPos: ls.maxPerPos });
    blocks.push({ type: 'spacer', min: m.spacerMin, max: m.spacerMax });
    blocks.push({ type: 'fixed', positionScores: rs.positionScores, maxPerPos: rs.maxPerPos });
  } else {
    // Konkatenation
    const concat = m.leftMatrix.concat(m.rightMatrix);
    const cs = matrixToPositionScores(concat);
    blocks.push({ type: 'fixed', positionScores: cs.positionScores, maxPerPos: cs.maxPerPos });
  }

  // totalMaxScore
  let totalMaxScore = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') {
      for (const v of b.maxPerPos) totalMaxScore += v;
    }
  }

  return { blocks, totalMaxScore };
}

// Aus den PRODORIC-PWM-Daten eine PWM-Block-Struktur bauen
// Score = direkt die PRODORIC-PWM-Werte (sind schon IC-gewichtet)
function buildPwmFromProdoric(motif) {
  const pwm = motif.prodoricPwm;
  if (!pwm) return null;
  const N = pwm.A.length;
  // gap_pos ist 0-basiert: nach Position gap_pos kommt der Spacer
  // Beispiel: gap_pos=6, gap_min=5, gap_max=15, N=12 → 6 links + spacer + 6 rechts
  const blocks = [];
  if (pwm.gapPos !== null && pwm.gapPos >= 0 && pwm.gapPos < N) {
    // Links: Position 0..gapPos-1
    const leftScores = [], leftMax = [];
    for (let i = 0; i < pwm.gapPos; i++) {
      leftScores.push([pwm.A[i], pwm.C[i], pwm.G[i], pwm.T[i]]);
      leftMax.push(Math.max(pwm.A[i], pwm.C[i], pwm.G[i], pwm.T[i]));
    }
    // Rechts: Position gapPos..N-1
    const rightScores = [], rightMax = [];
    for (let i = pwm.gapPos; i < N; i++) {
      rightScores.push([pwm.A[i], pwm.C[i], pwm.G[i], pwm.T[i]]);
      rightMax.push(Math.max(pwm.A[i], pwm.C[i], pwm.G[i], pwm.T[i]));
    }
    blocks.push({ type: 'fixed', positionScores: leftScores, maxPerPos: leftMax });
    blocks.push({ type: 'spacer', min: pwm.gapMin || 0, max: pwm.gapMax || 0 });
    blocks.push({ type: 'fixed', positionScores: rightScores, maxPerPos: rightMax });
  } else {
    // Kein Spacer: alles in einem Block
    const scores = [], maxArr = [];
    for (let i = 0; i < N; i++) {
      scores.push([pwm.A[i], pwm.C[i], pwm.G[i], pwm.T[i]]);
      maxArr.push(Math.max(pwm.A[i], pwm.C[i], pwm.G[i], pwm.T[i]));
    }
    blocks.push({ type: 'fixed', positionScores: scores, maxPerPos: maxArr });
  }
  return { blocks, totalMaxScore: pwm.maxScore };
}

// Aus dem Genom die Hintergrund-Frequenzen p_bg(A/C/G/T) holen
function getBackgroundFrequencies() {
  if (!mf.genome || !mf.genome.composition) return null;
  const c = mf.genome.composition;
  // composition hat A/C/G/T als Anteile (Summe = 1)
  return [c.A, c.C, c.G, c.T];
}

// Pro Treffer den Log-Odds-Score gegen Genom-Hintergrund berechnen.
// log_odds = Σ_i log₂(f_i,treffer-nuc / p_bg)
// Wir nehmen die zugrundeliegenden f's aus der PWM-Block-Struktur:
//   für PRODORIC haben wir die Scores selbst, daraus f rückrechnen geht nicht sauber.
//   Alternativer Ansatz: speichere f-Matrix separat (frequencyBlocks) und berechne Log-Odds darauf.
// Pragmatisch: bei sequenzen-basierter PWM nutzen wir die smoothed-Frequenzen.
//   Bei PRODORIC: f rekonstruieren via f_i,n ≈ 2^(score_i,n) / p_bg, wenn die PWM log-odds-style ist.
//     Aber PRODORIC ist IC-gewichtet, nicht log-odds. Daher: für PRODORIC nutzen wir score / max_score
//     als pseudo-frequenz für die Log-Odds-Annotation. Approximativ.
//   Sauberer: speichere frequencyBlocks parallel zu den scoreBlocks.
function buildFrequencyBlocksForLogOdds(motif) {
  // Versuche aus den Sequenzen-Daten eine Frequenz-Matrix zu bauen
  const der = motif.derivedFromSequences;
  if (der && der.ok && der.matrices) {
    const m = der.matrices;
    const ALPHA = 0.5;
    const smooth = (row) => {
      const total = row[0] + row[1] + row[2] + row[3] + 4 * ALPHA;
      return [(row[0]+ALPHA)/total, (row[1]+ALPHA)/total, (row[2]+ALPHA)/total, (row[3]+ALPHA)/total];
    };
    const norm = normalizeConsensus(motif.consensus);
    if (norm.ok && norm.blocks.length === 3 &&
        norm.blocks[0].type === 'fixed' && norm.blocks[1].type === 'spacer' && norm.blocks[2].type === 'fixed' &&
        norm.blocks[0].seq.length === m.leftLen && norm.blocks[2].seq.length === m.rightLen) {
      return [
        { type: 'fixed', frequencies: m.leftMatrix.map(smooth) },
        { type: 'spacer', min: norm.blocks[1].min, max: norm.blocks[1].max },
        { type: 'fixed', frequencies: m.rightMatrix.map(smooth) }
      ];
    } else if (m.spacerMin !== null && m.rightLen > 0) {
      return [
        { type: 'fixed', frequencies: m.leftMatrix.map(smooth) },
        { type: 'spacer', min: m.spacerMin, max: m.spacerMax },
        { type: 'fixed', frequencies: m.rightMatrix.map(smooth) }
      ];
    } else {
      const concat = m.leftMatrix.concat(m.rightMatrix);
      return [{ type: 'fixed', frequencies: concat.map(smooth) }];
    }
  }
  return null;
}

// Berechnet Log-Odds-Score eines Treffers gegen Hintergrund.
// hitSeq: gefundene Sequenz inkl. Spacer (gleich strukturiert wie der Konsensus)
// freqBlocks: Frequenz-Blöcke des Motivs
// pBg: [p_A, p_C, p_G, p_T] vom Genom
function computeHitLogOdds(hitSeq, freqBlocks, pBg) {
  if (!freqBlocks || !pBg) return null;
  const NUC_IDX = { A: 0, C: 1, G: 2, T: 3 };
  let score = 0;
  let pos = 0;
  for (const b of freqBlocks) {
    if (b.type === 'fixed') {
      for (let i = 0; i < b.frequencies.length; i++) {
        const ch = hitSeq[pos];
        const ni = NUC_IDX[ch];
        if (ni !== undefined) {
          const f = b.frequencies[i][ni];
          if (f > 0 && pBg[ni] > 0) {
            score += Math.log2(f / pBg[ni]);
          }
        }
        pos++;
      }
    } else {
      // Spacer überspringen — Länge variabel, müssen wir aus hitSeq.length herausrechnen?
      // Pragmatisch: Gesamt-hitSeq-Länge minus alle fixed-Längen = Spacer-Länge
      // Aber das ist hier nicht direkt verfügbar. Wir nehmen an, dass hitSeq die richtige Länge hat,
      // und wir kennen die Spacer-Länge aus Hits-Daten. Workaround: rechne fixed-Länge gesamt aus.
      let totalFixed = 0;
      for (const bb of freqBlocks) {
        if (bb.type === 'fixed') totalFixed += bb.frequencies.length;
      }
      const spacerLen = hitSeq.length - totalFixed;
      pos += spacerLen;
    }
  }
  return score;
}

// Aus einer Count-Matrix [N positions][4 bases] den Konsensus-IUPAC-String ableiten.
// Pseudocount α = 0.5 default. Toleranz default 0.05 (5 Prozentpunkte).
// Algorithmus: keepers = Nukleotide mit smoothed-Frequenz >= max-Frequenz - tolerance.
function deriveConsensus(countMatrix, options) {
  options = options || {};
  const alpha = (options.alpha !== undefined) ? options.alpha : 0.5;
  const tolerance = (options.tolerance !== undefined) ? options.tolerance : 0.05;
  const NUC = ['A', 'C', 'G', 'T'];
  const codeFor = (set) => {
    // Umkehr der IUPAC_EXPAND-Tabelle
    const sorted = NUC.filter(n => set.has(n)).sort().join('');
    const map = {
      'A': 'A', 'C': 'C', 'G': 'G', 'T': 'T',
      'AG': 'R', 'CT': 'Y', 'CG': 'S', 'AT': 'W',
      'GT': 'K', 'AC': 'M',
      'CGT': 'B', 'AGT': 'D', 'ACT': 'H', 'ACG': 'V',
      'ACGT': 'N'
    };
    return map[sorted] || 'N';
  };
  let result = '';
  for (const counts of countMatrix) {
    // Frequenzen mit Pseudocount
    const total = counts[0] + counts[1] + counts[2] + counts[3] + 4 * alpha;
    const freqs = counts.map(c => (c + alpha) / total);
    const fMax = Math.max(...freqs);
    const threshold = fMax - tolerance;
    const keepers = new Set();
    for (let i = 0; i < 4; i++) {
      if (freqs[i] + 1e-9 >= threshold) keepers.add(NUC[i]);
    }
    result += codeFor(keepers);
  }
  return result;
}

// Aus einer Count-Matrix den Datenraum-IUPAC-String ableiten.
// Datenraum = alle Nukleotide, die in der Eingabe (Counts > 0) jemals beobachtet wurden.
// Kein Pseudocount.
function deriveSearchSpace(countMatrix) {
  const NUC = ['A', 'C', 'G', 'T'];
  const codeFor = (set) => {
    const sorted = NUC.filter(n => set.has(n)).sort().join('');
    const map = {
      'A': 'A', 'C': 'C', 'G': 'G', 'T': 'T',
      'AG': 'R', 'CT': 'Y', 'CG': 'S', 'AT': 'W',
      'GT': 'K', 'AC': 'M',
      'CGT': 'B', 'AGT': 'D', 'ACT': 'H', 'ACG': 'V',
      'ACGT': 'N'
    };
    return map[sorted] || 'N';
  };
  let result = '';
  for (const counts of countMatrix) {
    const observed = new Set();
    for (let i = 0; i < 4; i++) {
      if (counts[i] >= 0.5) observed.add(NUC[i]); // 0.5 wegen IUPAC-Gewichtung (R = je 0.5 in A und G)
    }
    if (observed.size === 0) {
      result += 'N'; // Position niemals beobachtet (sollte nicht passieren)
    } else {
      result += codeFor(observed);
    }
  }
  return result;
}

// Komplette Ableitung aus einer Sequenz-Liste:
// liefert { consensus, searchSpace, freqMatrix, spacerInfo }
function deriveFromSequenceList(text, options) {
  const parsed = parseSequenceList(text);
  if (parsed.sequences.length === 0) {
    return { ok: false, error: 'Keine gültigen Sequenzen', invalid: parsed.invalid };
  }
  const matrices = computeFrequencyMatrices(parsed.sequences);
  if (!matrices) {
    return { ok: false, error: 'Frequenzen konnten nicht berechnet werden' };
  }
  // Konsensus + Datenraum für linken Block
  const leftConsensus = deriveConsensus(matrices.leftMatrix, options);
  const leftSpace = deriveSearchSpace(matrices.leftMatrix);
  const rightConsensus = matrices.rightLen > 0 ? deriveConsensus(matrices.rightMatrix, options) : '';
  const rightSpace = matrices.rightLen > 0 ? deriveSearchSpace(matrices.rightMatrix) : '';
  // Spacer-String wenn vorhanden
  let spacerStr = '';
  if (matrices.spacerMin !== null) {
    spacerStr = (matrices.spacerMin === matrices.spacerMax)
      ? ' N' + matrices.spacerMin + ' '
      : ' N' + matrices.spacerMin + '-' + matrices.spacerMax + ' ';
  }
  return {
    ok: true,
    consensus: (leftConsensus + spacerStr + rightConsensus).trim(),
    searchSpace: (leftSpace + spacerStr + rightSpace).trim(),
    matrices: matrices,
    parsed: parsed,
    n: matrices.n,
    skipped: matrices.skipped,
    invalid: parsed.invalid,
    warnings: (matrices.n < 5) ? ['Nur ' + matrices.n + ' Sequenzen — Konsensus ist wenig aussagekräftig'] : []
  };
}


// ====== Symmetrie-Analyse (v0.4.5) ======

// IUPAC-Codes vergleichen — gibt true zurück wenn die zwei IUPAC-Codes
// mindestens ein Nukleotid gemeinsam haben (also "können dieselbe Base meinen").
// Wird genutzt für die Mismatch-Bestimmung gegen Konsensus.
const IUPAC_BITS = {
  A: 0b0001, C: 0b0010, G: 0b0100, T: 0b1000, U: 0b1000,
  R: 0b0101, Y: 0b1010, S: 0b0110, W: 0b1001,
  K: 0b1100, M: 0b0011,
  B: 0b1110, D: 0b1101, H: 0b1011, V: 0b0111,
  N: 0b1111
};

function iupacMatches(consChar, observedNuc) {
  const cb = IUPAC_BITS[consChar];
  const ob = IUPAC_BITS[observedNuc];
  return (cb & ob) !== 0;
}

// Aus einem Konsensus-String die Half-Sites + Spacer-Information extrahieren.
// Erwartet: normalizeConsensus-Output mit blocks-Array.
// Liefert { left, right, spacerMin, spacerMax, leftLen, rightLen } oder null.
function extractHalfSitesFromConsensus(consensusStr) {
  const norm = normalizeConsensus(consensusStr);
  if (!norm.ok) return null;
  const blocks = norm.blocks;
  // Drei Fälle:
  // (1) Zwei fixed Blocks getrennt durch genau einen spacer: [fixed, spacer, fixed]
  // (2) Ein fixed Block ohne spacer: ganzer Konsensus, Half-Sites = halbierte Sequenz
  // (3) Komplexer: mehrere Blocks, nicht klar -> null
  if (blocks.length === 3 && blocks[0].type === 'fixed' && blocks[1].type === 'spacer' && blocks[2].type === 'fixed') {
    return {
      left: blocks[0].seq, right: blocks[2].seq,
      leftLen: blocks[0].seq.length, rightLen: blocks[2].seq.length,
      spacerMin: blocks[1].min, spacerMax: blocks[1].max,
      hasSpacer: true
    };
  }
  if (blocks.length === 1 && blocks[0].type === 'fixed') {
    // Inline ohne Spacer: User muss Half-Site-Länge angeben.
    // Default-Vorschlag: floor(len/2) für gerade, oder mit 1bp Mittel-Spacer
    const seq = blocks[0].seq;
    const L = seq.length;
    if (L % 2 === 0) {
      // Genau halbiert
      const half = L / 2;
      return {
        left: seq.substring(0, half), right: seq.substring(half),
        leftLen: half, rightLen: half,
        spacerMin: 0, spacerMax: 0,
        hasSpacer: false
      };
    } else {
      // Ungerade Länge: mittlere Position als 1-bp Spacer
      const half = Math.floor(L / 2);
      return {
        left: seq.substring(0, half), right: seq.substring(half + 1),
        leftLen: half, rightLen: half,
        spacerMin: 1, spacerMax: 1,
        hasSpacer: false  // kein expliziter Spacer im Input
      };
    }
  }
  return null;
}

// Reverse-Complement eines IUPAC-Strings (revcompString existiert schon, aber als Helfer hier ok)
function iupacRevcomp(s) {
  return revcompString(s);
}

// Aus dem Konsensus den wahrscheinlichen Symmetrie-Modus erkennen.
// Liefert { mode: 'normal'|'inverted_repeat'|'direct_repeat', halfSiteLen, suggested }
// suggested=true wenn das Tool einen Vorschlag macht (User soll bestätigen)
function detectSymmetryFromConsensus(consensusStr) {
  const halves = extractHalfSitesFromConsensus(consensusStr);
  if (!halves) return { mode: 'normal', halfSiteLen: null, suggested: false };
  if (halves.leftLen !== halves.rightLen || halves.leftLen < 3) {
    return { mode: 'normal', halfSiteLen: null, suggested: false };
  }
  // Test 1: Direct Repeat — left == right (IUPAC-aware)
  let isDirect = true;
  for (let i = 0; i < halves.leftLen; i++) {
    if (halves.left[i] !== halves.right[i]) { isDirect = false; break; }
  }
  if (isDirect) {
    return { mode: 'direct_repeat', halfSiteLen: halves.leftLen, suggested: true };
  }
  // Test 2: Inverted Repeat — right == revcomp(left)
  const revLeft = iupacRevcomp(halves.left);
  let isInverted = true;
  for (let i = 0; i < halves.leftLen; i++) {
    if (revLeft[i] !== halves.right[i]) { isInverted = false; break; }
  }
  if (isInverted) {
    return { mode: 'inverted_repeat', halfSiteLen: halves.leftLen, suggested: true };
  }
  return { mode: 'normal', halfSiteLen: halves.leftLen, suggested: false };
}

// Pro Treffer die Symmetrie-Annotation berechnen.
// Eingabe:
//   hitSeq: gefundene DNA-Sequenz im Treffer (mit Spacer inline, z.B. "GTTTCAACGCATATTGT")
//   consensus: normalisierter Konsensus mit blocks (von normalizeConsensus)
//   halfSiteLen: Half-Site-Länge in bp
//   mode: 'inverted_repeat' | 'direct_repeat'
// Liefert: { mmLeft, mmRight, asymmetry, symSubs, asymSubs, halfLeft, halfRight }
function analyzeHitSymmetry(hitSeq, consensusBlocks, halfSiteLen, mode) {
  // hitSeq enthält den ganzen Treffer inkl. Spacer.
  // Half-Sites sind die ersten halfSiteLen und letzten halfSiteLen Zeichen.
  if (!hitSeq || hitSeq.length < 2 * halfSiteLen) return null;
  const halfLeft = hitSeq.substring(0, halfSiteLen);
  const halfRight = hitSeq.substring(hitSeq.length - halfSiteLen);

  // Konsensus-Half-Sites aus den Blocks extrahieren
  // Annahme: blocks[0] ist linker fixed Block, blocks[blocks.length-1] ist rechter fixed Block
  let consLeft = '', consRight = '';
  if (consensusBlocks.length === 3 && consensusBlocks[0].type === 'fixed' && consensusBlocks[2].type === 'fixed') {
    consLeft = consensusBlocks[0].seq.substring(0, halfSiteLen);
    consRight = consensusBlocks[2].seq.substring(consensusBlocks[2].seq.length - halfSiteLen);
  } else if (consensusBlocks.length === 1 && consensusBlocks[0].type === 'fixed') {
    const full = consensusBlocks[0].seq;
    consLeft = full.substring(0, halfSiteLen);
    consRight = full.substring(full.length - halfSiteLen);
  } else {
    return null;
  }
  if (consLeft.length !== halfSiteLen || consRight.length !== halfSiteLen) return null;

  // Mismatches pro Half-Site
  const leftMm = [];   // Liste von Indizes wo Mismatch
  const rightMm = [];
  for (let i = 0; i < halfSiteLen; i++) {
    if (!iupacMatches(consLeft[i], halfLeft[i])) leftMm.push(i);
    if (!iupacMatches(consRight[i], halfRight[i])) rightMm.push(i);
  }
  const mmLeft = leftMm.length;
  const mmRight = rightMm.length;
  const asymmetry = Math.abs(mmLeft - mmRight);

  // Symmetrische vs asymmetrische Substitutionen
  // Symmetrische Substitution: Mismatch an gleicher relativer Position auf beiden Half-Sites,
  // mit gleicher Substitution (gleiche Base bei direct, complement-Base bei inverted)
  let symSubs = 0;
  let asymSubs = 0;
  // Bei Inverted Repeat: relative Position rechts gespiegelt
  // Wir mappen: linke Position i ↔ rechte Position halfSiteLen-1-i (Spiegelung) bei inverted
  //             linke Position i ↔ rechte Position i (1:1) bei direct
  const leftMmSet = new Set(leftMm);
  const rightMmSet = new Set(rightMm);

  if (mode === 'direct_repeat') {
    // Position i links korrespondiert mit Position i rechts
    for (let i = 0; i < halfSiteLen; i++) {
      const leftMmHere = leftMmSet.has(i);
      const rightMmHere = rightMmSet.has(i);
      if (leftMmHere && rightMmHere) {
        // Gleiche Substitution? → halfLeft[i] === halfRight[i]
        if (halfLeft[i] === halfRight[i]) symSubs++;
        else { asymSubs += 2; }   // Beide Seiten Mm, aber unterschiedliche Sub → 2 asym
      } else if (leftMmHere || rightMmHere) {
        asymSubs++;
      }
    }
  } else if (mode === 'inverted_repeat') {
    // Position i links korrespondiert mit Position (halfSiteLen-1-i) rechts (Spiegelung)
    for (let i = 0; i < halfSiteLen; i++) {
      const j = halfSiteLen - 1 - i;
      const leftMmHere = leftMmSet.has(i);
      const rightMmHere = rightMmSet.has(j);
      if (leftMmHere && rightMmHere) {
        // Bei Inverted: halfLeft[i] sollte komplementär zu halfRight[j] sein für "gleiche" Substitution
        const compTable = { A:'T', T:'A', G:'C', C:'G' };
        if (compTable[halfLeft[i]] === halfRight[j]) symSubs++;
        else asymSubs += 2;
      } else if (leftMmHere || rightMmHere) {
        asymSubs++;
      }
    }
  } else {
    return null;
  }

  return {
    mmLeft, mmRight, asymmetry, symSubs, asymSubs,
    halfLeft, halfRight
  };
}

// Parst eine PRODORIC JSON-Datei und gibt ein Motiv-kompatibles Objekt zurück.
// Format: siehe https://www.prodoric.de/openapi.json (Endpoint /matrix/MX{id})
function parseProdoricJson(json) {
  const errors = [];
  if (!json || typeof json !== 'object') {
    return { ok: false, error: 'Datei ist kein gültiges JSON-Objekt' };
  }
  // Pflichtfelder prüfen
  if (typeof json.consensus !== 'string' || !json.consensus) {
    return { ok: false, error: 'JSON enthält keinen Konsensus (consensus-Feld fehlt)' };
  }
  if (typeof json.mx !== 'number' && typeof json.mx !== 'string') {
    errors.push('mx-Feld fehlt');
  }
  if (typeof json.name !== 'string') {
    errors.push('name-Feld fehlt');
  }

  // MX-ID formatieren: 17 -> MX000017
  let mxId = null;
  if (json.mx !== undefined && json.mx !== null) {
    const n = parseInt(json.mx, 10);
    if (!isNaN(n)) mxId = 'MX' + String(n).padStart(6, '0');
  }

  // Konsensus normalisieren: uppercase, Whitespace bleibt für Lesbarkeit
  const consensusUpper = json.consensus.toUpperCase();

  // Funktion ableiten aus type
  // PRODORIC kennt mindestens: "Sigma Factor", "Transcription Factor"
  let func = 'free';
  let suggestedStrandMode = 'strand_dependent';   // Default: strangabhängig
  if (json.type === 'Sigma Factor') {
    func = 'promoter';
    suggestedStrandMode = 'strand_dependent';
  } else if (json.type === 'Transcription Factor') {
    // Aus Bindingsites Regulation ableiten
    const sites = Array.isArray(json.bindingsites) ? json.bindingsites : [];
    const regs = new Set(sites.map(bs => bs.regulation).filter(r => r));
    const onlyRepression = regs.size > 0 && regs.size === 1 && regs.has('Repression');
    const onlyActivation = regs.size > 0 && regs.size === 1 && regs.has('Activation');
    if (onlyRepression) {
      func = 'operator_in';   // Repressoren: oft im Gen oder upstream
      suggestedStrandMode = 'strand_neutral';   // CtsR-artig
    } else if (onlyActivation) {
      func = 'operator_up';
      suggestedStrandMode = 'strand_dependent';
    } else {
      // Gemischt oder unbekannt: Default operator_up, strangabhängig
      func = 'operator_up';
      suggestedStrandMode = 'strand_dependent';
    }
  }

  // v0.5: PWM-Daten extrahieren falls vorhanden
  let pwm = null;
  if (json.pwm && typeof json.pwm === 'object'
      && Array.isArray(json.pwm.A) && Array.isArray(json.pwm.C)
      && Array.isArray(json.pwm.G) && Array.isArray(json.pwm.T)
      && json.pwm.A.length === json.pwm.C.length
      && json.pwm.A.length === json.pwm.G.length
      && json.pwm.A.length === json.pwm.T.length) {
    pwm = {
      A: json.pwm.A.slice(),
      C: json.pwm.C.slice(),
      G: json.pwm.G.slice(),
      T: json.pwm.T.slice(),
      gapPos: typeof json.pwm.gap_pos === 'number' ? json.pwm.gap_pos : null,
      gapMin: typeof json.pwm.gap_min === 'number' ? json.pwm.gap_min : null,
      gapMax: typeof json.pwm.gap_max === 'number' ? json.pwm.gap_max : null,
      maxScore: typeof json.max_score === 'number' ? json.max_score : null
    };
    // maxScore neu berechnen wenn nicht im JSON
    if (pwm.maxScore === null) {
      let s = 0;
      for (let i = 0; i < pwm.A.length; i++) {
        s += Math.max(pwm.A[i], pwm.C[i], pwm.G[i], pwm.T[i]);
      }
      pwm.maxScore = s;
    }
  }

  return {
    ok: true,
    name: json.name || ('Matrix ' + (mxId || '?')),
    consensus: consensusUpper,
    func: func,
    suggestedStrandMode: suggestedStrandMode,
    prodoricMx: mxId,
    prodoricOrganism: (json.organism && json.organism.name)
      ? (json.organism.name + (json.organism.strain ? ' ' + json.organism.strain : ''))
      : null,
    bindingSiteCount: Array.isArray(json.bindingsites) ? json.bindingsites.length : 0,
    bindingSiteSequences: Array.isArray(json.bindingsites)
      ? json.bindingsites.filter(bs => bs.active !== false).map(bs => bs.sequence).filter(s => !!s)
      : [],
    pwm: pwm,
    rawType: json.type || null,
    warnings: errors
  };
}

// Wendet den PRODORIC-Parser auf ein bestehendes Motiv an
function applyProdoricToMotif(motif, parsed) {
  motif.name = parsed.name;
  motif.consensus = parsed.consensus;
  motif.func = parsed.func;
  motif.prodoricMx = parsed.prodoricMx;
  motif.prodoricOrganism = parsed.prodoricOrganism;
  motif.suggestedStrandMode = parsed.suggestedStrandMode;
  // v0.5: PWM-Daten übernehmen (für PRODORIC-Tab-Suche)
  motif.prodoricPwm = parsed.pwm || null;
  // v0.4.4: Sequenzen aus Bindingsites übernehmen + Konsensus/Datenraum daraus ableiten
  if (parsed.bindingSiteSequences && parsed.bindingSiteSequences.length > 0) {
    motif.sequences = parsed.bindingSiteSequences.join('\n');
    const derived = deriveFromSequenceList(motif.sequences, { alpha: 0.5, tolerance: 0.05 });
    motif.derivedFromSequences = derived;
    if (derived.ok) {
      motif.searchSpace = derived.searchSpace;
    }
  }
  // v0.4.5: Symmetrie auto-detect
  const detected = detectSymmetryFromConsensus(motif.consensus);
  if (detected.suggested && detected.mode !== 'normal') {
    motif.symmetryMode = detected.mode;
    motif.halfSiteLen = detected.halfSiteLen;
  }
  // Results invalidieren, da Konsensus geändert
  motif.results = null;
}

// File-Picker für PRODORIC-JSON
function loadProdoricJsonForMotif(motif) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'application/json,.json';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.addEventListener('change', () => {
    const file = inp.files && inp.files[0];
    if (!file) { document.body.removeChild(inp); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.body.removeChild(inp);
      let json;
      try { json = JSON.parse(ev.target.result); }
      catch (e) {
        alert('JSON-Fehler: ' + e.message);
        return;
      }
      const parsed = parseProdoricJson(json);
      if (!parsed.ok) {
        alert('PRODORIC-Import-Fehler: ' + parsed.error);
        return;
      }
      applyProdoricToMotif(motif, parsed);
      // Bestehende Set-Constraints für dieses Motiv: Strangmodus aus PRODORIC-Vorschlag setzen
      for (const s of sets) {
        const c = s.constraints && s.constraints[motif.id];
        if (c) c.strandMode = parsed.suggestedStrandMode;
      }
      // Re-render
      renderMotifList();
      if (mf.genome) renderGenomeMap();
      renderSets();
      log('PRODORIC ' + parsed.prodoricMx + ' geladen: ' + parsed.name + ', ' + parsed.bindingSiteCount + ' Bindingsites');
    };
    reader.onerror = () => {
      document.body.removeChild(inp);
      alert('Datei konnte nicht gelesen werden');
    };
    reader.readAsText(file);
  });
  inp.click();
}

function defaultSigBMotif() {
  motifSeq++;
  // v0.10: Default-Name ist "motif" (nicht "σB-Promotor"), damit der User
  // beim Lernen der Bedienung den Karten-Typ in der Tab-Lasche sieht.
  // Der σB-Konsensus bleibt vorgefüllt als bequemer Test-Default.
  return {
    id: 'motif_' + motifSeq,
    name: 'motif',
    color: MOTIF_PALETTE[0],
    visibleInOverview: true,
    mode: 'regex_consensus',
    consensus: 'GTTTAA N10-12 GGGWAW',
    mismatches: 1,
    strand: 'both',
    func: 'promoter',
    forceScan: false,
    results: null
  };
}

function removeMotif(id) {
  const idx = motifs.findIndex(m => m.id === id);
  motifs = motifs.filter(m => m.id !== id);
  // Wenn der aktive Tab gelöscht wurde: auf Nachbarn umschalten
  if (currentTabId === id) {
    if (motifs.length === 0) currentTabId = null;
    else currentTabId = motifs[Math.min(idx, motifs.length - 1)].id;
  }
  // Aus allen Sets entfernen
  for (const s of sets) {
    if (s.motifIds.has(id)) s.motifIds.delete(id);
    if (s.constraints) delete s.constraints[id];
  }
  renderMotifList();
  if (mf.genome) renderGenomeMap();
  renderSets();
}

// v0.3.3: aktiver Tab
let currentTabId = null;

function renderMotifList() {
  const root = document.getElementById('motif-list');
  root.innerHTML = '';
  // Aktiven Tab sicherstellen
  if (motifs.length > 0) {
    if (!currentTabId || !motifs.find(m => m.id === currentTabId)) {
      currentTabId = motifs[0].id;
    }
  } else {
    currentTabId = null;
  }
  for (const m of motifs) {
    const card = buildMotifCard(m);
    if (m.id !== currentTabId) card.classList.add('tab-hidden');
    root.appendChild(card);
    // v0.8.1: jetzt erst im DOM — Treffer rendern (vorher fanden Bauer keinen
    // results-Container weil Karte noch detached war)
    if (m.results) renderResults(m);
    updateMotifPreview(m.id);
  }
  renderTabs();
  // v0.10: IUPAC-Legende nur bei aktivem motif-Tab
  renderIupacLegend();
}

// v0.3.3: Tab-Bar rendern
// v0.10: drei Gruppen — Motiv-Tabs, Hairpin-Tabs, Structure-Tabs
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  const wrap = document.getElementById('motif-tabs');
  if (!bar || !wrap) return;
  bar.innerHTML = '';
  if (motifs.length === 0 && !mf.genome) {
    wrap.classList.remove('show');
    return;
  }
  wrap.classList.add('show');

  const motifList = motifs.filter(m => m.kind !== 'hairpin' && m.kind !== 'structure');
  const hairpinList = motifs.filter(m => m.kind === 'hairpin');
  const structureList = motifs.filter(m => m.kind === 'structure');

  const buildTab = (m) => {
    const tab = document.createElement('button');
    const isHairpin = m.kind === 'hairpin';
    const isStructure = m.kind === 'structure';
    const isMotif = !isHairpin && !isStructure;
    let extraClass = '';
    if (isHairpin) extraClass = ' tab-hairpin';
    else if (isStructure) extraClass = ' tab-structure';
    else extraClass = ' tab-motif';
    tab.className = 'tab' + extraClass + (m.id === currentTabId ? ' active' : '');
    tab.style.setProperty('--motif-color', m.color);
    tab.title = m.name;
    // Karten-Typ-Symbol direkt im Tab
    const glyphSpan = document.createElement('span');
    glyphSpan.style.cssText = 'display:inline-flex;align-items:center';
    glyphSpan.innerHTML = KIND_GLYPHS[m.kind || 'motif'];
    tab.appendChild(glyphSpan);
    // v0.10: Tab zeigt den individuellen Karten-Namen (was der User editiert).
    // Initial sind das die Defaults "motif" / "hairpin" / "signal" — Lernhilfe.
    const nm = document.createElement('span');
    nm.className = 'tab-name';
    nm.textContent = m.name;
    tab.appendChild(nm);
    if (m.results) {
      const cnt = document.createElement('span');
      cnt.className = 'tab-count';
      const n = m.results.hits.length;
      cnt.textContent = '(' + (n >= 1000 ? (n/1000).toFixed(1)+'k' : n) + ')';
      tab.appendChild(cnt);
    }
    const close = document.createElement('button');
    close.className = 'tab-close';
    close.textContent = '×';
    const kindLabel = isHairpin ? 'Hairpin' : isStructure ? 'Signal' : 'Motiv';
    close.title = kindLabel + ' löschen';
    close.addEventListener('click', (e) => {
      e.stopPropagation();
      const what = isHairpin ? 'die Hairpin-Suche' : isStructure ? 'die Signal-Karte' : 'das Motiv';
      confirmDialog(
        kindLabel + ' löschen',
        'Soll ' + what + ' "' + m.name + '" wirklich gelöscht werden? Konfiguration und Treffer gehen verloren.',
        () => removeMotif(m.id)
      );
    });
    tab.appendChild(close);

  addMotifBtn.title = 'Neues Motiv';

  bar.appendChild(addMotifBtn);

  // Separator nur wenn Hairpin-Karten existieren ODER wir den +T-Button zeigen

  sep.className = 'tab-separator';
  bar.appendChild(sep);

  // Hairpin-Tabs
  for (const m of hairpinList) bar.appendChild(buildTab(m));

  // v0.10: +-Button für neue Hairpin-Karte. Direkter Klick legt Default-Karte an
  // (Variante umschaltbar später über Dropdown in der Karte selbst).
  const addHairpinBtn = document.createElement('button');
  addHairpinBtn.className = 'tab-add-btn hairpin-add';
  addHairpinBtn.innerHTML = KIND_GLYPHS.hairpin + '<span style="font-size:14px">+</span>';
  addHairpinBtn.title = 'Neue Hairpin-Karte';
  addHairpinBtn.addEventListener('click', () => {
    addMotif(newHairpinMotif('rho_indep_term'));
  });
  bar.appendChild(addHairpinBtn);

  // v0.9: Structure-Tabs + Plus-Button
  if (structureList.length > 0 || true) {
    const sep2 = document.createElement('div');
    sep2.className = 'tab-separator';
    bar.appendChild(sep2);

    for (const m of structureList) bar.appendChild(buildTab(m));

    // v0.10: +-Button für neue Signal-Karte. Direkter Klick legt Default-Karte an
    // (Algorithmus umschaltbar über Dropdown in der Karte selbst).

    addStructBtn.innerHTML = KIND_GLYPHS.structure + '<span style="font-size:14px">+</span>';
    addStructBtn.title = 'Neue Signal-Karte';

// Bestätigungs-Dialog
function confirmDialog(title, body, onConfirm) {
  const overlay = document.getElementById('confirm-overlay');
  document.getElementById('cd-title').textContent = title;
  document.getElementById('cd-body').textContent = body;
  const cancel = document.getElementById('cd-cancel');
  const confirm = document.getElementById('cd-confirm');
  const close = () => overlay.classList.remove('show');
  const cancelHandler = () => close();
  const confirmHandler = () => { close(); onConfirm(); };
  cancel.onclick = cancelHandler;
  confirm.onclick = confirmHandler;
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
  overlay.classList.add('show');
}

// ========== v0.4: Sets ==========

// Set-Datenstruktur:
// {
//   id, name,
//   windowBp,                    // Cluster-Distanz
//   motifIds: Set<string>,        // welche Motive im Set
//   constraints: { motifId: { anchor, from, to } | null }  // pro Motiv: optionaler Constraint
//   showLoci: bool                // Drill-Down-Tabelle sichtbar?
// }

function newSet() {
  setSeq++;
  return {
    id: 'set_' + setSeq,
    name: 'Set ' + setSeq,
    windowBp: 500,
    minMotifs: 1,        // Mindest-Anzahl Motive im Cluster
    motifIds: new Set(),
    constraints: {},
    anchor: {            // Anker-Auswahl für Panel-Mittelpunkt
      motifs: true,      // alle Motive im Cluster (default an)
      gene_start: false,
      gene_end: false,
      gene_mid: false
      // operon_mid: false  // später
    },
    selectedLoci: new Set(),  // Set<lociKey> für Selektion
    sortBy: 'minPos',
    sortDir: 'asc',
    showLoci: false
  };
}

function addSet() {
  const s = newSet();
  // Default-Auswahl: alle gescannten Motive aufnehmen
  for (const m of motifs) {
    if (m.results) s.motifIds.add(m.id);
    // Default-Constraint aus Funktion
    s.constraints[m.id] = constraintFromFunction(m);
  }
  sets.push(s);
  renderSets();
}

function constraintFromFunction(m) {
  // v0.8: Hairpin-Karten — Default-Anker am Gen-Ende (rho-unabh. Term sitzen 3' der Gene)
  if (m.kind === 'hairpin') {
    const w = (m.hairpin && m.hairpin.utrWindow) ? m.hairpin.utrWindow : 200;
    return { anchor: 'gene_end', from: 0, to: w, strandMode: 'strand_dependent' };
  }
  const def = MOTIF_FUNCTIONS[m.func || 'free'];
  if (!def || !def.anchor) return { anchor: 'free', from: 0, to: 0, strandMode: 'strand_dependent' };
  return { anchor: def.anchor, from: def.from, to: def.to, strandMode: 'strand_dependent' };
}

function removeSet(id) {
  sets = sets.filter(s => s.id !== id);
  renderSets();
}

function renderSets() {
  const section = document.getElementById('sets-section');
  const list = document.getElementById('sets-list');
  if (!section || !list) return;
  // Nur anzeigen wenn Genom geladen
  if (!mf.genome) { section.classList.remove('show'); return; }
  section.classList.add('show');
  list.innerHTML = '';
  for (const s of sets) {
    list.appendChild(buildSetCard(s));
  }
}

// ----- Cluster-Algorithmus -----
// Nimmt Treffer aus den ausgewählten Motiven, sortiert nach Position,
// gruppiert in Cluster wenn Abstand <= windowBp
function buildClustersForSet(s) {
  const allHits = [];
  for (const motifId of s.motifIds) {
    const m = motifs.find(x => x.id === motifId);
    if (!m || !m.results) continue;
    for (const h of m.results.hits) {
      allHits.push({ ...h, motifId: motifId });
    }
  }
  if (allHits.length === 0) return { clusters: [], totalHits: 0 };
  // Sortiere nach Mitte des Treffers
  allHits.sort((a, b) => {
    const ca = (a.start + a.end) / 2;
    const cb = (b.start + b.end) / 2;
    return ca - cb;
  });
  const clusters = [];
  let cur = null;
  for (const h of allHits) {
    const center = (h.start + h.end) / 2;
    if (cur && (center - cur.lastCenter) <= s.windowBp) {
      cur.hits.push(h);
      cur.lastCenter = center;
      cur.minPos = Math.min(cur.minPos, h.start);
      cur.maxPos = Math.max(cur.maxPos, h.end);
      cur.motifSet.add(h.motifId);
    } else {
      if (cur) clusters.push(cur);
      cur = {
        hits: [h], lastCenter: center,
        minPos: h.start, maxPos: h.end,
        motifSet: new Set([h.motifId])
      };
    }
  }
  if (cur) clusters.push(cur);
  return { clusters, totalHits: allHits.length };
}

// Filter: prüft ob jeder Treffer im Cluster seinen Constraint erfüllt.
// Constraint ist erfüllt wenn ein Gen existiert, das den Anker definiert,
// und die Distanz im erlaubten Bereich liegt.
function clusterPassesConstraints(cluster, s) {
  for (const motifId of cluster.motifSet) {
    const c = s.constraints[motifId];
    if (!c || c.anchor === 'free') continue; // kein Constraint
    const strandMode = c.strandMode || 'strand_dependent';
    // Mindestens ein Treffer dieses Motivs muss den Constraint erfüllen
    let anyOk = false;
    for (const h of cluster.hits) {
      if (h.motifId !== motifId) continue;
      const dist = computeDistanceToAnchor(h, c.anchor, strandMode);
      if (dist === null) continue;
      if (dist >= c.from && dist <= c.to) { anyOk = true; break; }
    }
    if (!anyOk) return false;
  }
  return true;
}

// Distanz: relativ zum Gen-Strang
// gene_start: vorzeichenbehaftet, negativ = upstream
// gene_end: vorzeichenbehaftet, positiv = downstream
//
// strandMode 'strand_dependent': nur Gene berücksichtigt, deren Strang dem Treffer-Strang entspricht
// strandMode 'strand_neutral': alle Gene werden berücksichtigt, Treffer-Strang ignoriert
function computeDistanceToAnchor(hit, anchor, strandMode) {
  const genes = mf.genome.geneIndex;
  const hitMid = (hit.start + hit.end) / 2;
  let bestDist = null, bestAbs = Infinity;
  for (const g of genes) {
    // Strang-Filter
    if (strandMode === 'strand_dependent' && g.strand !== hit.strand) continue;
    let anchorPos, sign;
    if (anchor === 'gene_start') {
      anchorPos = (g.strand === 1) ? g.start : g.end;
      sign = (g.strand === 1) ? 1 : -1;
    } else if (anchor === 'gene_end') {
      anchorPos = (g.strand === 1) ? g.end : g.start;
      sign = (g.strand === 1) ? 1 : -1;
    } else return null;
    const rawDist = sign * (hitMid - anchorPos);
    if (Math.abs(rawDist) < bestAbs) { bestAbs = Math.abs(rawDist); bestDist = rawDist; }
  }
  return bestDist;
}

// v0.4.1: Anker-Bereich für Panel berechnen
// Sammelt alle Koordinaten der angekreuzten Anker-Elemente,
// gibt linkesten und rechtesten Wert zurück (oder null wenn nichts).
function computeClusterAnchorRange(cluster, s) {
  const coords = [];
  if (s.anchor.motifs) {
    for (const h of cluster.hits) coords.push((h.start + h.end) / 2);
  }
  // Gen-bezogene Anker
  if (s.anchor.gene_start || s.anchor.gene_end || s.anchor.gene_mid) {
    const genes = mf.genome.geneIndex || [];
    const cMin = cluster.minPos, cMax = cluster.maxPos;
    for (const g of genes) {
      // Schneidet das Gen den Cluster-Bereich überhaupt?
      // Gen-Mitte: Gen muss überlappen mit Cluster
      // Gen-Start/Ende: nur wenn der Anker selbst im Cluster liegt
      if (s.anchor.gene_start) {
        const gs = (g.strand === 1) ? g.start : g.end;
        if (gs >= cMin && gs <= cMax) coords.push(gs);
      }
      if (s.anchor.gene_end) {
        const ge = (g.strand === 1) ? g.end : g.start;
        if (ge >= cMin && ge <= cMax) coords.push(ge);
      }
      if (s.anchor.gene_mid) {
        // Überlappung mit Cluster
        if (g.end >= cMin && g.start <= cMax) {
          coords.push((g.start + g.end) / 2);
        }
      }
    }
  }
  if (coords.length === 0) {
    // Fallback: Cluster-Mittelpunkt
    return { min: cluster.minPos, max: cluster.maxPos };
  }
  return { min: Math.min(...coords), max: Math.max(...coords) };
}

// Berechnet Profil-Statistik: Map<profile-string, {hits, loci}>
function computeSetStats(s) {
  const { clusters, totalHits } = buildClustersForSet(s);
  // Erst Constraint-Filter, dann Mindest-Motive-Filter
  const validClusters = clusters.filter(c => {
    if (!clusterPassesConstraints(c, s)) return false;
    if (c.motifSet.size < (s.minMotifs || 1)) return false;
    return true;
  });
  const profileMap = new Map();
  for (const c of validClusters) {
    const profile = [...c.motifSet].sort().join('|');
    if (!profileMap.has(profile)) profileMap.set(profile, { hits: 0, loci: 0, motifSet: c.motifSet });
    const p = profileMap.get(profile);
    p.hits += c.hits.length;
    p.loci += 1;
  }
  return { totalHits, validClusters, profileMap, allClusters: clusters };
}

// Profil-Statistik: wieviele 2^N - 1 Profile insgesamt, wieviele mit ≥minMotifs Motiven
function computeProfileCounts(s) {
  const N = s.motifIds.size;
  if (N === 0) return { total: 0, valid: 0 };
  const total = (1 << N) - 1;  // 2^N - 1
  let valid = 0;
  for (let mask = 1; mask <= total; mask++) {
    let bits = 0;
    for (let b = 0; b < N; b++) if (mask & (1 << b)) bits++;
    if (bits >= (s.minMotifs || 1)) valid++;
  }
  return { total, valid };
}

function updateSetStats(s, card) {
  const stats = card.querySelector('#stats_' + s.id);
  const lociWrap = card.querySelector('#loci_' + s.id);
  const profInfo = card.querySelector('#profile_info_' + s.id);
  if (!stats) return;
  // Profil-Info immer aktualisieren
  if (profInfo) {
    const pc = computeProfileCounts(s);
    if (pc.total === 0) profInfo.textContent = '';
    else profInfo.textContent = 'Profile: ' + pc.valid + ' / ' + pc.total;
  }
  stats.innerHTML = '';
  if (s.motifIds.size === 0) {
    stats.innerHTML = '<div style="color:var(--fg-mute);text-align:center;padding:8px">Keine Motive ausgewählt</div>';
    if (lociWrap) lociWrap.innerHTML = '';
    return;
  }
  const { totalHits, validClusters, profileMap } = computeSetStats(s);
  const totalLoci = validClusters.length;

  // Total
  const totalRow = document.createElement('div');
  totalRow.className = 'stat-row stat-total';
  const totalLbl = document.createElement('span'); totalLbl.className = 'label';
  totalLbl.textContent = 'Loci insgesamt';
  const totalVal = document.createElement('span'); totalVal.className = 'value';
  totalVal.textContent = totalLoci.toLocaleString('de-DE') + ' (' + totalHits.toLocaleString('de-DE') + ' Treffer)';
  totalRow.appendChild(totalLbl); totalRow.appendChild(totalVal);
  stats.appendChild(totalRow);

  // Profile (sortiert: nach Anzahl Motive im Profil aufsteigend, dann nach Loci absteigend)
  const profileEntries = [...profileMap.entries()];
  profileEntries.sort((a, b) => {
    const da = a[0].split('|').length, db = b[0].split('|').length;
    if (da !== db) return da - db;
    return b[1].loci - a[1].loci;
  });
  for (const [profile, info] of profileEntries) {
    const row = document.createElement('div'); row.className = 'stat-row';
    const lbl = document.createElement('span'); lbl.className = 'label';
    const sw = document.createElement('span'); sw.className = 'swatches';
    const motifIdsArr = profile.split('|');
    for (const mid of motifIdsArr) {
      const m = motifs.find(x => x.id === mid);
      const dot = document.createElement('span'); dot.className = 'swatch-dot';
      dot.style.background = m ? m.color : '#555';
      sw.appendChild(dot);
    }
    lbl.appendChild(sw);
    const names = motifIdsArr.map(mid => {
      const m = motifs.find(x => x.id === mid);
      return m ? m.name : '(gelöscht)';
    }).join(' + ');
    const text = document.createTextNode(names);
    lbl.appendChild(text);
    row.appendChild(lbl);
    const val = document.createElement('span'); val.className = 'value';
    val.textContent = info.loci.toLocaleString('de-DE') + ' Loci · ' + info.hits.toLocaleString('de-DE') + ' Treffer';
    row.appendChild(val);
    stats.appendChild(row);
  }

  // Loci-Drill-Down
  if (lociWrap) {
    lociWrap.innerHTML = '';
    if (s.showLoci) {
      lociWrap.appendChild(buildLociTable(s, validClusters, card));
    }
  }
}

function lociKey(c) {
  return c.minPos + ':' + c.maxPos + ':' + [...c.motifSet].sort().join(',');
}

function sortLoci(clusters, sortBy, sortDir) {
  const dir = (sortDir === 'asc') ? 1 : -1;
  const out = clusters.slice();
  out.sort((a, b) => {
    let av, bv;
    switch (sortBy) {
      case 'minPos':  av = a.minPos; bv = b.minPos; break;
      case 'length':  av = (a.maxPos - a.minPos); bv = (b.maxPos - b.minPos); break;
      case 'profile': av = [...a.motifSet].sort().join(','); bv = [...b.motifSet].sort().join(','); break;
      case 'hits':    av = a.hits.length; bv = b.hits.length; break;
      case 'gene':    av = (a.hits[0].nearestGene || ''); bv = (b.hits[0].nearestGene || ''); break;
      default:        av = a.minPos; bv = b.minPos;
    }
    if (typeof av === 'string') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });
  return out;
}

function buildLociTable(s, clusters, card) {
  const wrap = document.createElement('div');
  if (clusters.length === 0) {
    wrap.style.cssText = 'color:var(--fg-mute);text-align:center;padding:8px;font-size:11px';
    wrap.textContent = 'Keine Loci';
    return wrap;
  }

  // Sortierung anwenden
  const sorted = sortLoci(clusters, s.sortBy, s.sortDir);

  // Tabellen-Container: scrollbar
  const tableWrap = document.createElement('div');
  tableWrap.style.cssText = 'max-height:400px;overflow-y:auto;overflow-x:auto;border:1px solid var(--border);border-radius:4px;background:var(--bg)';
  const t = document.createElement('table'); t.className = 'set-loci-table';
  t.style.width = '100%';
  const thead = document.createElement('thead');
  const trh = document.createElement('tr');

  // Master-Selektion
  const thSel = document.createElement('th');
  thSel.style.width = '24px'; thSel.style.padding = '4px';
  const masterCb = document.createElement('input'); masterCb.type = 'checkbox';
  masterCb.title = 'Alle / keine';
  thSel.appendChild(masterCb);
  trh.appendChild(thSel);

  // Spalten
  const cols = [
    { k: 'profile',  t: 'Profil' },
    { k: 'minPos',   t: 'Position' },
    { k: 'length',   t: 'Länge' },
    { k: 'hits',     t: 'Treffer' },
    { k: 'gene',     t: 'nächstes Gen' }
  ];
  for (const c of cols) {
    const th = document.createElement('th');
    th.dataset.sort = c.k;
    th.style.cursor = 'pointer';
    let txt = c.t;
    if (s.sortBy === c.k) txt += ' ' + (s.sortDir === 'asc' ? '↑' : '↓');
    th.textContent = txt;
    th.addEventListener('click', () => {
      if (s.sortBy === c.k) s.sortDir = (s.sortDir === 'asc') ? 'desc' : 'asc';
      else { s.sortBy = c.k; s.sortDir = 'asc'; }
      updateSetStats(s, card);
    });
    trh.appendChild(th);
  }
  thead.appendChild(trh);
  // Sticky-Header in Scroll-Container
  thead.style.position = 'sticky';
  thead.style.top = '0';
  thead.style.background = 'var(--bg)';
  t.appendChild(thead);

  const tbody = document.createElement('tbody');
  // Limit
  const LIMIT = 1000;
  const showClusters = sorted.slice(0, LIMIT);

  // Selektion vorbereiten
  if (!s.selectedLoci) s.selectedLoci = new Set();
  const allKeys = showClusters.map(lociKey);
  const allChecked = allKeys.length > 0 && allKeys.every(k => s.selectedLoci.has(k));
  const someChecked = allKeys.some(k => s.selectedLoci.has(k));
  masterCb.checked = allChecked;
  masterCb.indeterminate = !allChecked && someChecked;
  masterCb.addEventListener('change', () => {
    if (masterCb.checked) for (const k of allKeys) s.selectedLoci.add(k);
    else for (const k of allKeys) s.selectedLoci.delete(k);
    updateSetStats(s, card);
  });

  for (const c of showClusters) {
    const tr = document.createElement('tr');
    const k = lociKey(c);
    // Selektion
    const tdSel = document.createElement('td');
    tdSel.style.padding = '3px 4px'; tdSel.style.textAlign = 'center';
    const cb = document.createElement('input'); cb.type = 'checkbox';
    cb.checked = s.selectedLoci.has(k);
    cb.addEventListener('change', () => {
      if (cb.checked) s.selectedLoci.add(k); else s.selectedLoci.delete(k);
      // Panels neu rendern, ohne ganze Tabelle neu zu malen
      updateSetPanels(s, card);
      // Master-Cb-Status updaten
      const ck = allKeys.every(x => s.selectedLoci.has(x));
      masterCb.checked = ck;
      masterCb.indeterminate = !ck && allKeys.some(x => s.selectedLoci.has(x));
    });
    tdSel.appendChild(cb);
    tr.appendChild(tdSel);

    // Profil (Bonbons)
    const tdProf = document.createElement('td');
    const profileDots = document.createElement('span'); profileDots.className = 'profile-dots';
    for (const mid of [...c.motifSet].sort()) {
      const m = motifs.find(x => x.id === mid);
      const dot = document.createElement('span'); dot.className = 'profile-dot';
      dot.style.background = m ? m.color : '#555';
      dot.title = m ? m.name : '(gelöscht)';
      profileDots.appendChild(dot);
    }
    tdProf.appendChild(profileDots);
    tr.appendChild(tdProf);

    // Position
    const tdPos = document.createElement('td');
    tdPos.textContent = c.minPos.toLocaleString('de-DE') + '–' + c.maxPos.toLocaleString('de-DE');
    tr.appendChild(tdPos);

    // Länge
    const tdLen = document.createElement('td');
    tdLen.textContent = (c.maxPos - c.minPos + 1) + ' bp';
    tr.appendChild(tdLen);

    // Treffer
    const tdHits = document.createElement('td');
    tdHits.textContent = c.hits.length;
    tr.appendChild(tdHits);

    // Gen
    const tdGene = document.createElement('td');
    tdGene.textContent = c.hits[0].nearestGene || '—';
    tr.appendChild(tdGene);

    tbody.appendChild(tr);
  }
  if (sorted.length > LIMIT) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 6;
    td.style.cssText = 'text-align:center;color:var(--fg-mute);font-style:italic';
    td.textContent = '... ' + (sorted.length - LIMIT).toLocaleString('de-DE') + ' weitere Loci ausgeblendet';
    tr.appendChild(td); tbody.appendChild(tr);
  }
  t.appendChild(tbody);
  tableWrap.appendChild(t);
  wrap.appendChild(tableWrap);

  // Panel-Sektion (für Loci)
  const panelWrap = document.createElement('div');
  panelWrap.id = 'set_panels_' + s.id;
  panelWrap.style.cssText = 'margin-top:10px';
  wrap.appendChild(panelWrap);

  // Initialer Panel-Render
  setTimeout(() => updateSetPanels(s, card, sorted), 0);

  return wrap;
}

// Panels für Loci eines Sets
function updateSetPanels(s, card, sortedClustersOpt) {
  const panelWrap = card.querySelector('#set_panels_' + s.id);
  if (!panelWrap) return;
  // Sortiert nehmen falls übergeben, sonst neu computen
  let sorted = sortedClustersOpt;
  if (!sorted) {
    const { validClusters } = computeSetStats(s);
    sorted = sortLoci(validClusters, s.sortBy, s.sortDir);
  }
  panelWrap.innerHTML = '';

  // Auswahl: alle selektierten, sonst Top 10
  let toShow;
  if (s.selectedLoci && s.selectedLoci.size > 0) {
    toShow = sorted.filter(c => s.selectedLoci.has(lociKey(c)));
  } else {
    toShow = sorted.slice(0, 10);
  }
  if (toShow.length === 0) {
    panelWrap.innerHTML = '<div style="color:var(--fg-mute);text-align:center;padding:8px;font-size:11px">Keine Loci im Panel-Bereich</div>';
    return;
  }

  // Header
  const head = document.createElement('div');
  head.style.cssText = 'display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--fg-dim);margin-bottom:6px';
  const t1 = document.createElement('span');
  t1.textContent = (s.selectedLoci.size > 0)
    ? 'Panels (' + s.selectedLoci.size + ' selektiert)'
    : 'Panels (Top ' + toShow.length + ' nach Sortierung)';
  head.appendChild(t1);
  // Schwebender Maßstab kommt vom Set-Panel-Renderer pro Locus, weil jedes Locus eine andere Spannweite hat
  panelWrap.appendChild(head);

  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px';
  panelWrap.appendChild(list);

  const PANEL_HEIGHT = 50;
  for (const c of toShow) {
    const row = document.createElement('div');
    row.style.cssText = 'position:relative;background:var(--bg-elevated);border-radius:3px;overflow:hidden;height:' + PANEL_HEIGHT + 'px';
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'display:block;width:100%;height:100%';
    row.appendChild(canvas);
    const label = document.createElement('div');
    label.style.cssText = 'position:absolute;top:2px;left:6px;font-size:10px;color:var(--fg-mute);font-family:ui-monospace,monospace;pointer-events:none;text-shadow:0 0 3px var(--bg-elevated)';
    const profileNames = [...c.motifSet].sort().map(mid => {
      const m = motifs.find(x => x.id === mid);
      return m ? m.name : '?';
    }).join('+');
    label.textContent = c.minPos.toLocaleString('de-DE') + ' [' + profileNames + '] ' + (c.hits[0].nearestGene || '');
    row.appendChild(label);
    list.appendChild(row);

    requestAnimationFrame(() => {
      const w = row.clientWidth;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = PANEL_HEIGHT * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = PANEL_HEIGHT + 'px';
      drawSetPanel(canvas, c, s);
      // v0.7.2: Hover-Tooltips für Gene und Motiv-Marker
      attachHoverHandlers(canvas);
    });
  }
}

// Panel-Renderer für Set-Locus
function drawSetPanel(canvas, cluster, s) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  ctx.clearRect(0, 0, cssW, cssH);

  // v0.7.2: hitMap für Hover-Tooltips initialisieren
  canvas._hitMap = [];

  // Anker-Bereich aus Set-Auswahl
  const range = computeClusterAnchorRange(cluster, s);
  // Spannweite + 200 bp Puffer links und rechts
  let leftBound = Math.max(1, range.min - 200);
  let rightBound = Math.min(mf.genome.length, range.max + 200);
  // Falls gleicher Wert (nur ein Anker), 500 bp Default
  if (rightBound - leftBound < 100) {
    const center = (leftBound + rightBound) / 2;
    leftBound = Math.max(1, center - 500);
    rightBound = Math.min(mf.genome.length, center + 500);
  }
  const winSize = rightBound - leftBound + 1;
  const bp2px = (bp) => ((bp - leftBound) / winSize) * cssW;

  // Hintergrund
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0, 0, cssW, cssH);

  const midY = cssH / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(cssW, midY); ctx.stroke();

  // Gene
  const genes = mf.genome.geneIndex || [];
  const geneH = 12;
  const arrowLen = 5;
  for (const g of genes) {
    if (g.end < leftBound || g.start > rightBound) continue;
    const gx0 = bp2px(Math.max(g.start, leftBound));
    const gx1 = bp2px(Math.min(g.end, rightBound));
    const gw = Math.max(2, gx1 - gx0);
    const gy = midY - geneH / 2;
    // v0.10: Gene schwarz gefüllt, Outline + Label in Strand-Farbe (blau fwd, orange rev)
    const strandColor = g.strand === 1 ? '#7ab8f5' : '#ffb74d';
    ctx.fillStyle = '#000';
    ctx.strokeStyle = strandColor;
    ctx.lineWidth = 1;
    ctx.beginPath();
    if (g.strand === 1) {
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx0, gy);
      ctx.lineTo(gx1 - tipLen, gy);
      ctx.lineTo(gx1, gy + geneH / 2);
      ctx.lineTo(gx1 - tipLen, gy + geneH);
      ctx.lineTo(gx0, gy + geneH);
      ctx.closePath();
    } else {
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx1, gy);
      ctx.lineTo(gx0 + tipLen, gy);
      ctx.lineTo(gx0, gy + geneH / 2);
      ctx.lineTo(gx0 + tipLen, gy + geneH);
      ctx.lineTo(gx1, gy + geneH);
      ctx.closePath();
    }
    ctx.fill(); ctx.stroke();
    // v0.7.2: Gen für Hover-Tooltip speichern
    canvas._hitMap.push({
      x: gx0, y: gy, w: gw, h: geneH,
      type: 'gene',
      data: g
    });
    if (gw > 30) {
      ctx.fillStyle = strandColor;            // v0.10: Genname in Strand-Farbe
      ctx.font = '9px ui-monospace, monospace';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(g.name || '?', gx0 + 3, midY);
    }
  }

  // Motiv-Marker (alle sichtbaren Motive im Set, nicht nur die im Cluster — kontextueller)
  const markerY = midY - geneH / 2 - 5;
  const markerH = 4;
  for (const motifId of s.motifIds) {
    const m = motifs.find(x => x.id === motifId);
    if (!m || !m.results) continue;
    if (m.visibleInOverview === false) continue;
    for (const h of m.results.hits) {
      if (h.end < leftBound || h.start > rightBound) continue;
      const x0 = bp2px(Math.max(h.start, leftBound));
      const x1 = bp2px(Math.min(h.end, rightBound));
      const w = Math.max(2, x1 - x0);
      const inCluster = cluster.hits.some(ch => ch.motifId === motifId && ch.start === h.start && ch.end === h.end);
      ctx.fillStyle = m.color;
      ctx.globalAlpha = inCluster ? 1.0 : 0.4;
      ctx.fillRect(x0, markerY - markerH / 2, w, markerH);
      // Strang-Indikator
      ctx.beginPath();
      if (h.strand === 1) {
        ctx.moveTo(x1, markerY - markerH / 2);
        ctx.lineTo(x1 + 3, markerY);
        ctx.lineTo(x1, markerY + markerH / 2);
      } else {
        ctx.moveTo(x0, markerY - markerH / 2);
        ctx.lineTo(x0 - 3, markerY);
        ctx.lineTo(x0, markerY + markerH / 2);
      }
      ctx.closePath();
      ctx.fill();
      // Cluster-Marker mit weißem Rahmen
      if (inCluster) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(x0 - 0.5, markerY - markerH / 2 - 0.5, w + 1, markerH + 1);
      }
      // v0.7.2: Motiv-Hit für Tooltip-Hit-Test (mit Padding für leichteren Tap)
      const padY = 4;
      canvas._hitMap.push({
        x: x0 - 1, y: markerY - markerH / 2 - padY,
        w: w + 2, h: markerH + 2 * padY,
        type: 'motif',
        data: { motif: m, hit: h }
      });
    }
    ctx.globalAlpha = 1;
  }

  // Anker-Markierungen (Linien) für sichtbar gemachte Anker
  ctx.strokeStyle = 'rgba(122,184,245,0.6)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 2]);
  // Linkester und rechtester Anker
  for (const x of [bp2px(range.min), bp2px(range.max)]) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, cssH);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Mittelpunkts-Linie etwas heller
  const centerBp = (range.min + range.max) / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const cx = bp2px(centerBp);
  ctx.moveTo(cx, 0); ctx.lineTo(cx, cssH);
  ctx.stroke();
}

function copySetTsv(s) {
  const { validClusters } = computeSetStats(s);
  const lines = ['#pos_start\tpos_end\tlength_bp\tprofile\thit_count\tnearest_gene'];
  for (const c of validClusters) {
    const profile = [...c.motifSet].sort().map(mid => {
      const m = motifs.find(x => x.id === mid);
      return m ? m.name : '(deleted)';
    }).join('+');
    lines.push([
      c.minPos, c.maxPos, c.maxPos - c.minPos + 1, profile, c.hits.length,
      c.hits[0].nearestGene || ''
    ].join('\t'));
  }
  const tsv = lines.join('\n');
  navigator.clipboard.writeText(tsv).then(
    () => log('Set-TSV in Zwischenablage (' + validClusters.length + ' Loci)', 'info'),
    () => log('TSV-Kopieren fehlgeschlagen', 'error')
  );
}

function buildMotifCard(m) {
  // v0.8: Hairpin-Karte hat eigenen Renderer
  if (m.kind === 'hairpin') return buildHairpinCard(m);
  // v0.9: Strukturmotiv-Karte hat eigenen Renderer
  if (m.kind === 'structure') return buildStructureCard(m);

  const card = document.createElement('div');
  card.className = 'motif-card';
  card.id = 'card_' + m.id;
  // v0.10: Border-Left-Farbe kommt aus CSS (typ-spezifisch), nicht aus m.color

  // Row 1: Name, Color, Mute, Remove

  // v0.10: einheitliches Name-Feld (mit Label "Name")
  const nameField = makeNameField(m);

  colorSwatch.className = 'color-swatch';
  colorSwatch.style.background = m.color;
  const palette = document.createElement('div'); palette.className = 'palette';
  for (const c of MOTIF_PALETTE) {
    const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = c;

      m.color = c;
      colorSwatch.style.background = c;
      palette.classList.remove('show');

  const removeBtn = document.createElement('button'); removeBtn.className = 'action danger';

  row1.appendChild(nameField);
  row1.appendChild(colorSwatch);

  // Row 2 (v0.4.4): Eingabe-Tabs für die fünf Modi
