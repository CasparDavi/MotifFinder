// DNA Terminal-Penalty (Stem-Ende mit AT/TA/GT/TG-BP)
// Wert aus SantaLucia/Hicks 2004 (DNA AT-init); RNA-Äquivalent ist 0.45-0.5 für AU
const DNA_TERMINAL_AT_GT_PENALTY = 0.50;

function getBulgeInit(n, model) {
  if (n < 1) return Infinity;
  const tbl = (model === 'dna') ? DNA_BULGE_INIT : TURNER_BULGE_INIT;
  if (n <= 30) return tbl[n];
  // Logarithmische Extrapolation: ΔG(n>30) ≈ ΔG(30) + 1.75 · RT · ln(n/30)
  // RT bei 37°C = 0.616 kcal/mol
  return tbl[30] + 1.75 * 0.616 * Math.log(n / 30);
}

// Watson-Crick/GU-Komplement
function rnaComplement(b) {
  // Erwartet 'A','C','G','U'. Liefert komplementäre Base.
  if (b === 'A') return 'U';
  if (b === 'U') return 'A';
  if (b === 'C') return 'G';
  if (b === 'G') return 'C';
  return null;
}

function isPair(a, b, allowGU) {
  if (a === 'A' && b === 'U') return 'WC';
  if (a === 'U' && b === 'A') return 'WC';
  if (a === 'C' && b === 'G') return 'WC';
  if (a === 'G' && b === 'C') return 'WC';
  if (allowGU) {
    if (a === 'G' && b === 'U') return 'GU';
    if (a === 'U' && b === 'G') return 'GU';
  }
  return null;
}

// ΔG für einen Stack zwischen zwei aufeinanderfolgenden Basenpaaren.
// stem ist die Stem-Sequenz oben 5'->3'. paired[i] = true wenn Position i und
// das gespiegelte Gegenstück ein Paar bilden.
//   stack at index i: oben (i, i+1), unten (compIdx_i, compIdx_{i+1})
// model: 'rna' (Turner 2004) oder 'dna' (Mathews 2004). Default 'rna'.
function getStackEnergy(top5, top3, bot3, bot5, model) {
  // top5,top3 = 5'->3' Top-Strang
  // bot3,bot5 = 3'->5' Bot-Strang (also unten von links nach rechts gelesen)
  // Schlüssel: TOP5+TOP3+'/'+BOT3+BOT5
  const key = top5 + top3 + '/' + bot3 + bot5;
  const tbl = (model === 'dna') ? DNA_STACK : TURNER_STACK;
  if (tbl[key] !== undefined) return tbl[key];
  // Fallback bei unbekanntem Key (sollte nur bei nicht-WC/GU-Paaren passieren):
  return 0;
}

// ΔG für eine 1×1-Internal-Loop-Region (1 MM im Stem) zwischen zwei BPs.
// Geometrie:
//   5'-cTop-mmTop-iTop-3'    closing-pair (cTop, cBot), inner-pair (iTop, iBot)
//   3'-cBot-mmBot-iBot-5'    Mismatch (mmTop, mmBot) dazwischen
//
// Liefert den vollständigen NN-Term (kcal/mol) für diese Region — ERSETZT
// die zwei Stacks die sonst dort wären. Wenn der Schlüssel nicht in der Tabelle
// steht (sollte nicht passieren wenn closing/inner echte WC/GU-Paare sind),
// wird ein konservativer Fallback +2.0 kcal/mol zurückgegeben (mittlere Penalty).
//
// model: bei 'dna' aktuell auf RNA-int11 zurückgefallen + Penalty (DNA-int11
//        existiert in Mathews 2004 mit gleicher Struktur, ist hier aber noch
//        nicht in einer DNA-int11-Tabelle hinterlegt. Falls relevant in v0.8.5).
function getInt11Energy(cTop, cBot, mmTop, mmBot, iTop, iBot, model) {
  const closingPair = cTop + cBot;
  const innerPair = iTop + iBot;
  const key = closingPair + ':' + innerPair + ':' + mmTop + ':' + mmBot;
  // RNA-int11: aktuell auch für DNA als Approximation (Größenordnung passt)
  const v = TURNER_INT11[key];
  if (v !== undefined) return v;
  return 2.0;  // konservativer Fallback
}

// Loop-Initiation für gegebene Länge mit Extrapolation
function getLoopInit(loopLen, model) {
  if (loopLen < 3) return 99;  // verboten
  const tbl = (model === 'dna') ? DNA_HAIRPIN_LOOP_INIT : TURNER_HAIRPIN_LOOP_INIT;
  if (loopLen <= 30) return tbl[loopLen];
  // Extrapolation: ΔG(n>30) ≈ ΔG(30) + 1.75 · RT · ln(n/30)
  return tbl[30] + 1.75 * 0.616 * Math.log(loopLen / 30);
}

// Berechnet ΔG eines Hairpins gegeben:
//   stemTop:    Stem-Sequenz 5'->3' obere Hälfte (RNA, also U statt T)
//   stemBot:    Stem-Sequenz 3'->5' untere Hälfte (also Reverse des Bottom-Stem)
//   loop:       Loop-Sequenz 5'->3'
//   mmPositions: optional, Array mit Indizes (in stemTop/stemBot) die als
//                1×1-Mismatch behandelt werden sollen (statt als BP).
//                Voraussetzungen: jede MM-Position muss WC/GU-BPs links UND rechts
//                haben (also nicht Position 0 oder stemLen-1, und nie zwei MMs
//                hintereinander). Innerstes BP (am Loop) muss IMMER ein BP sein.
// Verlangt dass stemTop[i] mit stemBot[i] für alle BP-Positionen i paart (WC oder GU).
//
// Energie-Berechnung:
//   - Für je zwei aufeinanderfolgende Stem-Positionen i, i+1:
//     * Beide BPs → getStackEnergy(...)
//     * MM bei i+1 (mit BP bei i und i+2) → getInt11Energy(...) für die ganze
//       Region (i, i+1, i+2). Der Schritt überspringt dann i+1 in der Schleife,
//       weil int11 schon die Region bis i+2 abdeckt.
//   - Hairpin-Loop-Term wie bisher (Special-Match-Override / Loop-Init / mismatch_hairpin)
//
// Hairpin-Loop-Term Hierarchie (Turner 2004, NNDB):
//   1) Loop-Länge 3/4/6 + Match in Special-Hairpin-Tabelle:
//      → dieser Tabellenwert ÜBERSCHREIBT alles andere (Special-Hairpin-Override)
//   2) Loop-Länge = 3 (ohne Special-Match):
//      → LoopInit(3) + TerminalAU/GU-Penalty   (KEIN First-Mismatch-Term, NNDB-Regel)
//   3) Loop-Länge ≥ 4 (ohne Special-Match):
//      → LoopInit(n) + TerminalAU/GU-Penalty + mismatch_hairpin[closing][nt5][nt3]
// Test ob ein BP (top+bot) ein "weak" terminal pair ist (Terminal-Penalty greift)
// model='rna': AU/UA/GU/UG ; model='dna': AT/TA/GT/TG
function isWeakTerminalPair(pairStr, model) {
  if (model === 'dna') {
    return pairStr === 'AT' || pairStr === 'TA' ||
           pairStr === 'GT' || pairStr === 'TG';
  }
  return pairStr === 'AU' || pairStr === 'UA' ||
         pairStr === 'GU' || pairStr === 'UG';
}

// computeHairpinEnergy erweitert um Bulge-Support (v0.8.3d) und DNA-Modell (v0.8.4).
//
// Parameter:
//   stemTop, stemBot: Stem-Sequenzen (außen→innen, also [0] = Helix-Anfang)
//                     mit gleicher Länge stemLen. BP-Index i paart stemTop[i] mit stemBot[i].
//                     BEIDE sind nur die GEPAARTEN Positionen — Bulges sind separat.
//   loop:             Loop-Sequenz
//   mmPositions:      Stem-Indizes (außen→innen) mit 1×1-Mismatch
//   bulgePositions:   Array von Bulges, jeweils {kInside, side, bases}
//   model:            'rna' (default) oder 'dna' — wählt Energie-Tabellen
//
// Energie-Berechnung pro Stack-Schritt zwischen BP[i] und BP[i+1]:
//   a) Bulge an Position i (zwischen BP[i] und BP[i+1])
//      - n=1: getStackEnergy(BP[i],BP[i+1]) + bulge_init(1) + special_C_bulge (RNA only)
//      - n≥2: bulge_init(n) + Terminal-Penalty falls BP[i+1] schwach
//   b) MM an Position i+1 (1×1-Internal-Loop):
//      - getInt11Energy(...) wie bisher
//   c) Sonst: getStackEnergy(BP[i],BP[i+1])
//
// Für DNA-Modus:
//   - Keine Special-Tetraloops/Triloops/Hexaloops (UNCG/GNRA-spezifisch für RNA)
//   - Terminal-Penalty bei AT/TA/GT/TG statt AU/UA/GU/UG
//   - Special-C-Bulge-Bonus (NNDB) noch erlaubt — analog für DNA C-G-Kontext
function computeHairpinEnergy(stemTop, stemBot, loop, mmPositions, bulgePositions, model) {
  const stemLen = stemTop.length;
  if (stemLen < 2) return 99;
  const loopLen = loop.length;
  if (loopLen < 3) return 99;

  const isDna = (model === 'dna');
  const termPenalty = isDna ? DNA_TERMINAL_AT_GT_PENALTY : TURNER_TERMINAL_AU_GU_PENALTY;

  // mmPositions normalisieren
  const mmSet = new Set(mmPositions || []);

  // Bulge-Lookup nach kInside
  const bulgesByK = new Map();
  if (bulgePositions) {
    for (const b of bulgePositions) {
      if (b.kInside < 0 || b.kInside >= stemLen - 1) return 99;  // illegal
      bulgesByK.set(b.kInside, b);
    }
  }

  // Sanity: innerstes BP (am Loop) und äußerstes (am Helix-Anfang) dürfen nicht MM sein
  if (mmSet.has(stemLen - 1) || mmSet.has(0)) return 99;

  let dg = 0;
  let i = 0;
  while (i < stemLen - 1) {
    const next = i + 1;

    // Bulge an Position i (zwischen BP[i] und BP[i+1])?
    if (bulgesByK.has(i)) {
      const b = bulgesByK.get(i);
      const n = b.bases.length;
      if (n === 1) {
        // Stack der flankierenden BPs PLUS bulge_init(1) PLUS special_C_bulge
        dg += getStackEnergy(stemTop[i], stemTop[next], stemBot[i], stemBot[next], model);
        dg += getBulgeInit(1, model);
        // Special C-Bulge: gleicher Bonus für RNA und DNA (NNDB-Konvention)
        const isCBulge = (b.bases === 'C');
        if (isCBulge) {
          const flank1 = stemTop[i] + stemBot[i];
          const flank2 = stemTop[next] + stemBot[next];
          if (flank1 === 'CG' || flank1 === 'GC' || flank2 === 'CG' || flank2 === 'GC') {
            dg += TURNER_SPECIAL_C_BULGE;
          }
        }
      } else {
        // n >= 2: kein Stack, nur Init + Terminal-Penalty
        dg += getBulgeInit(n, model);
        const innerPair = stemTop[next] + stemBot[next];
        if (isWeakTerminalPair(innerPair, model)) {
          dg += termPenalty;
        }
      }
      i = next;
    } else if (mmSet.has(next)) {
      // 1×1-MM bei Position next
      if (next + 1 >= stemLen) return 99;
      dg += getInt11Energy(
        stemTop[i],     stemBot[i],
        stemTop[next],  stemBot[next],
        stemTop[next+1],stemBot[next+1],
        model
      );
      i = next + 1;
    } else {
      // Normaler Stack
      dg += getStackEnergy(stemTop[i], stemTop[next], stemBot[i], stemBot[next], model);
      i = next;
    }
  }

  // Innerstes BP (closing pair der Loop)
  const closingTop = stemTop[stemLen - 1];
  const closingBot = stemBot[stemLen - 1];
  const closingPair = closingTop + closingBot;

  // Special-Hairpin-Check NUR für RNA (UNCG/GNRA sind RNA-spezifisch via 2'-OH)
  let specialHairpinDg = null;
  if (!isDna) {
    const fullLoop = closingTop + loop + closingBot;
    if (loopLen === 3 && TURNER_TRILOOP_BONUS[fullLoop] !== undefined) {
      specialHairpinDg = TURNER_TRILOOP_BONUS[fullLoop];
    } else if (loopLen === 4 && TURNER_TETRALOOP_BONUS[fullLoop] !== undefined) {
      specialHairpinDg = TURNER_TETRALOOP_BONUS[fullLoop];
    } else if (loopLen === 6 && TURNER_HEXALOOP_BONUS[fullLoop] !== undefined) {
      specialHairpinDg = TURNER_HEXALOOP_BONUS[fullLoop];
    }
  }

  if (specialHairpinDg !== null) {
    dg += specialHairpinDg;
  } else {
    dg += getLoopInit(loopLen, model);
    if (isWeakTerminalPair(closingPair, model)) {
      dg += termPenalty;
    }
    if (loopLen >= 4) {
      const nt5 = loop[0];
      const nt3 = loop[loopLen - 1];
      const mmKey = closingPair + ':' + nt5 + ':' + nt3;
      const mmTbl = isDna ? DNA_MISMATCH_HAIRPIN : TURNER_MISMATCH_HAIRPIN;
      const mmDg = mmTbl[mmKey];
      if (mmDg !== undefined) {
        dg += mmDg;
      }
    }
  }

  return dg;
}

// v0.8.3d: Performance-optimierte Inverted-Repeat-Detektion.
//
// Optimierungen gegenüber Naiv-Implementierung:
//  - Sequenz-Pre-Encoding zu Int-Array (A=0, C=1, G=2, U=3, andere=-1)
//  - isPair als 2D-Lookup ohne Funktionsaufruf
//  - Bulge-Pfad komplett übersprungen wenn maxBulgeLen=0
//  - DotBracket erst nach dgThreshold-Check (lazy)
//  - Schnelles Early-Exit bei Position ohne paarendes BP am innersten Index
//
// Algorithmus: Greedy-Expansion. Für jede Loop-Position i und Loop-Länge L:
//   wachse Stem von innen (am Loop) nach außen.
//
// v0.8.3d: Bulges (1-3 nt) sind erlaubt — ungepaarte Bases auf nur einer Seite.
//   Pro Hairpin höchstens 1 Bulge (single-bulge-Modell).
function findHairpinsInRegion(seqDna, regionOffset, params) {
  const minStem = params.minStem;
  const maxStem = params.maxStem;
  const minLoop = params.minLoop;
  const maxLoop = params.maxLoop;
  const allowGU = params.allowGU;
  const dgThreshold = params.dgThreshold;
  const maxMismatches = (params.maxMismatches | 0) || 0;
  const maxBulgeLen = (params.maxBulgeLen | 0) || 0;
  const model = params.model || 'rna';
  const isDna = (model === 'dna');

  // Pre-Encoding zu Int-Array: A=0, C=1, G=2, T/U=3, andere=-1
  const N = seqDna.length;
  const seqInt = new Int8Array(N);
  // String-Form: bei RNA T→U, bei DNA T bleibt T
  const seqStr = new Array(N);
  for (let i = 0; i < N; i++) {
    const c = seqDna.charCodeAt(i);
    if (c === 65 || c === 97) { seqInt[i] = 0; seqStr[i] = 'A'; }
    else if (c === 67 || c === 99) { seqInt[i] = 1; seqStr[i] = 'C'; }
    else if (c === 71 || c === 103) { seqInt[i] = 2; seqStr[i] = 'G'; }
    else if (c === 84 || c === 116 || c === 85 || c === 117) {
      seqInt[i] = 3;
      seqStr[i] = isDna ? 'T' : 'U';
    }
    else { seqInt[i] = -1; seqStr[i] = 'N'; }
  }

  // Pair-Lookup: 4×4 → 0=kein Paar, 1=WC, 2=GU/GT
  // Index: i*4 + j  wo i,j ∈ {0..3}
  // 0=A, 1=C, 2=G, 3=U/T (RNA: U; DNA: T)
  const pairTbl = new Int8Array(16);
  pairTbl[0*4+3] = 1; pairTbl[3*4+0] = 1;  // A-U/A-T, U-A/T-A
  pairTbl[1*4+2] = 1; pairTbl[2*4+1] = 1;  // C-G, G-C
  if (allowGU) { pairTbl[2*4+3] = 2; pairTbl[3*4+2] = 2; }  // G-U/G-T, U-G/T-G

  const out = [];

  // Für effizienten DotBracket-Bau: parallele Arrays statt Object-Array
  // bpsTopIdx[k], bpsBotIdx[k] = Position der k-ten BP-Position (innen→außen)
  // mmFlagsArr[k] = true/false ob k-te Position MM ist
  // Wir reusen die Arrays pro Position um GC zu vermeiden.
  const bpsTopIdx = new Int32Array(maxStem + 1);
  const bpsBotIdx = new Int32Array(maxStem + 1);
  const mmFlagsArr = new Uint8Array(maxStem + 1);
  // Bulges: bei single-bulge-Modell maximal 1 Bulge pro Hairpin
  // Speichere als {kInside, side, bases-Position, bases-Länge}
  // (lazy: wir setzen nur wenn ein Bulge entsteht)

  for (let i = minStem; i <= N - minStem - minLoop; i++) {
    for (let loopLen = minLoop; loopLen <= maxLoop; loopLen++) {
      const loopStart = i;
      const loopEnd = i + loopLen - 1;
      if (loopEnd + minStem >= N) break;

      // Schnell-Pruning: innerstes BP muss paaren
      const innerTopIdx = i - 1;
      const innerBotIdx = i + loopLen;
      const tInner = seqInt[innerTopIdx];
      const bInner = seqInt[innerBotIdx];
      if (tInner < 0 || bInner < 0 || pairTbl[tInner * 4 + bInner] === 0) continue;

      let bpsLen = 0;        // Anzahl bps bisher
      let mmCount = 0;
      let bulgeUsed = false;
      let bulgeKInside = -1;     // (innen→außen-Index VOR Bulge)
      let bulgeSide = '';
      let bulgeBasesPos = -1;    // Position des ersten Bulge-Nucleotids in seq
      let bulgeBasesLen = 0;
      let lastWasMm = false;
      let topShift = 0;
      let botShift = 0;

      // Wachse Stem von innen nach außen
      while (bpsLen < maxStem) {
        const stepIdx = bpsLen;
        const topIdx = innerTopIdx - stepIdx - topShift;
        const botIdx = innerBotIdx + stepIdx + botShift;

        if (topIdx < 0 || botIdx >= N) break;

        const tInt = seqInt[topIdx];
        const bInt = seqInt[botIdx];
        if (tInt < 0 || bInt < 0) break;

        const isP = pairTbl[tInt * 4 + bInt];
        if (isP) {
          bpsTopIdx[bpsLen] = topIdx;
          bpsBotIdx[bpsLen] = botIdx;
          mmFlagsArr[bpsLen] = 0;
          bpsLen++;
          lastWasMm = false;
          continue;
        }

        // Non-Pair: erst MM-Versuch, dann Bulge
        if (bpsLen === 0) break;

        // (1) MM-Versuch
        if (mmCount < maxMismatches && !lastWasMm) {
          const nextTop = topIdx - 1;
          const nextBot = botIdx + 1;
          if (nextTop >= 0 && nextBot < N) {
            const tN = seqInt[nextTop];
            const bN = seqInt[nextBot];
            if (tN >= 0 && bN >= 0 && pairTbl[tN * 4 + bN] !== 0) {
              bpsTopIdx[bpsLen] = topIdx;
              bpsBotIdx[bpsLen] = botIdx;
              mmFlagsArr[bpsLen] = 1;
              bpsLen++;
              mmCount++;
              lastWasMm = true;
              continue;
            }
          }
        }

        // (2) Bulge-Versuch — nur wenn aktiviert
        if (maxBulgeLen >= 1 && !bulgeUsed) {
          let bulgeFound = false;
          // Top-Bulge
          for (let n = 1; n <= maxBulgeLen; n++) {
            const newTopIdx = topIdx - n;
            if (newTopIdx < 0) break;
            const tN = seqInt[newTopIdx];
            if (tN < 0) continue;
            if (pairTbl[tN * 4 + bInt] === 0) continue;
            // Lookahead: nächste Position muss BP sein (oder Boundary)
            const lookTop = newTopIdx - 1;
            const lookBot = botIdx + 1;
            if (lookTop >= 0 && lookBot < N) {
              const ltN = seqInt[lookTop];
              const lbN = seqInt[lookBot];
              if (ltN < 0 || lbN < 0 || pairTbl[ltN * 4 + lbN] === 0) continue;
            }
            // Bulge akzeptieren
            bulgeKInside = bpsLen - 1;
            bulgeSide = 'top';
            bulgeBasesPos = topIdx - n + 1;
            bulgeBasesLen = n;
            bpsTopIdx[bpsLen] = newTopIdx;
            bpsBotIdx[bpsLen] = botIdx;
            mmFlagsArr[bpsLen] = 0;
            bpsLen++;
            topShift += n;
            bulgeUsed = true;
            bulgeFound = true;
            lastWasMm = false;
            break;
          }
          // Bot-Bulge (nur wenn Top nicht gefunden)
          if (!bulgeFound) {
            for (let n = 1; n <= maxBulgeLen; n++) {
              const newBotIdx = botIdx + n;
              if (newBotIdx >= N) break;
              const bN = seqInt[newBotIdx];
              if (bN < 0) continue;
              if (pairTbl[tInt * 4 + bN] === 0) continue;
              const lookTop = topIdx - 1;
              const lookBot = newBotIdx + 1;
              if (lookTop >= 0 && lookBot < N) {
                const ltN = seqInt[lookTop];
                const lbN = seqInt[lookBot];
                if (ltN < 0 || lbN < 0 || pairTbl[ltN * 4 + lbN] === 0) continue;
              }
              bulgeKInside = bpsLen - 1;
              bulgeSide = 'bot';
              bulgeBasesPos = botIdx;
              bulgeBasesLen = n;
              bpsTopIdx[bpsLen] = topIdx;
              bpsBotIdx[bpsLen] = newBotIdx;
              mmFlagsArr[bpsLen] = 0;
              bpsLen++;
              botShift += n;
              bulgeUsed = true;
              bulgeFound = true;
              lastWasMm = false;
              break;
            }
          }
          if (bulgeFound) continue;
        }

        // Weder MM noch Bulge → Stem-Ende
        break;
      }

      // Trim am äußeren Ende falls MM
      while (bpsLen > 0 && mmFlagsArr[bpsLen - 1] === 1) {
        mmFlagsArr[bpsLen - 1] = 0;
        bpsLen--;
        mmCount--;
      }
      const stemLen = bpsLen;
      if (stemLen < minStem) continue;

      // Stem-Top und Stem-Bot in außen→innen-Konvention bauen
      // (computeHairpinEnergy erwartet [0]=außen, [stemLen-1]=innen)
      let stemTopStr = '';
      let stemBotStr = '';
      const mmPositions = [];
      for (let k = 0; k < stemLen; k++) {
        const innerK = stemLen - 1 - k;
        stemTopStr += seqStr[bpsTopIdx[innerK]];
        stemBotStr += seqStr[bpsBotIdx[innerK]];
        if (mmFlagsArr[innerK]) mmPositions.push(k);
      }
      const loopSeq = seqStr.slice(loopStart, loopEnd + 1).join('');

      // Bulge in außen→innen-Konvention
      let bulgePositionsOut = null;
      if (bulgeUsed) {
        // bulgeKInside ist innen→außen-Index. Außen→innen: kOut = stemLen - 2 - kInside
        const kOut = stemLen - 2 - bulgeKInside;
        if (kOut >= 0 && kOut < stemLen - 1) {
          // Bulge-Bases als String
          let bulgeBasesStr = '';
          for (let j = 0; j < bulgeBasesLen; j++) {
            bulgeBasesStr += seqStr[bulgeBasesPos + j];
          }
          bulgePositionsOut = [{ kInside: kOut, side: bulgeSide, bases: bulgeBasesStr }];
        }
      }

      const dg = computeHairpinEnergy(stemTopStr, stemBotStr, loopSeq, mmPositions, bulgePositionsOut, model);
      if (dg > dgThreshold) continue;

      // Treffer-Koordinaten
      const outerBpInside = stemLen - 1;  // bps[stemLen-1] = äußerstes BP
      const outerTopIdx = bpsTopIdx[outerBpInside];
      const outerBotIdx = bpsBotIdx[outerBpInside];
      const innerTop = bpsTopIdx[0];
      const innerBot = bpsBotIdx[0];
      const stemTopStart = outerTopIdx;
      const stemTopEnd = innerTop;
      const stemBotStart = innerBot;
      const stemBotEnd = outerBotIdx;

      // DotBracket-Bau (jetzt erst, nach dgThreshold-Pass) — effizient via
      // Position→bps-Index Lookup.
      // bpsTopIdx und bpsBotIdx sind in innen→außen-Reihenfolge.
      // Map: topPos → bpsInnenIdx (für O(1)-Lookup)
      const topPos2idx = new Map();
      const botPos2idx = new Map();
      for (let k = 0; k < stemLen; k++) {
        topPos2idx.set(bpsTopIdx[k], k);
        botPos2idx.set(bpsBotIdx[k], k);
      }
      let dbTop = '';
      for (let pos = stemTopStart; pos <= stemTopEnd; pos++) {
        const idx = topPos2idx.get(pos);
        if (idx !== undefined) {
          dbTop += mmFlagsArr[idx] ? '.' : '(';
        } else {
          dbTop += '.';
        }
      }
      let dbBot = '';
      for (let pos = stemBotStart; pos <= stemBotEnd; pos++) {
        const idx = botPos2idx.get(pos);
        if (idx !== undefined) {
          dbBot += mmFlagsArr[idx] ? '.' : ')';
        } else {
          dbBot += '.';
        }
      }
      const db = dbTop + '.'.repeat(loopLen) + dbBot;

      const stemTopFull = seqStr.slice(stemTopStart, stemTopEnd + 1).join('');
      const stemBotFull = seqStr.slice(stemBotStart, stemBotEnd + 1).join('');

      out.push({
        absStart: regionOffset + stemTopStart + 1,
        absEnd: regionOffset + stemBotEnd + 1,
        stemTop: stemTopStr,
        stemBot: stemBotStr,
        stemTopFull,
        stemBotFull,
        loop: loopSeq,
        loopLen,
        stemLen,
        mmCount,
        mmPositions,
        bulges: bulgePositionsOut || [],
        bulgeCount: bulgePositionsOut ? bulgePositionsOut.length : 0,
        deltaG: dg,
        dotBracket: db,
        relStemTopStart: stemTopStart,
        relStemTopEnd: stemTopEnd,
        relStemBotStart: stemBotStart,
        relStemBotEnd: stemBotEnd
      });
    }
  }
  return out;
}

// Filter: bei überlappenden Hairpins nur den mit niedrigster Energie behalten.
// Greedy: sortiere nach Energie aufsteigend, nimm jeden der noch nicht überlappt.
function filterOverlappingHairpins(hits) {
  if (hits.length === 0) return [];
  hits.sort((a, b) => a.deltaG - b.deltaG);
  const accepted = [];
  for (const h of hits) {
    let overlaps = false;
    for (const a of accepted) {
      if (h.absStart <= a.absEnd && h.absEnd >= a.absStart) {
        overlaps = true;
        break;
      }
    }
    if (!overlaps) accepted.push(h);
  }
  // Sortiert nach Position für Output
  accepted.sort((a, b) => a.absStart - b.absStart);
  return accepted;
}

// T-Tract-Score: zählt T's in den ersten N Positionen direkt nach dem Stem.
// Eingabe: full DNA-Sequenz der Region (T statt U), Position direkt nach Stem-Bot
function computeTTractScore(regionDna, posAfterStem, windowSize) {
  let count = 0;
  let actual = '';
  for (let k = 0; k < windowSize; k++) {
    const idx = posAfterStem + k;
    if (idx >= regionDna.length) break;
    const b = regionDna[idx];
    actual += b;
    if (b === 'T' || b === 'U') count++;
  }
  return { count, seq: actual };
}

// Reverse-Complement einer DNA-Sequenz
function reverseComplementDna(s) {
  const map = { A: 'T', T: 'A', C: 'G', G: 'C', N: 'N' };
  let out = '';
  for (let i = s.length - 1; i >= 0; i--) out += (map[s[i]] || 'N');
  return out;
}

// Liest eine Region aus dem Twobit-Genom (1-basiert, inklusiv).
// Gibt String mit ACGTN zurück.
function readRegionDna(twobit, startBp, endBp) {
  if (startBp < 1) startBp = 1;
  if (endBp > twobit.length) endBp = twobit.length;
  return twobit.get(startBp - 1, endBp - startBp + 1);
}

// Hauptfunktion: Hairpin/Terminator-Suche für eine Karte. ASYNC mit Yielding.
//
// === v0.9: Strukturmotiv-Scan ===
//
// Liefert pro Karte einen Score-Track (Float32Array) mit einem Wert pro
// stepSize Position, plus eine Peaks-Liste mit lokalen Maxima oberhalb des
// peakThreshold.
//
// Score-Track-Layout:
//   scoreTrack[i] = Score am Position (i * stepSize + windowSize/2)
//                   (Mittelpunkt des Sliding-Window)
//   trackStart    = (windowSize/2) — erste valide Position 1-basiert
//   trackStep     = stepSize bp Auflösung
//
// Async-Chunking: alle 50 kb yielden für UI-Responsivität.
async function runStructureScan(motif, twobit, geneIndex, onProgress, cancelToken) {
  const p = motif.structure;
  const algoDef = STRUCTURE_ALGORITHMS[p.algorithm];
  if (!algoDef) {
    return { hits: [], scoreTrack: new Float32Array(0), trackStart: 0, trackStep: 1, scanTimeMs: 0 };
  }
  const computeFn = algoDef.compute;
  const windowSize = p.windowSize;
  const stepSize = p.stepSize;
  const peakThreshold = p.peakThreshold;
  const t0 = performance.now();

  const yieldNow = () => new Promise(r => setTimeout(r, 0));
  const isCancelled = () => cancelToken && cancelToken.cancelled;

  const totalLen = twobit.length;
  // Anzahl Score-Positionen: (totalLen - windowSize) / stepSize + 1
  const numPositions = Math.max(0, Math.floor((totalLen - windowSize) / stepSize) + 1);
  const scoreTrack = new Float32Array(numPositions);

  // Wir lesen das Genom in Chunks von 50 kb (mit Overlap = windowSize)
  // und befüllen scoreTrack inkrementell.
  const chunkSize = 50000;
  const overlap = windowSize;

  let posInGenome = 1;        // 1-basierte Genomposition (Anfang Chunk)
  let scoreIdx = 0;           // nächster zu schreibender Index in scoreTrack

  while (posInGenome <= totalLen) {
    if (isCancelled()) return { hits: [], cancelled: true };

    const chunkEnd = Math.min(posInGenome + chunkSize - 1, totalLen);
    const dna = readRegionDna(twobit, posInGenome, chunkEnd);
    const chunkLen = dna.length;

    // Iteriere Window-Startpositionen innerhalb des Chunks
    // Window-Startpositionen sind 0-basiert relativ zum Chunk
    // Wir brauchen aber globale Indizes für scoreTrack.
    // scoreTrack-Index k → globale Position k*stepSize (0-basiert)
    // Der erste k den wir hier befüllen, ist scoreIdx.
    // Globale Position dieses k: scoreIdx*stepSize.
    // Diese Position muss innerhalb [posInGenome-1, posInGenome-1+chunkLen-windowSize] liegen.

    while (scoreIdx < numPositions) {
      const globalStart = scoreIdx * stepSize;       // 0-basiert
      const localStart = globalStart - (posInGenome - 1);
      if (localStart + windowSize > chunkLen) break;  // dieses k braucht noch mehr Sequenz
      if (localStart < 0) { scoreIdx++; continue; }

      const score = computeFn(dna, localStart, windowSize);
      scoreTrack[scoreIdx] = score;
      scoreIdx++;
    }

    if (chunkEnd >= totalLen) break;
    posInGenome = chunkEnd - overlap + 1;

    if (onProgress) onProgress(chunkEnd, totalLen, scoreIdx);
    await yieldNow();
  }

  // === Peak-Detection mit Typ-Information (v0.9b) ===
  //
  // Aus dem Score-Track werden drei Arten von biologisch sinnvollen Punkten extrahiert:
  //
  //   'maximum'        — lokales Maximum, score >= maxThreshold und größer als beide Nachbarn
  //                      (typisch: gekrümmte Region, A-Tract-Phasing-Zentrum)
  //   'minimum'        — lokales Minimum, score <= minThreshold und kleiner als beide Nachbarn
  //                      (typisch: Aufschmelzungs-Zone, Promoter -10 in B. subtilis)
  //   'inflection-down' — Wendepunkt mit fallender Steigung (konvex → konkav, Wert sinkt)
  //                      (typisch: Übergang stabil→instabil, TSS-Indikator-Kandidat)
  //
  // Welche Typen extrahiert werden, bestimmt das peakTypes-Array im motif.structure.
  // Mehrere Typen pro Karte sind erlaubt — sie erscheinen in derselben Treffer-Tabelle
  // mit Typ-Spalte.
  //
  // Wendepunkte: zweite Ableitung wechselt von >0 zu <0 (konvex zu konkav) UND
  //              erste Ableitung ist negativ (Wert fällt). Numerisch über
  //              zentrale Differenzen mit kleinem Glättungs-Schritt.

  const peakTypes = (motif.structure.peakTypes && motif.structure.peakTypes.length)
                    ? motif.structure.peakTypes
                    : ['maximum'];   // Default-Fallback
  const enableMax = peakTypes.includes('maximum');
  const enableMin = peakTypes.includes('minimum');
  const enableInflDown = peakTypes.includes('inflection-down');

  // Threshold-Defaults: Maxima nutzen peakThreshold (positiv), Minima nutzen
  // minThreshold (negativ-Schwelle) — der User kann beide separat setzen.
  // Wenn minThreshold nicht gesetzt ist, verwenden wir peakThreshold-symmetrisch
  // ABER nur als Maximum-Wert ohne Vorzeichen-Logik.
  const maxThreshold = peakThreshold;
  const minThreshold = (motif.structure.minThreshold !== undefined)
                       ? motif.structure.minThreshold
                       : null;   // null = kein Minima-Filter falls nicht gesetzt

  const hits = [];
  for (let i = 1; i < scoreTrack.length - 1; i++) {
    const v_prev = scoreTrack[i - 1];
    const v = scoreTrack[i];
    const v_next = scoreTrack[i + 1];

    let peakType = null;

    // Lokales Maximum
    if (enableMax && v >= maxThreshold && v > v_prev && v > v_next) {
      peakType = 'maximum';
    }
    // Lokales Minimum
    else if (enableMin && v < v_prev && v < v_next) {
      // Schwelle: wenn minThreshold gesetzt, muss v <= minThreshold sein
      if (minThreshold === null || v <= minThreshold) {
        peakType = 'minimum';
      }
    }

    if (peakType !== null) {
      const center = i * stepSize + Math.floor(windowSize / 2) + 1;
      const startBp = i * stepSize + 1;
      const endBp = i * stepSize + windowSize;
      hits.push({
        start: startBp,
        end: endBp,
        strand: 0,
        score: v,
        center,
        peakType,
        sequence: '',
        kind: 'structure',
        intragenic: false,
        nearestGene: null
      });
    }
  }

  // Wendepunkt-Detektion separat (braucht 2. Ableitung über mind. 4 Punkte)
  // f'(i)  ≈ (f[i+1] - f[i-1]) / 2
  // f''(i) ≈ f[i+1] - 2*f[i] + f[i-1]
  // Inflection-down: f''[i-1] > 0 && f''[i] < 0  und  f'[i] < 0
  if (enableInflDown && scoreTrack.length >= 4) {
    for (let i = 2; i < scoreTrack.length - 2; i++) {
      const f_im2 = scoreTrack[i - 2];
      const f_im1 = scoreTrack[i - 1];
      const f_i   = scoreTrack[i];
      const f_ip1 = scoreTrack[i + 1];
      const f_ip2 = scoreTrack[i + 2];

      const fpp_im1 = f_i   - 2 * f_im1 + f_im2;     // f''(i-1)
      const fpp_i   = f_ip1 - 2 * f_i   + f_im1;     // f''(i)
      const fpp_ip1 = f_ip2 - 2 * f_ip1 + f_i;       // f''(i+1)
      const fp_i    = (f_ip1 - f_im1) / 2;           // f'(i)

      // Vorzeichenwechsel f'' positiv → negativ zwischen (i-1) und (i+1),
      // also: fpp_im1 > 0 und fpp_ip1 < 0 (oder umgekehrt um Index-Schwankungen
      // tolerant zu sein, prüfen wir das Pattern um i)
      const isInflectionDown =
        fpp_im1 > 0 && fpp_ip1 < 0 &&  // Krümmungs-Wechsel
        fp_i < 0;                       // Wert fällt

      if (isInflectionDown) {
        // Stärke des Wendepunkts: Magnitude der 2. Ableitung-Änderung × |Steigung|
        const inflStrength = Math.abs(fpp_im1 - fpp_ip1) * Math.abs(fp_i);
        // Anwender-Threshold (peakThreshold) interpretieren wir hier als
        // Mindest-Steigung-Magnitude, damit nicht winzige Wendepunkte gemeldet werden.
        // Für Stacking-Score ist eine Steigung < -0.005 kcal/mol pro step schon spürbar.
        const minSlopeMag = peakThreshold * 0.05;   // moderate Schwelle
        if (Math.abs(fp_i) < minSlopeMag) continue;

        const center = i * stepSize + Math.floor(windowSize / 2) + 1;
        const startBp = i * stepSize + 1;
        const endBp = i * stepSize + windowSize;
        hits.push({
          start: startBp,
          end: endBp,
          strand: 0,
          score: f_i,
          slope: fp_i,
          inflStrength,
          center,
          peakType: 'inflection-down',
          sequence: '',
          kind: 'structure',
          intragenic: false,
          nearestGene: null
        });
      }
    }
  }

  // Gen-Klassifikation der Peaks (gleicher Mechanismus wie bei motif/hairpin)
  for (const h of hits) {
    const cl = classifyHit(h.start, h.end, 1, geneIndex);  // strand=1 für lookup
    h.intragenic = cl.intragenic;
    h.nearestGene = cl.nearestGene;
    h.distanceToGeneStart = cl.distanceToGeneStart;
  }

  // Sortiere nach Score absteigend für Top-N-Anzeige
  hits.sort((a, b) => b.score - a.score);

  return {
    hits,
    scoreTrack,
    trackStart: Math.floor(windowSize / 2) + 1,    // 1-basierte Mittelpunkt-Position des ersten Window
    trackStep: stepSize,
    scanTimeMs: performance.now() - t0,
    cancelled: false
  };
}

// Hauptfunktion: Hairpin/Terminator-Suche für eine Karte. ASYNC mit Yielding.
//
// Iteriert je nach scope:
//   utr3:   alle CDS, dann Region nach 3'-Ende (in Strangrichtung) ±utrWindow bp
//   utr5:   alle CDS, dann Region vor 5'-Start (in Strangrichtung) ±utrWindow bp
//   genome: ganzes Genom, beide Stränge, Sliding-Fenster
//
// Async-Chunking: zwischen Genom-Chunks bzw. alle 100 Gene wird via
// `await new Promise(r => setTimeout(r, 0))` an den Event-Loop zurückgegeben.
//
// Parameter:
//   onProgress(done, total, label):  Callback, wird pro Chunk aufgerufen
//   cancelToken: { cancelled: bool } — wenn true, bricht der Scan ab
async function runHairpinScan(motif, twobit, geneIndex, onProgress, cancelToken) {
  const p = motif.hairpin;
  // v0.8.4: Energie-Modell aus Preset ableiten.
  // dna_ir → 'dna' (Mathews 2004 Parameter)
  // Sonst → 'rna' (Turner 2004 Parameter, RNA-Sekundärstruktur)
  const energyModel = (p.preset === 'dna_ir') ? 'dna' : 'rna';
  const params = {
    minStem: p.minStem, maxStem: p.maxStem,
    minLoop: p.minLoop, maxLoop: p.maxLoop,
    allowGU: p.allowGU, dgThreshold: p.dgThreshold,
    maxMismatches: (p.maxMismatches | 0) || 0,
    maxBulgeLen: (p.maxBulgeLen | 0) || 0,
    model: energyModel
  };
  const allHits = [];
  const t0 = performance.now();

  // Yielding-Helper
  const yieldNow = () => new Promise(r => setTimeout(r, 0));
  const isCancelled = () => cancelToken && cancelToken.cancelled;

  if (p.scope === 'genome') {
    // Ganzes Genom in überlappenden Chunks.
    // Stranglogik:
    //   - DNA-IR-Modus: nur (+)-Strang scannen.
    //   - Sonst: beide Stränge separat.
    const isDnaIr = (p.preset === 'dna_ir');
    const chunkSize = 50000;
    const overlap = p.maxStem * 2 + p.maxLoop + 50;
    const total = twobit.length;
    let pos = 1;
    let bytesDone = 0;

    while (pos <= total) {
      if (isCancelled()) return { hits: [], cancelled: true };
      const chunkEnd = Math.min(pos + chunkSize - 1, total);
      // (+)-Strang
      const dna = readRegionDna(twobit, pos, chunkEnd);
      const hpHits = findHairpinsInRegion(dna, pos - 1, params);
      for (const h of hpHits) {
        h.strand = isDnaIr ? 0 : 1;
        h.geneAnchor = null;
        const posAfterStem = h.relStemBotEnd + 1;
        const tt = computeTTractScore(dna, posAfterStem, p.tTractWindow);
        h.tTractCount = tt.count;
        h.tTractSeq = tt.seq;
        if (!p.tTractEnabled || h.tTractCount >= p.tTractMin) allHits.push(h);
      }
      if (!isDnaIr) {
        // (−)-Strang
        const dnaRc = reverseComplementDna(dna);
        const rcHits = findHairpinsInRegion(dnaRc, 0, params);
        const dnaLen = dna.length;
        for (const h of rcHits) {
          const newStart = pos + (dnaLen - h.absEnd);
          const newEnd = pos + (dnaLen - h.absStart);
          h.absStart = newStart;
          h.absEnd = newEnd;
          h.strand = -1;
          h.geneAnchor = null;
          const posAfterStem = h.relStemBotEnd + 1;
          const tt = computeTTractScore(dnaRc, posAfterStem, p.tTractWindow);
          h.tTractCount = tt.count;
          h.tTractSeq = tt.seq;
          if (!p.tTractEnabled || h.tTractCount >= p.tTractMin) allHits.push(h);
        }
      }

      bytesDone = chunkEnd;
      if (onProgress) onProgress(bytesDone, total, allHits.length);

      if (chunkEnd >= total) break;
      pos = chunkEnd - overlap + 1;

      // Yield: Browser kann UI-Updates machen
      await yieldNow();
    }
  } else {
    // utr3 oder utr5: pro Gen eine Region scannen, in Gen-Strang-Richtung
    const seenLoci = new Set();
    const totalGenes = geneIndex.length;
    let geneCount = 0;
    const yieldEvery = 200;  // alle N Gene yielden

    for (const g of geneIndex) {
      geneCount++;
      if (isCancelled()) return { hits: [], cancelled: true };

      const key = g.start + ':' + g.end + ':' + g.strand;
      if (seenLoci.has(key)) continue;
      seenLoci.add(key);

      let regStart, regEnd;
      if (p.scope === 'utr3') {
        if (g.strand === 1) { regStart = g.end + 1; regEnd = g.end + p.utrWindow; }
        else { regStart = g.start - p.utrWindow; regEnd = g.start - 1; }
      } else {
        if (g.strand === 1) { regStart = g.start - p.utrWindow; regEnd = g.start - 1; }
        else { regStart = g.end + 1; regEnd = g.end + p.utrWindow; }
      }
      regStart = Math.max(1, regStart);
      regEnd = Math.min(twobit.length, regEnd);
      if (regEnd <= regStart) continue;

      let regDna = readRegionDna(twobit, regStart, regEnd);
      if (g.strand === -1) regDna = reverseComplementDna(regDna);

      const hits = findHairpinsInRegion(regDna, 0, params);
      const regLen = regDna.length;
      for (const h of hits) {
        let genomeStart, genomeEnd;
        if (g.strand === 1) {
          genomeStart = regStart + (h.absStart - 1);
          genomeEnd = regStart + (h.absEnd - 1);
        } else {
          genomeStart = regEnd - (h.absEnd - 1);
          genomeEnd = regEnd - (h.absStart - 1);
        }
        h.absStart = genomeStart;
        h.absEnd = genomeEnd;
        h.strand = g.strand;
        h.geneAnchor = { name: g.name, locusTag: g.locusTag, start: g.start, end: g.end };
        const tt = computeTTractScore(regDna, h.relStemBotEnd + 1, p.tTractWindow);
        h.tTractCount = tt.count;
        h.tTractSeq = tt.seq;
        if (!p.tTractEnabled || h.tTractCount >= p.tTractMin) allHits.push(h);
      }

      // Progress + Yield alle yieldEvery Gene
      if (geneCount % yieldEvery === 0) {
        if (onProgress) onProgress(geneCount, totalGenes, allHits.length);
        await yieldNow();
      }
    }
    if (onProgress) onProgress(totalGenes, totalGenes, allHits.length);
  }

  // Überlappungen filtern — pro Strang separat
  const plus = filterOverlappingHairpins(allHits.filter(h => h.strand === 1));
  const minus = filterOverlappingHairpins(allHits.filter(h => h.strand === -1));
  const both = filterOverlappingHairpins(allHits.filter(h => h.strand === 0));
  const filtered = plus.concat(minus, both);
  filtered.sort((a, b) => a.absStart - b.absStart);

  // In das Standard-Treffer-Modell überführen
  const hits = filtered.map(h => {
    // Sequenz in Transkriptionsrichtung — was eigentlich "h.stemTop + h.loop + revcomp(h.stemTop)"
    // wäre. Wir setzen die in der Tabelle angezeigte "sequence" als Strukturdarstellung.
    const fullSeq = h.stemTop + h.loop + h.stemBot.split('').reverse().join('');
    return {
      start: h.absStart,
      end: h.absEnd,
      strand: h.strand,
      sequence: fullSeq.replace(/U/g, 'T'),  // DNA-Anzeige
      // Hairpin-spezifische Felder (RNA-Sequenz wie im Detektor; Display
      // konvertiert U→T pro Render)
      stemTop: h.stemTop,
      stemBot: h.stemBot,
      stemTopFull: h.stemTopFull || h.stemTop,    // mit Bulge-Bases (5'→3')
      stemBotFull: h.stemBotFull || h.stemBot,
      loop: h.loop,
      // Backwards-Kompat-Aliase (frühere Render-Versionen)
      stemSeq: h.stemTop.replace(/U/g, 'T'),
      loopSeq: h.loop.replace(/U/g, 'T'),
      stemLen: h.stemLen,
      loopLen: h.loopLen,
      mmCount: h.mmCount || 0,
      mmPositions: h.mmPositions || [],
      bulges: h.bulges || [],
      bulgeCount: h.bulgeCount || 0,
      deltaG: h.deltaG,
      dotBracket: h.dotBracket,
      tTractCount: h.tTractCount,
      tTractSeq: h.tTractSeq ? h.tTractSeq.replace(/U/g, 'T') : '',
      // Standard-Annotation
      intragenic: false,  // wird unten von classifyHit gesetzt
      nearestGene: h.geneAnchor ? h.geneAnchor.name : null,
      _geneAnchor: h.geneAnchor
    };
  });

  return { hits, scanTimeMs: performance.now() - t0 };
}


// Treffer-Histogramm: Bucket-Counts über Genom
function computeHitHistogram(hits, genomeLen, numBuckets) {
  const buckets = new Uint32Array(numBuckets);
  if (genomeLen <= 0) return { buckets, bucketSize: 0 };
  const bucketSize = genomeLen / numBuckets;
  for (const h of hits) {
    const center = (h.start + h.end) / 2;
    let idx = Math.floor(center / bucketSize);
    if (idx >= numBuckets) idx = numBuckets - 1;
    if (idx < 0) idx = 0;
    buckets[idx]++;
  }
  return { buckets, bucketSize };
}

// ---------- v0.3.2: Globale Genom-Karte ----------
// Zeichnet GC-Skew oben + eine Heatmap-Zeile pro sichtbares Motiv darunter.
// Ausgeblendete Motive erscheinen als Bonbons unterhalb des Canvas.

function renderGenomeMap() {
  const root = document.getElementById('genome-map');
  if (!root) return;
  if (!mf.genome) { root.classList.remove('show'); return; }
  root.classList.add('show');

  const canvas = document.getElementById('genome-map-canvas');
  const status = document.getElementById('genome-map-status');
  const bonbons = document.getElementById('genome-map-bonbons');

  // Liste der Motive mit Sichtbarkeitsstatus
  const visibleMotifs = motifs.filter(m => m.visibleInOverview !== false);
  const hiddenMotifs = motifs.filter(m => m.visibleInOverview === false);

  // Höhe dynamisch berechnen
  const HEAD_H = 38;       // GC-Skew-Spur
  const ROW_H = 16;        // Heatmap-Zeile pro Motiv (mit Label drinnen)
  const BOTTOM_LABELS_H = 12; // Genom-Skala unten
  const PADDING = 4;
  // v0.7: Tetra-Anomalie-Spur (14 px) wenn vorhanden
  const TETRA_H = (mf.genome && mf.genome.tetraAnomaly) ? (14 + 2) : 0;
  const totalH = HEAD_H + TETRA_H + visibleMotifs.length * ROW_H + BOTTOM_LABELS_H + PADDING * 2;

  // Canvas-Größe setzen
  requestAnimationFrame(() => {
    const containerW = canvas.parentElement.clientWidth - 20; // padding
    const dpr = window.devicePixelRatio || 1;
    canvas.width = containerW * dpr;
    canvas.height = totalH * dpr;
    canvas.style.width = containerW + 'px';
    canvas.style.height = totalH + 'px';
    drawGenomeMap(canvas, visibleMotifs);
  });

  // Status-Zeile
  const scannedCount = motifs.filter(m => m.results).length;
  status.textContent = mf.genome.length.toLocaleString('de-DE') + ' bp · ' +
                        scannedCount + ' Motiv' + (scannedCount === 1 ? '' : 'e') + ' gescannt';

  // Bonbons rendern
  bonbons.innerHTML = '';
  if (hiddenMotifs.length > 0) {
    const lbl = document.createElement('span');
    lbl.className = 'bonbons-label';
    lbl.textContent = 'ausgeblendet:';
    bonbons.appendChild(lbl);
    for (const m of hiddenMotifs) {
      const pill = document.createElement('span');
      pill.className = 'bonbon';
      const dot = document.createElement('span');
      dot.className = 'bonbon-color';
      dot.style.background = m.color;
      const name = document.createElement('span');
      name.className = 'bonbon-name';
      name.textContent = m.name + (m.results ? ' (' + m.results.hits.length + ')' : '');
      pill.appendChild(dot);
      pill.appendChild(name);
      pill.title = 'Wieder einblenden';
      pill.addEventListener('click', () => {
        m.visibleInOverview = true;
        renderGenomeMap();
        // Panels neu zeichnen, weil Marker sich ändern
        for (const om of motifs) if (om.results) updatePanels(om);
      });
      bonbons.appendChild(pill);
    }
  }
}

// v0.7.3: Auge-Icon als Canvas-Pfad (plattform-unabhängig statt Emoji 👁).
// Position: (x, cy) ist linker Rand, vertikales Zentrum. width × height = Bounding-Box.
// Aussehen: stilisiertes Auge — Mandel-Outline mit gefüllter Iris in der Mitte.
function drawEyeIcon(ctx, x, cy, width, height, color) {
  const w = width;
  const h = height;
  const cx = x + w / 2;
  // Mandel-Form über zwei symmetrische Bezier-Bögen (oben und unten)
  const left = x;
  const right = x + w;
  // Bezier-Kontrollpunkte für Bogen — etwas höher als die Bounding-Box,
  // damit das Auge "weiter geöffnet" wirkt
  const ctrlOffset = h * 0.85;
  ctx.save();
  // Mandel-Outline
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(left, cy);
  ctx.quadraticCurveTo(cx, cy - ctrlOffset, right, cy);
  ctx.quadraticCurveTo(cx, cy + ctrlOffset, left, cy);
  ctx.closePath();
  ctx.stroke();
  // Iris als gefüllter Kreis in der Mitte
  ctx.fillStyle = color;
  ctx.beginPath();
  const irisR = Math.max(1.2, Math.min(w * 0.18, h * 0.38));
  ctx.arc(cx, cy, irisR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawGenomeMap(canvas, visibleMotifs) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  ctx.clearRect(0, 0, cssW, cssH);

  const genomeLen = mf.genome.length;
  const bp2px = (bp) => (bp / genomeLen) * cssW;

  const HEAD_H = 38;
  const ROW_H = 16;
  const PADDING = 4;
  const skewTop = PADDING;
  const skewBottom = skewTop + HEAD_H;
  // v0.7: Tetra-Anomalie-Spur zwischen GC-Skew und Motiv-Spuren
  const tetraData = mf.genome.tetraAnomaly || null;
  const TETRA_H = tetraData ? 14 : 0;
  const tetraTop = skewBottom + 2;
  const tetraBottom = tetraTop + TETRA_H;
  const rowsTop = (TETRA_H > 0 ? tetraBottom : skewBottom) + 2;

  // ---- GC-Skew-Spur (Multi-Resolution) ----
  const skewMulti = mf.genome.gcSkewMulti || null;
  // Fallback auf alten single-resolution-Modus
  const allSkewData = skewMulti
    ? [skewMulti.coarse, skewMulti.medium, skewMulti.fine]
    : (mf.genome.gcSkew && mf.genome.gcSkew.length > 1 ? [mf.genome.gcSkew] : []);

  if (allSkewData.length > 0 && allSkewData[0].length > 1) {
    // maxAbs aus dem feinsten (rauschigsten) Datensatz nehmen, damit alle drei darin Platz haben
    let maxAbs = 0.3;
    for (const ds of allSkewData) {
      for (const p of ds) { const a = Math.abs(p.value); if (a > maxAbs) maxAbs = a; }
    }
    const skewMid = (skewTop + skewBottom) / 2;
    // Nulllinie
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, skewMid); ctx.lineTo(cssW, skewMid); ctx.stroke();

    // Drei Linien: zart fein, mittel mittel, kräftig grob (umgekehrt zur Reihenfolge — grob zuletzt = oben)
    // Stil-Definitionen
    const styles = skewMulti ? [
      { data: skewMulti.fine,   stroke: 'rgba(255,255,255,0.18)', width: 0.7, label: '1kb' },   // Detail
      { data: skewMulti.medium, stroke: 'rgba(255,255,255,0.40)', width: 1.0, label: '10kb' },  // Mittel
      { data: skewMulti.coarse, stroke: 'rgba(122,184,245,0.85)', width: 1.5, label: '100kb' }  // Trend (Akzent)
    ] : [
      { data: allSkewData[0], stroke: 'rgba(255,255,255,0.55)', width: 1.0, label: '10kb' }
    ];

    for (const st of styles) {
      ctx.strokeStyle = st.stroke;
      ctx.lineWidth = st.width;
      ctx.beginPath();
      let first = true;
      for (const p of st.data) {
        const x = bp2px(p.center);
        const halfH = (HEAD_H / 2) - 2;
        const y = skewMid - (p.value / maxAbs) * halfH;
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // Beschriftung
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '9px ui-monospace, monospace';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillText(
      'GC-Skew  ±' + maxAbs.toFixed(2) +
      (skewMulti ? '  (1kb/10kb/100kb)' : '  (10 kb)'),
      4, skewTop + 1);
  }

  // ---- v0.7: Tetra-Anomalie-Spur ----
  if (tetraData && TETRA_H > 0 && tetraData.maxValue > 0) {
    // Hintergrund
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fillRect(0, tetraTop, cssW, TETRA_H);
    // Werte als Heatmap-Streifen
    const N = tetraData.values.length;
    if (N > 1) {
      // Pro Bucket eine vertikale Linie. Wir rendern direkt die N Datenpunkte
      // als Streifen mit Breite cssW/N
      const barW = Math.max(1, cssW / N);
      for (let i = 0; i < N; i++) {
        const v = tetraData.values[i];
        if (v <= 0) continue;
        // Logarithmisch normieren (Anomalie-Spitzen verstärken)
        const rel = Math.log(1 + v) / Math.log(1 + tetraData.maxValue);
        // Diskrete Stufen
        const step = Math.ceil(rel * 7) / 7;
        // Position
        const x = (tetraData.centers[i] / genomeLen) * cssW;
        ctx.globalAlpha = step;
        ctx.fillStyle = '#ffb74d';  // orange — passend zur "Warn"-Semantik
        ctx.fillRect(x - barW / 2, tetraTop + 2, barW, TETRA_H - 4);
      }
      ctx.globalAlpha = 1;
    }
    // Beschriftung
    ctx.fillStyle = 'rgba(255,183,77,0.8)';
    ctx.font = '9px ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    ctx.fillText('Atypie (4-mer, 5kb)', 4, tetraTop + TETRA_H / 2);
  }

  // ---- Heatmap-Zeilen pro Motiv ----
  // Bucket-Zahl: ein Bucket pro 2 Pixel, mindestens 50, maximal 400
  const numBuckets = Math.max(50, Math.min(400, Math.floor(cssW / 2)));
  const bucketSize = genomeLen / numBuckets;

  for (let mi = 0; mi < visibleMotifs.length; mi++) {
    const motif = visibleMotifs[mi];
    const y = rowsTop + mi * ROW_H;
    // Hintergrund-Streifen
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fillRect(0, y, cssW, ROW_H - 2);

    if (motif.results) {
      const filtered = motif.results.filterIntergenicOnly
        ? motif.results.hits.filter(h => !h.intragenic)
        : motif.results.hits;
      const { buckets } = computeHitHistogram(filtered, genomeLen, numBuckets);
      let maxCount = 0;
      for (const c of buckets) if (c > maxCount) maxCount = c;
      if (maxCount > 0) {
        const logMax = Math.log(maxCount + 1);
        const barW = cssW / numBuckets;
        const baseColor = motif.color;
        for (let i = 0; i < numBuckets; i++) {
          const c = buckets[i];
          if (c === 0) continue;
          // Logarithmische Helligkeit
          const intensity = Math.log(c + 1) / logMax;
          // 7 diskrete Stufen
          const step = Math.ceil(intensity * 7) / 7;
          ctx.globalAlpha = step;
          ctx.fillStyle = baseColor;
          ctx.fillRect(i * barW, y, Math.max(1, barW), ROW_H - 2);
        }
        ctx.globalAlpha = 1;
      }
    }

    // Auge + Farbquadrat + Name als Overlay (mit Schatten für Lesbarkeit)
    ctx.font = '10px ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    const textY = y + (ROW_H - 2) / 2;
    // Schwacher Hintergrund unterm Text
    const labelText = motif.name + (motif.results ? '  (' + motif.results.hits.length + ')' : '');
    const labelW = ctx.measureText(labelText).width;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, y, 12 + 14 + labelW + 8, ROW_H - 2);
    // v0.7.3: Auge als Canvas-Pfad (statt Emoji für plattform-unabhängige Darstellung)
    drawEyeIcon(ctx, 4, textY, 12, 8, 'rgba(255,255,255,0.7)');
    // Farbquadrat
    ctx.fillStyle = motif.color;
    ctx.fillRect(20, y + (ROW_H - 2) / 2 - 4, 8, 8);
    // Name
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(labelText, 32, textY);
  }

  // ---- v0.7: oriC/ter-Marker (vertikale Linien) ----
  const oriTer = mf.genome.oriTer;
  if (oriTer && oriTer.skewDepth > 0.01) {
    // Linien gehen vom Top des Skew-Bereichs bis zum Bottom des letzten Motiv-Streifens
    const lineTop = skewTop;
    const lineBottom = rowsTop + Math.max(visibleMotifs.length, 0) * ROW_H;
    const drawMarker = (bp, label, color) => {
      const x = bp2px(bp);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(x, lineTop);
      ctx.lineTo(x, lineBottom);
      ctx.stroke();
      ctx.setLineDash([]);
      // Label oben
      ctx.fillStyle = color;
      ctx.font = 'bold 9px ui-monospace, monospace';
      ctx.textBaseline = 'top';
      // Label-Position: rechts der Linie wenn nicht am Rand, sonst links
      const labelOffset = (x > cssW - 50) ? -3 : 3;
      ctx.textAlign = (labelOffset > 0) ? 'left' : 'right';
      ctx.fillText(label, x + labelOffset, lineTop + 1);
    };
    drawMarker(oriTer.oriC, 'oriC', 'rgba(129,199,132,0.9)');  // grün
    drawMarker(oriTer.ter, 'ter', 'rgba(232,90,79,0.9)');      // rot
  }

  // ---- Genom-Skala unten ----
  const labelY = cssH - 1;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px ui-monospace, monospace';
  ctx.textBaseline = 'bottom';
  for (let i = 0; i <= 4; i++) {
    const bp = (genomeLen * i) / 4;
    const x = bp2px(bp);
    const lbl = bp >= 1000000 ? (bp / 1000000).toFixed(1) + ' Mb' : Math.round(bp / 1000) + ' kb';
    ctx.textAlign = (i === 0) ? 'left' : (i === 4) ? 'right' : 'center';
    ctx.fillText(lbl, Math.max(2, Math.min(cssW - 2, x)), labelY);
  }
}

// Klick-Handling auf Genom-Karte:
//  - Auge-Klick (linke ~14 px einer Motiv-Zeile) -> Motiv ausblenden
//  - Sonstiger Klick auf Motiv-Zeile -> zum nächsten Treffer in Tabelle springen
//  - Klick auf GC-Skew-Spur -> nichts
function attachGenomeMapClickHandler() {
  const canvas = document.getElementById('genome-map-canvas');
  if (!canvas) return;
  if (canvas._handlerAttached) return;
  canvas._handlerAttached = true;

  canvas.addEventListener('click', (e) => {
    if (!mf.genome) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const w = rect.width;

    const HEAD_H = 38;
    const ROW_H = 16;
    const PADDING = 4;
    const TETRA_H = (mf.genome.tetraAnomaly ? 14 : 0);
    const rowsTop = PADDING + HEAD_H + 2 + (TETRA_H > 0 ? TETRA_H + 2 : 0);

    if (y < rowsTop) return; // GC-Skew/Tetra-Klick: ignorieren

    const visibleMotifs = motifs.filter(m => m.visibleInOverview !== false);
    const rowIdx = Math.floor((y - rowsTop) / ROW_H);
    if (rowIdx < 0 || rowIdx >= visibleMotifs.length) return;
    const motif = visibleMotifs[rowIdx];

    // Auge-Klick? (linke ~16 px)
    if (x < 16) {
      motif.visibleInOverview = false;
      renderGenomeMap();
      // Panels neu zeichnen
      for (const om of motifs) if (om.results) updatePanels(om);
      return;
    }

    // Sonst: zum nächsten Treffer springen
    if (!motif.results) return;
    // v0.3.3: Bei Klick auf andere Motiv-Zeile zu deren Tab wechseln
    if (motif.id !== currentTabId) {
      currentTabId = motif.id;
      renderMotifList();
    }
    const fraction = x / w;
    const targetBp = mf.genome.length * fraction;
    const filtered = motif.results.filterIntergenicOnly
      ? motif.results.hits.filter(h => !h.intragenic)
      : motif.results.hits;
    let bestIdx = -1, bestDist = Infinity;
    for (let i = 0; i < filtered.length; i++) {
      const center = (filtered[i].start + filtered[i].end) / 2;
      const d = Math.abs(center - targetBp);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    if (bestIdx === -1) return;
    const root = document.getElementById('results_' + motif.id);
    if (!root) return;
    const hk = hitKeyOf(filtered[bestIdx]);
    const cb = root.querySelector('.row-sel-' + motif.id + '[data-hkey="' + cssEscape(hk) + '"]');
    if (cb) {
      const tr = cb.closest('tr');
      if (tr) {
        tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        tr.style.transition = 'background 0.3s';
        tr.style.background = 'rgba(122,184,245,0.15)';
        setTimeout(() => { tr.style.background = ''; }, 1200);
      }
    } else {
      log('Nächster Treffer bei Pos ' + Math.round((filtered[bestIdx].start + filtered[bestIdx].end)/2).toLocaleString('de-DE') + ' liegt außerhalb der angezeigten Tabelle (Top 1000)', 'warn');
    }
  });

  // Hover: Cursor-Hint
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const HEAD_H = 38, ROW_H = 16, PADDING = 4;
    const rowsTop = PADDING + HEAD_H + 2;
    if (y < rowsTop) { canvas.style.cursor = 'default'; return; }
    if (x < 16) { canvas.style.cursor = 'pointer'; return; }
    canvas.style.cursor = 'crosshair';
  });
}

function cssEscape(s) {
  return s.replace(/(["\\\]])/g, '\\$1');
}

// Stabiler Schlüssel für einen Treffer (für Selektion)
function hitKeyOf(h) {
  // v0.8.3d: Hairpin-Hits haben kein 'spacers'. Konsistenter Key für beide Typen.
  const spacerSuffix = h.spacers ? ':' + h.spacers.join(',') : '';
  return h.start + ':' + h.end + ':' + h.strand + spacerSuffix;
}

// Auswahl der zu rendernden Panels: Selektion (alle), sonst Top N nach aktueller Sortierung
function pickPanelHits(m) {
  const r = m.results;
  if (!r) return [];
  let filtered = r.filterIntergenicOnly ? r.hits.filter(h => !h.intragenic) : r.hits;
  // v0.10: Bei Signal-Karten zusätzlich den aktiven Type-Filter (Max/Min/Wendepunkt) anwenden
  if (m.kind === 'structure' && r.typeFilter) {
    filtered = filtered.filter(h => r.typeFilter.has(h.peakType));
  }
  const PANEL_DEFAULT = 10;
  if (r.selected && r.selected.size > 0) {
    return filtered.filter(h => r.selected.has(hitKeyOf(h)));
  }
  return filtered.slice(0, PANEL_DEFAULT);
}

// Panel-Liste aktualisieren
function updatePanels(m) {
  const list = document.getElementById('panel_list_' + m.id);
  if (!list || list.classList.contains('hidden')) {
    if (list) {
      const title = document.getElementById('panels_title_' + m.id);
      const r = m.results; const sel = r.selected ? r.selected.size : 0;
      if (title) title.textContent = sel > 0 ? 'Panels (' + sel + ' selektiert, eingeklappt)' : 'Panels (eingeklappt)';
    }
    return;
  }
  const hits = pickPanelHits(m);
  const title = document.getElementById('panels_title_' + m.id);
  if (title) {
    const r = m.results; const sel = r.selected ? r.selected.size : 0;
    title.textContent = sel > 0
      ? 'Panels (' + sel + ' selektiert)'
      : 'Panels (Top ' + hits.length + ' nach aktueller Sortierung)';
  }
  list.innerHTML = '';

  if (hits.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--fg-mute);font-size:11px">Keine Treffer auswählbar</div>';
    return;
  }

  // Schwebender Maßstab: einmal pro Liste, oben rechts
  // Wert wird basierend auf Flanke berechnet (alle Panels haben gleiche Flanke)
  const scaleEl = document.createElement('div');
  scaleEl.className = 'scale-floating';
  list.appendChild(scaleEl);

  // Pro Treffer ein Panel-Canvas
  const PANEL_HEIGHT = 44;  // so niedrig wie möglich
  for (const h of hits) {
    const row = document.createElement('div');
    row.className = 'panel-row';
    row.style.height = PANEL_HEIGHT + 'px';
    const canvas = document.createElement('canvas');
    canvas.height = PANEL_HEIGHT * (window.devicePixelRatio || 1);
    row.appendChild(canvas);
    const label = document.createElement('div');
    label.className = 'panel-label';
    label.textContent = h.start.toLocaleString('de-DE') + ' ' + (h.strand === 1 ? '+' : '−') +
                        (h.nearestGene ? '  ' + h.nearestGene : '');
    row.appendChild(label);
    list.appendChild(row);

    // Canvas-Größe nach DOM-Insertion setzen, dann zeichnen
    requestAnimationFrame(() => {
      const w = row.clientWidth;
      canvas.width = w * (window.devicePixelRatio || 1);
      canvas.style.width = w + 'px';
      canvas.style.height = PANEL_HEIGHT + 'px';
      drawPanel(canvas, h, m, scaleEl);
      // v0.4.6.1: Hover-Tooltip-Listener
      attachHoverHandlers(canvas);
    });
  }
}

// v0.4.6.1: Hover-Handler für Panel-Canvas — zeigt Gen- oder Motiv-Tooltip
function attachHoverHandlers(canvas) {
  if (canvas._hoverAttached) return;
  canvas._hoverAttached = true;

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const hits = canvas._hitMap || [];
    // Suche von hinten — neuere Layer überschreiben
    let found = null;
    for (let i = hits.length - 1; i >= 0; i--) {
      const r = hits[i];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        found = r; break;
      }
    }
    if (found) {
      showHoverTooltip(found, e.clientX, e.clientY);
      canvas.style.cursor = 'pointer';
    } else {
      hideHoverTooltip();
      canvas.style.cursor = '';
    }
  });
  canvas.addEventListener('mouseleave', () => {
    hideHoverTooltip();
    canvas.style.cursor = '';
  });
  // Touch-Support: tap zeigt Tooltip kurz an, hide nach 3s
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.touches[0].clientX - rect.left;
    const y = e.touches[0].clientY - rect.top;
    const hits = canvas._hitMap || [];
    let found = null;
    for (let i = hits.length - 1; i >= 0; i--) {
      const r = hits[i];
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        found = r; break;
      }
    }
    if (found) {
      showHoverTooltip(found, e.touches[0].clientX, e.touches[0].clientY);
      // Auto-hide nach 3 Sekunden
      clearTimeout(canvas._hoverHideTimer);
      canvas._hoverHideTimer = setTimeout(hideHoverTooltip, 3000);
    }
  }, { passive: true });
}

function showHoverTooltip(hitRecord, screenX, screenY) {
  const ttDiv = document.getElementById('hover-tooltip');
  if (!ttDiv) return;
  let html = '';
  if (hitRecord.type === 'gene') {
    const g = hitRecord.data;
    const name = g.name || g.locusTag || g.geneId || '?';
    const len = g.end - g.start + 1;
    const strand = g.strand === 1 ? '+' : '−';
    html = '<div class="ht-title">' + escapeHtml(name) + '</div>';
    if (g.locusTag && g.locusTag !== name) {
      html += '<div class="ht-meta">' + escapeHtml(g.locusTag) + '</div>';
    }
    html += '<div class="ht-row"><span class="ht-k">Position</span><span class="ht-v">' +
            g.start.toLocaleString('de-DE') + '–' + g.end.toLocaleString('de-DE') + ' (' + strand + ')</span></div>';
    html += '<div class="ht-row"><span class="ht-k">Länge</span><span class="ht-v">' + len.toLocaleString('de-DE') + ' bp</span></div>';
    if (g.type) {
      html += '<div class="ht-row"><span class="ht-k">Typ</span><span class="ht-v">' + escapeHtml(g.type) + '</span></div>';
    }
    // v0.6: CAI / Codon-Bias-Annotation
    if (g.cai !== undefined && g.cai !== null) {
      html += '<div class="ht-row"><span class="ht-k">CAI</span><span class="ht-v">' + g.cai.toFixed(3) + '</span></div>';
    }
    if (g.codonClass) {
      let badgeColor = 'var(--fg-mute)';
      if (g.codonClass === 'hoch') badgeColor = 'var(--accent)';
      else if (g.codonClass === 'atypisch') badgeColor = 'var(--warn)';
      html += '<div class="ht-row"><span class="ht-k">Codon-Bias</span><span class="ht-v" style="color:' + badgeColor + '">' + g.codonClass + '</span></div>';
    }
    if (g.product) {
      html += '<div class="ht-desc">' + escapeHtml(g.product) + '</div>';
    } else if (g.note) {
      html += '<div class="ht-desc">' + escapeHtml(g.note) + '</div>';
    }
  } else if (hitRecord.type === 'motif') {
    const { motif: mt, hit: ht } = hitRecord.data;
    const len = ht.end - ht.start + 1;
    const strand = ht.strand === 1 ? '+' : '−';
    html = '<div class="ht-title" style="color:' + mt.color + '">' + escapeHtml(mt.name) + '</div>';
    html += '<div class="ht-row"><span class="ht-k">Position</span><span class="ht-v">' +
            ht.start.toLocaleString('de-DE') + '–' + ht.end.toLocaleString('de-DE') + ' (' + strand + ')</span></div>';
    html += '<div class="ht-row"><span class="ht-k">Länge</span><span class="ht-v">' + len + ' bp</span></div>';
    html += '<div class="ht-row"><span class="ht-k">Sequenz</span><span class="ht-v">' + escapeHtml(ht.sequence || '') + '</span></div>';
    if (ht.scoreFraction !== undefined) {
      html += '<div class="ht-row"><span class="ht-k">Score</span><span class="ht-v">' + Math.round(ht.scoreFraction * 100) + '%</span></div>';
    }
    if (ht.softMm !== undefined && ht.hardMm !== undefined) {
      html += '<div class="ht-row"><span class="ht-k">MM</span><span class="ht-v">' + ht.hardMm + ' hard, ' + ht.softMm + ' soft</span></div>';
    } else if (ht.mismatches !== undefined) {
      html += '<div class="ht-row"><span class="ht-k">MM</span><span class="ht-v">' + ht.mismatches + '</span></div>';
    }
    if (ht.spacers && ht.spacers.length > 0) {
      html += '<div class="ht-row"><span class="ht-k">Spacer</span><span class="ht-v">' + ht.spacers.join(', ') + '</span></div>';
    }
    // Symmetrie-Annotation falls vorhanden
    if (ht.symMmLeft !== undefined) {
      html += '<div class="ht-row"><span class="ht-k">Sym</span><span class="ht-v">L=' + ht.symMmLeft + ' R=' + ht.symMmRight +
              ' Asym=' + ht.symAsymmetry + ' (sym:' + ht.symSubs + '/asym:' + ht.asymSubs + ')</span></div>';
    }
    if (ht.nearestGene) {
      html += '<div class="ht-row"><span class="ht-k">Gen</span><span class="ht-v">' + escapeHtml(ht.nearestGene) +
              (ht.distanceToGeneStart !== null && ht.distanceToGeneStart !== undefined ?
                ' (Δ ' + (ht.distanceToGeneStart >= 0 ? '+' : '') + ht.distanceToGeneStart + ')' : '') +
              '</span></div>';
    }
    // v0.7: Low-Complexity-Hinweis wenn Entropy niedrig
    if (ht.localEntropy !== undefined && ht.localEntropy < 1.5) {
      html += '<div class="ht-row"><span class="ht-k">Komplexität</span><span class="ht-v" style="color:var(--warn)">niedrig (' + ht.localEntropy.toFixed(2) + ' Bits)</span></div>';
    }
    if (mt.consensus) {
      html += '<div class="ht-row"><span class="ht-k">Konsensus</span><span class="ht-v">' + escapeHtml(mt.consensus) + '</span></div>';
    }
  }
  ttDiv.innerHTML = html;
  ttDiv.classList.add('show');
  // Position berechnen mit Bildschirm-Bounds
  const ttRect = ttDiv.getBoundingClientRect();
  const ww = window.innerWidth, wh = window.innerHeight;
  let left = screenX + 12;
  let top = screenY + 12;
  if (left + ttRect.width > ww - 8) left = screenX - ttRect.width - 12;
  if (top + ttRect.height > wh - 8) top = screenY - ttRect.height - 12;
  if (left < 4) left = 4;
  if (top < 4) top = 4;
  ttDiv.style.left = left + 'px';
  ttDiv.style.top = top + 'px';
}

function hideHoverTooltip() {
  const ttDiv = document.getElementById('hover-tooltip');
  if (ttDiv) ttDiv.classList.remove('show');
}

// ---------- Canvas-Renderer für ein einzelnes Panel ----------
function drawPanel(canvas, hit, motif, scaleEl) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  ctx.clearRect(0, 0, cssW, cssH);

  // v0.4.6.1: Hit-Map für Hover-Tooltips zurücksetzen
  canvas._hitMap = [];

  // Flanke berechnen: Anker = Treffer-Mitte, Fenster = max(3 Gene, 500 bp)
  const FLANK_GENES = 3;
  const FLANK_BP_MIN = 500;
  const anchor = Math.round((hit.start + hit.end) / 2);

  // Genomlänge
  const genomeLen = mf.genome.length;

  // Suche links und rechts N Gene um den Anker
  const genes = mf.genome.geneIndex;
  // binär findet nicht so leicht, linear ist okay bei wenigen tausend
  let leftGeneIdx = -1, rightGeneIdx = -1;
  for (let i = 0; i < genes.length; i++) {
    if (genes[i].end < anchor) leftGeneIdx = i;
    else if (rightGeneIdx === -1 && genes[i].start > anchor) { rightGeneIdx = i; break; }
    else if (genes[i].start <= anchor && genes[i].end >= anchor) {
      // Gen überlappt mit Anker — gilt als sowohl links als rechts
      leftGeneIdx = i;
      rightGeneIdx = i + 1; break;
    }
  }
  // N Gene links/rechts vom Anker
  let leftBound = Math.max(1, anchor - FLANK_BP_MIN);
  let rightBound = Math.min(genomeLen, anchor + FLANK_BP_MIN);
  if (leftGeneIdx >= 0) {
    const targetIdx = Math.max(0, leftGeneIdx - FLANK_GENES + 1);
    leftBound = Math.min(leftBound, genes[targetIdx].start);
  }
  if (rightGeneIdx >= 0 && rightGeneIdx < genes.length) {
    const targetIdx = Math.min(genes.length - 1, rightGeneIdx + FLANK_GENES - 1);
    rightBound = Math.max(rightBound, genes[targetIdx].end);
  }
  leftBound = Math.max(1, leftBound);
  rightBound = Math.min(genomeLen, rightBound);

  const winSize = rightBound - leftBound + 1;
  const bp2px = (bp) => ((bp - leftBound) / winSize) * cssW;

  // Update-Maßstab — wir zeigen den Wert aus dem ersten gerenderten Panel
  // (alle haben gleiche Flanke, daher gleicher Maßstab)
  if (scaleEl && !scaleEl._set) {
    setScale(scaleEl, cssW, winSize);
    scaleEl._set = true;
  }

  // ---------- Zeichnen ----------
  // Hintergrund leicht
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0, 0, cssW, cssH);

  // Mittellinie sehr dezent
  const midY = cssH / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(cssW, midY); ctx.stroke();

  // Gene zeichnen (Pfeile)
  const geneH = 12;
  const arrowLen = 5;
  // Genfilter: nur die im Fenster
  for (const g of genes) {
    if (g.end < leftBound || g.start > rightBound) continue;
    const gx0 = bp2px(Math.max(g.start, leftBound));
    const gx1 = bp2px(Math.min(g.end, rightBound));
    const gw = Math.max(2, gx1 - gx0);
    const gy = midY - geneH / 2;
    // v0.10: Gene schwarz gefüllt, Outline + Label in Strand-Farbe (blau fwd, orange rev)
    const strandColor = g.strand === 1 ? '#7ab8f5' : '#ffb74d';
    ctx.fillStyle = '#000';
    ctx.strokeStyle = strandColor;
    ctx.lineWidth = 1;
    ctx.beginPath();
    if (g.strand === 1) {
      // → Spitze rechts
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx0, gy);
      ctx.lineTo(gx1 - tipLen, gy);
      ctx.lineTo(gx1, gy + geneH / 2);
      ctx.lineTo(gx1 - tipLen, gy + geneH);
      ctx.lineTo(gx0, gy + geneH);
      ctx.closePath();
    } else {
      // ← Spitze links
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx1, gy);
      ctx.lineTo(gx0 + tipLen, gy);
      ctx.lineTo(gx0, gy + geneH / 2);
      ctx.lineTo(gx0 + tipLen, gy + geneH);
      ctx.lineTo(gx1, gy + geneH);
      ctx.closePath();
    }
    ctx.fill(); ctx.stroke();

    // v0.4.6.1: Gen-Hit für Tooltip-Hit-Test speichern
    canvas._hitMap.push({
      x: gx0, y: gy, w: gw, h: geneH,
      type: 'gene',
      data: g
    });

    // Gen-Name wenn Platz — in Strand-Farbe
    if (gw > 30) {
      ctx.fillStyle = strandColor;
      ctx.font = '9px ui-monospace, monospace';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      const name = g.name || '?';
      const tx = gx0 + 3;
      ctx.fillText(name, tx, midY);
    }
  }

  // Motiv-Marker zeichnen — alle nicht-gemuteten Motive die einen Treffer im Fenster haben
  // Marker liegen ÜBER der Gen-Spur (mid - geneH - paddingMarker)
  const markerY = midY - geneH / 2 - 5;
  const markerH = 4;
  for (const otherMotif of motifs) {
    if (otherMotif.visibleInOverview === false) continue;
    if (!otherMotif.results) continue;
    for (const oh of otherMotif.results.hits) {
      if (oh.end < leftBound || oh.start > rightBound) continue;
      const x0 = bp2px(Math.max(oh.start, leftBound));
      const x1 = bp2px(Math.min(oh.end, rightBound));
      const w = Math.max(2, x1 - x0);
      // Treffer des aktuellen Motivs am Anker hervorheben
      const isAnchorHit = (otherMotif.id === motif.id) && oh.start === hit.start && oh.end === hit.end;
      ctx.fillStyle = otherMotif.color;
      ctx.globalAlpha = isAnchorHit ? 1.0 : 0.85;
      ctx.fillRect(x0, markerY - markerH / 2, w, markerH);
      // Strang-Indikator: kleiner Pfeil/Strich oben oder unten
      ctx.fillStyle = otherMotif.color;
      ctx.beginPath();
      if (oh.strand === 1) {
        ctx.moveTo(x1, markerY - markerH / 2);
        ctx.lineTo(x1 + 3, markerY);
        ctx.lineTo(x1, markerY + markerH / 2);
      } else {
        ctx.moveTo(x0, markerY - markerH / 2);
        ctx.lineTo(x0 - 3, markerY);
        ctx.lineTo(x0, markerY + markerH / 2);
      }
      ctx.closePath();
      ctx.fill();
      // Hervorhebung des aktuellen Treffers: kleiner Rahmen
      if (isAnchorHit) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(x0 - 0.5, markerY - markerH / 2 - 0.5, w + 1, markerH + 1);
      }

      // v0.4.6.1: Motiv-Hit für Tooltip-Hit-Test speichern (etwas größerer Klick-Bereich)
      const padY = 4;
      canvas._hitMap.push({
        x: x0 - 1, y: markerY - markerH / 2 - padY,
        w: w + 2, h: markerH + 2 * padY,
        type: 'motif',
        data: { motif: otherMotif, hit: oh }
      });
    }
    ctx.globalAlpha = 1;
  }

  // Anker-Markierung: dünne Linie vom Marker bis Mid
  const ax = bp2px(anchor);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 2]);
  ctx.beginPath();
  ctx.moveTo(ax, 0);
  ctx.lineTo(ax, cssH);
  ctx.stroke();
  ctx.setLineDash([]);
}

// Maßstab setzen: nice number, passend zur Fenstergröße
function setScale(el, pxWidth, bpWindow) {
  // Ziel: ein Balken von ~120-180 px Breite
  const targetPx = 140;
  const bpPerPx = bpWindow / pxWidth;
  const targetBp = bpPerPx * targetPx;
  // nice number nach 1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, ...
  const niceSteps = [1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,20000,50000,100000,200000,500000];
  let chosen = niceSteps[0];
  for (const s of niceSteps) { if (s <= targetBp) chosen = s; }
  const barPx = chosen / bpPerPx;
  el.innerHTML = '';
  const bar = document.createElement('span');
  bar.className = 'scale-bar';
  bar.style.width = barPx + 'px';
  el.appendChild(bar);
  const lbl = document.createElement('span');
  lbl.textContent = chosen >= 1000 ? (chosen / 1000) + ' kb' : chosen + ' bp';
  el.appendChild(lbl);
}

function sortHits(r) {
  const dir = r.sortDir === 'asc' ? 1 : -1;
  const k = r.sortBy;
  r.hits.sort((a, b) => {
    let av, bv;
    // Spacer-Spalten: spacer_0, spacer_1, ...
    if (k && k.startsWith('spacer_')) {
      const idx = parseInt(k.substring(7), 10);
      av = (a.spacers && a.spacers[idx] !== undefined) ? a.spacers[idx] : Infinity;
      bv = (b.spacers && b.spacers[idx] !== undefined) ? b.spacers[idx] : Infinity;
    } else {
      av = a[k]; bv = b[k];
    }
    if (av === null || av === undefined) av = (typeof bv === 'number') ? Infinity : '';
    if (bv === null || bv === undefined) bv = (typeof av === 'number') ? Infinity : '';
    if (typeof av === 'string') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });
}

// Sequenz-Coloring mit Block-Awareness:
// - Submotive in Base-Farben mit Mismatch-Highlight
// - Spacer-Basen in vollem Inhalt, grau-kursiv, gepaddet auf max-Range zentriert
function colorizeBlockSequence(hit, blocks) {
  if (!blocks) return colorizeSequenceFlat(hit.sequence);

  let out = '';
  let pos = 0;       // Position in hit.sequence
  let spacerIdx = 0; // Welcher Spacer kommt als nächstes

  for (const b of blocks) {
    if (b.type === 'fixed') {
      const L = b.seq.length;
      for (let i = 0; i < L; i++) {
        const base = (hit.sequence[pos + i] || 'N').toUpperCase();
        const cls = 'b-' + (['A','C','G','T','N'].includes(base) ? base : 'N');
        const allowed = IUPAC[b.seq[i]] || ['A','C','G','T'];
        const isMatch = allowed.includes(base);
        out += '<span class="seq-base ' + cls + (isMatch ? '' : ' mismatch') + '">' + base + '</span>';
      }
      pos += L;
    } else {
      // Spacer-Block: tatsächliche Länge aus hit.spacers, Padding auf b.max
      const len = (hit.spacers && hit.spacers[spacerIdx] !== undefined) ? hit.spacers[spacerIdx] : b.min;
      spacerIdx++;
      const totalPad = b.max - len;
      const padLeft = Math.floor(totalPad / 2);
      const padRight = totalPad - padLeft;

      // Trennzeichen vorm Spacer-Block (visuelle Klarheit)
      out += '<span class="spacer-pad"> </span>';
      // Padding links
      if (padLeft > 0) out += '<span class="spacer-pad">' + '·'.repeat(padLeft) + '</span>';
      // Spacer-Inhalt (lowercase, kursiv-grau)
      let spacerContent = '';
      for (let i = 0; i < len; i++) {
        const base = (hit.sequence[pos + i] || 'n').toLowerCase();
        spacerContent += base;
      }
      out += '<span class="spacer-base">' + spacerContent + '</span>';
      // Padding rechts
      if (padRight > 0) out += '<span class="spacer-pad">' + '·'.repeat(padRight) + '</span>';
      out += '<span class="spacer-pad"> </span>';

      pos += len;
    }
  }
  return out;
}

function colorizeSequenceFlat(seq) {
  let out = '';
  for (let i = 0; i < seq.length; i++) {
    const b = seq[i].toUpperCase();
    const cls = 'b-' + (['A','C','G','T','N'].includes(b) ? b : 'N');
    out += '<span class="seq-base ' + cls + '">' + b + '</span>';
  }
  return out;
}

let activeTooltipTrigger = null;

function setupTooltips() {
  const box = document.getElementById('tooltip-box');
  const close = document.getElementById('tt-close');

  document.addEventListener('click', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger) {
      e.stopPropagation();
      const key = trigger.dataset.tt;
      if (!key) return;
      if (activeTooltipTrigger === trigger) {
        hideTooltip();
        return;
      }
      showTooltip(trigger, key);
    } else if (!e.target.closest('#tooltip-box')) {
      hideTooltip();
    }
  });

  close.addEventListener('click', (e) => {
    e.stopPropagation();
    hideTooltip();
  });

  // Desktop: Hover
  document.addEventListener('mouseover', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger && trigger !== activeTooltipTrigger) {
      const key = trigger.dataset.tt;
      if (key && TOOLTIPS[key]) {
        clearTimeout(window._ttHoverTimeout);
        window._ttHoverTimeout = setTimeout(() => showTooltip(trigger, key), 250);
      }
    }
  });
  document.addEventListener('mouseout', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger) clearTimeout(window._ttHoverTimeout);
  });
}

function showTooltip(trigger, key) {
  const tt = TOOLTIPS[key];
  if (!tt) return;
  const box = document.getElementById('tooltip-box');
  document.getElementById('tt-title-text').textContent = tt.title;
  document.getElementById('tt-body').textContent = tt.body;
  box.classList.add('show');

  // Position berechnen — bevorzugt unterhalb, sonst oberhalb
  const r = trigger.getBoundingClientRect();
  box.style.left = '0px'; box.style.top = '0px'; // reset für Messung
  const bb = box.getBoundingClientRect();
  let left = r.left + r.width / 2 - bb.width / 2;
  let top = r.bottom + 8;
  if (top + bb.height > window.innerHeight - 10) {
    top = r.top - bb.height - 8;
  }
  if (left < 10) left = 10;
  if (left + bb.width > window.innerWidth - 10) left = window.innerWidth - bb.width - 10;
  box.style.left = left + 'px';
  box.style.top = top + 'px';

  if (activeTooltipTrigger) activeTooltipTrigger.classList.remove('active');
  trigger.classList.add('active');
  activeTooltipTrigger = trigger;
}

function hideTooltip() {
  document.getElementById('tooltip-box').classList.remove('show');
  if (activeTooltipTrigger) activeTooltipTrigger.classList.remove('active');
  activeTooltipTrigger = null;
}
