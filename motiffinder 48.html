  const tabBar = document.createElement('div'); tabBar.className = 'input-tabs';
  const tabDefs = [
    { id: 'consensus',       lbl: 'Konsensus' },
    { id: 'consensus_space', lbl: '+ Datenraum' },

    m.inputTab = id;

      tabs[k].classList.toggle('active', k === id);

    if (m._refreshThreshold) m._refreshThreshold();

  for (const def of tabDefs) {
    const btn = document.createElement('button');
    btn.className = 'input-tab' + (m.inputTab === def.id ? ' active' : '');
    btn.textContent = def.lbl;
    btn.addEventListener('click', () => activateTab(def.id));
    tabBar.appendChild(btn);
    tabs[def.id] = btn;
  }

  // Pane: Konsensus
  const paneConsensus = document.createElement('div');

  const consInpRow = document.createElement('div'); consInpRow.className = 'row';

  consInp.placeholder = 'z.B. TTGACA   oder   CGTTTT N12-16 GGGWAW';
  consInp.spellcheck = false; consInp.autocapitalize = 'characters';
  consInp.addEventListener('input', () => {
    m.consensus = consInp.value;
    updateMotifPreview(m.id);
    if (m._refreshThreshold) m._refreshThreshold();
  });
  consInpRow.appendChild(consensusLbl); consInpRow.appendChild(consInp);
  paneConsensus.appendChild(consInpRow);

  // Pane: Konsensus + Datenraum
  const paneSpace = document.createElement('div');
  paneSpace.className = 'input-pane' + (m.inputTab === 'consensus_space' ? ' active' : '');
  const consRow2 = document.createElement('div'); consRow2.className = 'row';
  const consensusLbl2 = document.createElement('label');
  consensusLbl2.innerHTML = 'Konsensus <span class="info-icon" data-tt="konsensus">i</span>';
  const consInp2 = document.createElement('input');
  consInp2.type = 'text'; consInp2.value = m.consensus;
  consInp2.placeholder = 'z.B. GTTTAA N5-15 GGGWAW';
  consInp2.spellcheck = false; consInp2.autocapitalize = 'characters';
  consInp2.addEventListener('input', () => {
    m.consensus = consInp2.value;
    consInp.value = consInp2.value; // sync zum anderen Pane
    updateMotifPreview(m.id);
    if (m._refreshThreshold) m._refreshThreshold();
  });
  consRow2.appendChild(consensusLbl2); consRow2.appendChild(consInp2);
  const spaceRow = document.createElement('div'); spaceRow.className = 'row';
  const spaceLbl = document.createElement('label');
  spaceLbl.innerHTML = 'Datenraum';
  spaceLbl.title = 'Was an jeder Position toleriert wird (weicher Mismatch). Nukleotide außerhalb sind harte Mismatches.';
  const spaceInp = document.createElement('input');
  spaceInp.type = 'text'; spaceInp.value = m.searchSpace;
  spaceInp.placeholder = 'z.B. GDDWNN N5-15 NRNNDN';
  spaceInp.spellcheck = false; spaceInp.autocapitalize = 'characters';
  spaceInp.addEventListener('input', () => {
    m.searchSpace = spaceInp.value;
    if (m._refreshThreshold) m._refreshThreshold();
  });
  spaceRow.appendChild(spaceLbl); spaceRow.appendChild(spaceInp);
  paneSpace.appendChild(consRow2);
  paneSpace.appendChild(spaceRow);
  const spaceHint = document.createElement('div'); spaceHint.className = 'pane-info';
  spaceHint.textContent = 'Suche-Modus mit Soft-/Hard-Mismatch kommt mit Scan-Erweiterung. Aktuell wird nur Konsensus für die Suche genutzt.';
  paneSpace.appendChild(spaceHint);

  // Pane: Sequenzen
  const paneSeqs = document.createElement('div');
  paneSeqs.className = 'input-pane' + (m.inputTab === 'sequences' ? ' active' : '');
  const seqLbl = document.createElement('div'); seqLbl.style.fontSize = '12px'; seqLbl.style.color = 'var(--fg-dim)'; seqLbl.style.marginBottom = '4px';
  seqLbl.textContent = 'Eine Beispielsequenz pro Zeile. Spacer-Notation z.B. GTTTCAn5TATTGT.';
  const seqInp = document.createElement('textarea');
  seqInp.value = m.sequences || '';
  seqInp.placeholder = 'GTTTCAn5TATTGT\nGTTTTAn10GGGTAT\n...';
  seqInp.spellcheck = false;
  const seqDerived = document.createElement('div');
  seqDerived.className = 'derived-display';
  seqDerived.style.display = 'none';
  const seqWarn = document.createElement('div'); seqWarn.className = 'pane-warn'; seqWarn.style.display = 'none';
  const seqInfo = document.createElement('div'); seqInfo.className = 'pane-info';

  const updateSeqDerivation = () => {
    const text = seqInp.value;
    m.sequences = text;
    if (!text.trim()) {
      seqDerived.style.display = 'none';
      seqWarn.style.display = 'none';
      seqInfo.textContent = '';
      m.derivedFromSequences = null;
      return;
    }
    const result = deriveFromSequenceList(text, { alpha: 0.5, tolerance: 0.05 });
    m.derivedFromSequences = result;
    if (!result.ok) {
      seqDerived.style.display = 'none';
      seqInfo.textContent = '';
      seqWarn.style.display = 'block';
      seqWarn.textContent = result.error;
      return;
    }
    // Konsensus + Datenraum übernehmen
    m.consensus = result.consensus;
    m.searchSpace = result.searchSpace;
    consInp.value = result.consensus;
    consInp2.value = result.consensus;
    spaceInp.value = result.searchSpace;
    seqDerived.style.display = 'block';
    seqDerived.innerHTML = '';
    const r1 = document.createElement('div');
    r1.innerHTML = '<span class="lbl">Konsensus:</span>' + escapeHtml(result.consensus);
    const r2 = document.createElement('div');
    r2.innerHTML = '<span class="lbl">Datenraum:</span>' + escapeHtml(result.searchSpace);
    seqDerived.appendChild(r1); seqDerived.appendChild(r2);
    seqInfo.textContent = result.n + ' gültige Sequenz' + (result.n === 1 ? '' : 'en')
      + (result.skipped ? ' · ' + result.skipped + ' wegen abweichender Länge übersprungen' : '')
      + (result.invalid.length ? ' · ' + result.invalid.length + ' ungültige Zeile(n)' : '');
    seqWarn.style.display = result.warnings.length ? 'block' : 'none';
    seqWarn.textContent = result.warnings.join(' · ');
    updateMotifPreview(m.id);
    renderMotifBlock(m);
  };
  seqInp.addEventListener('input', updateSeqDerivation);

  paneSeqs.appendChild(seqLbl);
  paneSeqs.appendChild(seqInp);
  paneSeqs.appendChild(seqInfo);
  paneSeqs.appendChild(seqWarn);
  paneSeqs.appendChild(seqDerived);
  // Initialisieren falls Sequenzen schon da
  if (m.sequences) setTimeout(updateSeqDerivation, 0);

  // Pane: PRODORIC
  const paneProd = document.createElement('div');
  paneProd.className = 'input-pane' + (m.inputTab === 'prodoric' ? ' active' : '');
  const prodInfo = document.createElement('div');
  prodInfo.style.cssText = 'font-size:12px;color:var(--fg-dim);margin-bottom:6px';
  if (m.prodoricMx) {
    prodInfo.textContent = m.prodoricMx + (m.prodoricOrganism ? ' — ' + m.prodoricOrganism : '');
  } else {
    prodInfo.textContent = 'Lädt eine PRODORIC-JSON-Datei (z.B. von prodoric.de). Konsensus, Name und Funktion werden übernommen.';
  }
  paneProd.appendChild(prodInfo);
  const prodBtn2 = document.createElement('button');
  prodBtn2.className = 'action';
  prodBtn2.textContent = m.prodoricMx ? 'Andere PRODORIC-JSON laden' : 'PRODORIC-JSON laden';
  prodBtn2.addEventListener('click', () => {
    if (m.prodoricMx) {
      confirmDialog(
        'PRODORIC ersetzen',
        'Aktuelles PRODORIC-Motiv (' + m.prodoricMx + ') wird überschrieben. Treffer gehen verloren. Fortfahren?',
        () => loadProdoricJsonForMotif(m)
      );
    } else {
      loadProdoricJsonForMotif(m);
    }
  });
  paneProd.appendChild(prodBtn2);

  panes['consensus'] = paneConsensus;
  panes['consensus_space'] = paneSpace;
  panes['sequences'] = paneSeqs;
  panes['prodoric'] = paneProd;

  // Container für die Tabs
  const inputContainer = document.createElement('div');
  inputContainer.appendChild(tabBar);
  for (const def of tabDefs) inputContainer.appendChild(panes[def.id]);
  // row2 ist jetzt der inputContainer
  const row2 = inputContainer;

  // Row 3: Threshold (linked %/MM), Strand, Scan
  const row3 = document.createElement('div'); row3.className = 'row';
  // v0.4.7.1: Zwei verbundene Zahlenfelder mit Link-Icon
  const thLbl = document.createElement('label');
  thLbl.innerHTML = 'Threshold <span class="info-icon" data-tt="threshold">i</span>';
  // Migration: wenn nur 'mismatches' aber kein 'scoreThreshold', oder noch Default 1.0
  if (m.scoreThreshold === undefined || m.scoreThreshold === null) {
    m.scoreThreshold = 1.0;
  }

  // Container
  const thBox = document.createElement('span');
  thBox.className = 'threshold-linked';

  const pctInp = document.createElement('input');
  pctInp.type = 'number'; pctInp.min = 0; pctInp.max = 100; pctInp.step = 0.1;

  const pctUnit = document.createElement('span');
  pctUnit.className = 'unit'; pctUnit.textContent = '%';

  // Link-Icon: zwei verschränkte Ringe als SVG
  const linkIcon = document.createElement('span');
  linkIcon.className = 'link-icon';
  linkIcon.title = 'Verkettet — Änderung eines Wertes aktualisiert den anderen';
  linkIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none">' +
    '<circle cx="5" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/>' +
    '<circle cx="9" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/>' +
    '</svg>';

  const mmInp = document.createElement('input');
  mmInp.type = 'number'; mmInp.min = 0; mmInp.step = 1;

  const mmUnit = document.createElement('span');
  mmUnit.className = 'unit'; mmUnit.textContent = 'MM';

  const ctxSpan = document.createElement('span');
  ctxSpan.className = 'ctx';

  const ctxExtraSpan = document.createElement('span');
  ctxExtraSpan.className = 'ctx';
  ctxExtraSpan.style.display = 'block';
  ctxExtraSpan.style.flexBasis = '100%';

  // Synchronisations-Funktionen
  // setThresholdFromPct: User hat Prozent eingegeben → MM-Feld aktualisieren
  // setThresholdFromMm: User hat MM eingegeben → Prozent-Feld aktualisieren
  // computeContext: Kontext-Text mit fixedLen
  let updating = false;  // Verhindert Endlos-Schleife

  const flashField = (el) => {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 400);
  };

  const computeContext = () => {
    const norm = normalizeConsensus(m.consensus);
    if (!norm.ok) return { fixedLen: 0, txt: 'Konsensus eingeben' };
    const fixedLen = fixedPositionCount(norm.blocks);
    return { fixedLen, txt: 'bei ' + fixedLen + ' fixen Pos.' };
  };

  const refreshFromThreshold = (sourceField) => {
    // m.scoreThreshold ist authoritativ; aktualisiere die Felder die nicht der source sind
    const ctx = computeContext();
    const fixedLen = ctx.fixedLen;
    const pct = m.scoreThreshold * 100;
    // halfPoints und MM aus scoreThreshold
    const halfPoints = fixedLen > 0 ? Math.floor((1 - m.scoreThreshold) * fixedLen * 2 + 1e-9) : 0;
    const maxHardMm = Math.floor(halfPoints / 2);
    // Backwards-kompat: m.mismatches setzen
    m.mismatches = maxHardMm;

    updating = true;
    if (sourceField !== 'pct') {
      pctInp.value = pct.toFixed(1).replace(/\.0$/, '');
      if (sourceField === 'mm') flashField(pctInp);
    }
    if (sourceField !== 'mm') {
      mmInp.value = maxHardMm;
      if (sourceField === 'pct') flashField(mmInp);
    }
    updating = false;

    // v0.5: PWM-Modus erkennen — MM-Feld wird dann ausgeblendet (Score-basiert, nicht MM-basiert)
    const isPwmMode = (m.inputTab === 'sequences' || m.inputTab === 'prodoric');
    mmInp.style.display = isPwmMode ? 'none' : '';
    mmUnit.style.display = isPwmMode ? 'none' : '';
    linkIcon.style.display = isPwmMode ? 'none' : '';

    // Kontext-Text
    if (isPwmMode) {
      // Im PWM-Modus: keine MM-Übersetzung sinnvoll
      ctxSpan.textContent = m.inputTab === 'sequences'
        ? 'PWM aus Sequenzen (IC × f)'
        : 'PWM aus PRODORIC';
    } else {
      ctxSpan.textContent = ctx.txt;
    }
    if (m.inputTab === 'consensus_space' && m.searchSpace) {
      ctxExtraSpan.textContent = '→ max ' + maxHardMm + ' Hard-MM oder ' + halfPoints + ' Soft-MM (Datenraum)';
      ctxExtraSpan.style.display = 'block';
    } else {
      ctxExtraSpan.style.display = 'none';
    }

    updateMotifPreview(m.id);
  };

  // Initiale Werte
  pctInp.value = (m.scoreThreshold * 100).toFixed(1).replace(/\.0$/, '');
  mmInp.value = m.mismatches !== undefined ? m.mismatches : 0;

  pctInp.addEventListener('input', () => {
    if (updating) return;
    let v = parseFloat(pctInp.value);
    if (isNaN(v)) return;
    if (v > 100) v = 100;
    if (v < 0) v = 0;
    m.scoreThreshold = v / 100;
    refreshFromThreshold('pct');
  });
  mmInp.addEventListener('input', () => {
    if (updating) return;
    let v = parseInt(mmInp.value, 10);
    if (isNaN(v)) return;
    if (v < 0) v = 0;
    // Aus MM in scoreThreshold umrechnen: threshold = 1 - mm/fixedLen
    const ctx = computeContext();
    const fixedLen = ctx.fixedLen;
    if (fixedLen > 0) {
      if (v > fixedLen) v = fixedLen;
      // Kleinster Threshold der noch v MM erlaubt: threshold so dass floor((1-th)*fixedLen*2) >= 2v
      // Wir setzen exakt: threshold = 1 - v/fixedLen (entspricht scoreFraction eines Treffers mit v MM)
      m.scoreThreshold = 1 - v / fixedLen;
    } else {
      m.scoreThreshold = 1.0;
    }
    refreshFromThreshold('mm');
  });

  thBox.appendChild(pctInp);
  thBox.appendChild(pctUnit);
  thBox.appendChild(linkIcon);
  thBox.appendChild(mmInp);
  thBox.appendChild(mmUnit);
  thBox.appendChild(ctxSpan);
  thBox.appendChild(ctxExtraSpan);

  // m.refreshThreshold expose, damit andere Stellen (z.B. Konsensus-Änderung) das Display refreshen können
  m._refreshThreshold = () => refreshFromThreshold(null);

  setTimeout(() => refreshFromThreshold(null), 0);

  const strandLbl = document.createElement('label');
  strandLbl.innerHTML = 'Strang <span class="info-icon" data-tt="strang">i</span>';
  const strandSel = document.createElement('select');
  for (const [v, t] of [['both', 'beide'], ['+', '+'], ['-', '−']]) {
    const o = document.createElement('option'); o.value = v; o.textContent = t;
    if (v === m.strand) o.selected = true;
    strandSel.appendChild(o);
  }
  strandSel.addEventListener('change', () => {
    m.strand = strandSel.value;
    updateMotifPreview(m.id);
  });

  const scanBtn = document.createElement('button');
  scanBtn.className = 'action scan-btn';
  scanBtn.textContent = 'Scannen';
  scanBtn.addEventListener('click', () => scanMotif(m.id));

  row3.appendChild(thLbl);
  row3.appendChild(thBox);
  row3.appendChild(strandLbl);
  row3.appendChild(strandSel);
  row3.appendChild(scanBtn);

  // Row 4: Funktion (für Set-Defaults)
  const row4 = document.createElement('div'); row4.className = 'row';
  const funcLbl = document.createElement('label');
  funcLbl.innerHTML = 'Funktion <span class="info-icon" data-tt="funktion">i</span>';
  const funcSel = document.createElement('select');
  for (const [key, def] of Object.entries(MOTIF_FUNCTIONS)) {
    const o = document.createElement('option'); o.value = key;
    o.textContent = def.label;
    if (key === (m.func || 'free')) o.selected = true;
    funcSel.appendChild(o);
  }
  funcSel.addEventListener('change', () => {
    m.func = funcSel.value;
    // Sets neu rendern, weil Default-Constraints sich potenziell ändern
    renderSets();
  });
  const funcHint = document.createElement('span');
  funcHint.style.cssText = 'color:var(--fg-mute);font-size:11px;margin-left:8px';
  funcHint.textContent = 'voreingestellte Position für Set-Analysen';
  row4.appendChild(funcLbl);
  row4.appendChild(funcSel);
  row4.appendChild(funcHint);

  // v0.4.5: Row Symmetry — Symmetrie-Modus für Inverted/Direct-Repeats
  const rowSym = document.createElement('div'); rowSym.className = 'row';
  const symLbl = document.createElement('label');
  symLbl.innerHTML = 'Motiv-Typ <span class="info-icon" data-tt="symmetrie">i</span>';
  const symSel = document.createElement('select');
  for (const [v, txt] of [['normal','Normal/seriell'], ['inverted_repeat','Inverted Repeat'], ['direct_repeat','Direct Repeat']]) {
    const o = document.createElement('option'); o.value = v; o.textContent = txt;
    if (v === (m.symmetryMode || 'normal')) o.selected = true;
    symSel.appendChild(o);
  }
  // Half-Site-Länge (nur sichtbar wenn nicht normal)
  const halfLbl = document.createElement('label');
  halfLbl.innerHTML = 'Half-Site-Länge';
  const halfInp = document.createElement('input');
  halfInp.type = 'number'; halfInp.min = 2; halfInp.max = 50; halfInp.style.width = '60px';
  halfInp.value = m.halfSiteLen || '';
  // Sichtbarkeit
  const updateSymVisibility = () => {
    const isSym = m.symmetryMode === 'inverted_repeat' || m.symmetryMode === 'direct_repeat';
    halfLbl.style.display = isSym ? '' : 'none';
    halfInp.style.display = isSym ? '' : 'none';
  };
  symSel.addEventListener('change', () => {
    m.symmetryMode = symSel.value;
    // Auto-Set Half-Site-Länge wenn nicht vorhanden
    if (m.symmetryMode !== 'normal' && !m.halfSiteLen) {
      const detected = detectSymmetryFromConsensus(m.consensus);
      if (detected.halfSiteLen) {
        m.halfSiteLen = detected.halfSiteLen;
        halfInp.value = detected.halfSiteLen;
      }
    }
    updateSymVisibility();
    // Bestehende Treffer neu annotieren
    if (m.results) {
      recomputeHitSymmetry(m);
      m.results.symmetryMode = m.symmetryMode;
      m.results.halfSiteLen = m.halfSiteLen;
      renderResults(m);
    }
  });
  halfInp.addEventListener('input', () => {
    m.halfSiteLen = parseInt(halfInp.value, 10) || null;
    if (m.results) {
      recomputeHitSymmetry(m);
      m.results.halfSiteLen = m.halfSiteLen;
      renderResults(m);
    }
  });

  // Suggestion-Hint, wenn der Konsensus auf Symmetrie hinweist und noch nicht gesetzt
  const symSuggest = document.createElement('span');
  symSuggest.style.cssText = 'font-size:11px;color:var(--accent);cursor:pointer;margin-left:8px;text-decoration:underline';
  symSuggest.id = 'sym_suggest_' + m.id;
  const updateSymSuggest = () => {
    if (m.symmetryMode !== 'normal') { symSuggest.style.display = 'none'; return; }
    const detected = detectSymmetryFromConsensus(m.consensus);
    if (detected.suggested && detected.mode !== 'normal') {
      const lbl = detected.mode === 'inverted_repeat' ? 'Inverted Repeat' : 'Direct Repeat';
      symSuggest.textContent = '↳ Konsensus sieht aus wie ' + lbl + ' — übernehmen?';
      symSuggest.style.display = '';
      symSuggest.onclick = () => {
        m.symmetryMode = detected.mode;
        m.halfSiteLen = detected.halfSiteLen;
        symSel.value = detected.mode;
        halfInp.value = detected.halfSiteLen;
        updateSymVisibility();
        symSuggest.style.display = 'none';
        if (m.results) renderResults(m);
      };
    } else {
      symSuggest.style.display = 'none';
    }
  };

  rowSym.appendChild(symLbl);
  rowSym.appendChild(symSel);
  rowSym.appendChild(halfLbl);
  rowSym.appendChild(halfInp);
  rowSym.appendChild(symSuggest);
  updateSymVisibility();
  // Initial-Suggest
  setTimeout(updateSymSuggest, 0);
  // Re-evaluate suggest when consensus changes (delegiert an updateMotifPreview)
  m._updateSymSuggest = updateSymSuggest;

  // Live-Vorschau Block
  const preview = document.createElement('div');
  preview.className = 'preview'; preview.id = 'preview_' + m.id;

  // Resultate-Block
  const results = document.createElement('div');
  results.className = 'results-section'; results.id = 'results_' + m.id;

  // Row PRODORIC-Status: MX-ID-Anzeige (auch wenn Tab nicht aktiv)
  // Wird nur angezeigt wenn Motiv aus PRODORIC stammt
  const rowProd = document.createElement('div');
  rowProd.className = 'row';
  rowProd.style.cssText = 'gap:12px;align-items:center;font-size:11px;color:var(--fg-mute);flex-wrap:wrap;margin-top:-4px';
  if (m.prodoricMx) {
    const prodLbl = document.createElement('span'); prodLbl.textContent = 'PRODORIC ' + m.prodoricMx;
    prodLbl.style.fontFamily = 'ui-monospace,monospace';
    rowProd.appendChild(prodLbl);
    if (m.prodoricOrganism) {
      const orgField = document.createElement('span');
      orgField.style.cssText = 'font-style:italic';
      orgField.textContent = '· ' + m.prodoricOrganism;
      rowProd.appendChild(orgField);
    }
  } else {
    rowProd.style.display = 'none';
  }

  // v0.4.7: Motif-Block (Diagramme links + Statistik rechts)
  const motifBlock = document.createElement('div');
  motifBlock.className = 'motif-block';
  motifBlock.id = 'motif_block_' + m.id;
  motifBlock.style.display = 'none'; // wird sichtbar wenn Daten da sind

  card.appendChild(row1);
  card.appendChild(rowProd);
  card.appendChild(row2);
  card.appendChild(row3);
  card.appendChild(row4);
  card.appendChild(rowSym);
  card.appendChild(preview);
  card.appendChild(motifBlock);
  card.appendChild(results);

  // v0.4.7: Block initial rendern
  renderMotifBlock(m);

  return card;
}

// v0.10: Helper-Funktionen für Parameter-UI (von Hairpin- und Signal-Karten genutzt).
// Bauen eine Param-Zeile mit Label, Eingabefeldern und optionalem Hint-Text.
function makeRow(labelText, inputs, hint) {
  const r = document.createElement('div'); r.className = 'param-row';
  const lbl = document.createElement('label'); lbl.textContent = labelText; lbl.className = 'param-label';
  r.appendChild(lbl);
  const inputsWrap = document.createElement('span'); inputsWrap.className = 'param-inputs';
  for (const inp of inputs) inputsWrap.appendChild(inp);
  r.appendChild(inputsWrap);
  if (hint) {
    const h = document.createElement('span'); h.className = 'param-hint';
    h.textContent = hint;
    r.appendChild(h);
  }
  return r;
}

function numInput(val, min, max, step, onChange, title) {
  const i = document.createElement('input');
  i.type = 'number'; i.value = val;
  i.min = min; i.max = max; i.step = step || 1;
  i.className = 'param-num';
  if (title) i.title = title;
  i.addEventListener('change', () => {
    const v = step && step < 1 ? parseFloat(i.value) : parseInt(i.value, 10);
    if (!isNaN(v)) onChange(v);
  });
  return i;
}

function dash() {
  const s = document.createElement('span'); s.className = 'param-dash'; s.textContent = '–'; return s;
}

// v0.10: Einheitliches Namen-Feld für alle Karten-Typen (motif/hairpin/signal).
// Erscheint oben links in der Header-Zeile, immer mit "Name"-Label davor.
// Synchronisiert beim Edit das Tab-Label.
function makeNameField(m) {
  const wrap = document.createElement('span');
  wrap.className = 'name-field';
  const lbl = document.createElement('label');
  lbl.className = 'name-label';
  lbl.textContent = 'Name';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'name-input';
  inp.value = m.name;
  inp.addEventListener('input', () => {
    m.name = inp.value;
    renderTabs();
  });
  wrap.appendChild(lbl);
  wrap.appendChild(inp);
  return wrap;
}

// v0.8: Hairpin-Karte. Eigene UI für Sekundärstruktur-Suchen (rho-unabh. Terminatoren etc.).
// Such-Algorithmus folgt in v0.8.1 — diese Karte rendert nur das Daten-Modell und UI-Skelett.
function buildHairpinCard(m) {
  const card = document.createElement('div');
  card.className = 'motif-card hairpin-card';
  card.id = 'card_' + m.id;
  // v0.10: Border-Left aus CSS (orange für Hairpin)

  // ---------- Header ----------
  const row1 = document.createElement('div'); row1.className = 'row';
  // v0.10: einheitliches Name-Feld (mit Label "Name")
  const nameField = makeNameField(m);

  const colorSwatch = document.createElement('span');
  colorSwatch.className = 'color-swatch';
  colorSwatch.style.background = m.color;
  // Hairpin-eigene Palette
  const HAIRPIN_PALETTE_INNER = ['#ff9466', '#88c468', '#bda35d', '#7d9aae', '#c98ba6', '#d68fd6'];
  const palette = document.createElement('div'); palette.className = 'palette';
  for (const c of HAIRPIN_PALETTE_INNER) {
    const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = c;
    sw.addEventListener('click', () => {
      m.color = c;
      colorSwatch.style.background = c;
      palette.classList.remove('show');
      renderTabs();
    });
    palette.appendChild(sw);
  }
  colorSwatch.addEventListener('click', () => palette.classList.toggle('show'));

  const removeBtn = document.createElement('button'); removeBtn.className = 'action danger';
  removeBtn.textContent = 'Entfernen';
  removeBtn.addEventListener('click', () => removeMotif(m.id));

  // Type-Badge: dynamisch aus aktuellem Preset
  const badge = document.createElement('span');
  badge.className = 'kind-badge';
  const updateBadge = () => {
    const presetDef = HAIRPIN_PRESETS[m.hairpin.preset] || HAIRPIN_PRESETS.rho_indep_term;
    badge.textContent = presetDef.badge;
  };
  updateBadge();

  row1.appendChild(nameField);
  row1.appendChild(colorSwatch);
  row1.appendChild(palette);
  row1.appendChild(badge);
  row1.appendChild(removeBtn);
  card.appendChild(row1);

  // ---------- Such-Parameter ----------
  const params = document.createElement('div');
  params.className = 'hairpin-params';

  // v0.10: makeRow/numInput/dash sind jetzt globale Helper (siehe oben)

  // v0.8.3d: Preset-Auswahl als erste Zeile
  // Das Wechseln eines Presets aktualisiert ALLE Parameter auf die Preset-Defaults.
  // Vorher gibt es einen Bestätigungs-Dialog, da es Verluste an manuellen Tweaks gibt.
  const presetRow = document.createElement('div'); presetRow.className = 'param-row';
  const presetLbl = document.createElement('label'); presetLbl.className = 'param-label'; presetLbl.textContent = 'Preset';
  presetRow.appendChild(presetLbl);
  const presetWrap = document.createElement('span'); presetWrap.className = 'param-inputs';
  const presetSel = document.createElement('select'); presetSel.className = 'param-num';
  presetSel.style.minWidth = '220px';
  for (const [k, v] of Object.entries(HAIRPIN_PRESETS)) {
    const o = document.createElement('option');
    o.value = k;
    o.textContent = v.label;
    if (k === m.hairpin.preset) o.selected = true;
    presetSel.appendChild(o);
  }
  presetSel.addEventListener('change', () => {
    const newPreset = presetSel.value;
    if (newPreset === m.hairpin.preset) return;
    // Vor dem Wechsel: bestätigen wenn schon manuell verändert wurde
    const ok = confirm('Preset wechseln auf "' + HAIRPIN_PRESETS[newPreset].label + '"?\nAlle Such-Parameter werden auf die Preset-Defaults zurückgesetzt.');
    if (!ok) {
      presetSel.value = m.hairpin.preset;
      return;
    }
    // Defaults aus Preset übernehmen
    const def = HAIRPIN_PRESETS[newPreset].defaults;
    m.hairpin.preset = newPreset;
    m.hairpin.minStem = def.minStem;
    m.hairpin.maxStem = def.maxStem;
    m.hairpin.minLoop = def.minLoop;
    m.hairpin.maxLoop = def.maxLoop;
    m.hairpin.dgThreshold = def.dgThreshold;
    m.hairpin.tTractEnabled = def.tTractEnabled;
    m.hairpin.tTractWindow = def.tTractWindow;
    m.hairpin.tTractMin = def.tTractMin;
    m.hairpin.allowGU = def.allowGU;
    m.hairpin.maxMismatches = def.maxMismatches;
    m.hairpin.maxBulgeLen = def.maxBulgeLen | 0;
    m.hairpin.scope = def.scope;
    m.hairpin.utrWindow = def.utrWindow;
    m.hairpin.energyModel = def.energyModel;
    // v0.10: Karte komplett neu bauen damit alle Eingabefelder die neuen Defaults zeigen
    m.results = null;
    refreshCard(m);
    renderTabs();   // Badge im Tab aktualisieren
  });
  presetWrap.appendChild(presetSel);
  presetRow.appendChild(presetWrap);
  // Preset-Beschreibung als Hint-Text darunter
  const presetDescr = document.createElement('div');
  presetDescr.className = 'preset-description';
  const updateDescr = () => {
    const p = HAIRPIN_PRESETS[m.hairpin.preset] || HAIRPIN_PRESETS.rho_indep_term;
    presetDescr.textContent = p.description;
    // v0.8.4: dna_ir hat jetzt korrekte DNA-Energien — keine Warning mehr nötig
    presetDescr.classList.remove('preset-warn');
  };
  updateDescr();
  params.appendChild(presetRow);
  params.appendChild(presetDescr);

  // Stem
  params.appendChild(makeRow('Stem-Länge',
    [
      numInput(m.hairpin.minStem, 3, 30, 1, v => { m.hairpin.minStem = v; }, 'Minimale Stem-Länge in Basenpaaren'),
      dash(),
      numInput(m.hairpin.maxStem, 3, 30, 1, v => { m.hairpin.maxStem = v; }, 'Maximale Stem-Länge in Basenpaaren'),
      (() => { const u = document.createElement('span'); u.className = 'param-unit'; u.textContent = 'bp'; return u; })()
    ],
    'Watson-Crick + GU-Wobble'));

  // Loop
  params.appendChild(makeRow('Loop-Länge',
    [
      numInput(m.hairpin.minLoop, 3, 20, 1, v => { m.hairpin.minLoop = v; }, 'Minimale Loop-Länge'),
      dash(),
      numInput(m.hairpin.maxLoop, 3, 20, 1, v => { m.hairpin.maxLoop = v; }, 'Maximale Loop-Länge'),
      (() => { const u = document.createElement('span'); u.className = 'param-unit'; u.textContent = 'nt'; return u; })()
    ],
    'Mind. 3 nt erforderlich'));

  // T-Tract — v0.8.3d: optional via Checkbox aktivierbar
  // Reihenfolge: T-Tract VOR ΔG-Schwelle (Anwender entscheidet erst ob er T-Tract sucht,
  // dann setzt er die ΔG-Schwelle für die Hairpin-Energie).
  const tTractRow = document.createElement('div'); tTractRow.className = 'param-row';
  const tTractLbl = document.createElement('label'); tTractLbl.className = 'param-label'; tTractLbl.textContent = 'T-Tract';
  tTractRow.appendChild(tTractLbl);
  const tTractWrap = document.createElement('span'); tTractWrap.className = 'param-inputs';

  const tTractCb = document.createElement('input'); tTractCb.type = 'checkbox';
  tTractCb.checked = !!m.hairpin.tTractEnabled;
  tTractCb.id = 'tTractCb_' + m.id;
  const tTractCbLbl = document.createElement('label');
  tTractCbLbl.style.cssText = 'display:inline-flex;align-items:center;gap:4px;font-size:12px;margin-right:8px';
  tTractCbLbl.htmlFor = tTractCb.id;
  tTractCbLbl.appendChild(tTractCb);
  tTractCbLbl.appendChild(document.createTextNode('aktiv'));
  tTractWrap.appendChild(tTractCbLbl);

  const tTractMinPrefix = document.createElement('span');
  tTractMinPrefix.className = 'param-prefix'; tTractMinPrefix.textContent = 'mind.';
  tTractWrap.appendChild(tTractMinPrefix);
  const tTractMinInput = numInput(m.hairpin.tTractMin, 0, 8, 1,
    v => { m.hairpin.tTractMin = v; }, 'Mindestanzahl T innerhalb des T-Tract-Fensters');
  tTractWrap.appendChild(tTractMinInput);
  const tTractInfix = document.createElement('span');
  tTractInfix.className = 'param-text'; tTractInfix.textContent = 'T in ';
  tTractWrap.appendChild(tTractInfix);
  const tTractWindowInput = numInput(m.hairpin.tTractWindow, 4, 15, 1,
    v => { m.hairpin.tTractWindow = v; }, 'Größe des T-Tract-Fensters');
  tTractWrap.appendChild(tTractWindowInput);
  const tTractUnit = document.createElement('span');
  tTractUnit.className = 'param-unit'; tTractUnit.textContent = 'nt';
  tTractWrap.appendChild(tTractUnit);

  // Enable/Disable-Logik
  const updateTTractEnabled = () => {
    const en = !!m.hairpin.tTractEnabled;
    tTractMinInput.disabled = !en;
    tTractWindowInput.disabled = !en;
    tTractMinPrefix.style.opacity = en ? '1' : '0.4';
    tTractInfix.style.opacity = en ? '1' : '0.4';
    tTractUnit.style.opacity = en ? '1' : '0.4';
  };
  updateTTractEnabled();
  tTractCb.addEventListener('change', () => {
    m.hairpin.tTractEnabled = tTractCb.checked;
    updateTTractEnabled();
  });

  tTractRow.appendChild(tTractWrap);
  const tTractHint = document.createElement('span'); tTractHint.className = 'param-hint';
  tTractHint.textContent = 'Direkt 3\' des Stems (nur Terminator-Suche)';
  tTractRow.appendChild(tTractHint);
  params.appendChild(tTractRow);

  // ΔG (jetzt nach T-Tract)
  params.appendChild(makeRow('ΔG-Schwelle',
    [
      numInput(m.hairpin.dgThreshold, -50, 0, 0.5, v => { m.hairpin.dgThreshold = v; }, 'Stem-ΔG ≤ dieser Wert'),
      (() => { const u = document.createElement('span'); u.className = 'param-unit'; u.textContent = 'kcal/mol'; return u; })()
    ],
    'Negativer = stabiler Stem'));

  // Suchbereich
  const scopeRow = document.createElement('div'); scopeRow.className = 'param-row';
  const scopeLbl = document.createElement('label'); scopeLbl.textContent = 'Suchbereich'; scopeLbl.className = 'param-label';
  scopeRow.appendChild(scopeLbl);
  const scopeWrap = document.createElement('span'); scopeWrap.className = 'param-inputs';
  const scopeSel = document.createElement('select'); scopeSel.className = 'param-num';
  for (const [v, t] of [['utr3', '3\'-UTR (nach Genen)'], ['utr5', '5\'-UTR (vor Genen)'], ['genome', 'Ganzes Genom']]) {
    const o = document.createElement('option'); o.value = v; o.textContent = t;
    if (v === m.hairpin.scope) o.selected = true;
    scopeSel.appendChild(o);
  }
  scopeSel.addEventListener('change', () => { m.hairpin.scope = scopeSel.value; });
  scopeWrap.appendChild(scopeSel);
  // UTR-Window Eingabe
  const utrWrap = document.createElement('span'); utrWrap.style.marginLeft = '8px'; utrWrap.className = 'param-inputs';
  const utrLbl = document.createElement('span'); utrLbl.className = 'param-text'; utrLbl.textContent = '±';
  utrWrap.appendChild(utrLbl);
  const utrInp = numInput(m.hairpin.utrWindow, 50, 1000, 50, v => { m.hairpin.utrWindow = v; }, 'Fenstergröße in bp');
  utrWrap.appendChild(utrInp);
  const utrUnit = document.createElement('span'); utrUnit.className = 'param-unit'; utrUnit.textContent = 'bp';
  utrWrap.appendChild(utrUnit);
  scopeWrap.appendChild(utrWrap);
  scopeRow.appendChild(scopeWrap);
  params.appendChild(scopeRow);

  // GU-Wobble
  const guRow = document.createElement('div'); guRow.className = 'param-row';
  const guLbl = document.createElement('label'); guLbl.className = 'param-label'; guLbl.textContent = 'Toleranzen';
  guRow.appendChild(guLbl);
  const guWrap = document.createElement('span'); guWrap.className = 'param-inputs';
  const guCb = document.createElement('input'); guCb.type = 'checkbox'; guCb.checked = !!m.hairpin.allowGU;
  guCb.addEventListener('change', () => { m.hairpin.allowGU = guCb.checked; });
  const guCbLbl = document.createElement('label'); guCbLbl.style.cssText = 'display:inline-flex;align-items:center;gap:4px;font-size:12px';
  guCbLbl.appendChild(guCb);
  guCbLbl.appendChild(document.createTextNode('G·U-Wobble erlauben'));
  guWrap.appendChild(guCbLbl);
  guRow.appendChild(guWrap);
  params.appendChild(guRow);

  // v0.8.3d: Max Mismatches im Stem
  const mmRow = document.createElement('div'); mmRow.className = 'param-row';
  const mmLbl = document.createElement('label'); mmLbl.className = 'param-label'; mmLbl.textContent = 'Stem-Mismatches';
  mmRow.appendChild(mmLbl);
  const mmWrap = document.createElement('span'); mmWrap.className = 'param-inputs';
  const mmSel = document.createElement('select');
  mmSel.style.cssText = 'font-size:12px;padding:2px 6px';
  for (const v of [0, 1]) {
    const opt = document.createElement('option');
    opt.value = String(v);
    opt.textContent = v === 0 ? '0 (perfekt)' : '1 (1×1-Mismatch erlaubt)';
    if ((m.hairpin.maxMismatches | 0) === v) opt.selected = true;
    mmSel.appendChild(opt);
  }
  mmSel.addEventListener('change', () => {
    m.hairpin.maxMismatches = parseInt(mmSel.value, 10) || 0;
  });
  mmWrap.appendChild(mmSel);
  const mmHint = document.createElement('span');
  mmHint.style.cssText = 'font-size:11px;color:var(--fg-mute);margin-left:8px';
  mmHint.textContent = '1 = ein einzelner MM in Stem-Mitte; bewertet mit int11-Energie';
  mmWrap.appendChild(mmHint);
  mmRow.appendChild(mmWrap);
  params.appendChild(mmRow);

  // v0.8.3d: Max Bulge-Länge im Stem
  const buRow = document.createElement('div'); buRow.className = 'param-row';
  const buLbl = document.createElement('label'); buLbl.className = 'param-label'; buLbl.textContent = 'Stem-Bulges';
  buRow.appendChild(buLbl);
  const buWrap = document.createElement('span'); buWrap.className = 'param-inputs';
  const buSel = document.createElement('select');
  buSel.style.cssText = 'font-size:12px;padding:2px 6px';
  for (const v of [0, 1, 2, 3]) {
    const opt = document.createElement('option');
    opt.value = String(v);
    opt.textContent = v === 0 ? 'kein Bulge' : 'max ' + v + ' nt';
    if ((m.hairpin.maxBulgeLen | 0) === v) opt.selected = true;
    buSel.appendChild(opt);
  }
  buSel.addEventListener('change', () => {
    m.hairpin.maxBulgeLen = parseInt(buSel.value, 10) || 0;
  });
  buWrap.appendChild(buSel);
  const buHint = document.createElement('span');
  buHint.style.cssText = 'font-size:11px;color:var(--fg-mute);margin-left:8px';
  buHint.textContent = 'Single-Bulge: ungepaarte Bases auf einer Stem-Seite';
  buWrap.appendChild(buHint);
  buRow.appendChild(buWrap);
  params.appendChild(buRow);

  card.appendChild(params);

  // ---------- Aktions-Zeile ----------
  const actionRow = document.createElement('div'); actionRow.className = 'row hairpin-action-row';
  const scanBtn = document.createElement('button');
  scanBtn.className = 'action scan-btn';
  scanBtn.textContent = 'Scannen';
  scanBtn.addEventListener('click', () => scanMotif(m.id));
  actionRow.appendChild(scanBtn);

  card.appendChild(actionRow);

  // ---------- Ergebnis-Container ----------
  const resBlock = document.createElement('div');
  resBlock.id = 'motif_block_' + m.id;  // konsistent mit Motiv-Karten
  resBlock.className = 'motif-block';
  card.appendChild(resBlock);

  const resRoot = document.createElement('div');
  resRoot.id = 'results_' + m.id;       // konsistent mit Motiv-Karten
  resRoot.className = 'results-section';
  card.appendChild(resRoot);

  return card;
}

// v0.9: Strukturmotiv-Karte (continuous score track + peaks)
function buildStructureCard(m) {
  const card = document.createElement('div');
  card.className = 'motif-card structure-card';
  card.id = 'card_' + m.id;
  // v0.10: Border-Left aus CSS (blau für Structure)

  // ---------- Header ----------
  const row1 = document.createElement('div'); row1.className = 'row';
  // v0.10: einheitliches Name-Feld (mit Label "Name")
  const nameField = makeNameField(m);

  const colorSwatch = document.createElement('span');
  colorSwatch.className = 'color-swatch';
  colorSwatch.style.background = m.color;
  const STRUCT_PALETTE = ['#7da5cc', '#b88dca', '#5fb5b5', '#d49a6a', '#9d8fd1', '#cd7d9a'];
  const palette = document.createElement('div'); palette.className = 'palette';
  for (const c of STRUCT_PALETTE) {
    const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = c;
    sw.addEventListener('click', () => {
      m.color = c;
      colorSwatch.style.background = c;
      // v0.10: kein borderLeftColor-Override mehr
      palette.classList.remove('show');
      renderTabs();
    });
    palette.appendChild(sw);
  }
  colorSwatch.addEventListener('click', () => palette.classList.toggle('show'));

  const removeBtn = document.createElement('button'); removeBtn.className = 'action danger';
  removeBtn.textContent = 'Entfernen';
  removeBtn.addEventListener('click', () => removeMotif(m.id));

  const badge = document.createElement('span');
  badge.className = 'kind-badge';
  const updateBadge = () => {
    const def = STRUCTURE_ALGORITHMS[m.structure.algorithm] || STRUCTURE_ALGORITHMS.curvature;
    badge.textContent = def.badge;
  };
  updateBadge();

  row1.appendChild(nameField);
  row1.appendChild(colorSwatch);
  row1.appendChild(palette);
  row1.appendChild(badge);
  row1.appendChild(removeBtn);
  card.appendChild(row1);

  // ---------- Algorithm-Auswahl ----------
  const params = document.createElement('div');
  params.className = 'param-grid';

  // Algorithm-Dropdown
  const algoRow = document.createElement('div'); algoRow.className = 'param-row';
  const algoLbl = document.createElement('label'); algoLbl.className = 'param-label'; algoLbl.textContent = 'Algorithmus';
  const algoSel = document.createElement('select');
  algoSel.style.cssText = 'padding:4px 8px;background:var(--bg-elevated);color:var(--fg);border:1px solid var(--border);border-radius:3px;font-family:inherit;font-size:13px;flex:1';
  for (const [k, v] of Object.entries(STRUCTURE_ALGORITHMS)) {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = v.label;
    if (k === m.structure.algorithm) opt.selected = true;
    algoSel.appendChild(opt);
  }
  algoSel.addEventListener('change', () => {
    const newAlgo = algoSel.value;
    const def = STRUCTURE_ALGORITHMS[newAlgo].defaults;
    m.structure.algorithm = newAlgo;
    m.structure.windowSize = def.windowSize;
    m.structure.stepSize = def.stepSize;
    m.structure.peakThreshold = def.peakThreshold;
    m.structure.minThreshold = def.minThreshold;
    m.structure.peakTypes = [...def.peakTypes];
    m.results = null;
    refreshCard(m);
    renderTabs();   // v0.10: Tab-Anzeige aktualisieren
  });
  algoRow.appendChild(algoLbl);
  algoRow.appendChild(algoSel);
  params.appendChild(algoRow);

  // Beschreibungs-Zeile
  const descrRow = document.createElement('div');
  descrRow.className = 'preset-descr';
  descrRow.style.cssText = 'font-size:11px;color:var(--fg-mute);padding:4px 8px;line-height:1.4;font-style:italic';
  const updateDescr = () => {
    const def = STRUCTURE_ALGORITHMS[m.structure.algorithm] || STRUCTURE_ALGORITHMS.curvature;
    descrRow.textContent = def.description;
  };
  updateDescr();
  params.appendChild(descrRow);

  // Window-Größe
  params.appendChild(makeRow('Window-Größe',
    [
      numInput(m.structure.windowSize, 10, 500, 5, v => { m.structure.windowSize = v; }, 'Größe des Sliding-Window in bp'),
      (() => { const u = document.createElement('span'); u.className = 'param-unit'; u.textContent = 'bp'; return u; })()
    ],
    'Größeres Window = glattere Kurve, weniger lokale Auflösung'));

  // Step-Größe
  params.appendChild(makeRow('Step-Größe',
    [
      numInput(m.structure.stepSize, 1, 50, 1, v => { m.structure.stepSize = v; }, 'Auflösung des Score-Tracks in bp'),
      (() => { const u = document.createElement('span'); u.className = 'param-unit'; u.textContent = 'bp'; return u; })()
    ],
    'Niedriger = höhere Auflösung, langsamerer Scan'));

  // Peak-Typen-Auswahl (Checkboxen) — abhängig vom Algorithmus
  const peakTypeRow = document.createElement('div'); peakTypeRow.className = 'param-row';
  const peakTypeLbl = document.createElement('label'); peakTypeLbl.className = 'param-label'; peakTypeLbl.textContent = 'Peak-Typen';
  peakTypeRow.appendChild(peakTypeLbl);
  const peakTypeWrap = document.createElement('span'); peakTypeWrap.className = 'param-inputs';
  peakTypeWrap.style.cssText = 'flex-wrap:wrap;gap:10px';

  const PEAK_TYPE_LABELS = {
    'maximum': 'Lok. Maxima',
    'minimum': 'Lok. Minima',
    'inflection-down': 'Wendepunkt (fallend)'
  };
  const PEAK_TYPE_TOOLTIPS = {
    'maximum': 'Lokale Maxima — höchste Score-Werte (typisch für gekrümmte Region, A-Tract-Phasing)',
    'minimum': 'Lokale Minima — niedrigste Score-Werte (typisch für aufschmelzbare Promoter -10-Zone)',
    'inflection-down': 'Wendepunkt mit fallender Steigung (konvex→konkav, Wert sinkt) — TSS-Indikator-Kandidat'
  };

  // Verfügbare Typen aus dem aktuellen Algorithmus
  const availTypes = STRUCTURE_ALGORITHMS[m.structure.algorithm].availablePeakTypes || ['maximum'];
  for (const pt of availTypes) {
    const lbl = document.createElement('label');
    lbl.style.cssText = 'display:inline-flex;align-items:center;gap:4px;font-size:12px;cursor:pointer';
    lbl.title = PEAK_TYPE_TOOLTIPS[pt] || pt;
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = m.structure.peakTypes.includes(pt);
    cb.addEventListener('change', () => {
      if (cb.checked) {
        if (!m.structure.peakTypes.includes(pt)) m.structure.peakTypes.push(pt);
      } else {
        m.structure.peakTypes = m.structure.peakTypes.filter(t => t !== pt);
      }
      // Min-Threshold-Sichtbarkeit aktualisieren
      updateThresholdVisibility();
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(PEAK_TYPE_LABELS[pt] || pt));
    peakTypeWrap.appendChild(lbl);
  }
  peakTypeRow.appendChild(peakTypeWrap);
  const peakTypeHint = document.createElement('span');
  peakTypeHint.className = 'param-hint';
  peakTypeHint.textContent = 'Welche Punkte als Treffer markieren';
  peakTypeRow.appendChild(peakTypeHint);
  params.appendChild(peakTypeRow);

  // Max-Threshold (für Maxima/Inflection)
  const maxThreshRow = makeRow('Max-Threshold',
    [
      numInput(m.structure.peakThreshold, 0, 1000, 0.1, v => { m.structure.peakThreshold = v; }, 'Mindest-Score für Maxima (und Mindest-Steigung-Magnitude für Wendepunkte)')
    ],
    'Lokale Maxima ≥ dieser Schwelle werden gelistet');

  // Min-Threshold (für Minima)
  const minThreshRow = makeRow('Min-Threshold',
    [
      numInput(
        m.structure.minThreshold !== null && m.structure.minThreshold !== undefined ? m.structure.minThreshold : 1.0,
        -1000, 1000, 0.1,
        v => { m.structure.minThreshold = v; },
        'Maximal-Score für Minima (Werte unter dieser Schwelle gelten als Treffer)'
      )
    ],
    'Lokale Minima ≤ dieser Schwelle werden gelistet');

  params.appendChild(maxThreshRow);
  params.appendChild(minThreshRow);

  // Sichtbarkeits-Logik: Max-Threshold nur wenn maximum oder inflection-down aktiv,
  // Min-Threshold nur wenn minimum aktiv
  function updateThresholdVisibility() {
    const hasMax = m.structure.peakTypes.includes('maximum') ||
                   m.structure.peakTypes.includes('inflection-down');
    const hasMin = m.structure.peakTypes.includes('minimum');
    maxThreshRow.style.display = hasMax ? '' : 'none';
    minThreshRow.style.display = hasMin ? '' : 'none';
  }
  updateThresholdVisibility();

  card.appendChild(params);

  // ---------- Scan-Button ----------
  const actionRow = document.createElement('div'); actionRow.className = 'row';
  const scanBtn = document.createElement('button');
  scanBtn.className = 'action scan-btn';
  scanBtn.textContent = 'Scannen';
  scanBtn.addEventListener('click', () => scanMotif(m.id));
  actionRow.appendChild(scanBtn);
  card.appendChild(actionRow);

  // ---------- Ergebnis-Block ----------
  const resRoot = document.createElement('div');
  resRoot.id = 'results_' + m.id;
  resRoot.className = 'results-section';
  card.appendChild(resRoot);

  return card;
}

// Helper: re-rendert eine Karte komplett (used by structure-card algorithm-change)
function refreshCard(m) {
  const oldCard = document.getElementById('card_' + m.id);
  if (!oldCard) return;
  const newCard = buildMotifCard(m);
  oldCard.parentNode.replaceChild(newCard, oldCard);
  if (m.results) renderResults(m);
}

// v0.4.7: Rendert den Motif-Block (Diagramme + Statistik) in der Motiv-Card
// Wird aufgerufen wenn Daten sich ändern (Sequenzen, Konsensus, Scan-Results)
function renderMotifBlock(m) {
  // v0.8: Hairpin-Karten haben kein Konsensus-Block; Ergebnisanzeige läuft separat
  if (m.kind === 'hairpin') return;
  // v0.9: Strukturmotiv-Karten haben kein Konsensus-Block
  if (m.kind === 'structure') return;
  const root = document.getElementById('motif_block_' + m.id);
  if (!root) return;

  // Verfügbare Diagramme bestimmen
  const der = m.derivedFromSequences;
  const hasMatrices = !!(der && der.ok && der.matrices);
  const norm = normalizeConsensus(m.consensus);
  const hasSpacerInputs = hasMatrices && der.matrices.spacerLengths && der.matrices.spacerLengths.length > 0;

  // v0.4.7.2: Block sichtbar sobald Konsensus definiert ist (Statistik live).
  // Vorher: nur bei Matrizen oder Treffern.
  if (!norm.ok && !hasMatrices && !m.results) {
    root.style.display = 'none';
    return;
  }
  root.style.display = '';

  // Linke Spalte: Diagramme
  let diagramHtml = '';
  if (hasMatrices) {
    // Tabs
    if (!m._activeMbTab) m._activeMbTab = 'logo';
    const tabs = [
      { k: 'logo', label: 'Logo' },
      { k: 'freq', label: 'Frequenzen' }
    ];
    if (hasSpacerInputs) tabs.push({ k: 'spacer', label: 'Spacer' });
    if (!tabs.find(t => t.k === m._activeMbTab)) m._activeMbTab = tabs[0].k;
    diagramHtml += '<div class="mb-tabs">';
    for (const t of tabs) {
      diagramHtml += '<button class="mb-tab-btn' + (t.k === m._activeMbTab ? ' active' : '') + '" data-mbtab="' + t.k + '" data-mid="' + m.id + '">' + t.label + '</button>';
    }
    diagramHtml += '</div>';
    diagramHtml += '<div class="mb-diagram-area">';
    if (m._activeMbTab === 'logo') {
      const blocks = buildLogoBlocks(m);
      if (blocks) {
        // Frequenz-Matrizen aus den Counts ableiten
        const blocksFreq = blocks.map(b => {
          if (b.type === 'fixed') return { ...b, matrix: countsToFrequency(b.matrix) };
          return b;
        });
        diagramHtml += renderSequenceLogoSVG(null, { blocks: blocksFreq, width: 410, height: 150 });
      } else {
        diagramHtml += '<div class="mb-empty-msg">Keine Matrix-Daten</div>';
      }
    } else if (m._activeMbTab === 'freq') {
      const blocks = buildLogoBlocks(m);
      if (blocks) {
        diagramHtml += renderFrequencyChartHTML(blocks);
      } else {
        diagramHtml += '<div class="mb-empty-msg">Keine Matrix-Daten</div>';
      }
    } else if (m._activeMbTab === 'spacer') {
      if (hasSpacerInputs) {
        diagramHtml += renderSpacerHistogramSVG(der.matrices.spacerLengths, { width: 410, height: 150 });
      } else {
        diagramHtml += '<div class="mb-empty-msg">Kein Spacer in Eingabe-Sequenzen</div>';
      }
    }
    diagramHtml += '</div>';
    if (der.n) {
      diagramHtml += '<div style="margin-top:6px;color:var(--fg-mute);font-size:11px">' + der.n + ' Eingabesequenzen' + (der.skipped ? ' (' + der.skipped + ' verworfen)' : '') + '</div>';
    }
  } else {
    diagramHtml = '<div class="mb-empty-msg">Diagramme sind verfügbar wenn Sequenzen oder PRODORIC-Daten geladen werden.</div>';
  }

  // Rechte Spalte: Statistik
  let statsHtml = '';
  const hasResults = !!(m.results && m.results.hits);
  let blockedScan = false;
  // v0.5: PWM-Modus erkennen (Tab oder Result)
  const isPwmMode = m.inputTab === 'sequences' || m.inputTab === 'prodoric';
  if (norm.ok) {
    // Konsensus-Echo plus pre-scan-Statistik
    const fixedLen = fixedPositionCount(norm.blocks);
    statsHtml += '<span class="k">Konsensus</span><span class="v">' + escapeHtml(norm.canonical) + '</span>';
    // Länge
    let mn = 0, mx = 0;
    for (const b of norm.blocks) {
      if (b.type === 'fixed') { mn += b.seq.length; mx += b.seq.length; }
      else { mn += b.min; mx += b.max; }
    }
    statsHtml += '<span class="k">Länge</span><span class="v">' + (mn === mx ? mn + ' bp' : mn + '–' + mx + ' bp') + '</span>';
    // Spacer-Längen-Kombinationen
    if (norm.hasSpacer) {
      let spacerCombos = 1;
      for (const b of norm.blocks) if (b.type === 'spacer') spacerCombos *= (b.max - b.min + 1);
      statsHtml += '<span class="k">Spacer-Komb.</span><span class="v">' + spacerCombos + '</span>';
    }
    // Erwartung + Varianten + Spezifität nur im Konsensus-/+Datenraum-Modus,
    // nicht bei PWM (wo Score kontinuierlich ist und MM-basierte Statistik nicht sinnvoll ist)
    if (mf.genome && mf.twobit && !isPwmMode) {
      const maxMm = m.scoreThreshold !== undefined ? Math.floor((1 - m.scoreThreshold) * fixedLen + 1e-9) : 0;
      const expected = expectedHitsForMotif(norm, maxMm, mf.genome.composition, mf.genome.length, m.strand === 'both');
      // Varianten-Berechnung (Hamming-Distanz ≤ maxMm), IUPAC-aware
      let mPerPos = [];
      for (const b of norm.blocks) {
        if (b.type === 'fixed') {
          for (const c of b.seq) {
            const arr = IUPAC[c] || ['A','C','G','T'];
            mPerPos.push(arr.length);
          }
        }
      }
      const lFixed = mPerPos.length;
      const kMax = Math.min(maxMm, lFixed);
      let fVariants = new Array(kMax + 1).fill(0);
      fVariants[0] = 1;
      for (let i = 0; i < lFixed; i++) {
        const mi = mPerPos[i];
        const ni = 4 - mi;
        const fNew = new Array(kMax + 1).fill(0);
        for (let j = 0; j <= kMax; j++) {
          if (fVariants[j] === 0) continue;
          fNew[j] += fVariants[j] * mi;
          if (j + 1 <= kMax) fNew[j + 1] += fVariants[j] * ni;
        }
        fVariants = fNew;
      }
      let variants = 0;
      for (let j = 0; j <= kMax; j++) variants += fVariants[j];

      // Ampel
      let ampel, label;
      if (expected < 500)        { ampel = 'green';  label = 'spezifisch'; }
      else if (expected < 5000)  { ampel = 'yellow'; label = 'moderat'; }
      else if (expected < 50000) { ampel = 'orange'; label = 'unspezifisch'; }
      else                       { ampel = 'red';    label = 'zu unspezifisch'; }

      statsHtml += '<span class="k">Zufallserwartung <span class="info-icon" data-tt="zufall">i</span></span><span class="v">' +
                  (expected < 1 ? expected.toFixed(2) : Math.round(expected).toLocaleString('de-DE')) + ' Treffer</span>';
      statsHtml += '<span class="k">Varianten (Hamming ≤ ' + maxMm + ')</span><span class="v">' + variants.toLocaleString('de-DE') + '</span>';
      statsHtml += '<span class="k">Spezifität</span><span><span class="ampel ' + ampel + '">' + label + '</span></span>';

      if (ampel === 'red' && !m.forceScan) {
        blockedScan = true;
        statsHtml += '<div style="grid-column:span 2;margin-top:6px;color:var(--err);font-size:11px">Scan blockiert. ' +
                    '<button class="action" id="override_block_' + m.id + '">Trotzdem scannen</button></div>';
      }
    } else if (isPwmMode) {
      // PWM-Modus: zeige PWM-Info statt Erwartung
      const pwmInfo = m.inputTab === 'sequences'
        ? (m.derivedFromSequences && m.derivedFromSequences.ok
            ? m.derivedFromSequences.n + ' Sequenzen'
            : 'keine Daten')
        : (m.prodoricPwm
            ? 'PRODORIC, max-Score ' + m.prodoricPwm.maxScore.toFixed(2)
            : 'keine PWM');
      statsHtml += '<span class="k">PWM-Quelle</span><span class="v">' + pwmInfo + '</span>';
    }
  }
  if (hasResults) {
    const r = m.results;
    const obs = r.hits.length;
    statsHtml += '<span class="k">Gefunden</span><span class="v">' + obs.toLocaleString('de-DE') + '</span>';
    if (r.expected !== null && r.expected !== undefined) {
      const exp = r.expected;
      const ratio = exp > 0 ? obs / exp : 0;
      const log2r = (obs > 0 && exp > 0) ? Math.log2(ratio) : null;
      const z = exp > 0 ? (obs - exp) / Math.sqrt(exp) : 0;
      let ratioLabel = ratio >= 1 ? 'Anreicherung' : 'Verarmung';
      statsHtml += '<span class="k">' + ratioLabel + ' <span class="info-icon" data-tt="anreicherung">i</span></span><span class="v">' +
                  ratio.toFixed(2) + '× ' + (log2r !== null ? '(log₂ ' + (log2r >= 0 ? '+' : '') + log2r.toFixed(2) + ')' : '') +
                  '</span>';
      statsHtml += '<span class="k">Z-Score <span class="info-icon" data-tt="zscore">i</span></span><span class="v">' + (isFinite(z) ? z.toFixed(2) : '—') + '</span>';
    }
    statsHtml += '<span class="k">Scan-Dauer</span><span class="v">' + r.scanDurationMs + ' ms</span>';
  }

  root.innerHTML =
    (hasMatrices
      ? '<div class="mb-diagrams">' + diagramHtml + '</div>'
      : '') +
    '<div class="mb-stats">' + statsHtml + '</div>';

  // Tab-Handler
  for (const btn of root.querySelectorAll('.mb-tab-btn')) {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.mbtab;
      m._activeMbTab = tab;
      renderMotifBlock(m);
    });
  }
  // Override-Button
  if (blockedScan) {
    const ovBtn = document.getElementById('override_block_' + m.id);
    if (ovBtn) ovBtn.addEventListener('click', () => {
      m.forceScan = true;
      renderMotifBlock(m);
    });
  }
}

function updateMotifPreview(id) {
  const m = motifs.find(x => x.id === id);
  if (!m) return;
  // v0.8: Hairpin-Karten haben keine Konsensus-Vorschau
  if (m.kind === 'hairpin') return;
  // v0.9: Strukturmotiv-Karten haben keine Konsensus-Vorschau
  if (m.kind === 'structure') return;
  // v0.4.5: Symmetrie-Suggest neu evaluieren
  if (m._updateSymSuggest) m._updateSymSuggest();
  // v0.4.7.2: Statistik wandert in motif-block; preview-Box bleibt nur leer
  const root = document.getElementById('preview_' + id);
  if (root) {
    root.innerHTML = '';
    root.style.display = 'none';
  }
  // motif-block neu rendern (zeigt Pre-Scan-Statistik live)
  renderMotifBlock(m);
  // Scan-Button enabled? (basiert auf Spezifität wenn Genom geladen)
  const card = document.getElementById('card_' + id);
  if (card && mf.genome) {
    const norm = normalizeConsensus(m.consensus);
    if (norm.ok) {
      const fixedLen = fixedPositionCount(norm.blocks);
      const maxMm = m.scoreThreshold !== undefined ? Math.floor((1 - m.scoreThreshold) * fixedLen + 1e-9) : 0;
      const expected = expectedHitsForMotif(norm, maxMm, mf.genome.composition, mf.genome.length, m.strand === 'both');
      const isRed = expected >= 50000;
      const sb = card.querySelector('.scan-btn');
      if (sb) sb.disabled = (isRed && !m.forceScan) || norm.minLen === 0;
    }
  }
}

function binomial(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  k = Math.min(k, n - k);
  let r = 1;
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
  return r;
}

// ---------- Scanner ----------
// v0.4.5: Annotiert alle bestehenden Treffer eines Motivs neu mit Symmetrie-Daten.
// Ruft analyzeHitSymmetry pro Treffer und setzt die Felder direkt am Hit.
function recomputeHitSymmetry(m) {
  if (!m.results || !m.results.hits) return;
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok) return;
  const isSym = m.symmetryMode === 'inverted_repeat' || m.symmetryMode === 'direct_repeat';
  for (const h of m.results.hits) {
    if (isSym && m.halfSiteLen) {
      const sym = analyzeHitSymmetry(h.sequence, norm.blocks, m.halfSiteLen, m.symmetryMode);
      if (sym) {
        h.symMmLeft = sym.mmLeft;
        h.symMmRight = sym.mmRight;
        h.symAsymmetry = sym.asymmetry;
        h.symSubs = sym.symSubs;
        h.asymSubs = sym.asymSubs;
        h.symHalfLeft = sym.halfLeft;
        h.symHalfRight = sym.halfRight;
      }
    } else {
      // Symmetrie-Felder löschen
      delete h.symMmLeft; delete h.symMmRight; delete h.symAsymmetry;
      delete h.symSubs; delete h.asymSubs;
      delete h.symHalfLeft; delete h.symHalfRight;
    }
  }
}

// v0.8.3d: Hairpin-Suche-Wrapper. Async mit Progress + Cancel.
//
// Während des Scans wird der Scan-Button zu "Abbrechen (X%, N Treffer)" und kann
// zum Abbrechen geklickt werden. Progress-Updates kommen pro Chunk (genome) oder
// pro 200 Gene (utr).
async function scanHairpinMotif(m) {
  // Falls schon ein Scan läuft: das ist der Cancel-Klick
  if (m._scanCancelToken && !m._scanCancelToken.cancelled) {
    m._scanCancelToken.cancelled = true;
    log('Hairpin-Suche "' + m.name + '" wird abgebrochen...', 'warn');
    return;
  }

  const cancelToken = { cancelled: false };
  m._scanCancelToken = cancelToken;

  const card = document.getElementById('card_' + m.id);
  const scanBtn = card ? card.querySelector('.scan-btn') : null;
  if (scanBtn) {
    scanBtn.classList.add('scan-running');
    scanBtn.textContent = 'Abbrechen';
  }

  const t0 = performance.now();
  log('Hairpin-Suche "' + m.name + '" gestartet — Stem ' + m.hairpin.minStem + '-' + m.hairpin.maxStem +
      ' bp, Loop ' + m.hairpin.minLoop + '-' + m.hairpin.maxLoop +
      ' nt, ΔG ≤ ' + m.hairpin.dgThreshold + ' kcal/mol' +
      (m.hairpin.tTractEnabled ? ', T-Tract ≥ ' + m.hairpin.tTractMin + '/' + m.hairpin.tTractWindow : ', T-Tract aus') +
      ', Scope: ' + m.hairpin.scope +
      (m.hairpin.maxBulgeLen > 0 ? ', Bulges ≤ ' + m.hairpin.maxBulgeLen : '') +
      (m.hairpin.maxMismatches > 0 ? ', MMs ≤ ' + m.hairpin.maxMismatches : ''), 'info');

  // Progress-Callback: aktualisiert Scan-Button-Text
  const onProgress = (done, total, hitsCount) => {
    if (!scanBtn) return;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    scanBtn.textContent = 'Abbrechen (' + pct + '%, ' + hitsCount + ' Treffer)';
  };

  try {
    // Kurze Pause damit Button-Update sichtbar ist
    await new Promise(r => setTimeout(r, 0));

    const result = await runHairpinScan(m, mf.twobit, mf.genome.geneIndex, onProgress, cancelToken);
    if (result.cancelled) {
      log('Hairpin-Suche "' + m.name + '" abgebrochen', 'warn');
      return;
    }
    const hits = result.hits;

    // Gen-Klassifikation pro Treffer
    for (const h of hits) {
      const cl = classifyHit(h.start, h.end, h.strand, mf.genome.geneIndex);
      h.intragenic = cl.intragenic;
      if (!h.nearestGene) h.nearestGene = cl.nearestGene;
      h.distanceToGeneStart = cl.distanceToGeneStart;
      h.strandRelToGene = cl.strandRelToGene;
      h.nearestGeneCai = cl.nearestGeneCai;
      h.nearestGeneCodonClass = cl.nearestGeneCodonClass;
      h.localEntropy = shannonEntropyAtPosition(mf.twobit, h.start - 1, h.end - 1);
    }

    m.results = {
      hits,
      kind: 'hairpin',
      scanParams: JSON.parse(JSON.stringify(m.hairpin)),
      scanTimeMs: result.scanTimeMs,
      sortBy: 'deltaG',
      sortDir: 'asc',
      filterIntergenicOnly: false,
      filterLowComplexity: false,
      selected: new Set()
    };

    const dt = ((performance.now() - t0) / 1000).toFixed(2);
    log('Hairpin-Suche "' + m.name + '": ' + hits.length + ' Treffer (' + dt + ' s)', 'ok');

    renderResults(m);
    renderTabs();
    renderGenomeMap();
    for (const s of sets) {
      if (s.motifIds.has(m.id)) updateSetStats(s, document.getElementById('set_card_' + s.id));
    }
  } catch (e) {
    log('Hairpin-Suche fehlgeschlagen: ' + e.message, 'err');
    console.error(e);
  } finally {
    m._scanCancelToken = null;
    if (scanBtn) {
      scanBtn.classList.remove('scan-running');
      scanBtn.textContent = 'Scannen';
    }
  }
}

function scanMotif(id) {
  const m = motifs.find(x => x.id === id);
  if (!m || !mf.twobit) return;
  // v0.8: Hairpin-Karten gehen einen anderen Pfad
  if (m.kind === 'hairpin') {
    return scanHairpinMotif(m);
  }
  // v0.9: Strukturmotiv-Karten
  if (m.kind === 'structure') {
    return scanStructureMotif(m);
  }
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok) return;

  // v0.5: Such-Modus aus aktivem Tab (Konsensus, +Datenraum, Sequenzen, PRODORIC)
  const tab = m.inputTab || 'consensus';
  let searchSpaceNorm = null;
  let pwmData = null;
  if (tab === 'consensus_space') {
    if (!m.searchSpace || !m.searchSpace.trim()) {
      log('Such-Modus +Datenraum: bitte Datenraum-Sequenz eingeben', 'warn');
      return;
    }
    const spNorm = normalizeConsensus(m.searchSpace);
    if (!spNorm.ok) {
      log('Datenraum-Sequenz ungültig: ' + spNorm.error, 'err');
      return;
    }
    if (spNorm.blocks.length !== norm.blocks.length) {
      log('Datenraum hat andere Block-Struktur als Konsensus (Anzahl Blöcke abweichend)', 'err');
      return;
    }
    let lengthOk = true;
    for (let i = 0; i < spNorm.blocks.length; i++) {
      if (spNorm.blocks[i].type !== norm.blocks[i].type) { lengthOk = false; break; }
      if (spNorm.blocks[i].type === 'fixed' && spNorm.blocks[i].seq.length !== norm.blocks[i].seq.length) {
        lengthOk = false; break;
      }
    }
    if (!lengthOk) {
      log('Datenraum: Block-Längen weichen vom Konsensus ab', 'err');
      return;
    }
    searchSpaceNorm = spNorm;
  } else if (tab === 'sequences') {
    // v0.5: PWM-Suche aus Sequenzen-Daten
    pwmData = buildPwmFromSequences(m);
    if (!pwmData) {
      log('Sequenzen-Suche: bitte zuerst Sequenzen eingeben', 'warn');
      return;
    }
  } else if (tab === 'prodoric') {
    // v0.5: PWM-Suche aus PRODORIC-Daten
    pwmData = buildPwmFromProdoric(m);
    if (!pwmData) {
      log('PRODORIC-Suche: keine PWM-Daten vorhanden — bitte PRODORIC-JSON laden', 'warn');
      return;
    }
  }

  const card = document.getElementById('card_' + id);
  const scanBtn = card.querySelector('.scan-btn');
  scanBtn.disabled = true;
  scanBtn.textContent = 'Scannt...';

  const t0 = performance.now();
  setTimeout(() => {
    try {
      const hits = runScan(norm, m.scoreThreshold, m.strand, mf.twobit, mf.genome.geneIndex, searchSpaceNorm, pwmData);
      // v0.4.5: Symmetrie-Annotation pro Treffer wenn Motiv Symmetrie hat
      if ((m.symmetryMode === 'inverted_repeat' || m.symmetryMode === 'direct_repeat')
          && m.halfSiteLen && m.halfSiteLen > 0) {
        for (const h of hits) {
          const sym = analyzeHitSymmetry(h.sequence, norm.blocks, m.halfSiteLen, m.symmetryMode);
          if (sym) {
            h.symMmLeft = sym.mmLeft;
            h.symMmRight = sym.mmRight;
            h.symAsymmetry = sym.asymmetry;
            h.symSubs = sym.symSubs;
            h.asymSubs = sym.asymSubs;
            h.symHalfLeft = sym.halfLeft;
            h.symHalfRight = sym.halfRight;
          }
        }
      }
      // v0.5: Log-Odds-Annotation gegen Genom-Hintergrund (nur wenn freqBlocks verfügbar)
      const freqBlocks = buildFrequencyBlocksForLogOdds(m);
      const pBg = getBackgroundFrequencies();
      if (freqBlocks && pBg) {
        for (const h of hits) {
          h.logOdds = computeHitLogOdds(h.sequence, freqBlocks, pBg);
        }
      }
      const t1 = performance.now();
      m.results = {
        hits,
        consensus: norm.canonical,
        consensusBlocks: norm.blocks,
        hasSpacer: norm.hasSpacer,
        scoreThreshold: m.scoreThreshold,
        searchMode: tab,                            // 'consensus' | 'consensus_space' | 'sequences' | 'prodoric'
        hasSearchSpace: !!searchSpaceNorm,
        hasPwm: !!pwmData,
        hasLogOdds: !!(freqBlocks && pBg),
        searchSpace: searchSpaceNorm ? searchSpaceNorm.canonical : null,
        searchSpaceBlocks: searchSpaceNorm ? searchSpaceNorm.blocks : null,
        strand: m.strand,
        symmetryMode: m.symmetryMode,
        halfSiteLen: m.halfSiteLen,
        scanDurationMs: Math.round(t1 - t0),
        expected: pwmData
          ? null  // PWM-Erwartung ist komplexer, kommt später
          : expectedHitsForMotif(norm, Math.floor((1 - m.scoreThreshold) * fixedPositionCount(norm.blocks)),
                                  mf.genome.composition, mf.genome.length, m.strand === 'both'),
        sortBy: 'start', sortDir: 'asc',
        filterIntergenicOnly: false
      };
      renderResults(m);
      renderMotifBlock(m);   // v0.4.7: Block aktualisieren mit Statistik
    } catch (err) {
      log('Scan-Fehler: ' + err.message, 'err');
      console.error(err);
    } finally {
      scanBtn.disabled = false;
      scanBtn.textContent = 'Scannen';
    }
  }, 10);
}

// Konvertiert einen fixed-Block (IUPAC-String) in ein Allowed-Mask-Array
function blockToAllowedMask(seq) {
  const out = new Uint8Array(seq.length);
  for (let i = 0; i < seq.length; i++) {
    let mask = 0;
    for (const b of IUPAC[seq[i]]) {
      if (b === 'A') mask |= 1;
      else if (b === 'C') mask |= 2;
      else if (b === 'G') mask |= 4;
      else if (b === 'T') mask |= 8;
    }
    out[i] = mask;
  }
  return out;
}

// Reverse-complement der Allowed-Maske (für Minus-Strang-Scan auf + Sequenz)
function reverseComplementMask(mask) {
  const out = new Uint8Array(mask.length);
  const COMP = [0, 8, 4, 0, 2, 0, 0, 0, 1]; // bit-Mapping: 1<->8, 2<->4
  for (let i = 0; i < mask.length; i++) {
    const m = mask[mask.length - 1 - i];
    let rc = 0;
    if (m & 1) rc |= 8;
    if (m & 2) rc |= 4;
    if (m & 4) rc |= 2;
    if (m & 8) rc |= 1;
    out[i] = rc;
  }
  return out;
}

// Reverse einer Block-Liste (für Minus-Strang): Reihenfolge gespiegelt, fixed-Blöcke revcomp.
// Spacer bleiben gleich.
function reverseBlocksForMinusStrand(blocks) {
  const reversed = [];
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.type === 'spacer') reversed.push({ type: 'spacer', min: b.min, max: b.max });
    else reversed.push({ type: 'fixed', seq: revcompString(b.seq) });
  }
  return reversed;
}

// v0.4.6: Berechnet Anzahl der fixen Positionen (für Score-Normalisierung)
function fixedPositionCount(blocks) {
  return blocks.filter(b => b.type === 'fixed')
               .reduce((s, b) => s + b.seq.length, 0);
}

// v0.4.6: Konvertiert Score-Threshold (0..1) in maximale erlaubte MM-Punkte
// (eines Score-Punkts entspricht einem Hard-MM oder zwei Soft-MM).
// scoreThreshold=1.0 → 0 MM erlaubt
// scoreThreshold=0.75 → 25% Abweichung erlaubt
function scoreThresholdToMaxMmPoints(scoreThreshold, fixedLen) {
  return Math.floor((1 - scoreThreshold) * fixedLen + 1e-9);
}

function runScan(norm, scoreThreshold, strand, twobit, geneIndex, searchSpaceNorm, pwmData) {
  // norm: { blocks, minLen, maxLen, hasSpacer, canonical } — Konsensus
  // searchSpaceNorm: optional, gleiche Struktur — Datenraum
  // scoreThreshold: 0..1
  // pwmData: optional, { blocks: [...], totalMaxScore } — PWM-Modus
  const total = twobit.length;

  // Sequenz-Bits einmal materialisieren
  const seqBits = new Uint8Array(total);
  const data = twobit.data;
  for (let i = 0; i < total; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    seqBits[i] = 1 << bits;
  }
  for (const [ns, nl] of twobit.nBlocks) {
    for (let i = ns; i < ns + nl; i++) seqBits[i] = 0;
  }

  // PWM-Modus: separater Pfad
  if (pwmData) {
    return runPwmScan(norm, pwmData, scoreThreshold, strand, twobit, geneIndex, seqBits, total);
  }

  // Anzahl fixer Positionen (für Score-Normalisierung)
  const fixedLen = fixedPositionCount(norm.blocks);
  // v0.4.7 Bug-Fix: Score-Threshold direkt in HalfPoints (Hard=2, Soft=1).
  // floor statt round damit Display und tatsächliche Schwelle exakt übereinstimmen.
  const maxMmHalfPoints = Math.floor((1 - scoreThreshold) * fixedLen * 2 + 1e-9);

  const hitsPlus = [];
  const hitsMinus = [];

  if (strand === 'both' || strand === '+') {
    scanWithBlocks(norm.blocks, seqBits, total, maxMmHalfPoints, hitsPlus, 1, searchSpaceNorm ? searchSpaceNorm.blocks : null);
  }
  if (strand === 'both' || strand === '-') {
    const rcBlocks = reverseBlocksForMinusStrand(norm.blocks);
    const rcSpaceBlocks = searchSpaceNorm ? reverseBlocksForMinusStrand(searchSpaceNorm.blocks) : null;
    scanWithBlocks(rcBlocks, seqBits, total, maxMmHalfPoints, hitsMinus, -1, rcSpaceBlocks);
  }

  // Sequenzen für alle Treffer extrahieren
  for (const h of [...hitsPlus, ...hitsMinus]) {
    const fullSeq = twobit.get(h.start - 1, h.end - h.start + 1);
    h.sequence = (h.strand === 1) ? fullSeq : revcompString(fullSeq);
    h.scoreFraction = fixedLen > 0 ? (1 - (h.mmHalfPoints / 2) / fixedLen) : 1;
    h.mismatches = Math.ceil(h.mmHalfPoints / 2);
  }

  // Dedup: Wenn + und − Treffer an gleicher Position+Länge+Spacern liegen UND
  //  die echte Sequenz selbstkomplementär ist, ist es ein echter Palindrom-Treffer
  //  (einer behalten, palindromic=true).
  // Wenn die Sequenz nicht selbstkomplementär ist (degenerierter Konsensus matcht
  //  beide Stränge unabhängig), sind es zwei legitime Treffer — beide behalten.
  const merged = [];
  const minusByKey = new Map();
  for (const h of hitsMinus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    minusByKey.set(k, h);
  }
  for (const h of hitsPlus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    if (minusByKey.has(k)) {
      // Beide Stränge liefern an gleicher Stelle einen Treffer.
      // Echte Palindromizität: hit.sequence (+ Strang Lesefolge) gleich ihrer Revcomp?
      const isTruePalindrome = (h.sequence === revcompString(h.sequence));
      if (isTruePalindrome) {
        h.palindromic = true;
        minusByKey.delete(k);
        merged.push(h);
      } else {
        // Degenerierter Konsensus matcht beide Stränge mit verschiedenen Sequenzen.
        // Beide Treffer behalten, kein palindromic-Flag.
        merged.push(h);
        // − wird unten dazugeschoben, weil noch in minusByKey
      }
    } else {
      merged.push(h);
    }
  }
  for (const h of minusByKey.values()) merged.push(h);

  // Klassifikation
  for (const h of merged) {
    const cl = classifyHit(h.start, h.end, h.strand, geneIndex);
    h.intragenic = cl.intragenic;
    h.nearestGene = cl.nearestGene;
    h.distanceToGeneStart = cl.distanceToGeneStart;
    h.strandRelToGene = cl.strandRelToGene;
    h.nearestGeneCai = cl.nearestGeneCai;             // v0.6
    h.nearestGeneCodonClass = cl.nearestGeneCodonClass; // v0.6
    h.localEntropy = shannonEntropyAtPosition(twobit, h.start - 1, h.end - 1);  // v0.7
    // Score-Felder kommen schon von runScan: scoreFraction, mismatches, softMm, hardMm
  }

  merged.sort((a, b) => a.start - b.start);
  return merged;
}

// v0.5: PWM-Scan-Pfad. Score-basiert statt Mismatch-basiert.
// pwmData: { blocks: [...], totalMaxScore }
function runPwmScan(norm, pwmData, scoreThreshold, strand, twobit, geneIndex, seqBits, total) {
  const minScoreThreshold = scoreThreshold * pwmData.totalMaxScore;

  const hitsPlus = [];
  const hitsMinus = [];

  if (strand === 'both' || strand === '+') {
    scanWithPwm(pwmData.blocks, seqBits, total, minScoreThreshold, hitsPlus, 1);
  }
  if (strand === 'both' || strand === '-') {
    const rcBlocks = reversePwmBlocksForMinusStrand(pwmData.blocks);
    scanWithPwm(rcBlocks, seqBits, total, minScoreThreshold, hitsMinus, -1);
  }

  // Sequenzen extrahieren + scoreFraction
  for (const h of [...hitsPlus, ...hitsMinus]) {
    const fullSeq = twobit.get(h.start - 1, h.end - h.start + 1);
    h.sequence = (h.strand === 1) ? fullSeq : revcompString(fullSeq);
    h.scoreFraction = pwmData.totalMaxScore > 0 ? h.pwmScore / pwmData.totalMaxScore : 1;
    h.mismatches = 0;  // Backwards-Kompat — bei PWM nicht aussagekräftig
  }

  // Dedup wie bei Konsensus
  const merged = [];
  const minusByKey = new Map();
  for (const h of hitsMinus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    minusByKey.set(k, h);
  }
  for (const h of hitsPlus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    if (minusByKey.has(k)) {
      const isTruePalindrome = (h.sequence === revcompString(h.sequence));
      if (isTruePalindrome) {
        h.palindromic = true;
        merged.push(h);
        minusByKey.delete(k);
      } else {
        h.palindromic = false;
        merged.push(h);
      }
    } else {
      h.palindromic = false;
      merged.push(h);
    }
  }
  for (const h of minusByKey.values()) {
    h.palindromic = false;
    merged.push(h);
  }

  // Klassifikation
  for (const h of merged) {
    const cl = classifyHit(h.start, h.end, h.strand, geneIndex);
    h.intragenic = cl.intragenic;
    h.nearestGene = cl.nearestGene;
    h.distanceToGeneStart = cl.distanceToGeneStart;
    h.strandRelToGene = cl.strandRelToGene;
    h.nearestGeneCai = cl.nearestGeneCai;             // v0.6
    h.nearestGeneCodonClass = cl.nearestGeneCodonClass; // v0.6
    h.localEntropy = shannonEntropyAtPosition(twobit, h.start - 1, h.end - 1);  // v0.7
  }

  merged.sort((a, b) => a.start - b.start);
  return merged;
}

// PWM-Blöcke für den Minus-Strang umdrehen.
// Reverse: positionScores [pos][A,C,G,T] → [revcomp_pos][T,G,C,A]
function reversePwmBlocksForMinusStrand(blocks) {
  const out = [];
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.type === 'spacer') {
      out.push({ type: 'spacer', min: b.min, max: b.max });
    } else {
      // Reverse positions, swap A↔T, C↔G
      const rev = [];
      const revMax = [];
      for (let p = b.positionScores.length - 1; p >= 0; p--) {
        const row = b.positionScores[p];
        // Original index: 0=A, 1=C, 2=G, 3=T
        // Revcomp: A↔T, C↔G → [T-orig, G-orig, C-orig, A-orig]
        rev.push([row[3], row[2], row[1], row[0]]);
        revMax.push(b.maxPerPos[p]);
      }
      out.push({ type: 'fixed', positionScores: rev, maxPerPos: revMax });
    }
  }
  return out;
}

// PWM-Scanner — analog zu scanWithBlocks aber mit kontinuierlichem Score
function scanWithPwm(blocks, seqBits, total, minScoreThreshold, output, strandCode) {
  // Mapping seqBits-Wert (1, 2, 4, 8) → Index (0, 1, 2, 3)
  const bitToIdx = new Int8Array(16);
  bitToIdx[1] = 0; bitToIdx[2] = 1; bitToIdx[4] = 2; bitToIdx[8] = 3;

  // Min-/Max-Längen
  let minLen = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') minLen += b.positionScores.length;
    else minLen += b.min;
  }
  const positions = total - minLen + 1;
  if (positions <= 0) return;

  // Pre-compute upper-bound für Greedy-Pruning:
  // suffixMaxScore[i] = Summe der maxPerPos aller fixed-Blöcke ab Block i
  const suffixMaxScore = new Float64Array(blocks.length + 1);
  for (let i = blocks.length - 1; i >= 0; i--) {
    suffixMaxScore[i] = suffixMaxScore[i + 1];
    if (blocks[i].type === 'fixed') {
      for (const v of blocks[i].maxPerPos) suffixMaxScore[i] += v;
    }
  }

  output.length = 0;
  for (let p = 0; p < positions; p++) {
    matchFromBlock(0, p, 0, [], p);
  }

  function matchFromBlock(blockIdx, posInGenome, scoreSoFar, spacersList, startPos) {
    if (blockIdx >= blocks.length) {
      // Treffer: gesamter Score reicht für Threshold
      output.push({
        start: startPos + 1,
        end: posInGenome,
        strand: strandCode,
        pwmScore: scoreSoFar,
        spacers: spacersList.slice()
      });
      return;
    }
    // Pruning: kann der aktuelle Score plus das maximal noch erreichbare den Threshold erreichen?
    if (scoreSoFar + suffixMaxScore[blockIdx] < minScoreThreshold) return;

    const blk = blocks[blockIdx];
    if (blk.type === 'fixed') {
      const L = blk.positionScores.length;
      if (posInGenome + L > total) return;
      let s = scoreSoFar;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[posInGenome + i];
        if (sb === 0) return; // N-Base: kein Score-Beitrag, harter Cut
        const idx = bitToIdx[sb];
        s += blk.positionScores[i][idx];
        // Pruning innerhalb des Blocks: nach diesem Schritt + verbleibender max im Block + suffix
        let remBlock = 0;
        for (let j = i + 1; j < L; j++) remBlock += blk.maxPerPos[j];
        if (s + remBlock + suffixMaxScore[blockIdx + 1] < minScoreThreshold) return;
      }
      matchFromBlock(blockIdx + 1, posInGenome + L, s, spacersList, startPos);
    } else {
      for (let len = blk.min; len <= blk.max; len++) {
        if (posInGenome + len > total) break;
        spacersList.push(len);
        matchFromBlock(blockIdx + 1, posInGenome + len, scoreSoFar, spacersList, startPos);
        spacersList.pop();
      }
    }
  }
}

// Kern-Scanner: arbeitet mit einer Block-Liste an einem geg. Strang.
// Strategie: an Position p den ersten fixed-Block versuchen → falls zu viele Mismatches, abbrechen.
// Sonst rekursiv die nächsten Blöcke (Spacer + fixed) durchtesten.
function scanWithBlocks(blocks, seqBits, total, maxMmHalfPoints, output, strandCode, spaceBlocks) {
  // v0.4.6: maxMmHalfPoints ist jetzt in halben Punkten (Hard-MM = 2, Soft-MM = 1)
  // Wenn spaceBlocks übergeben wird, wird Soft/Hard-MM unterschieden (Soft = im Datenraum).
  // Pre-compute Allowed-Masks pro fixed-Block für Konsensus
  const fixedMasks = blocks.map(b => b.type === 'fixed' ? blockToAllowedMask(b.seq) : null);
  // Pre-compute Allowed-Masks für Datenraum (nur falls vorhanden)
  const spaceMasks = spaceBlocks
    ? spaceBlocks.map(b => b.type === 'fixed' ? blockToAllowedMask(b.seq) : null)
    : null;

  // Min und Max Gesamtlänge
  let minLen = 0, maxLen = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') { minLen += b.seq.length; maxLen += b.seq.length; }
    else { minLen += b.min; maxLen += b.max; }
  }

  const positions = total - minLen + 1;
  if (positions <= 0) return;

  output.length = 0;
  for (let p = 0; p < positions; p++) {
    matchFromBlockInline(0, p, 0, 0, [], p);
  }

  // mmHalfPoints: aktuelle Punktzahl in Halben (Hard=2, Soft=1)
  // hardMm/softMm: Anzahl jeweils
