    { key: 'motifs',     lbl: 'Motiv-Treffer' },
    { key: 'gene_start', lbl: 'Gen-Start'    },
    { key: 'gene_end',   lbl: 'Gen-Ende'     },
    { key: 'gene_mid',   lbl: 'Gen-Mitte'    }
  ];
  for (const opt of anchorOpts) {
    const lbl = document.createElement('label');
    lbl.style.cssText = 'display:inline-flex;align-items:center;gap:4px;cursor:pointer';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !!s.anchor[opt.key];
    cb.addEventListener('change', () => {
      s.anchor[opt.key] = cb.checked;
      updateSetStats(s, card);
    });
    const sp = document.createElement('span'); sp.textContent = opt.lbl;
    lbl.appendChild(cb); lbl.appendChild(sp);
    anchorRow.appendChild(lbl);
  }
  const anchorHint = document.createElement('span');
  anchorHint.style.cssText = 'color:var(--fg-mute);font-size:10px;margin-left:auto';
  anchorHint.textContent = '(linkester + rechtester Wert → Mittelpunkt)';
  anchorRow.appendChild(anchorHint);
  cfg.appendChild(anchorRow);

  // Motiv-Auswahl + Constraint
  const checks = document.createElement('div'); checks.className = 'motif-checks';
  // Liste aller jemals genutzten Motive: aktuelle + gelöschte (in s.motifIds aber nicht mehr in motifs)
  const motifIdsAll = new Set(motifs.map(m => m.id));
  const usedDeletedIds = [...s.motifIds].filter(id => !motifIdsAll.has(id));
  const renderMotifRows = () => {
    checks.innerHTML = '';
    // Erst die existierenden Motive
    for (const m of motifs) {
      checks.appendChild(buildMotifRowInSet(s, m, false, card));
    }
    // Gelöschte als Greyed
    for (const delId of usedDeletedIds) {
      checks.appendChild(buildMotifRowInSet(s, { id: delId, name: '(gelöscht)', color: '#555' }, true, card));
    }
    if (motifs.length === 0 && usedDeletedIds.length === 0) {
      const hint = document.createElement('div');
      hint.style.cssText = 'color:var(--fg-mute);font-size:11px;text-align:center;padding:8px';
      hint.textContent = 'Keine Motive vorhanden';
      checks.appendChild(hint);
    }
  };
  renderMotifRows();
  cfg.appendChild(checks);

  card.appendChild(cfg);

  // Statistik (wird durch updateSetStats gefüllt)
  const stats = document.createElement('div'); stats.className = 'set-stats'; stats.id = 'stats_' + s.id;
  card.appendChild(stats);

  // Aktionen
  const actions = document.createElement('div'); actions.className = 'set-actions';
  const lociBtn = document.createElement('button');
  lociBtn.textContent = s.showLoci ? 'Loci ausblenden' : 'Loci anzeigen';
  lociBtn.addEventListener('click', () => {
    s.showLoci = !s.showLoci;
    lociBtn.textContent = s.showLoci ? 'Loci ausblenden' : 'Loci anzeigen';
    updateSetStats(s, card);
  });
  const tsvBtn = document.createElement('button');
  tsvBtn.textContent = 'TSV kopieren';
  tsvBtn.addEventListener('click', () => copySetTsv(s));
  actions.appendChild(lociBtn);
  actions.appendChild(tsvBtn);
  card.appendChild(actions);

  // Loci-Container (gefüllt in updateSetStats)
  const loci = document.createElement('div'); loci.id = 'loci_' + s.id;
  card.appendChild(loci);

  // Initial-Stats
  setTimeout(() => updateSetStats(s, card), 0);

  return card;
}

function buildMotifRowInSet(s, m, isDeleted, card) {
  const row = document.createElement('div'); row.className = 'motif-row';
  const lbl = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.checked = s.motifIds.has(m.id);
  if (isDeleted) cb.disabled = true;
  cb.addEventListener('change', () => {
    if (cb.checked) s.motifIds.add(m.id); else s.motifIds.delete(m.id);
    if (cb.checked && !s.constraints[m.id]) {
      s.constraints[m.id] = constraintFromFunction(m);
    }
    updateSetStats(s, card);
  });
  const dot = document.createElement('span');
  dot.className = 'motif-color'; dot.style.background = m.color;
  const nm = document.createElement('span');
  nm.textContent = m.name + (m.results ? ' (' + m.results.hits.length + ')' : '');
  if (isDeleted) nm.className = 'motif-name-deleted';
  lbl.appendChild(cb); lbl.appendChild(dot); lbl.appendChild(nm);
  row.appendChild(lbl);

  // Constraint-Editor
  if (!isDeleted) {
    const c = s.constraints[m.id] || constraintFromFunction(m);
    s.constraints[m.id] = c;
    const cstr = document.createElement('div'); cstr.className = 'constraint';
    const anchorSel = document.createElement('select');
    for (const [v, t] of [['free','frei'], ['gene_start','Gen-Start'], ['gene_end','Gen-Ende']]) {
      const o = document.createElement('option'); o.value = v; o.textContent = t;
      if (v === c.anchor) o.selected = true;
      anchorSel.appendChild(o);
    }
    anchorSel.addEventListener('change', () => {
      c.anchor = anchorSel.value;
      renderRangeInputs();
      updateSetStats(s, card);
    });
    cstr.appendChild(anchorSel);
    const rangeSpan = document.createElement('span');
    cstr.appendChild(rangeSpan);

    const renderRangeInputs = () => {
      rangeSpan.innerHTML = '';
      if (c.anchor === 'free') {
        const lbl = document.createElement('span'); lbl.className = 'free'; lbl.textContent = ' irgendwo';
        rangeSpan.appendChild(lbl);
        return;
      }
      const span1 = document.createElement('span'); span1.textContent = ' von ';
      const fromInp = document.createElement('input');
      fromInp.type = 'number'; fromInp.value = c.from; fromInp.step = 10;
      fromInp.addEventListener('input', () => {
        c.from = parseInt(fromInp.value, 10) || 0;
        updateSetStats(s, card);
      });
      const span2 = document.createElement('span'); span2.textContent = ' bis ';
      const toInp = document.createElement('input');
      toInp.type = 'number'; toInp.value = c.to; toInp.step = 10;
      toInp.addEventListener('input', () => {
        c.to = parseInt(toInp.value, 10) || 0;
        updateSetStats(s, card);
      });
      const span3 = document.createElement('span'); span3.textContent = ' bp ';
      rangeSpan.appendChild(span1); rangeSpan.appendChild(fromInp);
      rangeSpan.appendChild(span2); rangeSpan.appendChild(toInp);
      rangeSpan.appendChild(span3);

      // Strang-Modus
      const strandSel = document.createElement('select');
      strandSel.title = 'Strang-abhängig: Treffer-Strang muss Gen-Strang entsprechen.\n' +
                        'Strang-neutral: Treffer auf beiden Strängen wirksam (z.B. CtsR-Repressor).';
      for (const [v, t] of [['strand_dependent','strangabh.'], ['strand_neutral','strangneutr.']]) {
        const o = document.createElement('option'); o.value = v; o.textContent = t;
        if (v === (c.strandMode || 'strand_dependent')) o.selected = true;
        strandSel.appendChild(o);
      }
      strandSel.addEventListener('change', () => {
        c.strandMode = strandSel.value;
        updateSetStats(s, card);
      });
      rangeSpan.appendChild(strandSel);
    };
    renderRangeInputs();
    row.appendChild(cstr);
  }
  return row;
}

// ----- Cluster-Algorithmus -----
// Nimmt Treffer aus den ausgewählten Motiven, sortiert nach Position,
// gruppiert in Cluster wenn Abstand <= windowBp
function buildClustersForSet(s) {
  const allHits = [];
  for (const motifId of s.motifIds) {
    const m = motifs.find(x => x.id === motifId);
    if (!m || !m.results) continue;
    for (const h of m.results.hits) {
      allHits.push({ ...h, motifId: motifId });
    }
  }
  if (allHits.length === 0) return { clusters: [], totalHits: 0 };
  // Sortiere nach Mitte des Treffers
  allHits.sort((a, b) => {
    const ca = (a.start + a.end) / 2;
    const cb = (b.start + b.end) / 2;
    return ca - cb;
  });
  const clusters = [];
  let cur = null;
  for (const h of allHits) {
    const center = (h.start + h.end) / 2;
    if (cur && (center - cur.lastCenter) <= s.windowBp) {
      cur.hits.push(h);
      cur.lastCenter = center;
      cur.minPos = Math.min(cur.minPos, h.start);
      cur.maxPos = Math.max(cur.maxPos, h.end);
      cur.motifSet.add(h.motifId);
    } else {
      if (cur) clusters.push(cur);
      cur = {
        hits: [h], lastCenter: center,
        minPos: h.start, maxPos: h.end,
        motifSet: new Set([h.motifId])
      };
    }
  }
  if (cur) clusters.push(cur);
  return { clusters, totalHits: allHits.length };
}

// Filter: prüft ob jeder Treffer im Cluster seinen Constraint erfüllt.
// Constraint ist erfüllt wenn ein Gen existiert, das den Anker definiert,
// und die Distanz im erlaubten Bereich liegt.
function clusterPassesConstraints(cluster, s) {
  for (const motifId of cluster.motifSet) {
    const c = s.constraints[motifId];
    if (!c || c.anchor === 'free') continue; // kein Constraint
    const strandMode = c.strandMode || 'strand_dependent';
    // Mindestens ein Treffer dieses Motivs muss den Constraint erfüllen
    let anyOk = false;
    for (const h of cluster.hits) {
      if (h.motifId !== motifId) continue;
      const dist = computeDistanceToAnchor(h, c.anchor, strandMode);
      if (dist === null) continue;
      if (dist >= c.from && dist <= c.to) { anyOk = true; break; }
    }
    if (!anyOk) return false;
  }
  return true;
}

// Distanz: relativ zum Gen-Strang
// gene_start: vorzeichenbehaftet, negativ = upstream
// gene_end: vorzeichenbehaftet, positiv = downstream
//
// strandMode 'strand_dependent': nur Gene berücksichtigt, deren Strang dem Treffer-Strang entspricht
// strandMode 'strand_neutral': alle Gene werden berücksichtigt, Treffer-Strang ignoriert
function computeDistanceToAnchor(hit, anchor, strandMode) {
  const genes = mf.genome.geneIndex;
  const hitMid = (hit.start + hit.end) / 2;
  let bestDist = null, bestAbs = Infinity;
  for (const g of genes) {
    // Strang-Filter
    if (strandMode === 'strand_dependent' && g.strand !== hit.strand) continue;
    let anchorPos, sign;
    if (anchor === 'gene_start') {
      anchorPos = (g.strand === 1) ? g.start : g.end;
      sign = (g.strand === 1) ? 1 : -1;
    } else if (anchor === 'gene_end') {
      anchorPos = (g.strand === 1) ? g.end : g.start;
      sign = (g.strand === 1) ? 1 : -1;
    } else return null;
    const rawDist = sign * (hitMid - anchorPos);
    if (Math.abs(rawDist) < bestAbs) { bestAbs = Math.abs(rawDist); bestDist = rawDist; }
  }
  return bestDist;
}

// v0.4.1: Anker-Bereich für Panel berechnen
// Sammelt alle Koordinaten der angekreuzten Anker-Elemente,
// gibt linkesten und rechtesten Wert zurück (oder null wenn nichts).
function computeClusterAnchorRange(cluster, s) {
  const coords = [];
  if (s.anchor.motifs) {
    for (const h of cluster.hits) coords.push((h.start + h.end) / 2);
  }
  // Gen-bezogene Anker
  if (s.anchor.gene_start || s.anchor.gene_end || s.anchor.gene_mid) {
    const genes = mf.genome.geneIndex || [];
    const cMin = cluster.minPos, cMax = cluster.maxPos;
    for (const g of genes) {
      // Schneidet das Gen den Cluster-Bereich überhaupt?
      // Gen-Mitte: Gen muss überlappen mit Cluster
      // Gen-Start/Ende: nur wenn der Anker selbst im Cluster liegt
      if (s.anchor.gene_start) {
        const gs = (g.strand === 1) ? g.start : g.end;
        if (gs >= cMin && gs <= cMax) coords.push(gs);
      }
      if (s.anchor.gene_end) {
        const ge = (g.strand === 1) ? g.end : g.start;
        if (ge >= cMin && ge <= cMax) coords.push(ge);
      }
      if (s.anchor.gene_mid) {
        // Überlappung mit Cluster
        if (g.end >= cMin && g.start <= cMax) {
          coords.push((g.start + g.end) / 2);
        }
      }
    }
  }
  if (coords.length === 0) {
    // Fallback: Cluster-Mittelpunkt
    return { min: cluster.minPos, max: cluster.maxPos };
  }
  return { min: Math.min(...coords), max: Math.max(...coords) };
}

// Berechnet Profil-Statistik: Map<profile-string, {hits, loci}>
function computeSetStats(s) {
  const { clusters, totalHits } = buildClustersForSet(s);
  // Erst Constraint-Filter, dann Mindest-Motive-Filter
  const validClusters = clusters.filter(c => {
    if (!clusterPassesConstraints(c, s)) return false;
    if (c.motifSet.size < (s.minMotifs || 1)) return false;
    return true;
  });
  const profileMap = new Map();
  for (const c of validClusters) {
    const profile = [...c.motifSet].sort().join('|');
    if (!profileMap.has(profile)) profileMap.set(profile, { hits: 0, loci: 0, motifSet: c.motifSet });
    const p = profileMap.get(profile);
    p.hits += c.hits.length;
    p.loci += 1;
  }
  return { totalHits, validClusters, profileMap, allClusters: clusters };
}

// Profil-Statistik: wieviele 2^N - 1 Profile insgesamt, wieviele mit ≥minMotifs Motiven
function computeProfileCounts(s) {
  const N = s.motifIds.size;
  if (N === 0) return { total: 0, valid: 0 };
  const total = (1 << N) - 1;  // 2^N - 1
  let valid = 0;
  for (let mask = 1; mask <= total; mask++) {
    let bits = 0;
    for (let b = 0; b < N; b++) if (mask & (1 << b)) bits++;
    if (bits >= (s.minMotifs || 1)) valid++;
  }
  return { total, valid };
}

function updateSetStats(s, card) {
  const stats = card.querySelector('#stats_' + s.id);
  const lociWrap = card.querySelector('#loci_' + s.id);
  const profInfo = card.querySelector('#profile_info_' + s.id);
  if (!stats) return;
  // Profil-Info immer aktualisieren
  if (profInfo) {
    const pc = computeProfileCounts(s);
    if (pc.total === 0) profInfo.textContent = '';
    else profInfo.textContent = 'Profile: ' + pc.valid + ' / ' + pc.total;
  }
  stats.innerHTML = '';
  if (s.motifIds.size === 0) {
    stats.innerHTML = '<div style="color:var(--fg-mute);text-align:center;padding:8px">Keine Motive ausgewählt</div>';
    if (lociWrap) lociWrap.innerHTML = '';
    return;
  }
  const { totalHits, validClusters, profileMap } = computeSetStats(s);
  const totalLoci = validClusters.length;

  // Total
  const totalRow = document.createElement('div');
  totalRow.className = 'stat-row stat-total';
  const totalLbl = document.createElement('span'); totalLbl.className = 'label';
  totalLbl.textContent = 'Loci insgesamt';
  const totalVal = document.createElement('span'); totalVal.className = 'value';
  totalVal.textContent = totalLoci.toLocaleString('de-DE') + ' (' + totalHits.toLocaleString('de-DE') + ' Treffer)';
  totalRow.appendChild(totalLbl); totalRow.appendChild(totalVal);
  stats.appendChild(totalRow);

  // Profile (sortiert: nach Anzahl Motive im Profil aufsteigend, dann nach Loci absteigend)
  const profileEntries = [...profileMap.entries()];
  profileEntries.sort((a, b) => {
    const da = a[0].split('|').length, db = b[0].split('|').length;
    if (da !== db) return da - db;
    return b[1].loci - a[1].loci;
  });
  for (const [profile, info] of profileEntries) {
    const row = document.createElement('div'); row.className = 'stat-row';
    const lbl = document.createElement('span'); lbl.className = 'label';
    const sw = document.createElement('span'); sw.className = 'swatches';
    const motifIdsArr = profile.split('|');
    for (const mid of motifIdsArr) {
      const m = motifs.find(x => x.id === mid);
      const dot = document.createElement('span'); dot.className = 'swatch-dot';
      dot.style.background = m ? m.color : '#555';
      sw.appendChild(dot);
    }
    lbl.appendChild(sw);
    const names = motifIdsArr.map(mid => {
      const m = motifs.find(x => x.id === mid);
      return m ? m.name : '(gelöscht)';
    }).join(' + ');
    const text = document.createTextNode(names);
    lbl.appendChild(text);
    row.appendChild(lbl);
    const val = document.createElement('span'); val.className = 'value';
    val.textContent = info.loci.toLocaleString('de-DE') + ' Loci · ' + info.hits.toLocaleString('de-DE') + ' Treffer';
    row.appendChild(val);
    stats.appendChild(row);
  }

  // Loci-Drill-Down
  if (lociWrap) {
    lociWrap.innerHTML = '';
    if (s.showLoci) {
      lociWrap.appendChild(buildLociTable(s, validClusters, card));
    }
  }
}

function lociKey(c) {
  return c.minPos + ':' + c.maxPos + ':' + [...c.motifSet].sort().join(',');
}

function sortLoci(clusters, sortBy, sortDir) {
  const dir = (sortDir === 'asc') ? 1 : -1;
  const out = clusters.slice();
  out.sort((a, b) => {
    let av, bv;
    switch (sortBy) {
      case 'minPos':  av = a.minPos; bv = b.minPos; break;
      case 'length':  av = (a.maxPos - a.minPos); bv = (b.maxPos - b.minPos); break;
      case 'profile': av = [...a.motifSet].sort().join(','); bv = [...b.motifSet].sort().join(','); break;
      case 'hits':    av = a.hits.length; bv = b.hits.length; break;
      case 'gene':    av = (a.hits[0].nearestGene || ''); bv = (b.hits[0].nearestGene || ''); break;
      default:        av = a.minPos; bv = b.minPos;
    }
    if (typeof av === 'string') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });
  return out;
}

function buildLociTable(s, clusters, card) {
  const wrap = document.createElement('div');
  if (clusters.length === 0) {
    wrap.style.cssText = 'color:var(--fg-mute);text-align:center;padding:8px;font-size:11px';
    wrap.textContent = 'Keine Loci';
    return wrap;
  }

  // Sortierung anwenden
  const sorted = sortLoci(clusters, s.sortBy, s.sortDir);

  // Tabellen-Container: scrollbar
  const tableWrap = document.createElement('div');
  tableWrap.style.cssText = 'max-height:400px;overflow-y:auto;overflow-x:auto;border:1px solid var(--border);border-radius:4px;background:var(--bg)';
  const t = document.createElement('table'); t.className = 'set-loci-table';
  t.style.width = '100%';
  const thead = document.createElement('thead');
  const trh = document.createElement('tr');

  // Master-Selektion
  const thSel = document.createElement('th');
  thSel.style.width = '24px'; thSel.style.padding = '4px';
  const masterCb = document.createElement('input'); masterCb.type = 'checkbox';
  masterCb.title = 'Alle / keine';
  thSel.appendChild(masterCb);
  trh.appendChild(thSel);

  // Spalten
  const cols = [
    { k: 'profile',  t: 'Profil' },
    { k: 'minPos',   t: 'Position' },
    { k: 'length',   t: 'Länge' },
    { k: 'hits',     t: 'Treffer' },
    { k: 'gene',     t: 'nächstes Gen' }
  ];
  for (const c of cols) {
    const th = document.createElement('th');
    th.dataset.sort = c.k;
    th.style.cursor = 'pointer';
    let txt = c.t;
    if (s.sortBy === c.k) txt += ' ' + (s.sortDir === 'asc' ? '↑' : '↓');
    th.textContent = txt;
    th.addEventListener('click', () => {
      if (s.sortBy === c.k) s.sortDir = (s.sortDir === 'asc') ? 'desc' : 'asc';
      else { s.sortBy = c.k; s.sortDir = 'asc'; }
      updateSetStats(s, card);
    });
    trh.appendChild(th);
  }
  thead.appendChild(trh);
  // Sticky-Header in Scroll-Container
  thead.style.position = 'sticky';
  thead.style.top = '0';
  thead.style.background = 'var(--bg)';
  t.appendChild(thead);

  const tbody = document.createElement('tbody');
  // Limit
  const LIMIT = 1000;
  const showClusters = sorted.slice(0, LIMIT);

  // Selektion vorbereiten
  if (!s.selectedLoci) s.selectedLoci = new Set();
  const allKeys = showClusters.map(lociKey);
  const allChecked = allKeys.length > 0 && allKeys.every(k => s.selectedLoci.has(k));
  const someChecked = allKeys.some(k => s.selectedLoci.has(k));
  masterCb.checked = allChecked;
  masterCb.indeterminate = !allChecked && someChecked;
  masterCb.addEventListener('change', () => {
    if (masterCb.checked) for (const k of allKeys) s.selectedLoci.add(k);
    else for (const k of allKeys) s.selectedLoci.delete(k);
    updateSetStats(s, card);
  });

  for (const c of showClusters) {
    const tr = document.createElement('tr');
    const k = lociKey(c);
    // Selektion
    const tdSel = document.createElement('td');
    tdSel.style.padding = '3px 4px'; tdSel.style.textAlign = 'center';
    const cb = document.createElement('input'); cb.type = 'checkbox';
    cb.checked = s.selectedLoci.has(k);
    cb.addEventListener('change', () => {
      if (cb.checked) s.selectedLoci.add(k); else s.selectedLoci.delete(k);
      // Panels neu rendern, ohne ganze Tabelle neu zu malen
      updateSetPanels(s, card);
      // Master-Cb-Status updaten
      const ck = allKeys.every(x => s.selectedLoci.has(x));
      masterCb.checked = ck;
      masterCb.indeterminate = !ck && allKeys.some(x => s.selectedLoci.has(x));
    });
    tdSel.appendChild(cb);
    tr.appendChild(tdSel);

    // Profil (Bonbons)
    const tdProf = document.createElement('td');
    const profileDots = document.createElement('span'); profileDots.className = 'profile-dots';
    for (const mid of [...c.motifSet].sort()) {
      const m = motifs.find(x => x.id === mid);
      const dot = document.createElement('span'); dot.className = 'profile-dot';
      dot.style.background = m ? m.color : '#555';
      dot.title = m ? m.name : '(gelöscht)';
      profileDots.appendChild(dot);
    }
    tdProf.appendChild(profileDots);
    tr.appendChild(tdProf);

    // Position
    const tdPos = document.createElement('td');
    tdPos.textContent = c.minPos.toLocaleString('de-DE') + '–' + c.maxPos.toLocaleString('de-DE');
    tr.appendChild(tdPos);

    // Länge
    const tdLen = document.createElement('td');
    tdLen.textContent = (c.maxPos - c.minPos + 1) + ' bp';
    tr.appendChild(tdLen);

    // Treffer
    const tdHits = document.createElement('td');
    tdHits.textContent = c.hits.length;
    tr.appendChild(tdHits);

    // Gen
    const tdGene = document.createElement('td');
    tdGene.textContent = c.hits[0].nearestGene || '—';
    tr.appendChild(tdGene);

    tbody.appendChild(tr);
  }
  if (sorted.length > LIMIT) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 6;
    td.style.cssText = 'text-align:center;color:var(--fg-mute);font-style:italic';
    td.textContent = '... ' + (sorted.length - LIMIT).toLocaleString('de-DE') + ' weitere Loci ausgeblendet';
    tr.appendChild(td); tbody.appendChild(tr);
  }
  t.appendChild(tbody);
  tableWrap.appendChild(t);
  wrap.appendChild(tableWrap);

  // Panel-Sektion (für Loci)
  const panelWrap = document.createElement('div');
  panelWrap.id = 'set_panels_' + s.id;
  panelWrap.style.cssText = 'margin-top:10px';
  wrap.appendChild(panelWrap);

  // Initialer Panel-Render
  setTimeout(() => updateSetPanels(s, card, sorted), 0);

  return wrap;
}

// Panels für Loci eines Sets
function updateSetPanels(s, card, sortedClustersOpt) {
  const panelWrap = card.querySelector('#set_panels_' + s.id);
  if (!panelWrap) return;
  // Sortiert nehmen falls übergeben, sonst neu computen
  let sorted = sortedClustersOpt;
  if (!sorted) {
    const { validClusters } = computeSetStats(s);
    sorted = sortLoci(validClusters, s.sortBy, s.sortDir);
  }
  panelWrap.innerHTML = '';

  // Auswahl: alle selektierten, sonst Top 10
  let toShow;
  if (s.selectedLoci && s.selectedLoci.size > 0) {
    toShow = sorted.filter(c => s.selectedLoci.has(lociKey(c)));
  } else {
    toShow = sorted.slice(0, 10);
  }
  if (toShow.length === 0) {
    panelWrap.innerHTML = '<div style="color:var(--fg-mute);text-align:center;padding:8px;font-size:11px">Keine Loci im Panel-Bereich</div>';
    return;
  }

  // Header
  const head = document.createElement('div');
  head.style.cssText = 'display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--fg-dim);margin-bottom:6px';
  const t1 = document.createElement('span');
  t1.textContent = (s.selectedLoci.size > 0)
    ? 'Panels (' + s.selectedLoci.size + ' selektiert)'
    : 'Panels (Top ' + toShow.length + ' nach Sortierung)';
  head.appendChild(t1);
  // Schwebender Maßstab kommt vom Set-Panel-Renderer pro Locus, weil jedes Locus eine andere Spannweite hat
  panelWrap.appendChild(head);

  const list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px';
  panelWrap.appendChild(list);

  const PANEL_HEIGHT = 50;
  for (const c of toShow) {
    const row = document.createElement('div');
    row.style.cssText = 'position:relative;background:var(--bg-elevated);border-radius:3px;overflow:hidden;height:' + PANEL_HEIGHT + 'px';
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'display:block;width:100%;height:100%';
    row.appendChild(canvas);
    const label = document.createElement('div');
    label.style.cssText = 'position:absolute;top:2px;left:6px;font-size:10px;color:var(--fg-mute);font-family:ui-monospace,monospace;pointer-events:none;text-shadow:0 0 3px var(--bg-elevated)';
    const profileNames = [...c.motifSet].sort().map(mid => {
      const m = motifs.find(x => x.id === mid);
      return m ? m.name : '?';
    }).join('+');
    label.textContent = c.minPos.toLocaleString('de-DE') + ' [' + profileNames + '] ' + (c.hits[0].nearestGene || '');
    row.appendChild(label);
    list.appendChild(row);

    requestAnimationFrame(() => {
      const w = row.clientWidth;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = PANEL_HEIGHT * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = PANEL_HEIGHT + 'px';
      drawSetPanel(canvas, c, s);
      // v0.7.2: Hover-Tooltips für Gene und Motiv-Marker
      attachHoverHandlers(canvas);
    });
  }
}

// Panel-Renderer für Set-Locus
function drawSetPanel(canvas, cluster, s) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  ctx.clearRect(0, 0, cssW, cssH);

  // v0.7.2: hitMap für Hover-Tooltips initialisieren
  canvas._hitMap = [];

  // Anker-Bereich aus Set-Auswahl
  const range = computeClusterAnchorRange(cluster, s);
  // Spannweite + 200 bp Puffer links und rechts
  let leftBound = Math.max(1, range.min - 200);
  let rightBound = Math.min(mf.genome.length, range.max + 200);
  // Falls gleicher Wert (nur ein Anker), 500 bp Default
  if (rightBound - leftBound < 100) {
    const center = (leftBound + rightBound) / 2;
    leftBound = Math.max(1, center - 500);
    rightBound = Math.min(mf.genome.length, center + 500);
  }
  const winSize = rightBound - leftBound + 1;
  const bp2px = (bp) => ((bp - leftBound) / winSize) * cssW;

  // Hintergrund
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0, 0, cssW, cssH);

  const midY = cssH / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(cssW, midY); ctx.stroke();

  // Gene
  const genes = mf.genome.geneIndex || [];
  const geneH = 12;
  const arrowLen = 5;
  for (const g of genes) {
    if (g.end < leftBound || g.start > rightBound) continue;
    const gx0 = bp2px(Math.max(g.start, leftBound));
    const gx1 = bp2px(Math.min(g.end, rightBound));
    const gw = Math.max(2, gx1 - gx0);
    const gy = midY - geneH / 2;
    const fillColor = g.strand === 1 ? 'rgba(122,184,245,0.55)' : 'rgba(255,183,77,0.55)';
    ctx.fillStyle = fillColor;
    ctx.strokeStyle = g.strand === 1 ? 'rgba(122,184,245,0.9)' : 'rgba(255,183,77,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    if (g.strand === 1) {
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx0, gy);
      ctx.lineTo(gx1 - tipLen, gy);
      ctx.lineTo(gx1, gy + geneH / 2);
      ctx.lineTo(gx1 - tipLen, gy + geneH);
      ctx.lineTo(gx0, gy + geneH);
      ctx.closePath();
    } else {
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx1, gy);
      ctx.lineTo(gx0 + tipLen, gy);
      ctx.lineTo(gx0, gy + geneH / 2);
      ctx.lineTo(gx0 + tipLen, gy + geneH);
      ctx.lineTo(gx1, gy + geneH);
      ctx.closePath();
    }
    ctx.fill(); ctx.stroke();
    // v0.7.2: Gen für Hover-Tooltip speichern
    canvas._hitMap.push({
      x: gx0, y: gy, w: gw, h: geneH,
      type: 'gene',
      data: g
    });
    if (gw > 30) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '9px ui-monospace, monospace';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      ctx.fillText(g.name || '?', gx0 + 3, midY);
    }
  }

  // Motiv-Marker (alle sichtbaren Motive im Set, nicht nur die im Cluster — kontextueller)
  const markerY = midY - geneH / 2 - 5;
  const markerH = 4;
  for (const motifId of s.motifIds) {
    const m = motifs.find(x => x.id === motifId);
    if (!m || !m.results) continue;
    if (m.visibleInOverview === false) continue;
    for (const h of m.results.hits) {
      if (h.end < leftBound || h.start > rightBound) continue;
      const x0 = bp2px(Math.max(h.start, leftBound));
      const x1 = bp2px(Math.min(h.end, rightBound));
      const w = Math.max(2, x1 - x0);
      const inCluster = cluster.hits.some(ch => ch.motifId === motifId && ch.start === h.start && ch.end === h.end);
      ctx.fillStyle = m.color;
      ctx.globalAlpha = inCluster ? 1.0 : 0.4;
      ctx.fillRect(x0, markerY - markerH / 2, w, markerH);
      // Strang-Indikator
      ctx.beginPath();
      if (h.strand === 1) {
        ctx.moveTo(x1, markerY - markerH / 2);
        ctx.lineTo(x1 + 3, markerY);
        ctx.lineTo(x1, markerY + markerH / 2);
      } else {
        ctx.moveTo(x0, markerY - markerH / 2);
        ctx.lineTo(x0 - 3, markerY);
        ctx.lineTo(x0, markerY + markerH / 2);
      }
      ctx.closePath();
      ctx.fill();
      // Cluster-Marker mit weißem Rahmen
      if (inCluster) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(x0 - 0.5, markerY - markerH / 2 - 0.5, w + 1, markerH + 1);
      }
      // v0.7.2: Motiv-Hit für Tooltip-Hit-Test (mit Padding für leichteren Tap)
      const padY = 4;
      canvas._hitMap.push({
        x: x0 - 1, y: markerY - markerH / 2 - padY,
        w: w + 2, h: markerH + 2 * padY,
        type: 'motif',
        data: { motif: m, hit: h }
      });
    }
    ctx.globalAlpha = 1;
  }

  // Anker-Markierungen (Linien) für sichtbar gemachte Anker
  ctx.strokeStyle = 'rgba(122,184,245,0.6)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 2]);
  // Linkester und rechtester Anker
  for (const x of [bp2px(range.min), bp2px(range.max)]) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, cssH);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Mittelpunkts-Linie etwas heller
  const centerBp = (range.min + range.max) / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  const cx = bp2px(centerBp);
  ctx.moveTo(cx, 0); ctx.lineTo(cx, cssH);
  ctx.stroke();
}

function copySetTsv(s) {
  const { validClusters } = computeSetStats(s);
  const lines = ['#pos_start\tpos_end\tlength_bp\tprofile\thit_count\tnearest_gene'];
  for (const c of validClusters) {
    const profile = [...c.motifSet].sort().map(mid => {
      const m = motifs.find(x => x.id === mid);
      return m ? m.name : '(deleted)';
    }).join('+');
    lines.push([
      c.minPos, c.maxPos, c.maxPos - c.minPos + 1, profile, c.hits.length,
      c.hits[0].nearestGene || ''
    ].join('\t'));
  }
  const tsv = lines.join('\n');
  navigator.clipboard.writeText(tsv).then(
    () => log('Set-TSV in Zwischenablage (' + validClusters.length + ' Loci)', 'info'),
    () => log('TSV-Kopieren fehlgeschlagen', 'error')
  );
}

  panes['consensus'] = paneConsensus;

  panes['sequences'] = paneSeqs;
  panes['prodoric'] = paneProd;

  // Container für die Tabs
  const inputContainer = document.createElement('div');
  inputContainer.appendChild(tabBar);
  for (const def of tabDefs) inputContainer.appendChild(panes[def.id]);
  // row2 ist jetzt der inputContainer
  const row2 = inputContainer;

  // Row 3: Threshold (linked %/MM), Strand, Scan
  const row3 = document.createElement('div'); row3.className = 'row';
  // v0.4.7.1: Zwei verbundene Zahlenfelder mit Link-Icon
  const thLbl = document.createElement('label');
  thLbl.innerHTML = 'Threshold <span class="info-icon" data-tt="threshold">i</span>';
  // Migration: wenn nur 'mismatches' aber kein 'scoreThreshold', oder noch Default 1.0
  if (m.scoreThreshold === undefined || m.scoreThreshold === null) {
    m.scoreThreshold = 1.0;
  }

  // Container
  const thBox = document.createElement('span');
  thBox.className = 'threshold-linked';

  const pctInp = document.createElement('input');
  pctInp.type = 'number'; pctInp.min = 0; pctInp.max = 100; pctInp.step = 0.1;

  const pctUnit = document.createElement('span');
  pctUnit.className = 'unit'; pctUnit.textContent = '%';

  // Link-Icon: zwei verschränkte Ringe als SVG
  const linkIcon = document.createElement('span');
  linkIcon.className = 'link-icon';
  linkIcon.title = 'Verkettet — Änderung eines Wertes aktualisiert den anderen';
  linkIcon.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none">' +
    '<circle cx="5" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/>' +
    '<circle cx="9" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/>' +
    '</svg>';

  const mmInp = document.createElement('input');
  mmInp.type = 'number'; mmInp.min = 0; mmInp.step = 1;

  const mmUnit = document.createElement('span');
  mmUnit.className = 'unit'; mmUnit.textContent = 'MM';

  const ctxSpan = document.createElement('span');
  ctxSpan.className = 'ctx';

  const ctxExtraSpan = document.createElement('span');
  ctxExtraSpan.className = 'ctx';
  ctxExtraSpan.style.display = 'block';
  ctxExtraSpan.style.flexBasis = '100%';

  // Synchronisations-Funktionen
  // setThresholdFromPct: User hat Prozent eingegeben → MM-Feld aktualisieren
  // setThresholdFromMm: User hat MM eingegeben → Prozent-Feld aktualisieren
  // computeContext: Kontext-Text mit fixedLen
  let updating = false;  // Verhindert Endlos-Schleife

  const flashField = (el) => {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 400);
  };

  const computeContext = () => {
    const norm = normalizeConsensus(m.consensus);
    if (!norm.ok) return { fixedLen: 0, txt: 'Konsensus eingeben' };
    const fixedLen = fixedPositionCount(norm.blocks);
    return { fixedLen, txt: 'bei ' + fixedLen + ' fixen Pos.' };
  };

  const refreshFromThreshold = (sourceField) => {
    // m.scoreThreshold ist authoritativ; aktualisiere die Felder die nicht der source sind
    const ctx = computeContext();
    const fixedLen = ctx.fixedLen;
    const pct = m.scoreThreshold * 100;
    // halfPoints und MM aus scoreThreshold
    const halfPoints = fixedLen > 0 ? Math.floor((1 - m.scoreThreshold) * fixedLen * 2 + 1e-9) : 0;
    const maxHardMm = Math.floor(halfPoints / 2);
    // Backwards-kompat: m.mismatches setzen
    m.mismatches = maxHardMm;

    updating = true;
    if (sourceField !== 'pct') {
      pctInp.value = pct.toFixed(1).replace(/\.0$/, '');
      if (sourceField === 'mm') flashField(pctInp);
    }
    if (sourceField !== 'mm') {
      mmInp.value = maxHardMm;
      if (sourceField === 'pct') flashField(mmInp);
    }
    updating = false;

    // v0.5: PWM-Modus erkennen — MM-Feld wird dann ausgeblendet (Score-basiert, nicht MM-basiert)
    const isPwmMode = (m.inputTab === 'sequences' || m.inputTab === 'prodoric');
    mmInp.style.display = isPwmMode ? 'none' : '';
    mmUnit.style.display = isPwmMode ? 'none' : '';
    linkIcon.style.display = isPwmMode ? 'none' : '';

    // Kontext-Text
    if (isPwmMode) {
      // Im PWM-Modus: keine MM-Übersetzung sinnvoll
      ctxSpan.textContent = m.inputTab === 'sequences'
        ? 'PWM aus Sequenzen (IC × f)'
        : 'PWM aus PRODORIC';
    } else {
      ctxSpan.textContent = ctx.txt;
    }
    if (m.inputTab === 'consensus_space' && m.searchSpace) {
      ctxExtraSpan.textContent = '→ max ' + maxHardMm + ' Hard-MM oder ' + halfPoints + ' Soft-MM (Datenraum)';
      ctxExtraSpan.style.display = 'block';
    } else {
      ctxExtraSpan.style.display = 'none';
    }

    updateMotifPreview(m.id);
  };

  // Initiale Werte
  pctInp.value = (m.scoreThreshold * 100).toFixed(1).replace(/\.0$/, '');
  mmInp.value = m.mismatches !== undefined ? m.mismatches : 0;

  pctInp.addEventListener('input', () => {
    if (updating) return;
    let v = parseFloat(pctInp.value);
    if (isNaN(v)) return;
    if (v > 100) v = 100;
    if (v < 0) v = 0;
    m.scoreThreshold = v / 100;
    refreshFromThreshold('pct');
  });
  mmInp.addEventListener('input', () => {
    if (updating) return;
    let v = parseInt(mmInp.value, 10);
    if (isNaN(v)) return;
    if (v < 0) v = 0;
    // Aus MM in scoreThreshold umrechnen: threshold = 1 - mm/fixedLen
    const ctx = computeContext();
    const fixedLen = ctx.fixedLen;
    if (fixedLen > 0) {
      if (v > fixedLen) v = fixedLen;
      // Kleinster Threshold der noch v MM erlaubt: threshold so dass floor((1-th)*fixedLen*2) >= 2v
      // Wir setzen exakt: threshold = 1 - v/fixedLen (entspricht scoreFraction eines Treffers mit v MM)
      m.scoreThreshold = 1 - v / fixedLen;
    } else {
      m.scoreThreshold = 1.0;
    }
    refreshFromThreshold('mm');
  });

  thBox.appendChild(pctInp);
  thBox.appendChild(pctUnit);
  thBox.appendChild(linkIcon);
  thBox.appendChild(mmInp);
  thBox.appendChild(mmUnit);
  thBox.appendChild(ctxSpan);
  thBox.appendChild(ctxExtraSpan);

  // m.refreshThreshold expose, damit andere Stellen (z.B. Konsensus-Änderung) das Display refreshen können
  m._refreshThreshold = () => refreshFromThreshold(null);

  setTimeout(() => refreshFromThreshold(null), 0);

  const strandLbl = document.createElement('label');
  strandLbl.innerHTML = 'Strang <span class="info-icon" data-tt="strang">i</span>';
  const strandSel = document.createElement('select');
  for (const [v, t] of [['both', 'beide'], ['+', '+'], ['-', '−']]) {
    const o = document.createElement('option'); o.value = v; o.textContent = t;
    if (v === m.strand) o.selected = true;
    strandSel.appendChild(o);
  }
  strandSel.addEventListener('change', () => {
    m.strand = strandSel.value;
    updateMotifPreview(m.id);
  });

  const scanBtn = document.createElement('button');
  scanBtn.className = 'action scan-btn';
  scanBtn.textContent = 'Scan';
  scanBtn.addEventListener('click', () => scanMotif(m.id));

  row3.appendChild(thLbl);
  row3.appendChild(thBox);
  row3.appendChild(strandLbl);
  row3.appendChild(strandSel);
  row3.appendChild(scanBtn);

  // Row 4: Funktion (für Set-Defaults)
  const row4 = document.createElement('div'); row4.className = 'row';
  const funcLbl = document.createElement('label');
  funcLbl.innerHTML = 'Funktion <span class="info-icon" data-tt="funktion">i</span>';
  const funcSel = document.createElement('select');
  for (const [key, def] of Object.entries(MOTIF_FUNCTIONS)) {
    const o = document.createElement('option'); o.value = key;
    o.textContent = def.label;
    if (key === (m.func || 'free')) o.selected = true;
    funcSel.appendChild(o);
  }
  funcSel.addEventListener('change', () => {
    m.func = funcSel.value;
    // Sets neu rendern, weil Default-Constraints sich potenziell ändern
    renderSets();
  });
  const funcHint = document.createElement('span');
  funcHint.style.cssText = 'color:var(--fg-mute);font-size:11px;margin-left:8px';
  funcHint.textContent = 'voreingestellte Position für Set-Analysen';
  row4.appendChild(funcLbl);
  row4.appendChild(funcSel);
  row4.appendChild(funcHint);

  // v0.4.5: Row Symmetry — Symmetrie-Modus für Inverted/Direct-Repeats
  const rowSym = document.createElement('div'); rowSym.className = 'row';
  const symLbl = document.createElement('label');
  symLbl.innerHTML = 'Motiv-Typ <span class="info-icon" data-tt="symmetrie">i</span>';
  const symSel = document.createElement('select');
  for (const [v, txt] of [['normal','Normal/seriell'], ['inverted_repeat','Inverted Repeat'], ['direct_repeat','Direct Repeat']]) {
    const o = document.createElement('option'); o.value = v; o.textContent = txt;
    if (v === (m.symmetryMode || 'normal')) o.selected = true;
    symSel.appendChild(o);
  }
  // Half-Site-Länge (nur sichtbar wenn nicht normal)
  const halfLbl = document.createElement('label');
  halfLbl.innerHTML = 'Half-Site-Länge';
  const halfInp = document.createElement('input');
  halfInp.type = 'number'; halfInp.min = 2; halfInp.max = 50; halfInp.style.width = '60px';
  halfInp.value = m.halfSiteLen || '';
  // Sichtbarkeit
  const updateSymVisibility = () => {
    const isSym = m.symmetryMode === 'inverted_repeat' || m.symmetryMode === 'direct_repeat';
    halfLbl.style.display = isSym ? '' : 'none';
    halfInp.style.display = isSym ? '' : 'none';
  };
  symSel.addEventListener('change', () => {
    m.symmetryMode = symSel.value;
    // Auto-Set Half-Site-Länge wenn nicht vorhanden
    if (m.symmetryMode !== 'normal' && !m.halfSiteLen) {
      const detected = detectSymmetryFromConsensus(m.consensus);
      if (detected.halfSiteLen) {
        m.halfSiteLen = detected.halfSiteLen;
        halfInp.value = detected.halfSiteLen;
      }
    }
    updateSymVisibility();
    // Bestehende Treffer neu annotieren
    if (m.results) {
      recomputeHitSymmetry(m);
      m.results.symmetryMode = m.symmetryMode;
      m.results.halfSiteLen = m.halfSiteLen;
      renderResults(m);
    }
  });
  halfInp.addEventListener('input', () => {
    m.halfSiteLen = parseInt(halfInp.value, 10) || null;
    if (m.results) {
      recomputeHitSymmetry(m);
      m.results.halfSiteLen = m.halfSiteLen;
      renderResults(m);
    }
  });

  // Suggestion-Hint, wenn der Konsensus auf Symmetrie hinweist und noch nicht gesetzt
  const symSuggest = document.createElement('span');
  symSuggest.style.cssText = 'font-size:11px;color:var(--accent);cursor:pointer;margin-left:8px;text-decoration:underline';
  symSuggest.id = 'sym_suggest_' + m.id;
  const updateSymSuggest = () => {
    if (m.symmetryMode !== 'normal') { symSuggest.style.display = 'none'; return; }
    const detected = detectSymmetryFromConsensus(m.consensus);
    if (detected.suggested && detected.mode !== 'normal') {
      const lbl = detected.mode === 'inverted_repeat' ? 'Inverted Repeat' : 'Direct Repeat';
      symSuggest.textContent = '↳ Konsensus sieht aus wie ' + lbl + ' — übernehmen?';
      symSuggest.style.display = '';
      symSuggest.onclick = () => {
        m.symmetryMode = detected.mode;
        m.halfSiteLen = detected.halfSiteLen;
        symSel.value = detected.mode;
        halfInp.value = detected.halfSiteLen;
        updateSymVisibility();
        symSuggest.style.display = 'none';
        if (m.results) renderResults(m);
      };
    } else {
      symSuggest.style.display = 'none';
    }
  };

  rowSym.appendChild(symLbl);
  rowSym.appendChild(symSel);
  rowSym.appendChild(halfLbl);
  rowSym.appendChild(halfInp);
  rowSym.appendChild(symSuggest);
  updateSymVisibility();
  // Initial-Suggest
  setTimeout(updateSymSuggest, 0);
  // Re-evaluate suggest when consensus changes (delegiert an updateMotifPreview)
  m._updateSymSuggest = updateSymSuggest;

  // Live-Vorschau Block
  const preview = document.createElement('div');
  preview.className = 'preview'; preview.id = 'preview_' + m.id;

  // Resultate-Block
  const results = document.createElement('div');
  results.className = 'results-section'; results.id = 'results_' + m.id;

  // Row PRODORIC-Status: MX-ID-Anzeige (auch wenn Tab nicht aktiv)
  // Wird nur angezeigt wenn Motiv aus PRODORIC stammt
  const rowProd = document.createElement('div');
  rowProd.className = 'row';
  rowProd.style.cssText = 'gap:12px;align-items:center;font-size:11px;color:var(--fg-mute);flex-wrap:wrap;margin-top:-4px';
  if (m.prodoricMx) {
    const prodLbl = document.createElement('span'); prodLbl.textContent = 'PRODORIC ' + m.prodoricMx;
    prodLbl.style.fontFamily = 'ui-monospace,monospace';
    rowProd.appendChild(prodLbl);
    if (m.prodoricOrganism) {
      const orgField = document.createElement('span');
      orgField.style.cssText = 'font-style:italic';
      orgField.textContent = '· ' + m.prodoricOrganism;
      rowProd.appendChild(orgField);
    }
  } else {
    rowProd.style.display = 'none';
  }

  // v0.4.7: Motif-Block (Diagramme links + Statistik rechts)
  const motifBlock = document.createElement('div');
  motifBlock.className = 'motif-block';
  motifBlock.id = 'motif_block_' + m.id;
  motifBlock.style.display = 'none'; // wird sichtbar wenn Daten da sind

  card.appendChild(row1);
  card.appendChild(rowProd);
  card.appendChild(row2);
  card.appendChild(row3);
  card.appendChild(row4);
  card.appendChild(rowSym);
  card.appendChild(preview);
  card.appendChild(motifBlock);
  card.appendChild(results);

  // Wenn schon Resultate da: rendern
  if (m.results) renderResults(m);
  // v0.4.7: Block initial rendern
  renderMotifBlock(m);

  return card;
}

// v0.4.7: Rendert den Motif-Block (Diagramme + Statistik) in der Motiv-Card
// Wird aufgerufen wenn Daten sich ändern (Sequenzen, Konsensus, Scan-Results)
function renderMotifBlock(m) {
  const root = document.getElementById('motif_block_' + m.id);
  if (!root) return;

  // Verfügbare Diagramme bestimmen
  const der = m.derivedFromSequences;
  const hasMatrices = !!(der && der.ok && der.matrices);
  const norm = normalizeConsensus(m.consensus);
  const hasSpacerInputs = hasMatrices && der.matrices.spacerLengths && der.matrices.spacerLengths.length > 0;

  // v0.4.7.2: Block sichtbar sobald Konsensus definiert ist (Statistik live).
  // Vorher: nur bei Matrizen oder Treffern.
  if (!norm.ok && !hasMatrices && !m.results) {
    root.style.display = 'none';
    return;
  }
  root.style.display = '';

  // Linke Spalte: Diagramme
  let diagramHtml = '';
  if (hasMatrices) {
    // Tabs
    if (!m._activeMbTab) m._activeMbTab = 'logo';
    const tabs = [
      { k: 'logo', label: 'Logo' },
      { k: 'freq', label: 'Frequenzen' }
    ];
    if (hasSpacerInputs) tabs.push({ k: 'spacer', label: 'Spacer' });
    if (!tabs.find(t => t.k === m._activeMbTab)) m._activeMbTab = tabs[0].k;
    diagramHtml += '<div class="mb-tabs">';
    for (const t of tabs) {
      diagramHtml += '<button class="mb-tab-btn' + (t.k === m._activeMbTab ? ' active' : '') + '" data-mbtab="' + t.k + '" data-mid="' + m.id + '">' + t.label + '</button>';
    }
    diagramHtml += '</div>';
    diagramHtml += '<div class="mb-diagram-area">';
    if (m._activeMbTab === 'logo') {
      const blocks = buildLogoBlocks(m);
      if (blocks) {
        // Frequenz-Matrizen aus den Counts ableiten
        const blocksFreq = blocks.map(b => {
          if (b.type === 'fixed') return { ...b, matrix: countsToFrequency(b.matrix) };
          return b;
        });
        diagramHtml += renderSequenceLogoSVG(null, { blocks: blocksFreq, width: 410, height: 150 });
      } else {
        diagramHtml += '<div class="mb-empty-msg">Keine Matrix-Daten</div>';
      }
    } else if (m._activeMbTab === 'freq') {
      const blocks = buildLogoBlocks(m);
      if (blocks) {
        diagramHtml += renderFrequencyChartHTML(blocks);
      } else {
        diagramHtml += '<div class="mb-empty-msg">Keine Matrix-Daten</div>';
      }
    } else if (m._activeMbTab === 'spacer') {
      if (hasSpacerInputs) {
        diagramHtml += renderSpacerHistogramSVG(der.matrices.spacerLengths, { width: 410, height: 150 });
      } else {
        diagramHtml += '<div class="mb-empty-msg">Kein Spacer in Eingabe-Sequenzen</div>';
      }
    }
    diagramHtml += '</div>';
    if (der.n) {
      diagramHtml += '<div style="margin-top:6px;color:var(--fg-mute);font-size:11px">' + der.n + ' Eingabesequenzen' + (der.skipped ? ' (' + der.skipped + ' verworfen)' : '') + '</div>';
    }
  } else {
    diagramHtml = '<div class="mb-empty-msg">Diagramme sind verfügbar wenn Sequenzen oder PRODORIC-Daten geladen werden.</div>';
  }

  // Rechte Spalte: Statistik
  let statsHtml = '';
  const hasResults = !!(m.results && m.results.hits);
  let blockedScan = false;
  // v0.5: PWM-Modus erkennen (Tab oder Result)
  const isPwmMode = m.inputTab === 'sequences' || m.inputTab === 'prodoric';
  if (norm.ok) {
    // Konsensus-Echo plus pre-scan-Statistik
    const fixedLen = fixedPositionCount(norm.blocks);
    statsHtml += '<span class="k">Konsensus</span><span class="v">' + escapeHtml(norm.canonical) + '</span>';
    // Länge
    let mn = 0, mx = 0;
    for (const b of norm.blocks) {
      if (b.type === 'fixed') { mn += b.seq.length; mx += b.seq.length; }
      else { mn += b.min; mx += b.max; }
    }
    statsHtml += '<span class="k">Länge</span><span class="v">' + (mn === mx ? mn + ' bp' : mn + '–' + mx + ' bp') + '</span>';
    // Spacer-Längen-Kombinationen
    if (norm.hasSpacer) {
      let spacerCombos = 1;
      for (const b of norm.blocks) if (b.type === 'spacer') spacerCombos *= (b.max - b.min + 1);
      statsHtml += '<span class="k">Spacer-Komb.</span><span class="v">' + spacerCombos + '</span>';
    }
    // Erwartung + Varianten + Spezifität nur im Konsensus-/+Datenraum-Modus,
    // nicht bei PWM (wo Score kontinuierlich ist und MM-basierte Statistik nicht sinnvoll ist)
    if (mf.genome && mf.twobit && !isPwmMode) {
      const maxMm = m.scoreThreshold !== undefined ? Math.floor((1 - m.scoreThreshold) * fixedLen + 1e-9) : 0;
      const expected = expectedHitsForMotif(norm, maxMm, mf.genome.composition, mf.genome.length, m.strand === 'both');
      // Varianten-Berechnung (Hamming-Distanz ≤ maxMm), IUPAC-aware
      let mPerPos = [];
      for (const b of norm.blocks) {
        if (b.type === 'fixed') {
          for (const c of b.seq) {
            const arr = IUPAC[c] || ['A','C','G','T'];
            mPerPos.push(arr.length);
          }
        }
      }
      const lFixed = mPerPos.length;
      const kMax = Math.min(maxMm, lFixed);
      let fVariants = new Array(kMax + 1).fill(0);
      fVariants[0] = 1;
      for (let i = 0; i < lFixed; i++) {
        const mi = mPerPos[i];
        const ni = 4 - mi;
        const fNew = new Array(kMax + 1).fill(0);
        for (let j = 0; j <= kMax; j++) {
          if (fVariants[j] === 0) continue;
          fNew[j] += fVariants[j] * mi;
          if (j + 1 <= kMax) fNew[j + 1] += fVariants[j] * ni;
        }
        fVariants = fNew;
      }
      let variants = 0;
      for (let j = 0; j <= kMax; j++) variants += fVariants[j];

      // Ampel
      let ampel, label;
      if (expected < 500)        { ampel = 'green';  label = 'spezifisch'; }
      else if (expected < 5000)  { ampel = 'yellow'; label = 'moderat'; }
      else if (expected < 50000) { ampel = 'orange'; label = 'unspezifisch'; }
      else                       { ampel = 'red';    label = 'zu unspezifisch'; }

      statsHtml += '<span class="k">Zufallserwartung <span class="info-icon" data-tt="zufall">i</span></span><span class="v">' +
                  (expected < 1 ? expected.toFixed(2) : Math.round(expected).toLocaleString('de-DE')) + ' Treffer</span>';
      statsHtml += '<span class="k">Varianten (Hamming ≤ ' + maxMm + ')</span><span class="v">' + variants.toLocaleString('de-DE') + '</span>';
      statsHtml += '<span class="k">Spezifität</span><span><span class="ampel ' + ampel + '">' + label + '</span></span>';

      if (ampel === 'red' && !m.forceScan) {
        blockedScan = true;
        statsHtml += '<div style="grid-column:span 2;margin-top:6px;color:var(--err);font-size:11px">Scan blockiert. ' +
                    '<button class="action" id="override_block_' + m.id + '">Trotzdem scannen</button></div>';
      }
    } else if (isPwmMode) {
      // PWM-Modus: zeige PWM-Info statt Erwartung
      const pwmInfo = m.inputTab === 'sequences'
        ? (m.derivedFromSequences && m.derivedFromSequences.ok
            ? m.derivedFromSequences.n + ' Sequenzen'
            : 'keine Daten')
        : (m.prodoricPwm
            ? 'PRODORIC, max-Score ' + m.prodoricPwm.maxScore.toFixed(2)
            : 'keine PWM');
      statsHtml += '<span class="k">PWM-Quelle</span><span class="v">' + pwmInfo + '</span>';
    }
  }
  if (hasResults) {
    const r = m.results;
    const obs = r.hits.length;
    statsHtml += '<span class="k">Gefunden</span><span class="v">' + obs.toLocaleString('de-DE') + '</span>';
    if (r.expected !== null && r.expected !== undefined) {
      const exp = r.expected;
      const ratio = exp > 0 ? obs / exp : 0;
      const log2r = (obs > 0 && exp > 0) ? Math.log2(ratio) : null;
      const z = exp > 0 ? (obs - exp) / Math.sqrt(exp) : 0;
      let ratioLabel = ratio >= 1 ? 'Anreicherung' : 'Verarmung';
      statsHtml += '<span class="k">' + ratioLabel + ' <span class="info-icon" data-tt="anreicherung">i</span></span><span class="v">' +
                  ratio.toFixed(2) + '× ' + (log2r !== null ? '(log₂ ' + (log2r >= 0 ? '+' : '') + log2r.toFixed(2) + ')' : '') +
                  '</span>';
      statsHtml += '<span class="k">Z-Score <span class="info-icon" data-tt="zscore">i</span></span><span class="v">' + (isFinite(z) ? z.toFixed(2) : '—') + '</span>';
    }
    statsHtml += '<span class="k">Scan-Dauer</span><span class="v">' + r.scanDurationMs + ' ms</span>';
  }

  root.innerHTML =
    (hasMatrices
      ? '<div class="mb-diagrams">' + diagramHtml + '</div>'
      : '') +
    '<div class="mb-stats">' + statsHtml + '</div>';

  // Tab-Handler
  for (const btn of root.querySelectorAll('.mb-tab-btn')) {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.mbtab;
      m._activeMbTab = tab;
      renderMotifBlock(m);
    });
  }
  // Override-Button
  if (blockedScan) {
    const ovBtn = document.getElementById('override_block_' + m.id);
    if (ovBtn) ovBtn.addEventListener('click', () => {
      m.forceScan = true;
      renderMotifBlock(m);
    });
  }
}

function updateMotifPreview(id) {
  const m = motifs.find(x => x.id === id);
  if (!m) return;
  // v0.4.5: Symmetrie-Suggest neu evaluieren
  if (m._updateSymSuggest) m._updateSymSuggest();
  // v0.4.7.2: Statistik wandert in motif-block; preview-Box bleibt nur leer
  const root = document.getElementById('preview_' + id);
  if (root) {
    root.innerHTML = '';
    root.style.display = 'none';
  }
  // motif-block neu rendern (zeigt Pre-Scan-Statistik live)
  renderMotifBlock(m);
  // Scan-Button enabled? (basiert auf Spezifität wenn Genom geladen)
  const card = document.getElementById('card_' + id);
  if (card && mf.genome) {
    const norm = normalizeConsensus(m.consensus);
    if (norm.ok) {
      const fixedLen = fixedPositionCount(norm.blocks);
      const maxMm = m.scoreThreshold !== undefined ? Math.floor((1 - m.scoreThreshold) * fixedLen + 1e-9) : 0;
      const expected = expectedHitsForMotif(norm, maxMm, mf.genome.composition, mf.genome.length, m.strand === 'both');
      const isRed = expected >= 50000;
      const sb = card.querySelector('.scan-btn');
      if (sb) sb.disabled = (isRed && !m.forceScan) || norm.minLen === 0;
    }
  }
}

function binomial(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  k = Math.min(k, n - k);
  let r = 1;
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
  return r;
}

// ---------- Scanner ----------
// v0.4.5: Annotiert alle bestehenden Treffer eines Motivs neu mit Symmetrie-Daten.
// Ruft analyzeHitSymmetry pro Treffer und setzt die Felder direkt am Hit.
function recomputeHitSymmetry(m) {
  if (!m.results || !m.results.hits) return;
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok) return;
  const isSym = m.symmetryMode === 'inverted_repeat' || m.symmetryMode === 'direct_repeat';
  for (const h of m.results.hits) {
    if (isSym && m.halfSiteLen) {
      const sym = analyzeHitSymmetry(h.sequence, norm.blocks, m.halfSiteLen, m.symmetryMode);
      if (sym) {
        h.symMmLeft = sym.mmLeft;
        h.symMmRight = sym.mmRight;
        h.symAsymmetry = sym.asymmetry;
        h.symSubs = sym.symSubs;
        h.asymSubs = sym.asymSubs;
        h.symHalfLeft = sym.halfLeft;
        h.symHalfRight = sym.halfRight;
      }
    } else {
      // Symmetrie-Felder löschen
      delete h.symMmLeft; delete h.symMmRight; delete h.symAsymmetry;
      delete h.symSubs; delete h.asymSubs;
      delete h.symHalfLeft; delete h.symHalfRight;
    }
  }
}

function scanMotif(id) {
  const m = motifs.find(x => x.id === id);
  if (!m || !mf.twobit) return;
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok) return;

  // v0.5: Such-Modus aus aktivem Tab (Konsensus, +Datenraum, Sequenzen, PRODORIC)
  const tab = m.inputTab || 'consensus';
  let searchSpaceNorm = null;
  let pwmData = null;
  if (tab === 'consensus_space') {
    if (!m.searchSpace || !m.searchSpace.trim()) {
      log('Such-Modus +Datenraum: bitte Datenraum-Sequenz eingeben', 'warn');
      return;
    }
    const spNorm = normalizeConsensus(m.searchSpace);
    if (!spNorm.ok) {
      log('Datenraum-Sequenz ungültig: ' + spNorm.error, 'err');
      return;
    }
    if (spNorm.blocks.length !== norm.blocks.length) {
      log('Datenraum hat andere Block-Struktur als Konsensus (Anzahl Blöcke abweichend)', 'err');
      return;
    }
    let lengthOk = true;
    for (let i = 0; i < spNorm.blocks.length; i++) {
      if (spNorm.blocks[i].type !== norm.blocks[i].type) { lengthOk = false; break; }
      if (spNorm.blocks[i].type === 'fixed' && spNorm.blocks[i].seq.length !== norm.blocks[i].seq.length) {
        lengthOk = false; break;
      }
    }
    if (!lengthOk) {
      log('Datenraum: Block-Längen weichen vom Konsensus ab', 'err');
      return;
    }
    searchSpaceNorm = spNorm;
  } else if (tab === 'sequences') {
    // v0.5: PWM-Suche aus Sequenzen-Daten
    pwmData = buildPwmFromSequences(m);
    if (!pwmData) {
      log('Sequenzen-Suche: bitte zuerst Sequenzen eingeben', 'warn');
      return;
    }
  } else if (tab === 'prodoric') {
    // v0.5: PWM-Suche aus PRODORIC-Daten
    pwmData = buildPwmFromProdoric(m);
    if (!pwmData) {
      log('PRODORIC-Suche: keine PWM-Daten vorhanden — bitte PRODORIC-JSON laden', 'warn');
      return;
    }
  }

  const card = document.getElementById('card_' + id);
  const scanBtn = card.querySelector('.scan-btn');
  scanBtn.disabled = true;
  scanBtn.textContent = 'Scannt...';

  const t0 = performance.now();
  setTimeout(() => {
    try {
      const hits = runScan(norm, m.scoreThreshold, m.strand, mf.twobit, mf.genome.geneIndex, searchSpaceNorm, pwmData);
      // v0.4.5: Symmetrie-Annotation pro Treffer wenn Motiv Symmetrie hat
      if ((m.symmetryMode === 'inverted_repeat' || m.symmetryMode === 'direct_repeat')
          && m.halfSiteLen && m.halfSiteLen > 0) {
        for (const h of hits) {
          const sym = analyzeHitSymmetry(h.sequence, norm.blocks, m.halfSiteLen, m.symmetryMode);
          if (sym) {
            h.symMmLeft = sym.mmLeft;
            h.symMmRight = sym.mmRight;
            h.symAsymmetry = sym.asymmetry;
            h.symSubs = sym.symSubs;
            h.asymSubs = sym.asymSubs;
            h.symHalfLeft = sym.halfLeft;
            h.symHalfRight = sym.halfRight;
          }
        }
      }
      // v0.5: Log-Odds-Annotation gegen Genom-Hintergrund (nur wenn freqBlocks verfügbar)
      const freqBlocks = buildFrequencyBlocksForLogOdds(m);
      const pBg = getBackgroundFrequencies();
      if (freqBlocks && pBg) {
        for (const h of hits) {
          h.logOdds = computeHitLogOdds(h.sequence, freqBlocks, pBg);
        }
      }
      const t1 = performance.now();
      m.results = {
        hits,
        consensus: norm.canonical,
        consensusBlocks: norm.blocks,
        hasSpacer: norm.hasSpacer,
        scoreThreshold: m.scoreThreshold,
        searchMode: tab,                            // 'consensus' | 'consensus_space' | 'sequences' | 'prodoric'
        hasSearchSpace: !!searchSpaceNorm,
        hasPwm: !!pwmData,
        hasLogOdds: !!(freqBlocks && pBg),
        searchSpace: searchSpaceNorm ? searchSpaceNorm.canonical : null,
        searchSpaceBlocks: searchSpaceNorm ? searchSpaceNorm.blocks : null,
        strand: m.strand,
        symmetryMode: m.symmetryMode,
        halfSiteLen: m.halfSiteLen,
        scanDurationMs: Math.round(t1 - t0),
        expected: pwmData
          ? null  // PWM-Erwartung ist komplexer, kommt später
          : expectedHitsForMotif(norm, Math.floor((1 - m.scoreThreshold) * fixedPositionCount(norm.blocks)),
                                  mf.genome.composition, mf.genome.length, m.strand === 'both'),
        sortBy: 'start', sortDir: 'asc',
        filterIntergenicOnly: false
      };
      renderResults(m);
      renderMotifBlock(m);   // v0.4.7: Block aktualisieren mit Statistik
    } catch (err) {
      log('Scan-Fehler: ' + err.message, 'err');
      console.error(err);
    } finally {
      scanBtn.disabled = false;
      scanBtn.textContent = 'Scan';
    }
  }, 10);
}

// Konvertiert einen fixed-Block (IUPAC-String) in ein Allowed-Mask-Array
function blockToAllowedMask(seq) {
  const out = new Uint8Array(seq.length);
  for (let i = 0; i < seq.length; i++) {
    let mask = 0;
    for (const b of IUPAC[seq[i]]) {
      if (b === 'A') mask |= 1;
      else if (b === 'C') mask |= 2;
      else if (b === 'G') mask |= 4;
      else if (b === 'T') mask |= 8;
    }
    out[i] = mask;
  }
  return out;
}

// Reverse-complement der Allowed-Maske (für Minus-Strang-Scan auf + Sequenz)
function reverseComplementMask(mask) {
  const out = new Uint8Array(mask.length);
  const COMP = [0, 8, 4, 0, 2, 0, 0, 0, 1]; // bit-Mapping: 1<->8, 2<->4
  for (let i = 0; i < mask.length; i++) {
    const m = mask[mask.length - 1 - i];
    let rc = 0;
    if (m & 1) rc |= 8;
    if (m & 2) rc |= 4;
    if (m & 4) rc |= 2;
    if (m & 8) rc |= 1;
    out[i] = rc;
  }
  return out;
}

// Reverse einer Block-Liste (für Minus-Strang): Reihenfolge gespiegelt, fixed-Blöcke revcomp.
// Spacer bleiben gleich.
function reverseBlocksForMinusStrand(blocks) {
  const reversed = [];
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.type === 'spacer') reversed.push({ type: 'spacer', min: b.min, max: b.max });
    else reversed.push({ type: 'fixed', seq: revcompString(b.seq) });
  }
  return reversed;
}

// v0.4.6: Berechnet Anzahl der fixen Positionen (für Score-Normalisierung)
function fixedPositionCount(blocks) {
  return blocks.filter(b => b.type === 'fixed')
               .reduce((s, b) => s + b.seq.length, 0);
}

// v0.4.6: Konvertiert Score-Threshold (0..1) in maximale erlaubte MM-Punkte
// (eines Score-Punkts entspricht einem Hard-MM oder zwei Soft-MM).
// scoreThreshold=1.0 → 0 MM erlaubt
// scoreThreshold=0.75 → 25% Abweichung erlaubt
function scoreThresholdToMaxMmPoints(scoreThreshold, fixedLen) {
  return Math.floor((1 - scoreThreshold) * fixedLen + 1e-9);
}

function runScan(norm, scoreThreshold, strand, twobit, geneIndex, searchSpaceNorm, pwmData) {
  // norm: { blocks, minLen, maxLen, hasSpacer, canonical } — Konsensus
  // searchSpaceNorm: optional, gleiche Struktur — Datenraum
  // scoreThreshold: 0..1
  // pwmData: optional, { blocks: [...], totalMaxScore } — PWM-Modus
  const total = twobit.length;

  // Sequenz-Bits einmal materialisieren
  const seqBits = new Uint8Array(total);
  const data = twobit.data;
  for (let i = 0; i < total; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    seqBits[i] = 1 << bits;
  }
  for (const [ns, nl] of twobit.nBlocks) {
    for (let i = ns; i < ns + nl; i++) seqBits[i] = 0;
  }

  // PWM-Modus: separater Pfad
  if (pwmData) {
    return runPwmScan(norm, pwmData, scoreThreshold, strand, twobit, geneIndex, seqBits, total);
  }

  // Anzahl fixer Positionen (für Score-Normalisierung)
  const fixedLen = fixedPositionCount(norm.blocks);
  // v0.4.7 Bug-Fix: Score-Threshold direkt in HalfPoints (Hard=2, Soft=1).
  // floor statt round damit Display und tatsächliche Schwelle exakt übereinstimmen.
  const maxMmHalfPoints = Math.floor((1 - scoreThreshold) * fixedLen * 2 + 1e-9);

  const hitsPlus = [];
  const hitsMinus = [];

  if (strand === 'both' || strand === '+') {
    scanWithBlocks(norm.blocks, seqBits, total, maxMmHalfPoints, hitsPlus, 1, searchSpaceNorm ? searchSpaceNorm.blocks : null);
  }
  if (strand === 'both' || strand === '-') {
    const rcBlocks = reverseBlocksForMinusStrand(norm.blocks);
    const rcSpaceBlocks = searchSpaceNorm ? reverseBlocksForMinusStrand(searchSpaceNorm.blocks) : null;
    scanWithBlocks(rcBlocks, seqBits, total, maxMmHalfPoints, hitsMinus, -1, rcSpaceBlocks);
  }

  // Sequenzen für alle Treffer extrahieren
  for (const h of [...hitsPlus, ...hitsMinus]) {
    const fullSeq = twobit.get(h.start - 1, h.end - h.start + 1);
    h.sequence = (h.strand === 1) ? fullSeq : revcompString(fullSeq);
    h.scoreFraction = fixedLen > 0 ? (1 - (h.mmHalfPoints / 2) / fixedLen) : 1;
    h.mismatches = Math.ceil(h.mmHalfPoints / 2);
  }

  // Dedup: Wenn + und − Treffer an gleicher Position+Länge+Spacern liegen UND
  //  die echte Sequenz selbstkomplementär ist, ist es ein echter Palindrom-Treffer
  //  (einer behalten, palindromic=true).
  // Wenn die Sequenz nicht selbstkomplementär ist (degenerierter Konsensus matcht
  //  beide Stränge unabhängig), sind es zwei legitime Treffer — beide behalten.
  const merged = [];
  const minusByKey = new Map();
  for (const h of hitsMinus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    minusByKey.set(k, h);
  }
  for (const h of hitsPlus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    if (minusByKey.has(k)) {
      // Beide Stränge liefern an gleicher Stelle einen Treffer.
      // Echte Palindromizität: hit.sequence (+ Strang Lesefolge) gleich ihrer Revcomp?
      const isTruePalindrome = (h.sequence === revcompString(h.sequence));
      if (isTruePalindrome) {
        h.palindromic = true;
        minusByKey.delete(k);
        merged.push(h);
      } else {
        // Degenerierter Konsensus matcht beide Stränge mit verschiedenen Sequenzen.
        // Beide Treffer behalten, kein palindromic-Flag.
        merged.push(h);
        // − wird unten dazugeschoben, weil noch in minusByKey
      }
    } else {
      merged.push(h);
    }
  }
  for (const h of minusByKey.values()) merged.push(h);

  // Klassifikation
  for (const h of merged) {
    const cl = classifyHit(h.start, h.end, h.strand, geneIndex);
    h.intragenic = cl.intragenic;
    h.nearestGene = cl.nearestGene;
    h.distanceToGeneStart = cl.distanceToGeneStart;
    h.strandRelToGene = cl.strandRelToGene;
    h.nearestGeneCai = cl.nearestGeneCai;             // v0.6
    h.nearestGeneCodonClass = cl.nearestGeneCodonClass; // v0.6
    h.localEntropy = shannonEntropyAtPosition(twobit, h.start - 1, h.end - 1);  // v0.7
    // Score-Felder kommen schon von runScan: scoreFraction, mismatches, softMm, hardMm
  }

  merged.sort((a, b) => a.start - b.start);
  return merged;
}

// v0.5: PWM-Scan-Pfad. Score-basiert statt Mismatch-basiert.
// pwmData: { blocks: [...], totalMaxScore }
function runPwmScan(norm, pwmData, scoreThreshold, strand, twobit, geneIndex, seqBits, total) {
  const minScoreThreshold = scoreThreshold * pwmData.totalMaxScore;

  const hitsPlus = [];
  const hitsMinus = [];

  if (strand === 'both' || strand === '+') {
    scanWithPwm(pwmData.blocks, seqBits, total, minScoreThreshold, hitsPlus, 1);
  }
  if (strand === 'both' || strand === '-') {
    const rcBlocks = reversePwmBlocksForMinusStrand(pwmData.blocks);
    scanWithPwm(rcBlocks, seqBits, total, minScoreThreshold, hitsMinus, -1);
  }

  // Sequenzen extrahieren + scoreFraction
  for (const h of [...hitsPlus, ...hitsMinus]) {
    const fullSeq = twobit.get(h.start - 1, h.end - h.start + 1);
    h.sequence = (h.strand === 1) ? fullSeq : revcompString(fullSeq);
    h.scoreFraction = pwmData.totalMaxScore > 0 ? h.pwmScore / pwmData.totalMaxScore : 1;
    h.mismatches = 0;  // Backwards-Kompat — bei PWM nicht aussagekräftig
  }

  // Dedup wie bei Konsensus
  const merged = [];
  const minusByKey = new Map();
  for (const h of hitsMinus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    minusByKey.set(k, h);
  }
  for (const h of hitsPlus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    if (minusByKey.has(k)) {
      const isTruePalindrome = (h.sequence === revcompString(h.sequence));
      if (isTruePalindrome) {
        h.palindromic = true;
        merged.push(h);
        minusByKey.delete(k);
      } else {
        h.palindromic = false;
        merged.push(h);
      }
    } else {
      h.palindromic = false;
      merged.push(h);
    }
  }
  for (const h of minusByKey.values()) {
    h.palindromic = false;
    merged.push(h);
  }

  // Klassifikation
  for (const h of merged) {
    const cl = classifyHit(h.start, h.end, h.strand, geneIndex);
    h.intragenic = cl.intragenic;
    h.nearestGene = cl.nearestGene;
    h.distanceToGeneStart = cl.distanceToGeneStart;
    h.strandRelToGene = cl.strandRelToGene;
    h.nearestGeneCai = cl.nearestGeneCai;             // v0.6
    h.nearestGeneCodonClass = cl.nearestGeneCodonClass; // v0.6
    h.localEntropy = shannonEntropyAtPosition(twobit, h.start - 1, h.end - 1);  // v0.7
  }

  merged.sort((a, b) => a.start - b.start);
  return merged;
}

// PWM-Blöcke für den Minus-Strang umdrehen.
// Reverse: positionScores [pos][A,C,G,T] → [revcomp_pos][T,G,C,A]
function reversePwmBlocksForMinusStrand(blocks) {
  const out = [];
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.type === 'spacer') {
      out.push({ type: 'spacer', min: b.min, max: b.max });
    } else {
      // Reverse positions, swap A↔T, C↔G
      const rev = [];
      const revMax = [];
      for (let p = b.positionScores.length - 1; p >= 0; p--) {
        const row = b.positionScores[p];
        // Original index: 0=A, 1=C, 2=G, 3=T
        // Revcomp: A↔T, C↔G → [T-orig, G-orig, C-orig, A-orig]
        rev.push([row[3], row[2], row[1], row[0]]);
        revMax.push(b.maxPerPos[p]);
      }
      out.push({ type: 'fixed', positionScores: rev, maxPerPos: revMax });
    }
  }
  return out;
}

// PWM-Scanner — analog zu scanWithBlocks aber mit kontinuierlichem Score
function scanWithPwm(blocks, seqBits, total, minScoreThreshold, output, strandCode) {
  // Mapping seqBits-Wert (1, 2, 4, 8) → Index (0, 1, 2, 3)
  const bitToIdx = new Int8Array(16);
  bitToIdx[1] = 0; bitToIdx[2] = 1; bitToIdx[4] = 2; bitToIdx[8] = 3;

  // Min-/Max-Längen
  let minLen = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') minLen += b.positionScores.length;
    else minLen += b.min;
  }
  const positions = total - minLen + 1;
  if (positions <= 0) return;

  // Pre-compute upper-bound für Greedy-Pruning:
  // suffixMaxScore[i] = Summe der maxPerPos aller fixed-Blöcke ab Block i
  const suffixMaxScore = new Float64Array(blocks.length + 1);
  for (let i = blocks.length - 1; i >= 0; i--) {
    suffixMaxScore[i] = suffixMaxScore[i + 1];
    if (blocks[i].type === 'fixed') {
      for (const v of blocks[i].maxPerPos) suffixMaxScore[i] += v;
    }
  }

  output.length = 0;
  for (let p = 0; p < positions; p++) {
    matchFromBlock(0, p, 0, [], p);
  }

  function matchFromBlock(blockIdx, posInGenome, scoreSoFar, spacersList, startPos) {
    if (blockIdx >= blocks.length) {
      // Treffer: gesamter Score reicht für Threshold
      output.push({
        start: startPos + 1,
        end: posInGenome,
        strand: strandCode,
        pwmScore: scoreSoFar,
        spacers: spacersList.slice()
      });
      return;
    }
    // Pruning: kann der aktuelle Score plus das maximal noch erreichbare den Threshold erreichen?
    if (scoreSoFar + suffixMaxScore[blockIdx] < minScoreThreshold) return;

    const blk = blocks[blockIdx];
    if (blk.type === 'fixed') {
      const L = blk.positionScores.length;
      if (posInGenome + L > total) return;
      let s = scoreSoFar;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[posInGenome + i];
        if (sb === 0) return; // N-Base: kein Score-Beitrag, harter Cut
        const idx = bitToIdx[sb];
        s += blk.positionScores[i][idx];
        // Pruning innerhalb des Blocks: nach diesem Schritt + verbleibender max im Block + suffix
        let remBlock = 0;
        for (let j = i + 1; j < L; j++) remBlock += blk.maxPerPos[j];
        if (s + remBlock + suffixMaxScore[blockIdx + 1] < minScoreThreshold) return;
      }
      matchFromBlock(blockIdx + 1, posInGenome + L, s, spacersList, startPos);
    } else {
      for (let len = blk.min; len <= blk.max; len++) {
        if (posInGenome + len > total) break;
        spacersList.push(len);
        matchFromBlock(blockIdx + 1, posInGenome + len, scoreSoFar, spacersList, startPos);
        spacersList.pop();
      }
    }
  }
}

// Kern-Scanner: arbeitet mit einer Block-Liste an einem geg. Strang.
// Strategie: an Position p den ersten fixed-Block versuchen → falls zu viele Mismatches, abbrechen.
// Sonst rekursiv die nächsten Blöcke (Spacer + fixed) durchtesten.
function scanWithBlocks(blocks, seqBits, total, maxMmHalfPoints, output, strandCode, spaceBlocks) {
  // v0.4.6: maxMmHalfPoints ist jetzt in halben Punkten (Hard-MM = 2, Soft-MM = 1)
  // Wenn spaceBlocks übergeben wird, wird Soft/Hard-MM unterschieden (Soft = im Datenraum).
  // Pre-compute Allowed-Masks pro fixed-Block für Konsensus
  const fixedMasks = blocks.map(b => b.type === 'fixed' ? blockToAllowedMask(b.seq) : null);
  // Pre-compute Allowed-Masks für Datenraum (nur falls vorhanden)
  const spaceMasks = spaceBlocks
    ? spaceBlocks.map(b => b.type === 'fixed' ? blockToAllowedMask(b.seq) : null)
    : null;

  // Min und Max Gesamtlänge
  let minLen = 0, maxLen = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') { minLen += b.seq.length; maxLen += b.seq.length; }
    else { minLen += b.min; maxLen += b.max; }
  }

  const positions = total - minLen + 1;
  if (positions <= 0) return;

  output.length = 0;
  for (let p = 0; p < positions; p++) {
    matchFromBlockInline(0, p, 0, 0, [], p);
  }

  // mmHalfPoints: aktuelle Punktzahl in Halben (Hard=2, Soft=1)
  // hardMm/softMm: Anzahl jeweils
  function matchFromBlockInline(blockIdx, posInGenome, mmHalfPoints, hardCount, spacersList, startPos) {
    if (blockIdx >= blocks.length) {
      output.push({
        start: startPos + 1,
        end: posInGenome,
        strand: strandCode,
        mmHalfPoints: mmHalfPoints,
        hardMm: hardCount,
        softMm: mmHalfPoints - hardCount * 2,   // jeder Soft = 1 HalfPoint
        spacers: spacersList.slice()
      });
      return;
    }
    const blk = blocks[blockIdx];
    if (blk.type === 'fixed') {
      const consMask = fixedMasks[blockIdx];
      const spaceMask = spaceMasks ? spaceMasks[blockIdx] : null;
      const L = blk.seq.length;
      if (posInGenome + L > total) return;
      let mm = mmHalfPoints;
      let hard = hardCount;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[posInGenome + i];
        if (sb === 0) return; // N-Base: kein Match
        if ((sb & consMask[i]) === 0) {
          // Nicht im Konsensus
          if (spaceMask && (sb & spaceMask[i]) !== 0) {
            // Aber im Datenraum → Soft-MM = 1 HalfPoint
            mm += 1;
          } else {
            // Auch nicht im Datenraum → Hard-MM = 2 HalfPoints
            mm += 2;
            hard++;
          }
          if (mm > maxMmHalfPoints) return;
        }
      }
      matchFromBlockInline(blockIdx + 1, posInGenome + L, mm, hard, spacersList, startPos);
    } else {
      for (let len = blk.min; len <= blk.max; len++) {
        if (posInGenome + len > total) break;
        spacersList.push(len);
        matchFromBlockInline(blockIdx + 1, posInGenome + len, mmHalfPoints, hardCount, spacersList, startPos);
        spacersList.pop();
      }
    }
  }
}

function revcompString(s) {
  // IUPAC-aware Komplement
  const comp = {
    'A':'T', 'T':'A', 'C':'G', 'G':'C',
    'R':'Y', 'Y':'R',  // R(A/G) <-> Y(C/T)
    'M':'K', 'K':'M',  // M(A/C) <-> K(G/T)
    'S':'S', 'W':'W',  // selbstkomplementär
    'B':'V', 'V':'B',  // B(C/G/T) <-> V(A/C/G)
    'D':'H', 'H':'D',  // D(A/G/T) <-> H(A/C/T)
    'N':'N',
    'a':'t', 't':'a', 'c':'g', 'g':'c',
    'r':'y', 'y':'r', 'm':'k', 'k':'m',
    's':'s', 'w':'w',
    'b':'v', 'v':'b', 'd':'h', 'h':'d',
    'n':'n'
  };
  let r = '';
  for (let i = s.length - 1; i >= 0; i--) r += (comp[s[i]] || 'N');
  return r;
}

// ---------- Resultate-Rendering ----------
function renderResults(m) {
  const root = document.getElementById('results_' + m.id);
  if (!root) return;
  if (!m.results) { root.classList.remove('show'); return; }
  root.classList.add('show');

  const r = m.results;
  const all = r.hits;
  // v0.7: Filter-Logik kombiniert: intergenisch + low-complexity
  let filtered = all;
  if (r.filterIntergenicOnly) filtered = filtered.filter(h => !h.intragenic);
  if (r.filterLowComplexity) {
    // Low-Complexity: Entropy < 1.5 Bits (deutlich unter Maximum 2.0)
    filtered = filtered.filter(h => h.localEntropy === undefined || h.localEntropy >= 1.5);
  }

  // Statistik
  const obs = all.length;
  const exp = r.expected;
  const ratio = exp > 0 ? obs / exp : 0;
  const log2r = (obs > 0 && exp > 0) ? Math.log2(ratio) : null;
  const z = exp > 0 ? (obs - exp) / Math.sqrt(exp) : 0;

  // Konsensus-String mit Längen-Range
  const lengthLabel = (r.consensusBlocks && r.hasSpacer)
    ? (() => {
        let mn = 0, mx = 0;
        for (const b of r.consensusBlocks) {
          if (b.type === 'fixed') { mn += b.seq.length; mx += b.seq.length; }
          else { mn += b.min; mx += b.max; }
        }
        return mn + '–' + mx + ' bp';
      })()
    : (r.consensusBlocks ? (r.consensusBlocks.reduce((s,b)=>s+(b.type==='fixed'?b.seq.length:0),0) + ' bp')
                         : (r.consensus.length + ' bp'));

  let stats = '';
  // v0.4.7: results-stats wurde in motif-block verlagert (Diagramme + Statistik nebeneinander)

  // Controls
  stats += '<div class="results-controls">';
  stats += '<label><input type="checkbox" id="filt_intergenic_' + m.id + '"' + (r.filterIntergenicOnly ? ' checked' : '') + '> nur intergenische Treffer</label>';

  ];
  // Eine Spalte pro Spacer
  for (let si = 0; si < spacerCount; si++) {
    const b = spacerBlocks[si];
    const rangeLabel = (b.min === b.max) ? String(b.min) : (b.min + '–' + b.max);
    cols.push({
      k: 'spacer_' + si,
      t: 'Spacer ' + (si + 1) + '<br><span style="font-size:10px;color:var(--fg-mute)">(' + rangeLabel + ')</span>',
      tip: 'Beobachtete Spacer-Länge zwischen den fixen Blöcken (' + rangeLabel + ' nt erlaubt).'
    });
