// IUPAC-Konsensus normalisieren und validieren
// Konsensus-Parser: erkennt feste IUPAC-Blöcke und variable Spacer.
// Spacer-Notationen: N12-16, N12..16, N{12,16}, N12 (fest)
// Beispiel: "CGTTTT N12-16 GGGWAW" -> {
//   blocks: [
//     {type:'fixed', seq:'CGTTTT'},
//     {type:'spacer', min:12, max:16},
//     {type:'fixed', seq:'GGGWAW'}
//   ],
//   minLength: 6+12+6=24, maxLength: 6+16+6=28
// }
function normalizeConsensus(s) {
  if (!s) return { ok: false, error: 'Konsensus eingeben', value: '' };

  // Whitespaces entfernen, Großbuchstaben
  const raw = s.toUpperCase().replace(/\s+/g, '');
  if (raw.length === 0) return { ok: false, error: 'Konsensus eingeben', value: '' };

  // Tokenize: scanne Zeichen für Zeichen, erkenne Spacer-Patterns
  const blocks = [];
  let i = 0;
  let currentFixed = '';

  const flushFixed = () => {
    if (currentFixed) { blocks.push({ type: 'fixed', seq: currentFixed }); currentFixed = ''; }
  };

  while (i < raw.length) {
    const c = raw[i];
    // Prüfe auf Spacer-Pattern: N gefolgt von Ziffern oder Klammern
    // Möglichkeiten:
    //   N{a,b}
    //   N12-16  oder  N12..16
    //   N12     (fest)
    if (c === 'N' && i + 1 < raw.length && (raw[i+1] === '{' || /\d/.test(raw[i+1]))) {
      // Match versuchen
      const rest = raw.substring(i);
      // N{a,b}
      let m = rest.match(/^N\{(\d+),(\d+)\}/);
      if (m) {
        flushFixed();
        const min = parseInt(m[1], 10), max = parseInt(m[2], 10);
        if (min > max) return { ok: false, error: 'Spacer-Range ungültig: N{' + min + ',' + max + '}', value: raw };
        blocks.push({ type: 'spacer', min, max });
        i += m[0].length;
        continue;
      }
      // N12-16  oder  N12..16
      m = rest.match(/^N(\d+)(?:-|\.\.)(\d+)/);
      if (m) {
        flushFixed();
        const min = parseInt(m[1], 10), max = parseInt(m[2], 10);
        if (min > max) return { ok: false, error: 'Spacer-Range ungültig: N' + min + '-' + max, value: raw };
        blocks.push({ type: 'spacer', min, max });
        i += m[0].length;
        continue;
      }
      // N12 (fest) — aber NUR wenn die Ziffern eindeutig zu N gehören und nicht versehentlich
      // Zwei Ziffern sind ein klares Spacer-Signal (kein einzelnes IUPAC-N gefolgt von Ziffern hat hier Sinn)
      m = rest.match(/^N(\d+)/);
      if (m) {
        flushFixed();
        const fixed = parseInt(m[1], 10);
        blocks.push({ type: 'spacer', min: fixed, max: fixed });
        i += m[0].length;
        continue;
      }
    }
    // Reguläres IUPAC-Zeichen
    if (!IUPAC[c]) {
      return { ok: false, error: 'Ungültiges Zeichen: ' + c, value: raw };
    }
    currentFixed += c;
    i++;
  }
  flushFixed();

  if (blocks.length === 0) {
    return { ok: false, error: 'Konsensus leer', value: raw };
  }

  // Validierungen:
  // - Spacer am Anfang/Ende ist sinnlos (kein Anker)
  if (blocks[0].type === 'spacer' || blocks[blocks.length - 1].type === 'spacer') {
    return { ok: false, error: 'Spacer am Anfang oder Ende ist nicht erlaubt — fixe Submotive müssen flankieren', value: raw };
  }
  // - Zwei Spacer hintereinander unsinnig (theoretisch durch Parser nicht möglich, aber check)
  for (let k = 1; k < blocks.length; k++) {
    if (blocks[k].type === 'spacer' && blocks[k-1].type === 'spacer') {
      return { ok: false, error: 'Zwei Spacer hintereinander', value: raw };
    }
  }

  // Aggregierte Längen
  let minLen = 0, maxLen = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') { minLen += b.seq.length; maxLen += b.seq.length; }
    else { minLen += b.min; maxLen += b.max; }
  }

  const hasSpacer = blocks.some(b => b.type === 'spacer');
  // Kanonischer normalisierter String (für Anzeige & Speicherung)
  const canonical = blocks.map(b =>
    b.type === 'fixed' ? b.seq : ('N' + b.min + (b.min !== b.max ? '-' + b.max : ''))
  ).join(' ');

  return { ok: true, value: raw, blocks, minLen, maxLen, hasSpacer, canonical };
}

// ---------- Genom-Komposition ----------
function computeComposition(tb) {
  const counts = { A: 0, C: 0, G: 0, T: 0, N: 0 };
  // 4 Basen pro Byte ausnutzen für Speed
  const data = tb.data;
  const len = tb.length;
  // Inits
  for (let i = 0; i < len; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    const b = ['A','C','G','T'][bits];
    counts[b]++;
  }
  // N-Blöcke abziehen (da als A geschrieben aber eigentlich N)
  for (const [ns, nl] of tb.nBlocks) {
    counts.A -= nl;  // standardmäßig wurden Ns als A=00 kodiert
    counts.N += nl;
  }
  const validTotal = counts.A + counts.C + counts.G + counts.T;
  return {
    A: counts.A / validTotal,
    C: counts.C / validTotal,
    G: counts.G / validTotal,
    T: counts.T / validTotal,
    N: counts.N,
    validTotal
  };
}

// Wahrscheinlichkeit dass eine zufällige Position das IUPAC-Symbol matcht
function iupacProb(code, comp) {
  const bases = IUPAC[code];
  if (!bases) return 0;
  let p = 0;
  for (const b of bases) p += comp[b];
  return p;
}

// Erwartete Trefferzahl für IUPAC-Konsensus + erlaubte Mismatches
// Formel: pro Mismatch-Anzahl j: C(L,j) * (Match-Probs für L-j Positionen) * (Mismatch-Probs für j)
// Pro Position: pMatch = iupacProb(c, comp), pMismatch = 1 - pMatch
// Für genaue Berechnung müssen wir aber über die Positionsauswahl summieren weil die p_i positionsabhängig sind.
// Berechnet die Match-Wahrscheinlichkeit pro Position für einen einzelnen fixed-Block
// (DP über erlaubte Mismatches innerhalb des Blocks).
// Gibt zurück: Array f[j] = Wkt dass an einer Random-Position im Block genau j Mismatches.
function blockMatchDist(seq, comp, maxMismatches) {
  const L = seq.length;
  const k = Math.min(maxMismatches, L);
  let f = new Array(k + 1).fill(0);
  f[0] = 1;
  for (let i = 0; i < L; i++) {
    const p = iupacProb(seq[i], comp);
    const fNew = new Array(k + 1).fill(0);
    for (let j = 0; j <= k; j++) {
      if (f[j] === 0) continue;
      fNew[j] += f[j] * p;
      if (j + 1 <= k) fNew[j + 1] += f[j] * (1 - p);
    }
    f = fNew;
  }
  return f;
}

// Konvolution zweier Mismatch-Verteilungen (Mismatches summieren sich)
function convDist(a, b, maxK) {
  const out = new Array(maxK + 1).fill(0);
  for (let i = 0; i < a.length; i++) {
    if (a[i] === 0) continue;
    for (let j = 0; j < b.length; j++) {
      if (i + j > maxK) break;
      out[i + j] += a[i] * b[j];
    }
  }
  return out;
}

// Erweitert: akzeptiert String ODER parsed-Konsensus-Objekt {blocks, ...}
function expectedHitsForMotif(consensus, mismatches, comp, genomeLength, bothStrands) {
  // Wenn String: parsen
  let parsed;
  if (typeof consensus === 'string') {
    parsed = normalizeConsensus(consensus);
    if (!parsed.ok) return 0;
  } else {
    parsed = consensus;
  }
  const blocks = parsed.blocks;
  if (!blocks || blocks.length === 0) return 0;

  // Gesamterwartung = Summe über alle Spacer-Längen-Kombinationen.
  // Pro Längen-Kombination: Faltung der Mismatch-Verteilungen aller fixed-Blöcke.
  // Keine Spacer? → einfache DP über alle Positionen.
  if (!parsed.hasSpacer) {
    // Alle Blocks sind fixed, einfach konkatenieren
    const seq = blocks.map(b => b.seq).join('');
    const dist = blockMatchDist(seq, comp, mismatches);
    let pHit = 0;
    for (let j = 0; j <= mismatches && j < dist.length; j++) pHit += dist[j];
    const L = seq.length;
    return pHit * (genomeLength - L + 1) * (bothStrands ? 2 : 1);
  }

  // Mit Spacern: Verteilung pro fixed-Block einmalig berechnen
  const fixedDists = [];
  for (const b of blocks) {
    if (b.type === 'fixed') fixedDists.push(blockMatchDist(b.seq, comp, mismatches));
  }
  // Anzahl Spacer-Länge-Varianten = Produkt der Range-Größen
  // Pro Variante: feste Länge L = sum(fixed.length) + sum(spacer-Länge-Wahl)
  // Match-Wkt pro Variante = Konvolution der fixed-Distributionen, p(matches ≤ mismatches)
  // Die Match-Wkt ist unabhängig von der Spacer-Länge (Spacer matchen immer, beliebige Basen).
  // Daher: konvolviere die fixed-Dists einmal:
  let combined = [1];
  for (const d of fixedDists) combined = convDist(combined, d, mismatches);
  let pHit = 0;
  for (let j = 0; j <= mismatches && j < combined.length; j++) pHit += combined[j];

  // Summe über alle Spacer-Längen-Kombinationen
  // Vereinfachung: Anzahl Kombinationen = Produkt der (max-min+1).
  // Pro Kombi mit Gesamtlänge L: Position-Anzahl = genomeLength - L + 1
  // Lange Spacer reduzieren Position-Anzahl leicht. Bei großen Genomen vernachlässigbar,
  // aber wir machen's korrekt:
  const spacers = blocks.filter(b => b.type === 'spacer');
  const fixedLen = blocks.filter(b => b.type === 'fixed').reduce((s, b) => s + b.seq.length, 0);

  // Iteriere alle Kombinationen — bei wenigen Spacern ohnehin klein
  // Für jeden Spacer alle Längen durchlaufen, position-counts addieren
  let totalPositions = 0;
  function recurse(idx, sumSpacerLen) {
    if (idx >= spacers.length) {
      const L = fixedLen + sumSpacerLen;
      const positions = Math.max(0, genomeLength - L + 1);
      totalPositions += positions;
      return;
    }
    const sp = spacers[idx];
    for (let l = sp.min; l <= sp.max; l++) recurse(idx + 1, sumSpacerLen + l);
  }
  recurse(0, 0);

  return pHit * totalPositions * (bothStrands ? 2 : 1);
}

// ---------- Gen-Index für Distanz-Berechnung ----------
function buildGeneIndex(features) {
  // Nur 'gene' und 'CDS' verwenden, sortiert nach start
  const genes = features.filter(f => f.type === 'gene' || f.type === 'CDS')
                       .map(f => ({ start: f.start, end: f.end, strand: f.strand,
                                    name: f.qualifiers.gene || f.qualifiers.locus_tag || '?',
                                    locus_tag: f.qualifiers.locus_tag,
                                    type: f.type }))
                       .sort((a, b) => a.start - b.start);
  return genes;
}

// Klassifikation eines Treffers im Gen-Kontext
function classifyHit(start, end, strand, geneIndex) {
  // Binäre Suche nach Genen die den Treffer überlappen
  let intragenic = false;
  let containingGene = null;
  // Linear-Scan reicht für moderate Genzahl, Treffer-Anzahl ist begrenzt
  // Für 4500 Gene * 2400 Treffer = 10.8M ops, ginge im Worker
  for (const g of geneIndex) {
    if (g.end < start) continue;
    if (g.start > end) break;
    if (g.start <= start && g.end >= end) {
      intragenic = true; containingGene = g; break;
    }
    if (g.start <= end && g.end >= start) {
      // Teilüberlapp
      intragenic = true; containingGene = g; break;
    }
  }
  // Nächstes downstream-Gen (zum Berechnen der Distanz zu Gen-Start auf gleichem oder anderem Strand)
  // Für intergene Treffer suchen wir das nächstgelegene Gen-Start in der Nähe
  let nearestGeneStart = null;
  let distanceToGeneStart = null;
  let strandRelToGene = null;
  if (containingGene) {
    nearestGeneStart = containingGene;
    // Distanz zum eigenen Gen-Start
    if (containingGene.strand === 1) {
      distanceToGeneStart = start - containingGene.start;
    } else {
      distanceToGeneStart = containingGene.end - end;
    }
    strandRelToGene = (strand === containingGene.strand) ? 'sense' : 'antisense';
  } else {
    // Suche das nächste Gen-Start (vor oder nach dem Treffer)
    let bestDist = Infinity, bestGene = null;
    for (const g of geneIndex) {
      // Position des Gen-Starts (TSS-Approximation)
      const geneStartPos = g.strand === 1 ? g.start : g.end;
      // Wir interessieren uns für den nächsten Gen-Start "downstream" des Treffers
      // Aber bei Promotor-Suche ist das nächste Gen-Start in der Strang-Richtung wichtig
      // Pragmatisch: nächste Gen-Start-Position absolut
      const treffermitte = (start + end) / 2;
      const d = Math.abs(geneStartPos - treffermitte);
      if (d < bestDist) {
        bestDist = d;
        bestGene = g;
      }
    }
    if (bestGene) {
      nearestGeneStart = bestGene;
      // Vorzeichen: positiv = upstream des Gen-Starts (typischer Promotor)
      // negativ = downstream des Gen-Starts (innerhalb oder dahinter)
      if (bestGene.strand === 1) {
        distanceToGeneStart = start - bestGene.start;
      } else {
        distanceToGeneStart = bestGene.end - end;
      }
      strandRelToGene = (strand === bestGene.strand) ? 'sense' : 'antisense';
    }
  }
  return {
    intragenic,
    nearestGene: nearestGeneStart ? nearestGeneStart.name : null,
    nearestGeneLocusTag: nearestGeneStart ? nearestGeneStart.locus_tag : null,
    distanceToGeneStart,
    strandRelToGene
  };
}

// ---------- Motiv-Datenmodell ----------
const MOTIF_PALETTE = ['#e85a4f','#7ab8f5','#81c784','#ffd54f','#f48fb1','#4dd0e1','#ffb74d','#ba68c8'];
let motifs = [];
let motifSeq = 0;

function newMotif() {
  motifSeq++;
  // Nächste Farbe = nächste freie aus Palette
  const usedColors = new Set(motifs.map(m => m.color));
  let color = MOTIF_PALETTE.find(c => !usedColors.has(c)) || MOTIF_PALETTE[(motifSeq - 1) % MOTIF_PALETTE.length];
  return {
    id: 'motif_' + motifSeq,
    name: 'Motiv ' + motifSeq,
    color,
    visibleInOverview: true,
    mode: 'regex_consensus',
    consensus: '',
    mismatches: 0,
    strand: 'both',
    forceScan: false, // override für rote Ampel
    results: null     // wird bei Scan gefüllt
  };
}

function addMotif(presetMotif) {
  const m = presetMotif || newMotif();
  motifs.push(m);
  renderMotifList();
  if (mf.genome) renderGenomeMap();
}

// Default-Preset für den allerersten Aufruf nach Genom-Load:
// σB-Promotor-Konsensus für B. subtilis, sodass der Erstkontakt
// sofort zu einem sinnvollen Scan-Ergebnis führt.
function defaultSigBMotif() {
  motifSeq++;
  return {
    id: 'motif_' + motifSeq,
    name: 'σB-Promotor',
    color: MOTIF_PALETTE[0],
    visibleInOverview: true,
    mode: 'regex_consensus',
    consensus: 'GTTTAA N10-12 GGGWAW',
    mismatches: 1,
    strand: 'both',
    forceScan: false,
    results: null
  };
}

function removeMotif(id) {
  motifs = motifs.filter(m => m.id !== id);
  renderMotifList();
  if (mf.genome) renderGenomeMap();
}

function renderMotifList() {
  const root = document.getElementById('motif-list');
  root.innerHTML = '';
  for (const m of motifs) {
    root.appendChild(buildMotifCard(m));
    updateMotifPreview(m.id);
  }
}

function buildMotifCard(m) {
  const card = document.createElement('div');
  card.className = 'motif-card';
  card.id = 'card_' + m.id;
  card.style.borderLeftColor = m.color;

  // Row 1: Name, Color, Mute, Remove
  const row1 = document.createElement('div'); row1.className = 'row';

  const nameInp = document.createElement('input');
  nameInp.type = 'text'; nameInp.name = 'name'; nameInp.value = m.name;
  nameInp.addEventListener('input', () => { m.name = nameInp.value; });

  const colorSwatch = document.createElement('span');
  colorSwatch.className = 'color-swatch';
  colorSwatch.style.background = m.color;
  const palette = document.createElement('div'); palette.className = 'palette';
  for (const c of MOTIF_PALETTE) {
    const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = c;
    sw.addEventListener('click', () => {
      m.color = c;
      colorSwatch.style.background = c;
      card.style.borderLeftColor = c;
      palette.classList.remove('show');
    });
    palette.appendChild(sw);
  }
  colorSwatch.addEventListener('click', () => palette.classList.toggle('show'));

  const removeBtn = document.createElement('button'); removeBtn.className = 'action danger';
  removeBtn.textContent = 'Entfernen';
  removeBtn.addEventListener('click', () => removeMotif(m.id));

  row1.appendChild(nameInp);
  row1.appendChild(colorSwatch);
  row1.appendChild(palette);
  row1.appendChild(removeBtn);

  // Row 2: Konsensus-Eingabe + IUPAC-Tooltip
  const row2 = document.createElement('div'); row2.className = 'row';
  const consensusLbl = document.createElement('label');
  consensusLbl.innerHTML = 'Konsensus <span class="info-icon" data-tt="konsensus">i</span>';
  const consInp = document.createElement('input');
  consInp.type = 'text'; consInp.name = 'consensus'; consInp.value = m.consensus;
  consInp.placeholder = 'z.B. TTGACA   oder   CGTTTT N12-16 GGGWAW';
  consInp.spellcheck = false; consInp.autocapitalize = 'characters';
  consInp.addEventListener('input', () => {
    m.consensus = consInp.value;
    updateMotifPreview(m.id);
  });
  row2.appendChild(consensusLbl);
  row2.appendChild(consInp);

  // Row 3: Mismatches, Strand, Scan
  const row3 = document.createElement('div'); row3.className = 'row';
  const mmLbl = document.createElement('label');
  mmLbl.innerHTML = 'Mismatches <span class="info-icon" data-tt="mismatches">i</span>';
  const mmInp = document.createElement('input');
  mmInp.type = 'number'; mmInp.min = 0; mmInp.max = 5; mmInp.value = m.mismatches;
  mmInp.style.width = '60px';
  mmInp.addEventListener('input', () => {
    m.mismatches = parseInt(mmInp.value, 10) || 0;
    updateMotifPreview(m.id);
  });

  const strandLbl = document.createElement('label');
  strandLbl.innerHTML = 'Strang <span class="info-icon" data-tt="strang">i</span>';
  const strandSel = document.createElement('select');
  for (const [v, t] of [['both', 'beide'], ['+', '+'], ['-', '−']]) {
    const o = document.createElement('option'); o.value = v; o.textContent = t;
    if (v === m.strand) o.selected = true;
    strandSel.appendChild(o);
  }
  strandSel.addEventListener('change', () => {
    m.strand = strandSel.value;
    updateMotifPreview(m.id);
  });

  const scanBtn = document.createElement('button');
  scanBtn.className = 'action scan-btn';
  scanBtn.textContent = 'Scan';
  scanBtn.addEventListener('click', () => scanMotif(m.id));

  row3.appendChild(mmLbl);
  row3.appendChild(mmInp);
  row3.appendChild(strandLbl);
  row3.appendChild(strandSel);
  row3.appendChild(scanBtn);

  // Live-Vorschau Block
  const preview = document.createElement('div');
  preview.className = 'preview'; preview.id = 'preview_' + m.id;

  // Resultate-Block
  const results = document.createElement('div');
  results.className = 'results-section'; results.id = 'results_' + m.id;

  card.appendChild(row1);
  card.appendChild(row2);
  card.appendChild(row3);
  card.appendChild(preview);
  card.appendChild(results);

  // Wenn schon Resultate da: rendern
  if (m.results) renderResults(m);

  return card;
}

function updateMotifPreview(id) {
  const m = motifs.find(x => x.id === id);
  if (!m) return;
  const root = document.getElementById('preview_' + id);
  if (!root) return;
  if (!mf.genome) {
    root.innerHTML = '<span style="color:var(--fg-mute)">Genom laden für Vorschau</span>';
    return;
  }
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok) {
    root.innerHTML = '<span style="color:var(--fg-mute)">' + (norm.error || 'Konsensus eingeben') + '</span>';
    return;
  }
  const both = m.strand === 'both';
  const expected = expectedHitsForMotif(norm, m.mismatches, mf.genome.composition, mf.genome.length, both);

  // Ampel
  let ampel, label;
  if (expected < 500)        { ampel = 'green';  label = 'spezifisch'; }
  else if (expected < 5000)  { ampel = 'yellow'; label = 'moderat'; }
  else if (expected < 50000) { ampel = 'orange'; label = 'unspezifisch'; }
  else                       { ampel = 'red';    label = 'zu unspezifisch'; }

  // Längen-Anzeige
  let lengthLabel;
  if (norm.minLen === norm.maxLen) lengthLabel = norm.minLen + ' bp';
  else                              lengthLabel = norm.minLen + '–' + norm.maxLen + ' bp';

  // Varianten-Schätzung: nur über fixierte Positionen (Spacer zählen nicht).
  // L_fixed = Summe der fixed-Block-Längen.
  let lFixed = 0;
  for (const b of norm.blocks) if (b.type === 'fixed') lFixed += b.seq.length;
  let variants = 0;
  for (let j = 0; j <= Math.min(m.mismatches, lFixed); j++) {
    variants += binomial(lFixed, j) * Math.pow(3, j);
  }

  // Spacer-Kombinationen (Information für User)
  let spacerCombos = 1;
  for (const b of norm.blocks) if (b.type === 'spacer') spacerCombos *= (b.max - b.min + 1);

  let html = '';
  html += '<div class="preview-row"><span>Konsensus</span><span class="v">' + escapeHtml(norm.canonical) + '</span></div>';
  html += '<div class="preview-row"><span>Länge</span><span class="v">' + lengthLabel + '</span></div>';
  if (norm.hasSpacer) {
    html += '<div class="preview-row"><span>Spacer-Längen-Kombinationen</span><span class="v">' + spacerCombos + '</span></div>';
  }
  html += '<div class="preview-row"><span>Zufallserwartung <span class="info-icon" data-tt="zufall">i</span></span><span class="v">' +
          (expected < 1 ? expected.toFixed(2) : Math.round(expected).toLocaleString('de-DE')) +
          ' Treffer</span></div>';
  html += '<div class="preview-row"><span>Varianten (Hamming ≤ ' + m.mismatches + ')</span><span class="v">' +
          variants.toLocaleString('de-DE') + '</span></div>';
  html += '<div class="preview-row"><span>Spezifität</span><span><span class="ampel ' + ampel + '">' + label + '</span></span></div>';
  if (ampel === 'red' && !m.forceScan) {
    html += '<div style="margin-top:6px;color:var(--err);font-size:11px">Scan blockiert. ';
    html += '<button class="action" id="override_' + id + '">Trotzdem scannen</button></div>';
  }
  root.innerHTML = html;

  // Override-Button verkabeln
  const ovBtn = document.getElementById('override_' + id);
  if (ovBtn) ovBtn.addEventListener('click', () => {
    m.forceScan = true;
    updateMotifPreview(id);
  });

  // Scan-Button enabled?
  const card = document.getElementById('card_' + id);
  if (card) {
    const sb = card.querySelector('.scan-btn');
    if (sb) sb.disabled = (ampel === 'red' && !m.forceScan) || norm.minLen === 0;
  }
}

function binomial(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  k = Math.min(k, n - k);
  let r = 1;
  for (let i = 0; i < k; i++) r = r * (n - i) / (i + 1);
  return r;
}

// ---------- Scanner ----------
function scanMotif(id) {
  const m = motifs.find(x => x.id === id);
  if (!m || !mf.twobit) return;
  const norm = normalizeConsensus(m.consensus);
  if (!norm.ok) return;

  const card = document.getElementById('card_' + id);
  const scanBtn = card.querySelector('.scan-btn');
  scanBtn.disabled = true;
  scanBtn.textContent = 'Scannt...';

  const t0 = performance.now();
  setTimeout(() => {
    try {
      const hits = runScan(norm, m.mismatches, m.strand, mf.twobit, mf.genome.geneIndex);
      const t1 = performance.now();
      m.results = {
        hits,
        consensus: norm.canonical,
        consensusBlocks: norm.blocks,
        hasSpacer: norm.hasSpacer,
        mismatches: m.mismatches,
        strand: m.strand,
        scanDurationMs: Math.round(t1 - t0),
        expected: expectedHitsForMotif(norm, m.mismatches, mf.genome.composition,
                                        mf.genome.length, m.strand === 'both'),
        sortBy: 'start', sortDir: 'asc',
        filterIntergenicOnly: false
      };
      renderResults(m);
    } catch (err) {
      log('Scan-Fehler: ' + err.message, 'err');
      console.error(err);
    } finally {
      scanBtn.disabled = false;
      scanBtn.textContent = 'Scan';
    }
  }, 10);
}

// Konvertiert einen fixed-Block (IUPAC-String) in ein Allowed-Mask-Array
function blockToAllowedMask(seq) {
  const out = new Uint8Array(seq.length);
  for (let i = 0; i < seq.length; i++) {
    let mask = 0;
    for (const b of IUPAC[seq[i]]) {
      if (b === 'A') mask |= 1;
      else if (b === 'C') mask |= 2;
      else if (b === 'G') mask |= 4;
      else if (b === 'T') mask |= 8;
    }
    out[i] = mask;
  }
  return out;
}

// Reverse-complement der Allowed-Maske (für Minus-Strang-Scan auf + Sequenz)
function reverseComplementMask(mask) {
  const out = new Uint8Array(mask.length);
  const COMP = [0, 8, 4, 0, 2, 0, 0, 0, 1]; // bit-Mapping: 1<->8, 2<->4
  for (let i = 0; i < mask.length; i++) {
    const m = mask[mask.length - 1 - i];
    let rc = 0;
    if (m & 1) rc |= 8;
    if (m & 2) rc |= 4;
    if (m & 4) rc |= 2;
    if (m & 8) rc |= 1;
    out[i] = rc;
  }
  return out;
}

// Reverse einer Block-Liste (für Minus-Strang): Reihenfolge gespiegelt, fixed-Blöcke revcomp.
// Spacer bleiben gleich.
function reverseBlocksForMinusStrand(blocks) {
  const reversed = [];
  for (let i = blocks.length - 1; i >= 0; i--) {
    const b = blocks[i];
    if (b.type === 'spacer') reversed.push({ type: 'spacer', min: b.min, max: b.max });
    else reversed.push({ type: 'fixed', seq: revcompString(b.seq) });
  }
  return reversed;
}

function runScan(norm, mismatches, strand, twobit, geneIndex) {
  // norm: { blocks, minLen, maxLen, hasSpacer, canonical }
  const total = twobit.length;

  // Sequenz-Bits einmal materialisieren
  const seqBits = new Uint8Array(total);
  const data = twobit.data;
  for (let i = 0; i < total; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    seqBits[i] = 1 << bits;
  }
  for (const [ns, nl] of twobit.nBlocks) {
    for (let i = ns; i < ns + nl; i++) seqBits[i] = 0;
  }

  const hitsPlus = [];
  const hitsMinus = [];

  if (strand === 'both' || strand === '+') {
    scanWithBlocks(norm.blocks, seqBits, total, mismatches, hitsPlus, 1);
  }
  if (strand === 'both' || strand === '-') {
    const rcBlocks = reverseBlocksForMinusStrand(norm.blocks);
    scanWithBlocks(rcBlocks, seqBits, total, mismatches, hitsMinus, -1);
  }

  // Dedup: Treffer mit identischer Position+Länge auf + und − = palindromisch
  const merged = [];
  const minusByKey = new Map();
  for (const h of hitsMinus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    minusByKey.set(k, h);
  }
  for (const h of hitsPlus) {
    const k = h.start + ':' + h.end + ':' + (h.spacers || []).join(',');
    if (minusByKey.has(k)) {
      h.palindromic = true;
      minusByKey.delete(k);
    }
    merged.push(h);
  }
  for (const h of minusByKey.values()) merged.push(h);

  // Sequenzen + Klassifikation + Score
  const consensusFixedLen = norm.blocks.filter(b => b.type === 'fixed')
                                       .reduce((s, b) => s + b.seq.length, 0);
  for (const h of merged) {
    const fullSeq = twobit.get(h.start - 1, h.end - h.start + 1);
    h.sequence = (h.strand === 1) ? fullSeq : revcompString(fullSeq);
    const cl = classifyHit(h.start, h.end, h.strand, geneIndex);
    h.intragenic = cl.intragenic;
    h.nearestGene = cl.nearestGene;
    h.distanceToGeneStart = cl.distanceToGeneStart;
    h.strandRelToGene = cl.strandRelToGene;
    h.score = consensusFixedLen - h.mismatches;
    h.maxScore = consensusFixedLen;
  }

  merged.sort((a, b) => a.start - b.start);
  return merged;
}

// Kern-Scanner: arbeitet mit einer Block-Liste an einem geg. Strang.
// Strategie: an Position p den ersten fixed-Block versuchen → falls zu viele Mismatches, abbrechen.
// Sonst rekursiv die nächsten Blöcke (Spacer + fixed) durchtesten.
function scanWithBlocks(blocks, seqBits, total, mismatches, output, strandCode) {
  // Pre-compute Allowed-Masks pro fixed-Block
  const fixedMasks = blocks.map(b => b.type === 'fixed' ? blockToAllowedMask(b.seq) : null);

  // Min und Max Gesamtlänge
  let minLen = 0, maxLen = 0;
  for (const b of blocks) {
    if (b.type === 'fixed') { minLen += b.seq.length; maxLen += b.seq.length; }
    else { minLen += b.min; maxLen += b.max; }
  }

  const positions = total - minLen + 1;
  if (positions <= 0) return;

  // Iterator-Funktion: testet ab Position p ob die Block-Liste matcht
  // Kette: für jeden fixed-Block wird ab aktueller Position gematcht; danach Spacer-Loop.
  // Wir tracken: aktuelle Position, akkumulierte Mismatches, Spacer-Längen-Liste.
  function tryMatch(p) {
    return matchFromBlock(0, p, 0, []);
  }

  function matchFromBlock(blockIdx, posInGenome, mmSoFar, spacersList) {
    if (blockIdx >= blocks.length) {
      // Ende erreicht — Treffer aufzeichnen
      output.push({
        start: spacersList.startPos !== undefined ? spacersList.startPos : (posInGenome - 0), // wird unten überschrieben
        end: posInGenome, // 1-basiert: posInGenome ist Position nach letztem Block (exklusiv) - korrigiere
        strand: strandCode,
        mismatches: mmSoFar,
        spacers: spacersList.slice() // Kopie
      });
      return;
    }
    const blk = blocks[blockIdx];
    if (blk.type === 'fixed') {
      const mask = fixedMasks[blockIdx];
      const L = blk.seq.length;
      if (posInGenome + L > total) return;
      let mm = mmSoFar;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[posInGenome + i];
        if (sb === 0) return; // N: kein Match überhaupt
        if ((sb & mask[i]) === 0) {
          mm++;
          if (mm > mismatches) return;
        }
      }
      matchFromBlock(blockIdx + 1, posInGenome + L, mm, spacersList);
    } else {
      // Spacer: probiere alle Längen im Range
      for (let len = blk.min; len <= blk.max; len++) {
        if (posInGenome + len > total) break;
        spacersList.push(len);
        matchFromBlock(blockIdx + 1, posInGenome + len, mmSoFar, spacersList);
        spacersList.pop();
      }
    }
  }

  // Wir können nicht direkt im Recursion start/end aufzeichnen, weil mehrere Treffer pro Startposition
  // möglich sind (verschiedene Spacer-Längen). Lösung: Treffer-Aufnahme mit korrektem start/end.
  // Refaktoriere: matchFromBlock akkumuliert und beim End-Block schreibt {start, end (computed), ...}.
  output.length = 0; // reset für saubere Aufzeichnung
  for (let p = 0; p < positions; p++) {
    matchFromBlockInline(0, p, 0, [], p);
  }

  function matchFromBlockInline(blockIdx, posInGenome, mmSoFar, spacersList, startPos) {
    if (blockIdx >= blocks.length) {
      output.push({
        start: startPos + 1,            // 1-basiert
        end: posInGenome,                // letzte Position des Treffers (1-basiert inklusiv = posInGenome)
        strand: strandCode,
        mismatches: mmSoFar,
        spacers: spacersList.slice()
      });
      return;
    }
    const blk = blocks[blockIdx];
    if (blk.type === 'fixed') {
      const mask = fixedMasks[blockIdx];
      const L = blk.seq.length;
      if (posInGenome + L > total) return;
      let mm = mmSoFar;
      for (let i = 0; i < L; i++) {
        const sb = seqBits[posInGenome + i];
        if (sb === 0) return;
        if ((sb & mask[i]) === 0) {
          mm++;
          if (mm > mismatches) return;
        }
      }
      matchFromBlockInline(blockIdx + 1, posInGenome + L, mm, spacersList, startPos);
    } else {
      for (let len = blk.min; len <= blk.max; len++) {
        if (posInGenome + len > total) break;
        spacersList.push(len);
        matchFromBlockInline(blockIdx + 1, posInGenome + len, mmSoFar, spacersList, startPos);
        spacersList.pop();
      }
    }
  }
}

function revcompString(s) {
  const comp = { A: 'T', T: 'A', C: 'G', G: 'C', N: 'N' };
  let r = '';
  for (let i = s.length - 1; i >= 0; i--) r += (comp[s[i]] || 'N');
  return r;
}

// ---------- Resultate-Rendering ----------
function renderResults(m) {
  const root = document.getElementById('results_' + m.id);
  if (!root) return;
  if (!m.results) { root.classList.remove('show'); return; }
  root.classList.add('show');

  const r = m.results;
  const all = r.hits;
  const filtered = r.filterIntergenicOnly ? all.filter(h => !h.intragenic) : all;

  // Statistik
  const obs = all.length;
  const exp = r.expected;
  const ratio = exp > 0 ? obs / exp : 0;
  const log2r = (obs > 0 && exp > 0) ? Math.log2(ratio) : null;
  const z = exp > 0 ? (obs - exp) / Math.sqrt(exp) : 0;

  // Konsensus-String mit Längen-Range
  const lengthLabel = (r.consensusBlocks && r.hasSpacer)
    ? (() => {
        let mn = 0, mx = 0;
        for (const b of r.consensusBlocks) {
          if (b.type === 'fixed') { mn += b.seq.length; mx += b.seq.length; }
          else { mn += b.min; mx += b.max; }
        }
        return mn + '–' + mx + ' bp';
      })()
    : (r.consensusBlocks ? (r.consensusBlocks.reduce((s,b)=>s+(b.type==='fixed'?b.seq.length:0),0) + ' bp')
                         : (r.consensus.length + ' bp'));

  let stats = '';
  stats += '<div class="results-stats">';
  stats += '<span class="k">Konsensus</span><span class="v">' + escapeHtml(r.consensus) + ' (' + lengthLabel + ', ≤' + r.mismatches + ' MM, Strang ' + r.strand + ')</span>';
  stats += '<span class="k">Zufallserwartung <span class="info-icon" data-tt="zufall">i</span></span><span class="v">' +
            Math.round(exp).toLocaleString('de-DE') + '</span>';
  stats += '<span class="k">Gefunden</span><span class="v">' + obs.toLocaleString('de-DE') + '</span>';
  let ratioLabel;
  if (ratio >= 1) ratioLabel = 'Anreicherung';
  else            ratioLabel = 'Verarmung';
  stats += '<span class="k">' + ratioLabel + ' <span class="info-icon" data-tt="anreicherung">i</span></span><span class="v">' +
            ratio.toFixed(2) + '× ' + (log2r !== null ? '(log₂ ' + (log2r >= 0 ? '+' : '') + log2r.toFixed(2) + ')' : '') +
            (log2r !== null && log2r < -2 ? '<span class="badge-warn">stark verarmt — Selektion?</span>' : '') +
            '</span>';
  stats += '<span class="k">Z-Score <span class="info-icon" data-tt="zscore">i</span></span><span class="v">' +
            (isFinite(z) ? z.toFixed(2) : '—') + '</span>';
  stats += '<span class="k">Scan-Dauer</span><span class="v">' + r.scanDurationMs + ' ms</span>';
  stats += '</div>';

  // Controls
  stats += '<div class="results-controls">';
  stats += '<label><input type="checkbox" id="filt_intergenic_' + m.id + '"' + (r.filterIntergenicOnly ? ' checked' : '') + '> nur intergenische Treffer</label>';
  stats += '<button id="copy_tsv_' + m.id + '">TSV kopieren</button>';
  stats += '<span style="color:var(--fg-mute)">' + filtered.length + ' angezeigt</span>';
  stats += '</div>';

  // Tabelle
  const LIMIT = 1000;
  const showHits = filtered.slice(0, LIMIT);

  // Spacer-Blöcke ermitteln (für separate Spalten)
  const spacerBlocks = (r.consensusBlocks || []).filter(b => b.type === 'spacer');
  const spacerCount = spacerBlocks.length;

  let table = '<table class="results-table"><thead><tr>';
  // Checkbox-Spalte: zuerst, mit master-Toggle im Header
  table += '<th class="col-sel"><input type="checkbox" class="row-checkbox" id="sel_master_' + m.id + '" title="Alle anzeigen / keine"></th>';
  const cols = [
    { k: 'start', t: 'Pos' },
    { k: 'strand', t: 'Strang' },
    { k: 'sequence', t: 'Sequenz' }
  ];
  // Eine Spalte pro Spacer
  for (let si = 0; si < spacerCount; si++) {
    const b = spacerBlocks[si];
    const rangeLabel = (b.min === b.max) ? String(b.min) : (b.min + '–' + b.max);
    cols.push({
      k: 'spacer_' + si,
      t: 'Spacer ' + (si + 1) + '<br><span style="font-size:10px;color:var(--fg-mute)">(' + rangeLabel + ')</span>'
    });
  }
  cols.push({ k: 'score', t: 'Score' });
  cols.push({ k: 'distanceToGeneStart', t: 'Δ Gen-Start' });
  cols.push({ k: 'strandRelToGene', t: 'Strangbezug' });
  cols.push({ k: 'context', t: 'Kontext' });
  cols.push({ k: 'nearestGene', t: 'Gen' });
  for (const c of cols) {
    const sorted = (r.sortBy === c.k) ? ' class="sorted"' : '';
    const arr = (r.sortBy === c.k) ? (r.sortDir === 'asc' ? ' ↑' : ' ↓') : '';
    table += '<th data-sort="' + c.k + '"' + sorted + '>' + c.t + arr + '</th>';
  }
  table += '</tr></thead><tbody>';
  if (!r.selected) r.selected = new Set();
  for (let hi = 0; hi < showHits.length; hi++) {
    const h = showHits[hi];
    const hitKey = hitKeyOf(h);
    const isSelected = r.selected.has(hitKey);
    table += '<tr>';
    table += '<td class="col-sel"><input type="checkbox" class="row-checkbox row-sel-' + m.id + '" data-hkey="' + hitKey + '"' + (isSelected ? ' checked' : '') + '></td>';
    table += '<td>' + h.start.toLocaleString('de-DE') + '</td>';
    table += '<td>' + (h.strand === 1 ? '+' : '−') + (h.palindromic ? ' (pal)' : '') + '</td>';
    table += '<td>' + colorizeBlockSequence(h, r.consensusBlocks) + '</td>';
    for (let si = 0; si < spacerCount; si++) {
      const v = (h.spacers && h.spacers[si] !== undefined) ? h.spacers[si] : '—';
      table += '<td>' + v + '</td>';
    }
    table += '<td>' + h.score + '/' + h.maxScore + '</td>';
    table += '<td>' + (h.distanceToGeneStart !== null ? (h.distanceToGeneStart >= 0 ? '+' : '') + h.distanceToGeneStart : '—') + '</td>';
    table += '<td>' + (h.strandRelToGene || '—') + '</td>';
    table += '<td><span class="ctx-pill ' + (h.intragenic ? 'intragenic' : 'intergenic') + '">' + (h.intragenic ? 'intra' : 'inter') + '</span></td>';
    table += '<td>' + (h.nearestGene || '—') + '</td>';
    table += '</tr>';
  }
  if (filtered.length > LIMIT) {
    table += '<tr><td colspan="' + (cols.length + 1) + '" class="results-overflow">... ' + (filtered.length - LIMIT).toLocaleString('de-DE') + ' weitere Treffer ausgeblendet</td></tr>';
  }
  table += '</tbody></table>';

  // Panel-Sektion: erst nach Tabelle gerendert, vom updatePanels gefüllt
  const panelHtml = '<div class="panel-section" id="panels_' + m.id + '">' +
                    '<div class="panel-section-header">' +
                      '<span class="ps-title" id="panels_title_' + m.id + '">Panels</span>' +
                      '<div class="ps-actions">' +
                        '<button id="panels_clear_' + m.id + '">Auswahl löschen</button>' +
                        '<button id="panels_toggle_' + m.id + '">Einklappen</button>' +
                      '</div>' +
                    '</div>' +
                    '<div class="panel-list" id="panel_list_' + m.id + '"></div>' +
                  '</div>';

  root.innerHTML = stats + table + panelHtml;

  // Event-Handlers
  document.getElementById('filt_intergenic_' + m.id).addEventListener('change', (e) => {
    r.filterIntergenicOnly = e.target.checked;
    renderResults(m);
  });
  document.getElementById('copy_tsv_' + m.id).addEventListener('click', () => {
    const spacerBlocks = (r.consensusBlocks || []).filter(b => b.type === 'spacer');
    const header = ['#position','strand','sequence'];
    for (let si = 0; si < spacerBlocks.length; si++) header.push('spacer_' + (si + 1));
    header.push('score', 'distance_to_gene_start', 'strand_rel_to_gene', 'context', 'nearest_gene', 'palindromic');
    const lines = [header.join('\t')];
    for (const h of filtered) {
      const row = [h.start, h.strand === 1 ? '+' : '-', h.sequence];
      for (let si = 0; si < spacerBlocks.length; si++) {
        row.push((h.spacers && h.spacers[si] !== undefined) ? h.spacers[si] : '');
      }
      row.push(h.score + '/' + h.maxScore);
      row.push(h.distanceToGeneStart !== null ? h.distanceToGeneStart : '');
      row.push(h.strandRelToGene || '');
      row.push(h.intragenic ? 'intragenic' : 'intergenic');
      row.push(h.nearestGene || '');
      row.push(h.palindromic ? 'palindromic' : '');
      lines.push(row.join('\t'));
    }
    const tsv = lines.join('\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(tsv).then(
        () => log('TSV (' + filtered.length + ' Zeilen) in Zwischenablage', 'ok'),
        (e) => log('Clipboard-Fehler: ' + e, 'err')
      );
    } else {
      log('Clipboard nicht verfügbar — TSV in Debug-Log', 'warn');
      logPre(tsv.length > 4000 ? tsv.substring(0, 4000) + '\n[abgeschnitten]' : tsv);
    }
  });
  // Sort-Header
  for (const th of root.querySelectorAll('th[data-sort]')) {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (r.sortBy === k) r.sortDir = r.sortDir === 'asc' ? 'desc' : 'asc';
      else { r.sortBy = k; r.sortDir = 'asc'; }
      sortHits(r);
      renderResults(m);
    });
  }

  // Row-Checkbox-Handler
  for (const cb of root.querySelectorAll('.row-sel-' + m.id)) {
    cb.addEventListener('change', (e) => {
      const k = e.target.dataset.hkey;
      if (e.target.checked) r.selected.add(k);
      else r.selected.delete(k);
      updatePanels(m);
      // Master-Checkbox-Status updaten
      const master = document.getElementById('sel_master_' + m.id);
      if (master) {
        const total = root.querySelectorAll('.row-sel-' + m.id).length;
        const checked = root.querySelectorAll('.row-sel-' + m.id + ':checked').length;
        master.checked = (total > 0 && checked === total);
        master.indeterminate = (checked > 0 && checked < total);
      }
    });
  }
  // Master-Checkbox: alle anzeigen / keine
  const master = document.getElementById('sel_master_' + m.id);
  if (master) {
    master.addEventListener('change', (e) => {
      const checked = e.target.checked;
      // Setze nur die SICHTBAREN Treffer (showHits, max LIMIT)
      for (const h of showHits) {
        const k = hitKeyOf(h);
        if (checked) r.selected.add(k);
        else r.selected.delete(k);
      }
      renderResults(m);
    });
  }

  // Panel-Action-Buttons
  const clearBtn = document.getElementById('panels_clear_' + m.id);
  if (clearBtn) clearBtn.addEventListener('click', () => {
    r.selected.clear();
    renderResults(m);
  });
  const toggleBtn = document.getElementById('panels_toggle_' + m.id);
  if (toggleBtn) toggleBtn.addEventListener('click', () => {
    const list = document.getElementById('panel_list_' + m.id);
    if (!list) return;
    const isHidden = list.classList.toggle('hidden');
    toggleBtn.textContent = isHidden ? 'Aufklappen' : 'Einklappen';
    if (!isHidden) updatePanels(m);
  });

  // v0.3.2: Globale Genom-Karte aktualisieren (statt pro-Motiv-Distribution)
  renderGenomeMap();

  // Panels rendern
  updatePanels(m);
}

// ---------- v0.3.1: GC-Skew + Genom-Distribution ----------
// GC-Skew = (G - C) / (G + C) pro Sliding-Window
// Speichert ein Array von { center, value }
function computeGCSkew(tb, windowSize, step) {
  const total = tb.length;
  const data = tb.data;
  const out = [];
  // Schnellere Berechnung: laufender Counter über Window
  // Initial-Window
  let g = 0, c = 0;
  const w = Math.min(windowSize, total);
  for (let i = 0; i < w; i++) {
    const bits = (data[i >> 2] >> ((3 - (i & 3)) * 2)) & 0x3;
    if (bits === 1) c++;       // C
    else if (bits === 2) g++;  // G
  }
  // Erstes Datenpunkt
  out.push({ center: Math.floor(w / 2), value: (g + c) > 0 ? (g - c) / (g + c) : 0 });
  // Schiebe das Fenster vorwärts in Schritten von 'step'
  for (let start = step; start + w <= total; start += step) {
    // Entferne 'step' Basen vom linken Rand, füge 'step' am rechten Rand hinzu
    for (let k = 0; k < step; k++) {
      const leftIdx = start - step + k;
      const lb = (data[leftIdx >> 2] >> ((3 - (leftIdx & 3)) * 2)) & 0x3;
      if (lb === 1) c--; else if (lb === 2) g--;
      const rightIdx = start + w - step + k;
      const rb = (data[rightIdx >> 2] >> ((3 - (rightIdx & 3)) * 2)) & 0x3;
      if (rb === 1) c++; else if (rb === 2) g++;
    }
    out.push({ center: start + Math.floor(w / 2), value: (g + c) > 0 ? (g - c) / (g + c) : 0 });
  }
  return out;
}

// Treffer-Histogramm: Bucket-Counts über Genom
function computeHitHistogram(hits, genomeLen, numBuckets) {
  const buckets = new Uint32Array(numBuckets);
  if (genomeLen <= 0) return { buckets, bucketSize: 0 };
  const bucketSize = genomeLen / numBuckets;
  for (const h of hits) {
    const center = (h.start + h.end) / 2;
    let idx = Math.floor(center / bucketSize);
    if (idx >= numBuckets) idx = numBuckets - 1;
    if (idx < 0) idx = 0;
    buckets[idx]++;
  }
  return { buckets, bucketSize };
}

// ---------- v0.3.2: Globale Genom-Karte ----------
// Zeichnet GC-Skew oben + eine Heatmap-Zeile pro sichtbares Motiv darunter.
// Ausgeblendete Motive erscheinen als Bonbons unterhalb des Canvas.

function renderGenomeMap() {
  const root = document.getElementById('genome-map');
  if (!root) return;
  if (!mf.genome) { root.classList.remove('show'); return; }
  root.classList.add('show');

  const canvas = document.getElementById('genome-map-canvas');
  const status = document.getElementById('genome-map-status');
  const bonbons = document.getElementById('genome-map-bonbons');

  // Liste der Motive mit Sichtbarkeitsstatus
  const visibleMotifs = motifs.filter(m => m.visibleInOverview !== false);
  const hiddenMotifs = motifs.filter(m => m.visibleInOverview === false);

  // Höhe dynamisch berechnen
  const HEAD_H = 38;       // GC-Skew-Spur
  const ROW_H = 16;        // Heatmap-Zeile pro Motiv (mit Label drinnen)
  const BOTTOM_LABELS_H = 12; // Genom-Skala unten
  const PADDING = 4;
  const totalH = HEAD_H + visibleMotifs.length * ROW_H + BOTTOM_LABELS_H + PADDING * 2;

  // Canvas-Größe setzen
  requestAnimationFrame(() => {
    const containerW = canvas.parentElement.clientWidth - 20; // padding
    const dpr = window.devicePixelRatio || 1;
    canvas.width = containerW * dpr;
    canvas.height = totalH * dpr;
    canvas.style.width = containerW + 'px';
    canvas.style.height = totalH + 'px';
    drawGenomeMap(canvas, visibleMotifs);
  });

  // Status-Zeile
  const scannedCount = motifs.filter(m => m.results).length;
  status.textContent = mf.genome.length.toLocaleString('de-DE') + ' bp · ' +
                        scannedCount + ' Motiv' + (scannedCount === 1 ? '' : 'e') + ' gescannt';

  // Bonbons rendern
  bonbons.innerHTML = '';
  if (hiddenMotifs.length > 0) {
    const lbl = document.createElement('span');
    lbl.className = 'bonbons-label';
    lbl.textContent = 'ausgeblendet:';
    bonbons.appendChild(lbl);
    for (const m of hiddenMotifs) {
      const pill = document.createElement('span');
      pill.className = 'bonbon';
      const dot = document.createElement('span');
      dot.className = 'bonbon-color';
      dot.style.background = m.color;
      const name = document.createElement('span');
      name.className = 'bonbon-name';
      name.textContent = m.name + (m.results ? ' (' + m.results.hits.length + ')' : '');
      pill.appendChild(dot);
      pill.appendChild(name);
      pill.title = 'Wieder einblenden';
      pill.addEventListener('click', () => {
        m.visibleInOverview = true;
        renderGenomeMap();
        // Panels neu zeichnen, weil Marker sich ändern
        for (const om of motifs) if (om.results) updatePanels(om);
      });
      bonbons.appendChild(pill);
    }
  }
}

function drawGenomeMap(canvas, visibleMotifs) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  ctx.clearRect(0, 0, cssW, cssH);

  const genomeLen = mf.genome.length;
  const bp2px = (bp) => (bp / genomeLen) * cssW;

  const HEAD_H = 38;
  const ROW_H = 16;
  const PADDING = 4;
  const skewTop = PADDING;
  const skewBottom = skewTop + HEAD_H;
  const rowsTop = skewBottom + 2;

  // ---- GC-Skew-Spur ----
  const skewData = mf.genome.gcSkew || [];
  if (skewData.length > 1) {
    let maxAbs = 0.3;
    for (const p of skewData) { const a = Math.abs(p.value); if (a > maxAbs) maxAbs = a; }
    const skewMid = (skewTop + skewBottom) / 2;
    // Nulllinie
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, skewMid); ctx.lineTo(cssW, skewMid); ctx.stroke();
    // Linie
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    let first = true;
    for (const p of skewData) {
      const x = bp2px(p.center);
      const halfH = (HEAD_H / 2) - 2;
      const y = skewMid - (p.value / maxAbs) * halfH;
      if (first) { ctx.moveTo(x, y); first = false; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    // Beschriftung
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '9px ui-monospace, monospace';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillText('GC-Skew  ±' + maxAbs.toFixed(2) + '  (10 kb)', 4, skewTop + 1);
  }

  // ---- Heatmap-Zeilen pro Motiv ----
  // Bucket-Zahl: ein Bucket pro 2 Pixel, mindestens 50, maximal 400
  const numBuckets = Math.max(50, Math.min(400, Math.floor(cssW / 2)));
  const bucketSize = genomeLen / numBuckets;

  for (let mi = 0; mi < visibleMotifs.length; mi++) {
    const motif = visibleMotifs[mi];
    const y = rowsTop + mi * ROW_H;
    // Hintergrund-Streifen
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fillRect(0, y, cssW, ROW_H - 2);

    if (motif.results) {
      const filtered = motif.results.filterIntergenicOnly
        ? motif.results.hits.filter(h => !h.intragenic)
        : motif.results.hits;
      const { buckets } = computeHitHistogram(filtered, genomeLen, numBuckets);
      let maxCount = 0;
      for (const c of buckets) if (c > maxCount) maxCount = c;
      if (maxCount > 0) {
        const logMax = Math.log(maxCount + 1);
        const barW = cssW / numBuckets;
        const baseColor = motif.color;
        for (let i = 0; i < numBuckets; i++) {
          const c = buckets[i];
          if (c === 0) continue;
          // Logarithmische Helligkeit
          const intensity = Math.log(c + 1) / logMax;
          // 7 diskrete Stufen
          const step = Math.ceil(intensity * 7) / 7;
          ctx.globalAlpha = step;
          ctx.fillStyle = baseColor;
          ctx.fillRect(i * barW, y, Math.max(1, barW), ROW_H - 2);
        }
        ctx.globalAlpha = 1;
      }
    }

    // Auge + Farbquadrat + Name als Overlay (mit Schatten für Lesbarkeit)
    ctx.font = '10px ui-monospace, monospace';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    const textY = y + (ROW_H - 2) / 2;
    // Schwacher Hintergrund unterm Text
    const labelText = motif.name + (motif.results ? '  (' + motif.results.hits.length + ')' : '');
    const labelW = ctx.measureText(labelText).width;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, y, 12 + 14 + labelW + 8, ROW_H - 2);
    // Auge-Symbol (Klickbereich, nur visuell — Klicks per Canvas-Listener)
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('👁', 4, textY);
    // Farbquadrat
    ctx.fillStyle = motif.color;
    ctx.fillRect(20, y + (ROW_H - 2) / 2 - 4, 8, 8);
    // Name
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(labelText, 32, textY);
  }

  // ---- Genom-Skala unten ----
  const labelY = cssH - 1;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px ui-monospace, monospace';
  ctx.textBaseline = 'bottom';
  for (let i = 0; i <= 4; i++) {
    const bp = (genomeLen * i) / 4;
    const x = bp2px(bp);
    const lbl = bp >= 1000000 ? (bp / 1000000).toFixed(1) + ' Mb' : Math.round(bp / 1000) + ' kb';
    ctx.textAlign = (i === 0) ? 'left' : (i === 4) ? 'right' : 'center';
    ctx.fillText(lbl, Math.max(2, Math.min(cssW - 2, x)), labelY);
  }
}

// Klick-Handling auf Genom-Karte:
//  - Auge-Klick (linke ~14 px einer Motiv-Zeile) -> Motiv ausblenden
//  - Sonstiger Klick auf Motiv-Zeile -> zum nächsten Treffer in Tabelle springen
//  - Klick auf GC-Skew-Spur -> nichts
function attachGenomeMapClickHandler() {
  const canvas = document.getElementById('genome-map-canvas');
  if (!canvas) return;
  if (canvas._handlerAttached) return;
  canvas._handlerAttached = true;

  canvas.addEventListener('click', (e) => {
    if (!mf.genome) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const w = rect.width;

    const HEAD_H = 38;
    const ROW_H = 16;
    const PADDING = 4;
    const rowsTop = PADDING + HEAD_H + 2;

    if (y < rowsTop) return; // GC-Skew-Klick: ignorieren

    const visibleMotifs = motifs.filter(m => m.visibleInOverview !== false);
    const rowIdx = Math.floor((y - rowsTop) / ROW_H);
    if (rowIdx < 0 || rowIdx >= visibleMotifs.length) return;
    const motif = visibleMotifs[rowIdx];

    // Auge-Klick? (linke ~16 px)
    if (x < 16) {
      motif.visibleInOverview = false;
      renderGenomeMap();
      // Panels neu zeichnen
      for (const om of motifs) if (om.results) updatePanels(om);
      return;
    }

    // Sonst: zum nächsten Treffer springen
    if (!motif.results) return;
    const fraction = x / w;
    const targetBp = mf.genome.length * fraction;
    const filtered = motif.results.filterIntergenicOnly
      ? motif.results.hits.filter(h => !h.intragenic)
      : motif.results.hits;
    let bestIdx = -1, bestDist = Infinity;
    for (let i = 0; i < filtered.length; i++) {
      const center = (filtered[i].start + filtered[i].end) / 2;
      const d = Math.abs(center - targetBp);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    if (bestIdx === -1) return;
    const root = document.getElementById('results_' + motif.id);
    if (!root) return;
    const hk = hitKeyOf(filtered[bestIdx]);
    const cb = root.querySelector('.row-sel-' + motif.id + '[data-hkey="' + cssEscape(hk) + '"]');
    if (cb) {
      const tr = cb.closest('tr');
      if (tr) {
        tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        tr.style.transition = 'background 0.3s';
        tr.style.background = 'rgba(122,184,245,0.15)';
        setTimeout(() => { tr.style.background = ''; }, 1200);
      }
    } else {
      log('Nächster Treffer bei Pos ' + Math.round((filtered[bestIdx].start + filtered[bestIdx].end)/2).toLocaleString('de-DE') + ' liegt außerhalb der angezeigten Tabelle (Top 1000)', 'warn');
    }
  });

  // Hover: Cursor-Hint
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const HEAD_H = 38, ROW_H = 16, PADDING = 4;
    const rowsTop = PADDING + HEAD_H + 2;
    if (y < rowsTop) { canvas.style.cursor = 'default'; return; }
    if (x < 16) { canvas.style.cursor = 'pointer'; return; }
    canvas.style.cursor = 'crosshair';
  });
}

function cssEscape(s) {
  return s.replace(/(["\\\]])/g, '\\$1');
}

// Stabiler Schlüssel für einen Treffer (für Selektion)
function hitKeyOf(h) {
  return h.start + ':' + h.end + ':' + h.strand + ':' + ((h.spacers || []).join(','));
}

// Auswahl der zu rendernden Panels: Selektion (alle), sonst Top N nach aktueller Sortierung
function pickPanelHits(m) {
  const r = m.results;
  if (!r) return [];
  const filtered = r.filterIntergenicOnly ? r.hits.filter(h => !h.intragenic) : r.hits;
  const PANEL_DEFAULT = 10;
  if (r.selected && r.selected.size > 0) {
    return filtered.filter(h => r.selected.has(hitKeyOf(h)));
  }
  return filtered.slice(0, PANEL_DEFAULT);
}

// Panel-Liste aktualisieren
function updatePanels(m) {
  const list = document.getElementById('panel_list_' + m.id);
  if (!list || list.classList.contains('hidden')) {
    if (list) {
      const title = document.getElementById('panels_title_' + m.id);
      const r = m.results; const sel = r.selected ? r.selected.size : 0;
      if (title) title.textContent = sel > 0 ? 'Panels (' + sel + ' selektiert, eingeklappt)' : 'Panels (eingeklappt)';
    }
    return;
  }
  const hits = pickPanelHits(m);
  const title = document.getElementById('panels_title_' + m.id);
  if (title) {
    const r = m.results; const sel = r.selected ? r.selected.size : 0;
    title.textContent = sel > 0
      ? 'Panels (' + sel + ' selektiert)'
      : 'Panels (Top ' + hits.length + ' nach aktueller Sortierung)';
  }
  list.innerHTML = '';

  if (hits.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--fg-mute);font-size:11px">Keine Treffer auswählbar</div>';
    return;
  }

  // Schwebender Maßstab: einmal pro Liste, oben rechts
  // Wert wird basierend auf Flanke berechnet (alle Panels haben gleiche Flanke)
  const scaleEl = document.createElement('div');
  scaleEl.className = 'scale-floating';
  list.appendChild(scaleEl);

  // Pro Treffer ein Panel-Canvas
  const PANEL_HEIGHT = 44;  // so niedrig wie möglich
  for (const h of hits) {
    const row = document.createElement('div');
    row.className = 'panel-row';
    row.style.height = PANEL_HEIGHT + 'px';
    const canvas = document.createElement('canvas');
    canvas.height = PANEL_HEIGHT * (window.devicePixelRatio || 1);
    row.appendChild(canvas);
    const label = document.createElement('div');
    label.className = 'panel-label';
    label.textContent = h.start.toLocaleString('de-DE') + ' ' + (h.strand === 1 ? '+' : '−') +
                        (h.nearestGene ? '  ' + h.nearestGene : '');
    row.appendChild(label);
    list.appendChild(row);

    // Canvas-Größe nach DOM-Insertion setzen, dann zeichnen
    requestAnimationFrame(() => {
      const w = row.clientWidth;
      canvas.width = w * (window.devicePixelRatio || 1);
      canvas.style.width = w + 'px';
      canvas.style.height = PANEL_HEIGHT + 'px';
      drawPanel(canvas, h, m, scaleEl);
    });
  }
}

// ---------- Canvas-Renderer für ein einzelnes Panel ----------
function drawPanel(canvas, hit, motif, scaleEl) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cssW = canvas.width / dpr;
  const cssH = canvas.height / dpr;
  ctx.clearRect(0, 0, cssW, cssH);

  // Flanke berechnen: Anker = Treffer-Mitte, Fenster = max(3 Gene, 500 bp)
  const FLANK_GENES = 3;
  const FLANK_BP_MIN = 500;
  const anchor = Math.round((hit.start + hit.end) / 2);

  // Genomlänge
  const genomeLen = mf.genome.length;

  // Suche links und rechts N Gene um den Anker
  const genes = mf.genome.geneIndex;
  // binär findet nicht so leicht, linear ist okay bei wenigen tausend
  let leftGeneIdx = -1, rightGeneIdx = -1;
  for (let i = 0; i < genes.length; i++) {
    if (genes[i].end < anchor) leftGeneIdx = i;
    else if (rightGeneIdx === -1 && genes[i].start > anchor) { rightGeneIdx = i; break; }
    else if (genes[i].start <= anchor && genes[i].end >= anchor) {
      // Gen überlappt mit Anker — gilt als sowohl links als rechts
      leftGeneIdx = i;
      rightGeneIdx = i + 1; break;
    }
  }
  // N Gene links/rechts vom Anker
  let leftBound = Math.max(1, anchor - FLANK_BP_MIN);
  let rightBound = Math.min(genomeLen, anchor + FLANK_BP_MIN);
  if (leftGeneIdx >= 0) {
    const targetIdx = Math.max(0, leftGeneIdx - FLANK_GENES + 1);
    leftBound = Math.min(leftBound, genes[targetIdx].start);
  }
  if (rightGeneIdx >= 0 && rightGeneIdx < genes.length) {
    const targetIdx = Math.min(genes.length - 1, rightGeneIdx + FLANK_GENES - 1);
    rightBound = Math.max(rightBound, genes[targetIdx].end);
  }
  leftBound = Math.max(1, leftBound);
  rightBound = Math.min(genomeLen, rightBound);

  const winSize = rightBound - leftBound + 1;
  const bp2px = (bp) => ((bp - leftBound) / winSize) * cssW;

  // Update-Maßstab — wir zeigen den Wert aus dem ersten gerenderten Panel
  // (alle haben gleiche Flanke, daher gleicher Maßstab)
  if (scaleEl && !scaleEl._set) {
    setScale(scaleEl, cssW, winSize);
    scaleEl._set = true;
  }

  // ---------- Zeichnen ----------
  // Hintergrund leicht
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0, 0, cssW, cssH);

  // Mittellinie sehr dezent
  const midY = cssH / 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(cssW, midY); ctx.stroke();

  // Gene zeichnen (Pfeile)
  const geneH = 12;
  const arrowLen = 5;
  // Genfilter: nur die im Fenster
  for (const g of genes) {
    if (g.end < leftBound || g.start > rightBound) continue;
    const gx0 = bp2px(Math.max(g.start, leftBound));
    const gx1 = bp2px(Math.min(g.end, rightBound));
    const gw = Math.max(2, gx1 - gx0);
    const gy = midY - geneH / 2;
    // Pfeilform: Box mit Spitze in Strang-Richtung
    const fillColor = g.strand === 1 ? 'rgba(122,184,245,0.55)' : 'rgba(255,183,77,0.55)';
    ctx.fillStyle = fillColor;
    ctx.strokeStyle = g.strand === 1 ? 'rgba(122,184,245,0.9)' : 'rgba(255,183,77,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    if (g.strand === 1) {
      // → Spitze rechts
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx0, gy);
      ctx.lineTo(gx1 - tipLen, gy);
      ctx.lineTo(gx1, gy + geneH / 2);
      ctx.lineTo(gx1 - tipLen, gy + geneH);
      ctx.lineTo(gx0, gy + geneH);
      ctx.closePath();
    } else {
      // ← Spitze links
      const tipLen = Math.min(arrowLen, gw / 2);
      ctx.moveTo(gx1, gy);
      ctx.lineTo(gx0 + tipLen, gy);
      ctx.lineTo(gx0, gy + geneH / 2);
      ctx.lineTo(gx0 + tipLen, gy + geneH);
      ctx.lineTo(gx1, gy + geneH);
      ctx.closePath();
    }
    ctx.fill(); ctx.stroke();

    // Gen-Name wenn Platz
    if (gw > 30) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '9px ui-monospace, monospace';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'left';
      const name = g.name || '?';
      const tx = gx0 + 3;
      ctx.fillText(name, tx, midY);
    }
  }

  // Motiv-Marker zeichnen — alle nicht-gemuteten Motive die einen Treffer im Fenster haben
  // Marker liegen ÜBER der Gen-Spur (mid - geneH - paddingMarker)
  const markerY = midY - geneH / 2 - 5;
  const markerH = 4;
  for (const otherMotif of motifs) {
    if (otherMotif.visibleInOverview === false) continue;
    if (!otherMotif.results) continue;
    for (const oh of otherMotif.results.hits) {
      if (oh.end < leftBound || oh.start > rightBound) continue;
      const x0 = bp2px(Math.max(oh.start, leftBound));
      const x1 = bp2px(Math.min(oh.end, rightBound));
      const w = Math.max(2, x1 - x0);
      // Treffer des aktuellen Motivs am Anker hervorheben
      const isAnchorHit = (otherMotif.id === motif.id) && oh.start === hit.start && oh.end === hit.end;
      ctx.fillStyle = otherMotif.color;
      ctx.globalAlpha = isAnchorHit ? 1.0 : 0.85;
      ctx.fillRect(x0, markerY - markerH / 2, w, markerH);
      // Strang-Indikator: kleiner Pfeil/Strich oben oder unten
      ctx.fillStyle = otherMotif.color;
      ctx.beginPath();
      if (oh.strand === 1) {
        ctx.moveTo(x1, markerY - markerH / 2);
        ctx.lineTo(x1 + 3, markerY);
        ctx.lineTo(x1, markerY + markerH / 2);
      } else {
        ctx.moveTo(x0, markerY - markerH / 2);
        ctx.lineTo(x0 - 3, markerY);
        ctx.lineTo(x0, markerY + markerH / 2);
      }
      ctx.closePath();
      ctx.fill();
      // Hervorhebung des aktuellen Treffers: kleiner Rahmen
      if (isAnchorHit) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(x0 - 0.5, markerY - markerH / 2 - 0.5, w + 1, markerH + 1);
      }
    }
    ctx.globalAlpha = 1;
  }

  // Anker-Markierung: dünne Linie vom Marker bis Mid
  const ax = bp2px(anchor);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 2]);
  ctx.beginPath();
  ctx.moveTo(ax, 0);
  ctx.lineTo(ax, cssH);
  ctx.stroke();
  ctx.setLineDash([]);
}

// Maßstab setzen: nice number, passend zur Fenstergröße
function setScale(el, pxWidth, bpWindow) {
  // Ziel: ein Balken von ~120-180 px Breite
  const targetPx = 140;
  const bpPerPx = bpWindow / pxWidth;
  const targetBp = bpPerPx * targetPx;
  // nice number nach 1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, ...
  const niceSteps = [1,2,5,10,20,50,100,200,500,1000,2000,5000,10000,20000,50000,100000,200000,500000];
  let chosen = niceSteps[0];
  for (const s of niceSteps) { if (s <= targetBp) chosen = s; }
  const barPx = chosen / bpPerPx;
  el.innerHTML = '';
  const bar = document.createElement('span');
  bar.className = 'scale-bar';
  bar.style.width = barPx + 'px';
  el.appendChild(bar);
  const lbl = document.createElement('span');
  lbl.textContent = chosen >= 1000 ? (chosen / 1000) + ' kb' : chosen + ' bp';
  el.appendChild(lbl);
}

function sortHits(r) {
  const dir = r.sortDir === 'asc' ? 1 : -1;
  const k = r.sortBy;
  r.hits.sort((a, b) => {
    let av, bv;
    // Spacer-Spalten: spacer_0, spacer_1, ...
    if (k && k.startsWith('spacer_')) {
      const idx = parseInt(k.substring(7), 10);
      av = (a.spacers && a.spacers[idx] !== undefined) ? a.spacers[idx] : Infinity;
      bv = (b.spacers && b.spacers[idx] !== undefined) ? b.spacers[idx] : Infinity;
    } else {
      av = a[k]; bv = b[k];
    }
    if (av === null || av === undefined) av = (typeof bv === 'number') ? Infinity : '';
    if (bv === null || bv === undefined) bv = (typeof av === 'number') ? Infinity : '';
    if (typeof av === 'string') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });
}

// Sequenz-Coloring mit Block-Awareness:
// - Submotive in Base-Farben mit Mismatch-Highlight
// - Spacer-Basen in vollem Inhalt, grau-kursiv, gepaddet auf max-Range zentriert
function colorizeBlockSequence(hit, blocks) {
  if (!blocks) return colorizeSequenceFlat(hit.sequence);

  let out = '';
  let pos = 0;       // Position in hit.sequence
  let spacerIdx = 0; // Welcher Spacer kommt als nächstes

  for (const b of blocks) {
    if (b.type === 'fixed') {
      const L = b.seq.length;
      for (let i = 0; i < L; i++) {
        const base = (hit.sequence[pos + i] || 'N').toUpperCase();
        const cls = 'b-' + (['A','C','G','T','N'].includes(base) ? base : 'N');
        const allowed = IUPAC[b.seq[i]] || ['A','C','G','T'];
        const isMatch = allowed.includes(base);
        out += '<span class="seq-base ' + cls + (isMatch ? '' : ' mismatch') + '">' + base + '</span>';
      }
      pos += L;
    } else {
      // Spacer-Block: tatsächliche Länge aus hit.spacers, Padding auf b.max
      const len = (hit.spacers && hit.spacers[spacerIdx] !== undefined) ? hit.spacers[spacerIdx] : b.min;
      spacerIdx++;
      const totalPad = b.max - len;
      const padLeft = Math.floor(totalPad / 2);
      const padRight = totalPad - padLeft;

      // Trennzeichen vorm Spacer-Block (visuelle Klarheit)
      out += '<span class="spacer-pad"> </span>';
      // Padding links
      if (padLeft > 0) out += '<span class="spacer-pad">' + '·'.repeat(padLeft) + '</span>';
      // Spacer-Inhalt (lowercase, kursiv-grau)
      let spacerContent = '';
      for (let i = 0; i < len; i++) {
        const base = (hit.sequence[pos + i] || 'n').toLowerCase();
        spacerContent += base;
      }
      out += '<span class="spacer-base">' + spacerContent + '</span>';
      // Padding rechts
      if (padRight > 0) out += '<span class="spacer-pad">' + '·'.repeat(padRight) + '</span>';
      out += '<span class="spacer-pad"> </span>';

      pos += len;
    }
  }
  return out;
}

function colorizeSequenceFlat(seq) {
  let out = '';
  for (let i = 0; i < seq.length; i++) {
    const b = seq[i].toUpperCase();
    const cls = 'b-' + (['A','C','G','T','N'].includes(b) ? b : 'N');
    out += '<span class="seq-base ' + cls + '">' + b + '</span>';
  }
  return out;
}

};

let activeTooltipTrigger = null;

function setupTooltips() {
  const box = document.getElementById('tooltip-box');
  const close = document.getElementById('tt-close');

  document.addEventListener('click', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger) {
      e.stopPropagation();
      const key = trigger.dataset.tt;
      if (!key) return;
      if (activeTooltipTrigger === trigger) {
        hideTooltip();
        return;
      }
      showTooltip(trigger, key);
    } else if (!e.target.closest('#tooltip-box')) {
      hideTooltip();
    }
  });

  close.addEventListener('click', (e) => {
    e.stopPropagation();
    hideTooltip();
  });

  // Desktop: Hover
  document.addEventListener('mouseover', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger && trigger !== activeTooltipTrigger) {
      const key = trigger.dataset.tt;
      if (key && TOOLTIPS[key]) {
        clearTimeout(window._ttHoverTimeout);
        window._ttHoverTimeout = setTimeout(() => showTooltip(trigger, key), 250);
      }
    }
  });
  document.addEventListener('mouseout', (e) => {
    const trigger = e.target.closest('.info-icon');
    if (trigger) clearTimeout(window._ttHoverTimeout);
  });
}

function showTooltip(trigger, key) {
  const tt = TOOLTIPS[key];
  if (!tt) return;
  const box = document.getElementById('tooltip-box');
  document.getElementById('tt-title-text').textContent = tt.title;
  document.getElementById('tt-body').textContent = tt.body;
  box.classList.add('show');

  // Position berechnen — bevorzugt unterhalb, sonst oberhalb
  const r = trigger.getBoundingClientRect();
  box.style.left = '0px'; box.style.top = '0px'; // reset für Messung
  const bb = box.getBoundingClientRect();
  let left = r.left + r.width / 2 - bb.width / 2;
  let top = r.bottom + 8;
  if (top + bb.height > window.innerHeight - 10) {
    top = r.top - bb.height - 8;
  }
  if (left < 10) left = 10;
  if (left + bb.width > window.innerWidth - 10) left = window.innerWidth - bb.width - 10;
  box.style.left = left + 'px';
  box.style.top = top + 'px';

  if (activeTooltipTrigger) activeTooltipTrigger.classList.remove('active');
  trigger.classList.add('active');
  activeTooltipTrigger = trigger;
}

function hideTooltip() {
  document.getElementById('tooltip-box').classList.remove('show');
  if (activeTooltipTrigger) activeTooltipTrigger.classList.remove('active');
  activeTooltipTrigger = null;
}
